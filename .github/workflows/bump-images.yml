# Manually triggered pipeline to bump NeuralTrust image versions.
# Updates: values.yaml, template hardcoded fallbacks, subchart defaults,
# and bumps chart versions (patch).
#
# For each image, provide a specific tag or leave empty to auto-detect
# the latest release from Google Artifact Registry.
#
# Usage:
#   1. Go to Actions → "Bump Image Versions" → Run workflow
#   2. Fill in specific tags or leave empty for auto-detection
#   3. The workflow creates a PR with the version changes

name: Bump Image Versions

on:
  workflow_dispatch:
    inputs:
      trustgate_tag:
        description: "trustgate-ee tag (e.g. v1.9.51). Empty = latest from AR."
        required: false
        default: ""
      control_plane_api_tag:
        description: "control-plane-api tag (e.g. v1.8.3). Empty = latest from AR."
        required: false
        default: ""
      scheduler_tag:
        description: "scheduler tag (e.g. v1.8.1). Empty = latest from AR."
        required: false
        default: ""
      app_tag:
        description: "app (frontend) tag (e.g. v1.8.1). Empty = latest from AR."
        required: false
        default: ""
      data_plane_api_tag:
        description: "data-plane-api tag (e.g. v1.8.4). Empty = latest from AR."
        required: false
        default: ""
      workers_tag:
        description: "workers tag (e.g. v1.5.0). Empty = latest from AR."
        required: false
        default: ""
      kafka_connect_tag:
        description: "kafka-connect tag (e.g. v0.0.2). Empty = latest from AR."
        required: false
        default: ""
      firewall_tag:
        description: "firewall-cpu / firewall-gpu tag (e.g. v2.4.3). Empty = latest from firewall-cpu in AR (same tag as firewall-gpu)."
        required: false
        default: ""
      aispm_tag:
        description: "aispm-api / aispm-worker / aispm-beat tag (shared, e.g. v0.15.0). Empty = latest from aispm-api in AR (api/worker/beat ship together)."
        required: false
        default: ""
      siem_connectors_tag:
        description: "siem-connectors tag (e.g. v0.1.0). Empty = latest from AR (no change if no semver tag is published)."
        required: false
        default: ""
      clickhouse_tag:
        description: "clickhouse-server tag (e.g. 25.8 or 25.10.1). Empty = latest from AR (matches X.Y, X.Y.Z, X.Y.Z.W)."
        required: false
        default: ""
      kafka_tag:
        description: "kafka tag (e.g. 4.2.0). Empty = latest bare semver from AR (no v prefix)."
        required: false
        default: ""
      redis_tag:
        description: "redis-stack-server tag (e.g. 7.2.0-v20). Empty = latest matching X.Y.Z-vNN from AR."
        required: false
        default: ""
      postgres_tag:
        description: "postgres tag (e.g. 17-alpine). Empty = latest matching N-alpine from AR (used by trustgate db-init and control-plane in-cluster postgres)."
        required: false
        default: ""
      curl_tag:
        description: "curl tag (e.g. 8.19.0). Empty = latest bare semver from AR (used by ClickHouse backup cronjob and the api healthCheck job placeholder)."
        required: false
        default: ""
      fetch_latest:
        description: "Fetch latest from Artifact Registry for empty inputs"
        required: false
        type: boolean
        default: true

env:
  AR_REGISTRY: europe-west1-docker.pkg.dev
  AR_PROJECT: neuraltrust-app-prod
  AR_REPO: nt-docker

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Resolve image tags
        id: tags
        run: |
          AR_BASE="${{ env.AR_REGISTRY }}/${{ env.AR_PROJECT }}/${{ env.AR_REPO }}"
          FETCH_LATEST="${{ inputs.fetch_latest }}"

          resolve_tag() {
            local image="$1"
            local manual_tag="$2"
            # Default: bare semver (v1.2.3). Optional third arg overrides the grep -E pattern.
            local tag_pattern="${3:-^v[0-9]+\.[0-9]+\.[0-9]+$}"

            if [[ -n "$manual_tag" ]]; then
              echo "$manual_tag"
              return
            fi

            if [[ "$FETCH_LATEST" != "true" ]]; then
              echo ""
              return
            fi

            echo "Fetching latest tag for ${image}..." >&2

            local latest
            latest=$(gcloud artifacts docker tags list \
              "${AR_BASE}/${image}" \
              --format='value(tag)' 2>&1)

            if [[ $? -ne 0 ]]; then
              echo "ERROR: gcloud failed for ${image}: ${latest}" >&2
              echo ""
              return
            fi

            # Filter tags by pattern (default: bare v1.2.3 semver)
            latest=$(echo "$latest" | grep -E "$tag_pattern" | sort -V | tail -1)

            if [[ -z "$latest" ]]; then
              echo "WARNING: Could not find latest tag for ${image}" >&2
              echo ""
              return
            fi

            echo "  → ${image}: ${latest}" >&2
            echo "$latest"
          }

          TRUSTGATE=$(resolve_tag "trustgate-ee" "${{ inputs.trustgate_tag }}")
          CONTROL_PLANE_API=$(resolve_tag "control-plane-api" "${{ inputs.control_plane_api_tag }}")
          SCHEDULER=$(resolve_tag "scheduler" "${{ inputs.scheduler_tag }}")
          APP=$(resolve_tag "app" "${{ inputs.app_tag }}")
          DATA_PLANE_API=$(resolve_tag "data-plane-api" "${{ inputs.data_plane_api_tag }}")
          WORKERS=$(resolve_tag "workers" "${{ inputs.workers_tag }}")
          KAFKA_CONNECT=$(resolve_tag "kafka-connect" "${{ inputs.kafka_connect_tag }}")
          FIREWALL=$(resolve_tag "firewall-cpu" "${{ inputs.firewall_tag }}")
          AISPM=$(resolve_tag "aispm-api" "${{ inputs.aispm_tag }}")
          SIEM_CONNECTORS=$(resolve_tag "siem-connectors" "${{ inputs.siem_connectors_tag }}")

          # Infrastructure images (non-standard tag patterns, override default regex).
          CLICKHOUSE=$(resolve_tag "clickhouse-server" "${{ inputs.clickhouse_tag }}" '^[0-9]+\.[0-9]+(\.[0-9]+){0,2}$')
          KAFKA=$(resolve_tag "kafka" "${{ inputs.kafka_tag }}" '^[0-9]+\.[0-9]+\.[0-9]+$')
          REDIS=$(resolve_tag "redis-stack-server" "${{ inputs.redis_tag }}" '^[0-9]+\.[0-9]+\.[0-9]+-v[0-9]+$')
          POSTGRES=$(resolve_tag "postgres" "${{ inputs.postgres_tag }}" '^[0-9]+-alpine$')
          CURL=$(resolve_tag "curl" "${{ inputs.curl_tag }}" '^[0-9]+\.[0-9]+\.[0-9]+$')

          echo "trustgate=${TRUSTGATE}" >> "$GITHUB_OUTPUT"
          echo "control_plane_api=${CONTROL_PLANE_API}" >> "$GITHUB_OUTPUT"
          echo "scheduler=${SCHEDULER}" >> "$GITHUB_OUTPUT"
          echo "app=${APP}" >> "$GITHUB_OUTPUT"
          echo "data_plane_api=${DATA_PLANE_API}" >> "$GITHUB_OUTPUT"
          echo "workers=${WORKERS}" >> "$GITHUB_OUTPUT"
          echo "kafka_connect=${KAFKA_CONNECT}" >> "$GITHUB_OUTPUT"
          echo "firewall=${FIREWALL}" >> "$GITHUB_OUTPUT"
          echo "aispm=${AISPM}" >> "$GITHUB_OUTPUT"
          echo "siem_connectors=${SIEM_CONNECTORS}" >> "$GITHUB_OUTPUT"
          echo "clickhouse=${CLICKHOUSE}" >> "$GITHUB_OUTPUT"
          echo "kafka=${KAFKA}" >> "$GITHUB_OUTPUT"
          echo "redis=${REDIS}" >> "$GITHUB_OUTPUT"
          echo "postgres=${POSTGRES}" >> "$GITHUB_OUTPUT"
          echo "curl=${CURL}" >> "$GITHUB_OUTPUT"

          echo "### Resolved Tags" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| trustgate-ee | \`${TRUSTGATE:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| control-plane-api | \`${CONTROL_PLANE_API:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| scheduler | \`${SCHEDULER:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| app | \`${APP:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| data-plane-api | \`${DATA_PLANE_API:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| workers | \`${WORKERS:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| kafka-connect | \`${KAFKA_CONNECT:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| firewall-cpu (tag shared with firewall-gpu) | \`${FIREWALL:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| aispm-api/worker/beat (shared tag) | \`${AISPM:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| siem-connectors | \`${SIEM_CONNECTORS:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| clickhouse-server | \`${CLICKHOUSE:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| kafka | \`${KAFKA:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| redis-stack-server | \`${REDIS:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| postgres (trustgate db-init + control-plane in-cluster) | \`${POSTGRES:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| curl (clickhouse backup cronjob) | \`${CURL:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Update values.yaml and template defaults
        id: update
        run: |
          CHANGES=()
          BUMP_CONTROL_PLANE=false
          BUMP_DATA_PLANE=false
          BUMP_TRUSTGATE=false
          BUMP_FIREWALL=false
          BUMP_AISPM=false
          BUMP_SIEM_CONNECTORS=false
          BUMP_CLICKHOUSE=false
          BUMP_KAFKA=false

          # --- Helper: update a tag in values.yaml via yq ---
          update_values_tag() {
            local yq_path="$1"
            local new_tag="$2"
            local image_name="$3"
            local file="${4:-values.yaml}"

            if [[ -z "$new_tag" ]]; then
              return 1
            fi

            local current_tag
            current_tag=$(yq eval "${yq_path}" "$file")

            if [[ "$current_tag" == "$new_tag" ]]; then
              echo "No change for ${image_name} in ${file} (already ${current_tag})"
              return 1
            fi

            echo "Updating ${image_name} in ${file}: ${current_tag} → ${new_tag}"
            yq eval -i "${yq_path} = \"${new_tag}\"" "$file"
            CHANGES+=("${image_name}: ${current_tag} → ${new_tag}")
            return 0
          }

          # --- Helper: update hardcoded fallback tag in a Go template file ---
          # Handles both patterns:
          #   {{- $var := "TAG" }}                        (control-plane style)
          #   {{- $var := .Values.path | default "TAG" }} (data-plane style)
          # Always returns 0 (safe under set -e). Sets TEMPLATE_TAG_CHANGED=1 if
          # the file was actually modified, 0 otherwise (no match / already at this tag).
          TEMPLATE_TAG_CHANGED=0
          update_template_tag() {
            TEMPLATE_TAG_CHANGED=0
            local file="$1"
            local var_name="$2"
            local new_tag="$3"

            if [[ -z "$new_tag" ]]; then
              return 0
            fi

            if ! grep -q "\$${var_name} :=" "$file" 2>/dev/null; then
              return 0
            fi

            cp "$file" "${file}.bump-bak"
            # Pattern: {{- $var := "OLD" }}
            sed -i "s/\(\$${var_name} := \)\"[^\"]*\"/\1\"${new_tag}\"/" "$file"
            # Pattern: {{- $var := .Values.xxx | default "OLD" }}
            sed -i "s/\(\$${var_name} := .*| default \)\"[^\"]*\"/\1\"${new_tag}\"/" "$file"

            if cmp -s "$file" "${file}.bump-bak"; then
              rm -f "${file}.bump-bak"
              return 0
            fi

            rm -f "${file}.bump-bak"
            echo "  Updated fallback \$${var_name} → ${new_tag} in ${file}"
            TEMPLATE_TAG_CHANGED=1
            return 0
          }

          # --- Helper: bump patch version in a Chart.yaml ---
          bump_chart_version() {
            local chart_file="$1"
            local current
            current=$(yq eval '.version' "$chart_file")
            local major minor patch
            IFS='.' read -r major minor patch <<< "$current"
            patch=$((patch + 1))
            local new_version="${major}.${minor}.${patch}"
            yq eval -i ".version = \"${new_version}\"" "$chart_file"
            echo "  Bumped ${chart_file}: ${current} → ${new_version}" >&2
            echo "${new_version}"
          }

          # =============================================
          # 1. TrustGate EE
          # =============================================
          TAG="${{ steps.tags.outputs.trustgate }}"
          if update_values_tag '.trustgate.global.image.tag' "$TAG" "trustgate-ee"; then
            BUMP_TRUSTGATE=true
            # Sync trustgate subchart default values
            yq eval -i ".global.image.tag = \"${TAG}\"" charts/trustgate/values.yaml
            echo "  Synced charts/trustgate/values.yaml"
          fi

          # =============================================
          # 2. Control Plane API
          # =============================================
          TAG="${{ steps.tags.outputs.control_plane_api }}"
          if update_values_tag '.["neuraltrust-control-plane"].controlPlane.components.api.image.tag' "$TAG" "control-plane-api"; then
            BUMP_CONTROL_PLANE=true
            update_template_tag "charts/neuraltrust-control-plane/templates/api/deployment.yaml" "apiImageTag" "$TAG"
          fi

          # =============================================
          # 3. Scheduler
          # =============================================
          TAG="${{ steps.tags.outputs.scheduler }}"
          if update_values_tag '.["neuraltrust-control-plane"].controlPlane.components.scheduler.image.tag' "$TAG" "scheduler"; then
            BUMP_CONTROL_PLANE=true
            update_template_tag "charts/neuraltrust-control-plane/templates/scheduler/deployment.yaml" "imageTag" "$TAG"
          fi

          # =============================================
          # 4. App (frontend) — updates both initContainer and main container
          # =============================================
          TAG="${{ steps.tags.outputs.app }}"
          if update_values_tag '.["neuraltrust-control-plane"].controlPlane.components.app.image.tag' "$TAG" "app"; then
            BUMP_CONTROL_PLANE=true
            update_template_tag "charts/neuraltrust-control-plane/templates/app/deployment.yaml" "initImageTag" "$TAG"
            update_template_tag "charts/neuraltrust-control-plane/templates/app/deployment.yaml" "appImageTag" "$TAG"
          fi

          # =============================================
          # 5. Data Plane API
          # =============================================
          TAG="${{ steps.tags.outputs.data_plane_api }}"
          if update_values_tag '.["neuraltrust-data-plane"].dataPlane.components.api.image.tag' "$TAG" "data-plane-api"; then
            BUMP_DATA_PLANE=true
            update_template_tag "charts/neuraltrust-data-plane/templates/api/deployment.yaml" "apiTag" "$TAG"
          fi

          # =============================================
          # 6. Workers
          # =============================================
          TAG="${{ steps.tags.outputs.workers }}"
          if update_values_tag '.["neuraltrust-data-plane"].dataPlane.components.worker.image.tag' "$TAG" "workers"; then
            BUMP_DATA_PLANE=true
            update_template_tag "charts/neuraltrust-data-plane/templates/worker/deployment.yaml" "workerTag" "$TAG"
          fi

          # =============================================
          # 7. Kafka Connect
          # =============================================
          TAG="${{ steps.tags.outputs.kafka_connect }}"
          if update_values_tag '.["neuraltrust-data-plane"].dataPlane.components.kafka.connect.image.tag' "$TAG" "kafka-connect"; then
            BUMP_DATA_PLANE=true
            update_template_tag "charts/neuraltrust-data-plane/templates/kafka-components/deployment.yaml" "kafkaConnectTag" "$TAG"
          fi

          # =============================================
          # 8. Firewall (gateway + worker share a single tag/image)
          # Touches: two parent values paths, the firewall subchart's own
          # values.yaml mirror, and the hardcoded fallbacks in both
          # gateway-deployment.yaml ($gwTag) and worker-deployment.yaml ($wTag).
          # NOTE: the orphan .["neuraltrust-firewall"].firewall.image.tag in
          # parent values.yaml is intentionally NOT touched — no template reads
          # it. It remains for backward-compat with any external --set callers.
          # =============================================
          TAG="${{ steps.tags.outputs.firewall }}"
          if [[ -n "$TAG" ]]; then
            if update_values_tag '.["neuraltrust-firewall"].firewall.gateway.image.tag' "$TAG" "firewall-cpu (gateway)"; then
              BUMP_FIREWALL=true
              yq eval -i ".firewall.gateway.image.tag = \"${TAG}\"" charts/neuraltrust-firewall/values.yaml
              echo "  Synced charts/neuraltrust-firewall/values.yaml firewall.gateway.image.tag"
              update_template_tag "charts/neuraltrust-firewall/templates/gateway-deployment.yaml" "gwTag" "$TAG"
            fi
            if update_values_tag '.["neuraltrust-firewall"].firewall.workerDefaults.image.tag' "$TAG" "firewall-cpu (worker)"; then
              BUMP_FIREWALL=true
              yq eval -i ".firewall.workerDefaults.image.tag = \"${TAG}\"" charts/neuraltrust-firewall/values.yaml
              echo "  Synced charts/neuraltrust-firewall/values.yaml firewall.workerDefaults.image.tag"
              update_template_tag "charts/neuraltrust-firewall/templates/worker-deployment.yaml" "wTag" "$TAG"
            fi
          fi

          # =============================================
          # 9. AISPM (api / worker / beat share a single coordinated tag)
          # Parent values.yaml has these blocks commented out by default —
          # write tags into the subchart's own values.yaml and template fallbacks.
          # =============================================
          TAG="${{ steps.tags.outputs.aispm }}"
          if [[ -n "$TAG" ]]; then
            for COMPONENT in api worker beat; do
              if update_values_tag ".aispm.${COMPONENT}.image.tag" "$TAG" "aispm-${COMPONENT}" "charts/neuraltrust-aispm/values.yaml"; then
                BUMP_AISPM=true
                update_template_tag "charts/neuraltrust-aispm/templates/${COMPONENT}-deployment.yaml" "tag" "$TAG"
              fi
            done
          fi

          # =============================================
          # 10. SIEM Connectors (single image)
          # Parent values.yaml has this block commented out by default —
          # write the tag into the subchart's own values.yaml and template fallback.
          # =============================================
          TAG="${{ steps.tags.outputs.siem_connectors }}"
          if update_values_tag '.siemConnectors.image.tag' "$TAG" "siem-connectors" "charts/neuraltrust-siem-connectors/values.yaml"; then
            BUMP_SIEM_CONNECTORS=true
            update_template_tag "charts/neuraltrust-siem-connectors/templates/deployment.yaml" "tag" "$TAG"
          fi

          # =============================================
          # 11. Infrastructure: ClickHouse (clickhouse-server)
          # No subchart values.yaml — parent values.yaml is the sole source.
          # No template fallback (charts/clickhouse uses .Values.image directly).
          # =============================================
          TAG="${{ steps.tags.outputs.clickhouse }}"
          if update_values_tag '.clickhouse.image.tag' "$TAG" "clickhouse-server"; then
            BUMP_CLICKHOUSE=true
          fi

          # =============================================
          # 12. Infrastructure: Kafka
          # No subchart values.yaml — parent values.yaml is the sole source.
          # =============================================
          TAG="${{ steps.tags.outputs.kafka }}"
          if update_values_tag '.kafka.image.tag' "$TAG" "kafka"; then
            BUMP_KAFKA=true
          fi

          # =============================================
          # 13. Infrastructure: Redis (redis-stack-server, used by trustgate)
          # Lives under .trustgate.redis.image — also mirrored in the trustgate
          # subchart's own values.yaml. No hardcoded template fallback.
          # =============================================
          TAG="${{ steps.tags.outputs.redis }}"
          if update_values_tag '.trustgate.redis.image.tag' "$TAG" "redis-stack-server (parent)"; then
            BUMP_TRUSTGATE=true
            yq eval -i ".redis.image.tag = \"${TAG}\"" charts/trustgate/values.yaml
            echo "  Synced charts/trustgate/values.yaml redis.image.tag"
          fi

          # =============================================
          # 14. Infrastructure: Postgres (used by trustgate db-init job
          # and the control-plane in-cluster postgres)
          # Two parent paths + three template fallbacks.
          # =============================================
          TAG="${{ steps.tags.outputs.postgres }}"
          if [[ -n "$TAG" ]]; then
            if update_values_tag '.trustgate.global.postgresql.image.tag' "$TAG" "postgres (trustgate)"; then
              BUMP_TRUSTGATE=true
              update_template_tag "charts/trustgate/templates/postgresql-init-job.yaml" "postgresImageTag" "$TAG"
            fi
            if update_values_tag '.["neuraltrust-control-plane"].controlPlane.components.postgresql.image.tag' "$TAG" "postgres (control-plane)"; then
              BUMP_CONTROL_PLANE=true
              update_template_tag "charts/neuraltrust-control-plane/templates/api/deployment.yaml" "pgWaitImageTag" "$TAG"
              update_template_tag "charts/neuraltrust-control-plane/templates/scheduler/deployment.yaml" "pgWaitImageTag" "$TAG"
            fi
          fi

          # =============================================
          # 15. Infrastructure: curl (ClickHouse backup cronjob)
          # The parent path under controlPlane.components.api.healthCheck is
          # documentation-only (no template references it) — kept in sync for
          # values.yaml accuracy. The functional usage is the data-plane
          # backup-cronjob template fallback.
          # =============================================
          TAG="${{ steps.tags.outputs.curl }}"
          if [[ -n "$TAG" ]]; then
            if update_values_tag '.["neuraltrust-control-plane"].controlPlane.components.api.healthCheck.image.tag' "$TAG" "curl (control-plane healthCheck doc)"; then
              BUMP_CONTROL_PLANE=true
            fi
            # The backup-cronjob fallback is the only functional curl usage.
            update_template_tag "charts/neuraltrust-data-plane/templates/clickhouse-config/backup-cronjob.yaml" "backupTag" "$TAG"
            if [[ "$TEMPLATE_TAG_CHANGED" == "1" ]]; then
              CHANGES+=("curl (clickhouse backup-cronjob fallback): → ${TAG}")
              BUMP_DATA_PLANE=true
            fi
          fi

          # =============================================
          # Bump chart versions (patch) for changed subcharts
          # =============================================
          echo ""
          echo "=== Chart Version Bumps ==="

          # Bump subchart versions (patch) and sync dependency refs in root Chart.yaml
          # Note: root chart VERSION is handled by auto-release.yml on merge
          if [[ "$BUMP_CONTROL_PLANE" == "true" ]]; then
            NEW_VER=$(bump_chart_version "charts/neuraltrust-control-plane/Chart.yaml")
            yq eval -i "(.dependencies[] | select(.name == \"neuraltrust-control-plane\")).version = \"${NEW_VER}\"" Chart.yaml
            echo "  Updated root Chart.yaml dep: neuraltrust-control-plane → ${NEW_VER}"
          fi

          if [[ "$BUMP_DATA_PLANE" == "true" ]]; then
            NEW_VER=$(bump_chart_version "charts/neuraltrust-data-plane/Chart.yaml")
            yq eval -i "(.dependencies[] | select(.name == \"neuraltrust-data-plane\")).version = \"${NEW_VER}\"" Chart.yaml
            echo "  Updated root Chart.yaml dep: neuraltrust-data-plane → ${NEW_VER}"
          fi

          if [[ "$BUMP_TRUSTGATE" == "true" ]]; then
            NEW_VER=$(bump_chart_version "charts/trustgate/Chart.yaml")
            yq eval -i "(.dependencies[] | select(.name == \"trustgate\")).version = \"${NEW_VER}\"" Chart.yaml
            echo "  Updated root Chart.yaml dep: trustgate → ${NEW_VER}"
          fi

          if [[ "$BUMP_FIREWALL" == "true" ]]; then
            NEW_VER=$(bump_chart_version "charts/neuraltrust-firewall/Chart.yaml")
            yq eval -i "(.dependencies[] | select(.name == \"neuraltrust-firewall\")).version = \"${NEW_VER}\"" Chart.yaml
            echo "  Updated root Chart.yaml dep: neuraltrust-firewall → ${NEW_VER}"
          fi

          if [[ "$BUMP_AISPM" == "true" ]]; then
            NEW_VER=$(bump_chart_version "charts/neuraltrust-aispm/Chart.yaml")
            yq eval -i "(.dependencies[] | select(.name == \"neuraltrust-aispm\")).version = \"${NEW_VER}\"" Chart.yaml
            echo "  Updated root Chart.yaml dep: neuraltrust-aispm → ${NEW_VER}"
          fi

          if [[ "$BUMP_SIEM_CONNECTORS" == "true" ]]; then
            NEW_VER=$(bump_chart_version "charts/neuraltrust-siem-connectors/Chart.yaml")
            yq eval -i "(.dependencies[] | select(.name == \"neuraltrust-siem-connectors\")).version = \"${NEW_VER}\"" Chart.yaml
            echo "  Updated root Chart.yaml dep: neuraltrust-siem-connectors → ${NEW_VER}"
          fi

          if [[ "$BUMP_CLICKHOUSE" == "true" ]]; then
            NEW_VER=$(bump_chart_version "charts/clickhouse/Chart.yaml")
            yq eval -i "(.dependencies[] | select(.name == \"clickhouse\")).version = \"${NEW_VER}\"" Chart.yaml
            echo "  Updated root Chart.yaml dep: clickhouse → ${NEW_VER}"
          fi

          if [[ "$BUMP_KAFKA" == "true" ]]; then
            NEW_VER=$(bump_chart_version "charts/kafka/Chart.yaml")
            yq eval -i "(.dependencies[] | select(.name == \"kafka\")).version = \"${NEW_VER}\"" Chart.yaml
            echo "  Updated root Chart.yaml dep: kafka → ${NEW_VER}"
          fi

          # Save changes summary
          if [[ ${#CHANGES[@]} -eq 0 ]]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "No version changes needed."
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
            {
              echo "CHANGES_SUMMARY<<EOF"
              for c in "${CHANGES[@]}"; do echo "- ${c}"; done
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Regenerate Chart.lock
        if: steps.update.outputs.no_changes != 'true'
        run: |
          helm dependency update .
          echo "Chart.lock regenerated"

      - name: Check for changes
        if: steps.update.outputs.no_changes != 'true'
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "### Changes" >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            git diff >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create Pull Request
        if: steps.update.outputs.no_changes != 'true' && steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/bump-images-$(date +%Y%m%d-%H%M%S)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add \
            values.yaml \
            Chart.yaml \
            Chart.lock \
            charts/trustgate/values.yaml \
            charts/trustgate/Chart.yaml \
            charts/trustgate/templates/ \
            charts/neuraltrust-control-plane/Chart.yaml \
            charts/neuraltrust-control-plane/templates/ \
            charts/neuraltrust-data-plane/Chart.yaml \
            charts/neuraltrust-data-plane/templates/ \
            charts/neuraltrust-firewall/values.yaml \
            charts/neuraltrust-firewall/Chart.yaml \
            charts/neuraltrust-firewall/templates/ \
            charts/neuraltrust-aispm/values.yaml \
            charts/neuraltrust-aispm/Chart.yaml \
            charts/neuraltrust-aispm/templates/ \
            charts/neuraltrust-siem-connectors/values.yaml \
            charts/neuraltrust-siem-connectors/Chart.yaml \
            charts/neuraltrust-siem-connectors/templates/ \
            charts/clickhouse/Chart.yaml \
            charts/kafka/Chart.yaml
          git commit -m "$(cat <<COMMIT
          chore: bump image versions

          ${CHANGES_SUMMARY}
          COMMIT
          )"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: bump image versions" \
            --body "$(cat <<PR_BODY
          ## Image Version Bump

          Triggered by: @${{ github.actor }}
          Mode: ${{ inputs.fetch_latest == true && 'auto-detect latest from Artifact Registry' || 'manual input' }}

          ### Changes
          ${CHANGES_SUMMARY}

          ---
          *Auto-generated by [Bump Image Versions](/${{ github.repository }}/actions/workflows/bump-images.yml) workflow*
          PR_BODY
          )" \
            --base main \
            --head "$BRANCH"

      - name: No changes summary
        if: steps.update.outputs.no_changes == 'true' || steps.diff.outputs.has_changes == 'false'
        run: |
          echo "### No Changes" >> "$GITHUB_STEP_SUMMARY"
          echo "All images are already at the requested versions." >> "$GITHUB_STEP_SUMMARY"
