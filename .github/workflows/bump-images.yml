# Manually triggered pipeline to bump NeuralTrust image versions.
# Updates: values.yaml, template hardcoded fallbacks, subchart defaults,
# and bumps chart versions (patch).
#
# v2-only: v1 (TrustGate/Kafka) is maintained on the v1.14.x release line and is
# not bumped here.
#
# For each image, provide a specific tag or leave empty to auto-detect
# the latest release from Google Artifact Registry.
#
# Usage:
#   1. Go to Actions → "Bump Image Versions" → Run workflow
#   2. Fill in specific tags or leave empty for auto-detection
#   3. The workflow creates a PR with the version changes

name: Bump Image Versions

on:
  workflow_dispatch:
    inputs:
      control_plane_api_tag:
        description: "control-plane-api tag (e.g. v1.8.3). Empty = latest from AR."
        required: false
        default: ""
      app_tag:
        description: "control-plane-app (frontend) tag (e.g. v1.8.1). Empty = latest from AR."
        required: false
        default: ""
      data_plane_api_tag:
        description: "data-plane-api tag (e.g. v1.8.4). Empty = latest from AR."
        required: false
        default: ""
      firewall_tag:
        description: "firewall-cpu / firewall-gpu tag (e.g. v2.4.3). Empty = latest from firewall-cpu in AR (same tag as firewall-gpu)."
        required: false
        default: ""
      watchdog_tag:
        description: "watchdog tag (e.g. v0.1.0). Empty = latest from AR."
        required: false
        default: ""
      agentgateway_tag:
        description: "agentgateway tag (e.g. v0.2.9). Empty = latest from AR."
        required: false
        default: ""
      trustguard_tag:
        description: "trustguard tag (e.g. v0.1.0). Empty = latest from AR."
        required: false
        default: ""
      trustlens_tag:
        description: "trustlens tag (e.g. v0.1.0). Manual only until the AR repository exists."
        required: false
        default: ""
      dataagent_tag:
        description: "dataagent tag (e.g. v0.1.0). Empty = latest from AR."
        required: false
        default: ""
      datacore_tag:
        description: "datacore tag (e.g. v0.1.0). Empty = latest from AR."
        required: false
        default: ""
      clickstack_otel_collector_tag:
        description: "clickstack-otel-collector tag (e.g. 2.30.1). Empty = latest from AR (bare X.Y.Z)."
        required: false
        default: ""
      opentelemetry_collector_contrib_tag:
        description: "opentelemetry-collector-contrib tag (e.g. 0.156.0). Empty = latest from AR (bare X.Y.Z). Syncs umbrella OTel Collector + hybrid ClickStack egress sidecar."
        required: false
        default: ""
      alertengine_tag:
        description: "alertengine tag (e.g. v0.1.0). Empty = latest from AR."
        required: false
        default: ""
      clickhouse_tag:
        description: "clickhouse-server tag (e.g. 25.8 or 25.10.1). Empty = latest from AR (matches X.Y, X.Y.Z, X.Y.Z.W)."
        required: false
        default: ""
      redis_tag:
        description: "redis-stack-server tag (e.g. 7.2.0-v20). Empty = latest matching X.Y.Z-vNN from AR."
        required: false
        default: ""
      postgres_tag:
        description: "postgres tag (e.g. 17-alpine). Empty = latest matching N-alpine from AR (in-cluster postgres + migration initContainers)."
        required: false
        default: ""
      fetch_latest:
        description: "Fetch latest from Artifact Registry for empty inputs"
        required: false
        type: boolean
        default: true

env:
  AR_REGISTRY: europe-west1-docker.pkg.dev
  AR_PROJECT: neuraltrust-app-prod
  AR_REPO: nt-docker

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.PLATFORM_WIF_PROVIDER }}
          service_account: ${{ secrets.PLATFORM_WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true
          cleanup_credentials: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Resolve image tags
        id: tags
        run: |
          AR_BASE="${{ env.AR_REGISTRY }}/${{ env.AR_PROJECT }}/${{ env.AR_REPO }}"
          FETCH_LATEST="${{ inputs.fetch_latest }}"

          resolve_tag() {
            local image="$1"
            local manual_tag="$2"
            # Default: bare semver (v1.2.3). Optional third arg overrides the grep -E pattern.
            local tag_pattern="${3:-^v[0-9]+\.[0-9]+\.[0-9]+$}"

            if [[ -n "$manual_tag" ]]; then
              echo "$manual_tag"
              return
            fi

            if [[ "$FETCH_LATEST" != "true" ]]; then
              echo ""
              return
            fi

            echo "Fetching latest tag for ${image}..." >&2

            local latest
            latest=$(gcloud artifacts docker tags list \
              "${AR_BASE}/${image}" \
              --format='value(tag)' 2>&1)

            if [[ $? -ne 0 ]]; then
              echo "ERROR: gcloud failed for ${image}: ${latest}" >&2
              echo ""
              return
            fi

            # Filter tags by pattern (default: bare v1.2.3 semver)
            latest=$(echo "$latest" | grep -E "$tag_pattern" | sort -V | tail -1)

            if [[ -z "$latest" ]]; then
              echo "WARNING: Could not find latest tag for ${image}" >&2
              echo ""
              return
            fi

            echo "  → ${image}: ${latest}" >&2
            echo "$latest"
          }

          CONTROL_PLANE_API=$(resolve_tag "control-plane-api" "${{ inputs.control_plane_api_tag }}")
          APP=$(resolve_tag "app" "${{ inputs.app_tag }}")
          DATA_PLANE_API=$(resolve_tag "data-plane-api" "${{ inputs.data_plane_api_tag }}")
          FIREWALL=$(resolve_tag "firewall-cpu" "${{ inputs.firewall_tag }}")
          WATCHDOG=$(resolve_tag "watchdog" "${{ inputs.watchdog_tag }}")
          AGENTGATEWAY=$(resolve_tag "agentgateway" "${{ inputs.agentgateway_tag }}")
          TRUSTGUARD=$(resolve_tag "trustguard" "${{ inputs.trustguard_tag }}")
          # TrustLens is WIP and has no AR repository yet; honor manual input only.
          TRUSTLENS="${{ inputs.trustlens_tag }}"
          DATAAGENT=$(resolve_tag "dataagent" "${{ inputs.dataagent_tag }}")
          DATACORE=$(resolve_tag "datacore" "${{ inputs.datacore_tag }}")
          ALERTENGINE=$(resolve_tag "alertengine" "${{ inputs.alertengine_tag }}")

          # Infrastructure images (non-standard tag patterns, override default regex).
          # clickstack-otel-collector is mirrored into AR from ClickHouse; tags are bare X.Y.Z.
          CLICKSTACK_OTEL_COLLECTOR=$(resolve_tag "clickstack-otel-collector" "${{ inputs.clickstack_otel_collector_tag }}" '^[0-9]+\.[0-9]+\.[0-9]+$')
          # Contrib collector: upstream otel tags are bare X.Y.Z (no v-prefix).
          OTEL_COLLECTOR_CONTRIB=$(resolve_tag "opentelemetry-collector-contrib" "${{ inputs.opentelemetry_collector_contrib_tag }}" '^[0-9]+\.[0-9]+\.[0-9]+$')
          CLICKHOUSE=$(resolve_tag "clickhouse-server" "${{ inputs.clickhouse_tag }}" '^[0-9]+\.[0-9]+(\.[0-9]+){0,2}$')
          REDIS=$(resolve_tag "redis-stack-server" "${{ inputs.redis_tag }}" '^[0-9]+\.[0-9]+\.[0-9]+-v[0-9]+$')
          POSTGRES=$(resolve_tag "postgres" "${{ inputs.postgres_tag }}" '^[0-9]+-alpine$')

          echo "control_plane_api=${CONTROL_PLANE_API}" >> "$GITHUB_OUTPUT"
          echo "app=${APP}" >> "$GITHUB_OUTPUT"
          echo "data_plane_api=${DATA_PLANE_API}" >> "$GITHUB_OUTPUT"
          echo "firewall=${FIREWALL}" >> "$GITHUB_OUTPUT"
          echo "watchdog=${WATCHDOG}" >> "$GITHUB_OUTPUT"
          echo "agentgateway=${AGENTGATEWAY}" >> "$GITHUB_OUTPUT"
          echo "trustguard=${TRUSTGUARD}" >> "$GITHUB_OUTPUT"
          echo "trustlens=${TRUSTLENS}" >> "$GITHUB_OUTPUT"
          echo "dataagent=${DATAAGENT}" >> "$GITHUB_OUTPUT"
          echo "datacore=${DATACORE}" >> "$GITHUB_OUTPUT"
          echo "clickstack_otel_collector=${CLICKSTACK_OTEL_COLLECTOR}" >> "$GITHUB_OUTPUT"
          echo "opentelemetry_collector_contrib=${OTEL_COLLECTOR_CONTRIB}" >> "$GITHUB_OUTPUT"
          echo "alertengine=${ALERTENGINE}" >> "$GITHUB_OUTPUT"
          echo "clickhouse=${CLICKHOUSE}" >> "$GITHUB_OUTPUT"
          echo "redis=${REDIS}" >> "$GITHUB_OUTPUT"
          echo "postgres=${POSTGRES}" >> "$GITHUB_OUTPUT"

          echo "### Resolved Tags" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| control-plane-api | \`${CONTROL_PLANE_API:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| control-plane-app (app) | \`${APP:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| data-plane-api | \`${DATA_PLANE_API:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| firewall-cpu (tag shared with firewall-gpu) | \`${FIREWALL:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| watchdog | \`${WATCHDOG:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agentgateway | \`${AGENTGATEWAY:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| trustguard | \`${TRUSTGUARD:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| trustlens | \`${TRUSTLENS:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| dataagent | \`${DATAAGENT:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| datacore | \`${DATACORE:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| clickstack-otel-collector | \`${CLICKSTACK_OTEL_COLLECTOR:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| opentelemetry-collector-contrib | \`${OTEL_COLLECTOR_CONTRIB:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| alertengine | \`${ALERTENGINE:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| clickhouse-server | \`${CLICKHOUSE:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| redis-stack-server | \`${REDIS:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| postgres (in-cluster + migrations) | \`${POSTGRES:-skipped}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Update values.yaml and template defaults
        id: update
        run: |
          CHANGES=()
          BUMP_CONTROL_PLANE_API=false
          BUMP_CONTROL_PLANE_APP=false
          BUMP_DATA_PLANE_API=false
          BUMP_FIREWALL=false
          BUMP_WATCHDOG=false
          BUMP_AGENTGATEWAY=false
          BUMP_TRUSTGUARD=false
          BUMP_TRUSTLENS=false
          BUMP_DATAAGENT=false
          BUMP_DATACORE=false
          BUMP_CLICKSTACK_OTEL_COLLECTOR=false
          BUMP_ALERTENGINE=false
          BUMP_CLICKHOUSE=false

          # --- Helper: update a tag in values.yaml via yq ---
          update_values_tag() {
            local yq_path="$1"
            local new_tag="$2"
            local image_name="$3"
            local file="${4:-values.yaml}"

            if [[ -z "$new_tag" ]]; then
              return 1
            fi

            local current_tag
            current_tag=$(yq eval "${yq_path}" "$file")

            if [[ "$current_tag" == "$new_tag" ]]; then
              echo "No change for ${image_name} in ${file} (already ${current_tag})"
              return 1
            fi

            echo "Updating ${image_name} in ${file}: ${current_tag} → ${new_tag}"
            yq eval -i "${yq_path} = \"${new_tag}\"" "$file"
            CHANGES+=("${image_name}: ${current_tag} → ${new_tag}")
            return 0
          }

          # --- Helper: update hardcoded fallback tag in a Go template file ---
          # Handles both patterns:
          #   {{- $var := "TAG" }}
          #   {{- $var := .Values.path | default "TAG" }}
          # Always returns 0 (safe under set -e). Sets TEMPLATE_TAG_CHANGED=1 if
          # the file was actually modified, 0 otherwise (no match / already at this tag).
          TEMPLATE_TAG_CHANGED=0
          update_template_tag() {
            TEMPLATE_TAG_CHANGED=0
            local file="$1"
            local var_name="$2"
            local new_tag="$3"

            if [[ -z "$new_tag" ]]; then
              return 0
            fi

            if ! grep -q "\$${var_name} :=" "$file" 2>/dev/null; then
              return 0
            fi

            cp "$file" "${file}.bump-bak"
            # Pattern: {{- $var := "OLD" }}
            sed -i "s/\(\$${var_name} := \)\"[^\"]*\"/\1\"${new_tag}\"/" "$file"
            # Pattern: {{- $var := .Values.xxx | default "OLD" }}
            sed -i "s/\(\$${var_name} := .*| default \)\"[^\"]*\"/\1\"${new_tag}\"/" "$file"

            if cmp -s "$file" "${file}.bump-bak"; then
              rm -f "${file}.bump-bak"
              return 0
            fi

            rm -f "${file}.bump-bak"
            echo "  Updated fallback \$${var_name} → ${new_tag} in ${file}"
            TEMPLATE_TAG_CHANGED=1
            return 0
          }

          # --- Helper: bump patch version in a Chart.yaml ---
          bump_chart_version() {
            local chart_file="$1"
            local current
            current=$(yq eval '.version' "$chart_file")
            local major minor patch
            IFS='.' read -r major minor patch <<< "$current"
            patch=$((patch + 1))
            local new_version="${major}.${minor}.${patch}"
            yq eval -i ".version = \"${new_version}\"" "$chart_file"
            echo "  Bumped ${chart_file}: ${current} → ${new_version}" >&2
            echo "${new_version}"
          }

          # =============================================
          # 1. Control-plane API (external)
          # =============================================
          TAG="${{ steps.tags.outputs.control_plane_api }}"
          if update_values_tag '.["control-plane-api"].controlPlane.components.api.image.tag' "$TAG" "control-plane-api"; then
            BUMP_CONTROL_PLANE_API=true
            update_template_tag "charts/control-plane-api/templates/api/deployment.yaml" "apiImageTag" "$TAG"
          fi

          # =============================================
          # 2. Control-plane App/UI (external) — initContainer + main container
          # =============================================
          TAG="${{ steps.tags.outputs.app }}"
          if update_values_tag '.["control-plane-app"].controlPlane.components.app.image.tag' "$TAG" "control-plane-app (app)"; then
            BUMP_CONTROL_PLANE_APP=true
            update_template_tag "charts/control-plane-app/templates/app/deployment.yaml" "initImageTag" "$TAG"
            update_template_tag "charts/control-plane-app/templates/app/deployment.yaml" "appImageTag" "$TAG"
          fi

          # =============================================
          # 3. Data-plane API shim
          # =============================================
          TAG="${{ steps.tags.outputs.data_plane_api }}"
          if update_values_tag '.["data-plane-api"].dataPlane.components.api.image.tag' "$TAG" "data-plane-api"; then
            BUMP_DATA_PLANE_API=true
          fi
          update_template_tag "charts/data-plane-api/templates/api/deployment.yaml" "apiTag" "$TAG"
          if [[ "$TEMPLATE_TAG_CHANGED" == "1" ]]; then BUMP_DATA_PLANE_API=true; fi
          update_template_tag "charts/data-plane-api/templates/api/deployment.yaml" "fallbackApiTag" "$TAG"
          if [[ "$TEMPLATE_TAG_CHANGED" == "1" ]]; then BUMP_DATA_PLANE_API=true; fi
          update_template_tag "charts/data-plane-api/templates/_helpers.tpl" "apiTag" "$TAG"
          if [[ "$TEMPLATE_TAG_CHANGED" == "1" ]]; then BUMP_DATA_PLANE_API=true; fi

          # =============================================
          # 4. Firewall (gateway + worker share a single tag/image)
          # =============================================
          TAG="${{ steps.tags.outputs.firewall }}"
          if [[ -n "$TAG" ]]; then
            if update_values_tag '.firewall.firewall.gateway.image.tag' "$TAG" "firewall-cpu (gateway)"; then
              BUMP_FIREWALL=true
              yq eval -i ".firewall.gateway.image.tag = \"${TAG}\"" charts/firewall/values.yaml
              echo "  Synced charts/firewall/values.yaml firewall.gateway.image.tag"
              update_template_tag "charts/firewall/templates/gateway-deployment.yaml" "gwTag" "$TAG"
            fi
            if update_values_tag '.firewall.firewall.workerDefaults.image.tag' "$TAG" "firewall-cpu (worker)"; then
              BUMP_FIREWALL=true
              yq eval -i ".firewall.workerDefaults.image.tag = \"${TAG}\"" charts/firewall/values.yaml
              echo "  Synced charts/firewall/values.yaml firewall.workerDefaults.image.tag"
              update_template_tag "charts/firewall/templates/worker-deployment.yaml" "wTag" "$TAG"
            fi
            if [[ "$BUMP_FIREWALL" == "true" ]]; then
              yq eval -i ".appVersion = \"${TAG}\"" charts/firewall/Chart.yaml
              echo "  Synced charts/firewall/Chart.yaml appVersion"
            fi
          fi

          # =============================================
          # 5. Watchdog
          # The watchdog subchart image tag defaults to Chart.appVersion when
          # empty, so keep both the explicit default tag and appVersion aligned.
          # =============================================
          TAG="${{ steps.tags.outputs.watchdog }}"
          if update_values_tag '.image.tag' "$TAG" "watchdog" "charts/watchdog/values.yaml"; then
            BUMP_WATCHDOG=true
            yq eval -i ".appVersion = \"${TAG}\"" charts/watchdog/Chart.yaml
            echo "  Synced charts/watchdog/Chart.yaml appVersion"
          fi

          # =============================================
          # 6. In-cluster runtime subcharts (agentgateway / trustguard / trustlens)
          # Each has its own values.yaml with a single .image.tag.
          # =============================================
          TAG="${{ steps.tags.outputs.agentgateway }}"
          if update_values_tag '.agentgateway.image.tag' "$TAG" "agentgateway"; then
            BUMP_AGENTGATEWAY=true
            yq eval -i ".image.tag = \"${TAG}\"" charts/agentgateway/values.yaml
            yq eval -i ".appVersion = \"${TAG}\"" charts/agentgateway/Chart.yaml
          fi

          TAG="${{ steps.tags.outputs.trustguard }}"
          if update_values_tag '.trustguard.image.tag' "$TAG" "trustguard"; then
            BUMP_TRUSTGUARD=true
            yq eval -i ".image.tag = \"${TAG}\"" charts/trustguard/values.yaml
            yq eval -i ".appVersion = \"${TAG}\"" charts/trustguard/Chart.yaml
          fi

          TAG="${{ steps.tags.outputs.trustlens }}"
          if update_values_tag '.trustlens.image.tag' "$TAG" "trustlens"; then
            BUMP_TRUSTLENS=true
            yq eval -i ".image.tag = \"${TAG}\"" charts/trustlens/values.yaml
            yq eval -i ".appVersion = \"${TAG}\"" charts/trustlens/Chart.yaml
          fi

          # =============================================
          # 7. Data pipeline (dataagent / datacore / clickstack-otel-collector /
          # alertengine). Same single .image.tag pattern.
          # =============================================
          TAG="${{ steps.tags.outputs.dataagent }}"
          if update_values_tag '.dataagent.image.tag' "$TAG" "dataagent"; then
            BUMP_DATAAGENT=true
            yq eval -i ".image.tag = \"${TAG}\"" charts/dataagent/values.yaml
            yq eval -i ".appVersion = \"${TAG}\"" charts/dataagent/Chart.yaml
          fi

          TAG="${{ steps.tags.outputs.datacore }}"
          if update_values_tag '.datacore.image.tag' "$TAG" "datacore"; then
            BUMP_DATACORE=true
            yq eval -i ".image.tag = \"${TAG}\"" charts/datacore/values.yaml
            yq eval -i ".appVersion = \"${TAG}\"" charts/datacore/Chart.yaml
          fi

          TAG="${{ steps.tags.outputs.clickstack_otel_collector }}"
          if update_values_tag '.["clickstack-otel-collector"].image.tag' "$TAG" "clickstack-otel-collector"; then
            BUMP_CLICKSTACK_OTEL_COLLECTOR=true
            yq eval -i ".image.tag = \"${TAG}\"" charts/clickstack-otel-collector/values.yaml
            yq eval -i ".appVersion = \"${TAG}\"" charts/clickstack-otel-collector/Chart.yaml
          fi

          TAG="${{ steps.tags.outputs.alertengine }}"
          if update_values_tag '.alertengine.image.tag' "$TAG" "alertengine"; then
            BUMP_ALERTENGINE=true
            yq eval -i ".image.tag = \"${TAG}\"" charts/alertengine/values.yaml
            yq eval -i ".appVersion = \"${TAG}\"" charts/alertengine/Chart.yaml
          fi

          # =============================================
          # 8. Infrastructure: ClickHouse (external analytics)
          # No subchart values.yaml — parent values.yaml is the sole source.
          # =============================================
          TAG="${{ steps.tags.outputs.clickhouse }}"
          if update_values_tag '.clickhouse.image.tag' "$TAG" "clickhouse-server"; then
            BUMP_CLICKHOUSE=true
            yq eval -i ".appVersion = \"${TAG}\"" charts/clickhouse/Chart.yaml
          fi
          update_template_tag "charts/data-plane-api/templates/api/deployment.yaml" "chMigrationTag" "$TAG"
          if [[ "$TEMPLATE_TAG_CHANGED" == "1" ]]; then BUMP_DATA_PLANE_API=true; fi

          # =============================================
          # 9. Infrastructure: opentelemetry-collector-contrib
          # Shared by the umbrella OTel Collector and the hybrid ClickStack
          # egress sidecar. Keep both values paths + hardcoded fallbacks in sync.
          # =============================================
          TAG="${{ steps.tags.outputs.opentelemetry_collector_contrib }}"
          if [[ -n "$TAG" ]]; then
            if update_values_tag '.global.observability.collector.image.tag' "$TAG" "opentelemetry-collector-contrib (umbrella)"; then
              :
            fi
            # Only sync egress when the hybrid ClickStack egress image block exists.
            if [[ -n "$(yq eval '.global.clickstack.egress.image.repository // ""' values.yaml)" ]]; then
              if update_values_tag '.global.clickstack.egress.image.tag' "$TAG" "opentelemetry-collector-contrib (clickstack egress)"; then
                :
              fi
            fi
            # deployment.yaml uses inline default "X.Y.Z" (not $var :=).
            if grep -q 'opentelemetry-collector-contrib' templates/otel-collector/deployment.yaml 2>/dev/null; then
              cp templates/otel-collector/deployment.yaml templates/otel-collector/deployment.yaml.bump-bak
              sed -i -E 's/(default ")[0-9]+\.[0-9]+\.[0-9]+(" \(default dict \$coll\.image\)\.tag)/\1'"${TAG}"'\2/' \
                templates/otel-collector/deployment.yaml
              if ! cmp -s templates/otel-collector/deployment.yaml templates/otel-collector/deployment.yaml.bump-bak; then
                echo "  Updated otel-collector deployment fallback → ${TAG}"
                CHANGES+=("opentelemetry-collector-contrib (umbrella fallback): → ${TAG}")
              fi
              rm -f templates/otel-collector/deployment.yaml.bump-bak
            fi
            # clickstackEgress.image helper: $tag := $img.tag | default "X.Y.Z"
            if grep -q 'neuraltrust-platform.clickstackEgress.image' templates/_helpers.tpl 2>/dev/null; then
              update_template_tag "templates/_helpers.tpl" "tag" "$TAG"
              if [[ "$TEMPLATE_TAG_CHANGED" == "1" ]]; then
                CHANGES+=("opentelemetry-collector-contrib (egress fallback): → ${TAG}")
              fi
            fi
          fi

          # =============================================
          # 10. Infrastructure: Redis (in-cluster, umbrella-managed)
          # =============================================
          TAG="${{ steps.tags.outputs.redis }}"
          if update_values_tag '.infrastructure.redis.image.tag' "$TAG" "redis (in-cluster)"; then
            :
          fi
          update_template_tag "templates/redis/_helpers.tpl" "tag" "$TAG"
          if [[ "$TEMPLATE_TAG_CHANGED" == "1" ]]; then
            CHANGES+=("redis (in-cluster fallback): → ${TAG}")
          fi

          # =============================================
          # 11. Infrastructure: Postgres (in-cluster + migration initContainers)
          # =============================================
          TAG="${{ steps.tags.outputs.postgres }}"
          if [[ -n "$TAG" ]]; then
            if update_values_tag '.global.postgresql.image.tag' "$TAG" "postgres (in-cluster)"; then
              :
            fi
            update_template_tag "templates/postgresql/deployment.yaml" "tag" "$TAG"
            if [[ "$TEMPLATE_TAG_CHANGED" == "1" ]]; then
              CHANGES+=("postgres (in-cluster fallback): → ${TAG}")
            fi
            update_template_tag "charts/control-plane-api/templates/api/deployment.yaml" "pgWaitImageTag" "$TAG"
            if [[ "$TEMPLATE_TAG_CHANGED" == "1" ]]; then BUMP_CONTROL_PLANE_API=true; fi
            update_template_tag "charts/data-plane-api/templates/api/deployment.yaml" "pgMigTag" "$TAG"
            if [[ "$TEMPLATE_TAG_CHANGED" == "1" ]]; then BUMP_DATA_PLANE_API=true; fi
          fi

          # =============================================
          # Bump chart versions (patch) for changed subcharts + sync dep refs.
          # Root chart VERSION is handled by auto-release.yml on merge.
          # =============================================
          echo ""
          echo "=== Chart Version Bumps ==="

          bump_dep() {
            local chart_dir="$1"
            local dep_name="$2"
            local new_ver
            new_ver=$(bump_chart_version "charts/${chart_dir}/Chart.yaml")
            yq eval -i "(.dependencies[] | select(.name == \"${dep_name}\")).version = \"${new_ver}\"" Chart.yaml
            echo "  Updated root Chart.yaml dep: ${dep_name} → ${new_ver}"
          }

          [[ "$BUMP_CONTROL_PLANE_API" == "true" ]] && bump_dep "control-plane-api" "control-plane-api"
          [[ "$BUMP_CONTROL_PLANE_APP" == "true" ]] && bump_dep "control-plane-app" "control-plane-app"
          [[ "$BUMP_DATA_PLANE_API" == "true" ]] && bump_dep "data-plane-api" "data-plane-api"
          [[ "$BUMP_FIREWALL" == "true" ]] && bump_dep "firewall" "firewall"
          [[ "$BUMP_WATCHDOG" == "true" ]] && bump_dep "watchdog" "watchdog"
          [[ "$BUMP_AGENTGATEWAY" == "true" ]] && bump_dep "agentgateway" "agentgateway"
          [[ "$BUMP_TRUSTGUARD" == "true" ]] && bump_dep "trustguard" "trustguard"
          [[ "$BUMP_TRUSTLENS" == "true" ]] && bump_dep "trustlens" "trustlens"
          [[ "$BUMP_DATAAGENT" == "true" ]] && bump_dep "dataagent" "dataagent"
          [[ "$BUMP_DATACORE" == "true" ]] && bump_dep "datacore" "datacore"
          [[ "$BUMP_CLICKSTACK_OTEL_COLLECTOR" == "true" ]] && bump_dep "clickstack-otel-collector" "clickstack-otel-collector"
          [[ "$BUMP_ALERTENGINE" == "true" ]] && bump_dep "alertengine" "alertengine"
          [[ "$BUMP_CLICKHOUSE" == "true" ]] && bump_dep "clickhouse" "clickhouse"

          # Save changes summary
          if [[ ${#CHANGES[@]} -eq 0 ]]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "No version changes needed."
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
            {
              echo "CHANGES_SUMMARY<<EOF"
              for c in "${CHANGES[@]}"; do echo "- ${c}"; done
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Regenerate Chart.lock
        if: steps.update.outputs.no_changes != 'true'
        run: |
          helm dependency update .
          echo "Chart.lock regenerated"

      - name: Check for changes
        if: steps.update.outputs.no_changes != 'true'
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "### Changes" >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            git diff >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create Pull Request
        if: steps.update.outputs.no_changes != 'true' && steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/bump-images-$(date +%Y%m%d-%H%M%S)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add \
            values.yaml \
            Chart.yaml \
            Chart.lock \
            templates/_helpers.tpl \
            templates/otel-collector/deployment.yaml \
            templates/redis/_helpers.tpl \
            templates/postgresql/deployment.yaml \
            charts/control-plane-api/Chart.yaml \
            charts/control-plane-api/templates/ \
            charts/control-plane-app/Chart.yaml \
            charts/control-plane-app/templates/ \
            charts/data-plane-api/Chart.yaml \
            charts/data-plane-api/templates/ \
            charts/firewall/values.yaml \
            charts/firewall/Chart.yaml \
            charts/firewall/templates/ \
            charts/watchdog/values.yaml \
            charts/watchdog/Chart.yaml \
            charts/agentgateway/values.yaml \
            charts/agentgateway/Chart.yaml \
            charts/trustguard/values.yaml \
            charts/trustguard/Chart.yaml \
            charts/trustlens/values.yaml \
            charts/trustlens/Chart.yaml \
            charts/dataagent/values.yaml \
            charts/dataagent/Chart.yaml \
            charts/datacore/values.yaml \
            charts/datacore/Chart.yaml \
            charts/clickstack-otel-collector/values.yaml \
            charts/clickstack-otel-collector/Chart.yaml \
            charts/alertengine/values.yaml \
            charts/alertengine/Chart.yaml \
            charts/clickhouse/Chart.yaml
          while IFS= read -r staged_file; do
            staged_basename="${staged_file##*/}"
            case "${staged_basename,,}" in
              gha-creds-*.json|gcr-keys.json|key.json|*.key|*.pem)
                echo "::error::Refusing to commit staged credential material: $staged_file"
                exit 1
                ;;
            esac
          done < <(git diff --cached --name-only)
          git commit -m "$(cat <<COMMIT
          chore: bump image versions

          ${CHANGES_SUMMARY}
          COMMIT
          )"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: bump image versions" \
            --body "$(cat <<PR_BODY
          ## Image Version Bump

          Triggered by: @${{ github.actor }}
          Mode: ${{ inputs.fetch_latest == true && 'auto-detect latest from Artifact Registry' || 'manual input' }}

          ### Changes
          ${CHANGES_SUMMARY}

          ---
          *Auto-generated by [Bump Image Versions](/${{ github.repository }}/actions/workflows/bump-images.yml) workflow*
          PR_BODY
          )" \
            --base main \
            --head "$BRANCH"

      - name: No changes summary
        if: steps.update.outputs.no_changes == 'true' || steps.diff.outputs.has_changes == 'false'
        run: |
          echo "### No Changes" >> "$GITHUB_STEP_SUMMARY"
          echo "All images are already at the requested versions." >> "$GITHUB_STEP_SUMMARY"
