name: Publish Helm Chart to Artifact Registry

on:
  release:
    types: [published]

env:
  AR_REGISTRY: europe-west1-docker.pkg.dev
  AR_LOCATION: europe-west1
  AR_REPO: helm-charts
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  CHART_NAME: neuraltrust-platform

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Chart version
        id: chart_version
        run: |
          V="${{ github.event.release.tag_name }}"
          echo "version=${V#v}" >> "$GITHUB_OUTPUT"

      - name: Validate
        run: |
          helm lint .
          helm dependency list

      - name: Package
        run: |
          CHART_VERSION="${{ steps.chart_version.outputs.version }}"
          CHART_FILE="neuraltrust-platform-${CHART_VERSION}.tgz"
          PACKAGE_SOURCE="$(mktemp -d)"
          trap 'rm -rf "$PACKAGE_SOURCE"' EXIT
          git archive --format=tar HEAD | tar -xf - -C "$PACKAGE_SOURCE"
          helm package "$PACKAGE_SOURCE" --dependency-update --version "$CHART_VERSION"
          test -f "$CHART_FILE"
          echo "CHART_FILE=$CHART_FILE" >> "$GITHUB_ENV"

      - name: Verify package contents
        run: |
          python3 - "$CHART_FILE" <<'PY'
          import json
          import sys
          import tarfile
          from pathlib import PurePosixPath

          violations = []

          with tarfile.open(sys.argv[1], "r:gz") as archive:
              for member in archive.getmembers():
                  if not member.isfile():
                      continue

                  basename = PurePosixPath(member.name).name.casefold()
                  if basename.startswith("gha-creds-") and basename.endswith(".json"):
                      violations.append(f"{member.name}: temporary Google Cloud credentials")
                      continue
                  if (
                      basename in {"gcr-keys.json", "key.json"}
                      or basename.endswith((".key", ".pem"))
                  ):
                      violations.append(f"{member.name}: forbidden credential filename")
                      continue

                  packaged_file = archive.extractfile(member)
                  if packaged_file is None:
                      continue
                  try:
                      content = json.load(packaged_file)
                  except (json.JSONDecodeError, UnicodeDecodeError):
                      continue
                  if (
                      isinstance(content, dict)
                      and content.get("type") == "service_account"
                      and content.get("private_key")
                  ):
                      violations.append(f"{member.name}: service account private key")

          if violations:
              print("::error::Refusing to publish a chart containing credentials")
              print("\n".join(violations))
              raise SystemExit(1)
          PY

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.PLATFORM_WIF_PROVIDER }}
          service_account: ${{ secrets.PLATFORM_WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          create_credentials_file: false

      - name: Login to Artifact Registry
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "$ACCESS_TOKEN" |
            helm registry login -u oauth2accesstoken --password-stdin ${{ env.AR_REGISTRY }}

      - name: Push
        run: |
          helm push "$CHART_FILE" oci://${{ env.AR_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}

      - name: Upload chart to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "$CHART_FILE" --clobber

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Append container images and installation to release notes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          V="${{ steps.chart_version.outputs.version }}"
          REPO="${{ github.repository }}"
          OCI_URL="oci://europe-west1-docker.pkg.dev/neuraltrust-app-prod/helm-charts/neuraltrust-platform"

          # auto-release (NeuralTrust/workflows ai-release-bump) creates the release with
          # "What changed" + "Commits". This step appends chart-specific sections below.
          RELEASE_NOTES=$(gh release view "$TAG" --json body -q '.body')
          IMAGES_TABLE=$(./scripts/release-images-markdown.sh)

          cat > updated_body.md << BODYEOF
          ${RELEASE_NOTES}

          ---

          ## Container images

          Default image tags shipped in this release (\`values.yaml\` and subchart defaults):

          ${IMAGES_TABLE}

          ---

          ## Installation

          **All required secrets are auto-generated by default.** No manual secret creation needed — just deploy. Optionally copy \`values-required.yaml\` to customize domains, resources, etc.

          **Choose one of the following:**

          **1. Clone source at this tag**
          \`\`\`bash
          git clone --branch ${TAG} --depth 1 https://github.com/${REPO}.git
          cd neuraltrust-platform
          helm dependency update
          # Zero-config deploy (secrets auto-generated):
          helm upgrade --install neuraltrust-platform . --namespace neuraltrust --create-namespace
          # Or with custom values:
          # Edit values-required.yaml, then install with:
          # helm upgrade --install neuraltrust-platform . --namespace neuraltrust --create-namespace -f values-required.yaml
          \`\`\`

          **2. Download chart (tarball)**

          [neuraltrust-platform-${V}.tgz](https://github.com/${REPO}/releases/download/${TAG}/neuraltrust-platform-${V}.tgz)

          \`\`\`bash
          curl -sL -O https://github.com/${REPO}/releases/download/${TAG}/neuraltrust-platform-${V}.tgz
          helm upgrade --install neuraltrust-platform ./neuraltrust-platform-${V}.tgz --namespace neuraltrust --create-namespace
          \`\`\`

          **3. Install from OCI (Artifact Registry)**
          \`\`\`bash
          helm upgrade --install neuraltrust-platform ${OCI_URL} --version ${V} --namespace neuraltrust --create-namespace
          \`\`\`
          Or pull the chart first, then install:
          \`\`\`bash
          helm pull ${OCI_URL} --version ${V}
          helm upgrade --install neuraltrust-platform ./neuraltrust-platform-${V}.tgz --namespace neuraltrust --create-namespace
          \`\`\`

          > **Secrets:** All required secrets (JWT keys, database passwords) are auto-generated on first install and preserved on upgrades. To provide explicit values, set them in a custom values file. See [SECRETS.md](https://github.com/${REPO}/blob/${TAG}/SECRETS.md) for details.
          BODYEOF

          gh release edit "$TAG" --notes-file updated_body.md

      - name: Verify
        run: |
          helm show chart oci://${{ env.AR_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.CHART_NAME }} --version ${{ steps.chart_version.outputs.version }}

      - name: Summary
        run: |
          OCI_URL="oci://europe-west1-docker.pkg.dev/neuraltrust-app-prod/helm-charts/neuraltrust-platform"
          V="${{ steps.chart_version.outputs.version }}"
          echo "## Helm Chart Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Chart:** \`${{ env.CHART_NAME }}\` · **Version:** \`$V\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install" >> $GITHUB_STEP_SUMMARY
          echo "All required secrets are auto-generated by default. Deploy with zero configuration:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "helm upgrade --install neuraltrust-platform $OCI_URL --version $V --namespace neuraltrust --create-namespace" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Or after creating a custom values file:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "helm upgrade --install neuraltrust-platform $OCI_URL --version $V --namespace neuraltrust --create-namespace -f values-custom.yaml" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`$OCI_URL\`" >> $GITHUB_STEP_SUMMARY
