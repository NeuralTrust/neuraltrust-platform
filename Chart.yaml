apiVersion: v2
name: neuraltrust-platform
description: NeuralTrust platform Helm chart (v2 hybrid + external)
type: application
version: 2.2.0
appVersion: "2.0.0"
icon: https://neuraltrust.ai/favicon.ico
# v1 is maintained only on the v1.14.x release line. Do NOT install this chart
# on a v1 cluster — pin `helm install ... --version ~1.14.0` instead.
dependencies:
  # Infrastructure — in-cluster analytics store used in v2 external mode.
  - name: clickhouse
    version: 1.0.4
    repository: file://./charts/clickhouse
    condition: infrastructure.clickhouse.deploy
    tags:
      - infrastructure
  # Data-plane API shim (kept until TrustLens supersedes it).
  - name: data-plane-api
    version: 1.4.3
    repository: file://./charts/data-plane-api
    condition: data-plane-api.dataPlane.enabled
    tags:
      - neuraltrust
      - v2
  # Control-plane API — v2 external only (SaaS-side in hybrid). Loaded
  # unconditionally so operators can flip global.deploymentMode without
  # editing dependency conditions; every template is gated by isExternal.
  - name: control-plane-api
    version: 0.1.2
    repository: file://./charts/control-plane-api
    tags:
      - neuraltrust
      - v2
  # Control-plane App/UI — v2 external only (SaaS-side in hybrid).
  - name: control-plane-app
    version: 0.1.10
    repository: file://./charts/control-plane-app
    tags:
      - neuraltrust
      - v2
  # AgentGateway proxy/MCP admin + data plane.
  - name: agentgateway
    version: 0.1.26
    repository: file://./charts/agentgateway
    tags:
      - neuraltrust
      - v2
  # TrustGuard control + data plane.
  - name: trustguard
    version: 0.1.24
    repository: file://./charts/trustguard
    tags:
      - neuraltrust
      - v2
  # TrustLens (opt-in, WIP).
  - name: trustlens
    version: 0.1.1
    repository: file://./charts/trustlens
    tags:
      - neuraltrust
      - v2
  # DataAgent — enrolled hybrid only.
  - name: dataagent
    version: 0.1.7
    repository: file://./charts/dataagent
    tags:
      - neuraltrust
      - v2
  # DataCore — v2 external only.
  - name: datacore
    version: 0.1.12
    repository: file://./charts/datacore
    tags:
      - neuraltrust
      - v2
  # ClickStack OTel collector — v2 external only.
  - name: clickstack-otel-collector
    version: 0.1.4
    repository: file://./charts/clickstack-otel-collector
    tags:
      - neuraltrust
      - v2
  # AlertEngine — v2 external only.
  - name: alertengine
    version: 0.1.4
    repository: file://./charts/alertengine
    tags:
      - neuraltrust
      - v2
  # Firewall API — optional (default on).
  - name: firewall
    version: 2.1.0
    repository: file://./charts/firewall
    condition: firewall.enabled
    tags:
      - neuraltrust
  # Watchdog — optional self-monitoring/self-healing.
  - name: watchdog
    version: 0.3.1
    repository: file://./charts/watchdog
    condition: watchdog.enabled
    tags:
      - neuraltrust
      - optional
