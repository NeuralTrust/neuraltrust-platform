{{- if eq (include "agentgateway.enabled" .) "true" }}
{{- if and .Values.ingress.enabled (eq (include "agentgateway.ingress.useIngress" .) "true") }}
{{- $className := include "neuraltrust-platform.ingress.className" (dict "global" .Values.global "local" .Values.ingress.className) }}
{{- $annotations := include "neuraltrust-platform.ingress.annotations" (dict "global" .Values.global "local" .Values.ingress.annotations) }}
{{- $renderTLS := and .Values.ingress.tls .Values.ingress.tls.enabled (include "neuraltrust-platform.ingress.renderTLS" (dict "global" .Values.global "tlsEnabled" .Values.ingress.tls.enabled)) }}
{{- $tlsSecret := include "neuraltrust-platform.ingress.effectiveTLSSecretName" (dict "global" .Values.global "localSecretName" .Values.ingress.tls.secretName) }}
{{- $dpHost := include "neuraltrust-platform.ingress.host" (dict "host" .Values.ingress.dataPlane.host "prefix" .Values.ingress.dataPlane.hostPrefix "global" .Values.global) }}
{{- $mcpHost := include "neuraltrust-platform.ingress.host" (dict "host" .Values.ingress.mcp.host "prefix" .Values.ingress.mcp.hostPrefix "global" .Values.global) }}
{{- $dpExtra := include "agentgateway.ingress.effectiveAdditionalHosts" (dict "ctx" . "plane" "dataPlane") | fromYamlArray }}
{{- $mcpExtra := include "agentgateway.ingress.effectiveAdditionalHosts" (dict "ctx" . "plane" "mcp") | fromYamlArray }}
# Data-plane (proxy) ingress — hybrid + full (primary + optional additionalHosts / wildcards)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentgateway-gateway
  labels:
    {{- include "agentgateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-plane
  {{- with $annotations }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if $renderTLS }}
  tls:
    - secretName: {{ $tlsSecret }}
      {{- if or $dpHost $dpExtra }}
      hosts:
        {{- if $dpHost }}
        - {{ $dpHost | quote }}
        {{- end }}
        {{- range $dpExtra }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
  {{- end }}
  rules:
    - {{- if $dpHost }}
      host: {{ $dpHost | quote }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.dataPlane.name }}
                port:
                  name: http
    {{- range $dpExtra }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.dataPlane.name }}
                port:
                  name: http
    {{- end }}
{{- if .Values.mcp.enabled }}
---
# MCP ingress — hybrid + full (primary + optional additionalHosts / wildcards)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentgateway-mcp
  labels:
    {{- include "agentgateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
  {{- with $annotations }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if $renderTLS }}
  tls:
    - secretName: {{ $tlsSecret }}
      {{- if or $mcpHost $mcpExtra }}
      hosts:
        {{- if $mcpHost }}
        - {{ $mcpHost | quote }}
        {{- end }}
        {{- range $mcpExtra }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
  {{- end }}
  rules:
    - {{- if $mcpHost }}
      host: {{ $mcpHost | quote }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.mcp.name }}
                port:
                  name: http
    {{- range $mcpExtra }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.mcp.name }}
                port:
                  name: http
    {{- end }}
{{- end }}
{{- if eq (include "neuraltrust-platform.isFull" .) "true" }}
{{- $cpHost := include "neuraltrust-platform.ingress.host" (dict "host" .Values.ingress.controlPlane.host "prefix" .Values.ingress.controlPlane.hostPrefix "global" .Values.global) }}
---
# Control-plane (admin) ingress — full only (exact host; no wildcards)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentgateway-admin
  labels:
    {{- include "agentgateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
  {{- with $annotations }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if $renderTLS }}
  tls:
    - secretName: {{ $tlsSecret }}
      {{- if $cpHost }}
      hosts:
        - {{ $cpHost | quote }}
      {{- end }}
  {{- end }}
  rules:
    - {{- if $cpHost }}
      host: {{ $cpHost | quote }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.controlPlane.name }}
                port:
                  name: http
{{- end }}
{{- end }}
{{- end }}
