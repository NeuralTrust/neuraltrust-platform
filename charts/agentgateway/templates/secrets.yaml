{{- if eq (include "neuraltrust-platform.isV2" .) "true" }}
{{- if and (include "neuraltrust-platform.autoGenerateSecrets" .) (not .Values.global.preserveExistingSecrets) }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace "agentgateway-secrets") }}
{{- $hasExplicit := or .Values.serverSecretKey .Values.stsSigningKey .Values.database.password }}
{{- if or .Release.IsInstall $existing $hasExplicit (eq (include "neuraltrust-platform.confirmedMigrationCanGenerateSecrets" .) "true") }}
{{- $dbPw := include "neuraltrust-platform.resolveSecret" (dict "value" .Values.database.password "existingSecret" $existing "secretKey" "DB_PASSWORD" "length" 32) }}
{{- if .Values.stsSigningKey }}
  {{- fail "agentgateway.stsSigningKey cannot be safely parsed by Helm. Pre-create agentgateway-secrets with a validated RSA PKCS#1 STS_SIGNING_KEY (create-secrets.sh does this) and leave this value empty" }}
{{- end }}
{{- $stsSigningKey := .Values.stsSigningKey | default "" }}
{{- if and (not $stsSigningKey) $existing $existing.data (hasKey $existing.data "STS_SIGNING_KEY") }}
  {{- $stsSigningKey = index $existing.data "STS_SIGNING_KEY" | b64dec }}
{{- end }}
{{- $decodedSigningKey := $stsSigningKey }}
{{- if and $stsSigningKey (not (contains "-----BEGIN" $stsSigningKey)) }}
  {{- $decodedSigningKey = $stsSigningKey | b64dec }}
{{- end }}
{{- $validSigningKey := and
  (contains "-----BEGIN RSA PRIVATE KEY-----" $decodedSigningKey)
  (contains "-----END RSA PRIVATE KEY-----" $decodedSigningKey)
  (gt (len $decodedSigningKey) 800)
}}
{{- if not $validSigningKey }}
  {{- /* AgentGateway signs MCP session tokens with RS256; a symmetric random
         string cannot be parsed by the runtime. Invalid values generated by
         pre-2.0 chart revisions are replaced once with a valid RSA key. */}}
  {{- $stsSigningKey = genPrivateKey "rsa" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: agentgateway-secrets
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "agentgateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  SERVER_SECRET_KEY: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.serverSecretKey "existingSecret" $existing "secretKey" "SERVER_SECRET_KEY" "length" 64) | quote }}
  STS_SIGNING_KEY: {{ $stsSigningKey | quote }}
  {{- /* IAM DB auth ships no static password (service mints a token). */}}
  {{- if not .Values.database.iamAuth }}
  # App reads DB_PASSWORD (not DATABASE_PASSWORD).
  DB_PASSWORD: {{ $dbPw | quote }}
  {{- /* Hybrid: raw-telemetry exporter DSN. Same role, shared "trustdata" DB; the
         role's default search_path (set by v2-postgresql-init) targets its own
         "agentgateway" schema, so trustgate_data + migration_versions land there. */}}
  {{- if eq (include "neuraltrust-platform.isHybrid" .) "true" }}
  {{- $host := include "neuraltrust-platform.postgres.host" (dict "host" .Values.database.host) }}
  {{- $port := .Values.database.port | default 5432 }}
  {{- $name := include "neuraltrust-platform.v2.dbName" (dict "ctx" . "explicit" .Values.database.name "external" "agentgateway") }}
  {{- $user := .Values.database.user | default "agentgateway" }}
  {{- $ssl := .Values.database.sslMode | default "prefer" }}
  SENSIBLE_PG_DSN: {{ printf "postgresql://%s:%s@%s:%v/%s?sslmode=%s" ($user | urlquery) ($dbPw | urlquery) $host $port $name $ssl | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.redis.password (not .Values.redis.iamAuth) }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- end }}
  {{- /* TRUSTGUARD_CLIENT_ID/_SECRET are injected from the shared
         trustguard-client-credentials Secret via the Deployment env, so the pair
         stays identical to TrustGuard's platform client. Not stored here. */}}
  {{- if (default dict .Values.configSync).enabled }}
  {{- $csToken := include "neuraltrust-platform.configSync.token" (dict "ctx" . "existingSecret" $existing) }}
  {{- if $csToken }}
  CONFIG_SYNC_TOKEN: {{ $csToken | quote }}
  {{- end }}
  CONFIG_SYNC_LKG_KEY: {{ include "neuraltrust-platform.configSync.lkgKey" (dict "ctx" . "existingSecret" $existing) | quote }}
  {{- end }}
  {{- /* Hybrid ClickStack export: Authorization header for the collector's OTLP
         receivers. Rendered only when global.clickstack is enabled and a token is
         resolvable (inline or preserved from the existing Secret). */}}
  {{- if eq (include "neuraltrust-platform.clickstackHybridEnabled" .) "true" }}
  {{- $otlpHeaders := include "neuraltrust-platform.clickstack.otlpHeaders" (dict "ctx" . "existingSecret" $existing) }}
  {{- if $otlpHeaders }}
  OTEL_EXPORTER_OTLP_HEADERS: {{ $otlpHeaders | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
