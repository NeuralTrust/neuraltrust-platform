# AgentGateway (TrustGate v2) subchart.
# Core v2 runtime (hybrid + external). The admin (control-plane) workload
# renders only in external mode (global.deploymentMode=external); proxy + mcp
# (data-plane) render in both hybrid and external.
nameOverride: ""
fullnameOverride: "agentgateway"
# Adds readOnlyRootFilesystem, drops capabilities, seccomp profile. Set false to relax.
securityHardening: true
image:
  repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/agentgateway
  tag: "v0.14.0"
  pullPolicy: IfNotPresent
# Image pull secret name (string) or list. "none"/"" suppresses it.
# Falls back to global.imagePullSecrets when empty.
imagePullSecrets: "gcr-secret"
serviceAccount:
  create: true
  name: "agentgateway"
  annotations: {}
# Non-secret config injected into every workload via the env ConfigMap.
config:
  logLevel: "info"
  # Gateway discovery: "header" (X-TG-Gateway) or "subdomain" (<gw>.<baseDomain>).
  gatewayDiscoveryMode: "header"
  # Base domains the app requires (GATEWAY_BASE_DOMAIN / MCP_BASE_DOMAIN).
  # Empty => derived from global.domain (mcp.<domain> for MCP).
  gatewayBaseDomain: ""
  mcpBaseDomain: ""
  # v2 ships without Kafka; the telemetry publisher stays off unless a broker is
  # wired. Set true only when KAFKA_BROKERS points at a real broker.
  # Enabled by default in v2: hybrid writes raw events to local Postgres;
  # external exports metadata and raw events to the ClickStack collector.
  telemetryEnabled: true
# PostgreSQL connection (external-capable). Password lives in the secret.
# In v2 hybrid this block is IGNORED — hybrid workloads envFrom the shared
# `postgresql-secrets` rendered from `global.postgresql.*` (default user +
# database = neuraltrust). In v2 external the data plane connects to its
# private "agentgateway" DB (control plane owns its migrations); DB_NAME is
# mode-derived from an EMPTY name — set an explicit name only to override.
database:
  host: "" # Empty ⇒ in-cluster control-plane-postgresql; set for external/CloudSQL
  port: 5432
  name: "" # Empty ⇒ mode-derived (external: "agentgateway"; hybrid: shared "neuraltrust")
  user: "agentgateway" # v2 external only; hybrid overrides via global.postgresql.user
  password: "" # Auto-generated if empty (when global.autoGenerateSecrets=true)
  sslMode: "prefer" # TLS when available, plaintext fallback for the non-TLS in-cluster PG; use "require" for hosted DBs
  # IAM (e.g. AWS RDS) database auth. Emits DB_IAM_AUTH/DB_AUTH_MODE/POSTGRES_LOGIN=aws
  # and omits the static DB_PASSWORD; the service mints a SigV4 token at connect time.
  # Requires an IRSA-annotated serviceAccount. Leave false for password auth.
  iamAuth: false
# Redis connection (external-capable — Memorystore in SaaS, optional on-prem).
redis:
  host: "" # Required in v2. Empty renders empty env.
  port: 6379
  db: "0" # Redis logical DB index. Keep "0" for cluster-mode managed Redis (e.g. ElastiCache Serverless) — a non-zero DB issues SELECT, which cluster mode rejects.
  password: "" # Optional
  username: "" # Optional Redis 6+ ACL username (e.g. ElastiCache user group). Emits REDIS_USERNAME (note: TrustGate ignores it; AUTHs as the default user).
  tls: "" # Set "true" for TLS-only managed Redis (e.g. ElastiCache Serverless). Emits REDIS_TLS_ENABLED (the var TrustGate reads).
  tlsInsecureVerify: "" # Set "true" to skip Redis server-cert verification (self-signed managed Redis). Emits REDIS_TLS_INSECURE_VERIFY.
  # IAM (e.g. AWS ElastiCache) Redis auth. When true, emits REDIS_LOGIN=aws +
  # REDIS_IAM_AUTH and omits REDIS_PASSWORD. Requires username + tls + cacheName
  # (and awsServerless=true for ElastiCache Serverless). Needs an IRSA role with
  # elasticache:Connect. false = password.
  iamAuth: false
  cacheName: "" # ElastiCache replication-group / serverless cache name → REDIS_CACHE_NAME
  awsServerless: false # true for ElastiCache Serverless → REDIS_AWS_SERVERLESS
# ---- config-sync (DB-less data plane <- SaaS control plane) ----
# When enabled, proxy + mcp pull compiled config over gRPC from the NeuralTrust
# SaaS control plane instead of Postgres. OFF by default: enabling switches the
# data plane to DB-less (a behavior change). TLS uses the public LE cert on the
# SaaS endpoint, so no CA distribution is needed (system roots).
configSync:
  enabled: false
  # Control-plane gRPC endpoint host:port. Empty => mode-derived:
  #   hybrid: agentgateway-configsync.<saasDomain>:443 (public SaaS, TLS)
  #   full:   <controlPlane.name>.<namespace>.svc.cluster.local:<controlPlane.ports.grpc> (in-cluster)
  endpoint: ""
  # Hybrid only: SaaS domain for the fixed public endpoint above. Override to
  # dev.neuraltrust.ai for the dev SaaS. Ignored in full mode.
  saasDomain: "neuraltrust.ai"
  # Full only: dial the in-cluster control plane over plaintext (no cert). The app
  # rejects CONFIG_SYNC_TLS_INSECURE=true when APP_ENV is staging/production, so a
  # plaintext full deployment must run a non-prod APP_ENV. Ignored in hybrid.
  tlsInsecure: true
  # TLS SNI to verify (hybrid / full-with-TLS). Empty => host part of endpoint.
  serverName: ""
  # Custom CA file path, only if the data plane sits behind a TLS-intercepting
  # proxy. Empty => verify against the system root store.
  tlsCa: ""
  # Shared token authenticating the data plane to the control plane. MUST match
  # the SaaS control plane. Never auto-generated.
  token: ""
  existingSecret:
    name: ""
    tokenKey: "CONFIG_SYNC_TOKEN"
    lkgKey: "CONFIG_SYNC_LKG_KEY"
  # Local encrypted last-known-good cache key: base64 of exactly 32 bytes.
  # Auto-generated per release when empty (local-only, need not match anything).
  lkgKey: ""
# TrustGuard integration (proxy → trustguard /v1/evaluate via client-credentials).
trustguard:
  # Empty ⇒ auto-derived to the in-cluster data-plane Service
  # (http://trustguard-data-plane.<release-namespace>.svc.cluster.local, port 80).
  # Override only when TrustGuard runs outside this umbrella release.
  baseURL: ""
  # DEPRECATED: client credentials are now owned centrally by the umbrella chart
  # (global.v2.trustguardClientId / trustguardClientSecret → shared
  # trustguard-client-credentials Secret) so they always match TrustGuard's platform
  # client. These fields are ignored; kept for backward compatibility.
  clientId: ""
  clientSecret: ""
# Admin JWT + credential encryption key.
serverSecretKey: "" # Auto-generated if empty
# DEPRECATED inline input: Helm cannot cryptographically validate private keys.
# Leave empty to auto-generate an RSA PKCS#1 key, or pre-create
# agentgateway-secrets with create-secrets.sh. Existing valid keys are preserved
# through lookup so MCP sessions remain valid across upgrades.
stsSigningKey: ""
# ---- control-plane (admin mode) — full deployments only ----
controlPlane:
  name: agentgateway-admin
  replicas: 1
  ports:
    http: 8080
    # config-sync gRPC listener (CONFIG_SYNC_GRPC_LISTEN_ADDR default :8083).
    # Exposed on the control-plane Service so full-mode data planes can dial it.
    grpc: 8083
  resources:
    requests: {cpu: 250m, memory: 512Mi}
    limits: {cpu: 500m, memory: 1Gi}
  nodeSelector: {}
  tolerations: []
  extraEnv: []
  service:
    port: 8080
# ---- data-plane (proxy mode) — hybrid + full ----
dataPlane:
  name: agentgateway-proxy
  replicas: 1
  ports:
    http: 8081
  resources:
    requests: {cpu: 500m, memory: 1Gi}
    limits: {cpu: 2000m, memory: 2Gi}
  nodeSelector: {}
  tolerations: []
  extraEnv: []
  service:
    port: 8081
# ---- MCP server (mcp mode) — part of the data-plane, hybrid + full ----
mcp:
  enabled: true
  name: agentgateway-mcp
  replicas: 1
  ports:
    http: 8082
  resources:
    requests: {cpu: 250m, memory: 512Mi}
    limits: {cpu: 1000m, memory: 1Gi}
  nodeSelector: {}
  tolerations: []
  extraEnv: []
  service:
    port: 8082
ingress:
  enabled: true
  # Public routing resource:
  #   auto    → Ingress on AWS/Azure/GCP; native OpenShift Routes on OpenShift
  #   ingress → always networking.k8s.io/v1 Ingress (OpenShift Ingress option)
  #   route   → always OpenShift Route (no-op outside OpenShift)
  resourceType: "auto"
  className: "" # Empty = use global.ingress.className
  annotations: {}
  tls:
    enabled: false
    secretName: "" # Empty = shared global.ingress.tls secret
  controlPlane:
    host: "" # Empty = auto-derive <hostPrefix>.<global.domain>
    hostPrefix: "admin"
  # Proxy (data-plane) public hosts. Primary host is exact; additionalHosts may
  # include single-label wildcards (e.g. "*.llm.platform.example.com") for
  # dynamically created gateways. Pair with config.gatewayDiscoveryMode=subdomain
  # and config.gatewayBaseDomain=<zone without *.> so the app resolves slugs.
  dataPlane:
    host: ""
    hostPrefix: "gateway"
    additionalHosts: []
  # MCP public hosts. Same contract as dataPlane (exact + optional wildcards).
  mcp:
    host: ""
    hostPrefix: "mcp"
    additionalHosts: []
