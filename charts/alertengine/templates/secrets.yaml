{{- if eq (include "alertengine.deploy" .) "true" }}
{{- if and (include "neuraltrust-platform.autoGenerateSecrets" .) (not .Values.global.preserveExistingSecrets) }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace "alertengine-secrets") }}
{{- $hasExplicit := or .Values.database.password .Values.authJwtSecret .Values.appEncryptionKey }}
{{- if or .Release.IsInstall $existing $hasExplicit }}
apiVersion: v1
kind: Secret
metadata:
  name: alertengine-secrets
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "alertengine.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /* IAM DB auth ships no static password (service mints a token). */}}
  {{- if not .Values.database.iamAuth }}
  DB_PASSWORD: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.database.password "existingSecret" $existing "secretKey" "DB_PASSWORD" "length" 32) | quote }}
  {{- end }}
  AUTH_JWT_SECRET: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.authJwtSecret "existingSecret" $existing "secretKey" "AUTH_JWT_SECRET" "length" 64) | quote }}
  APP_ENCRYPTION_KEY: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.appEncryptionKey "existingSecret" $existing "secretKey" "APP_ENCRYPTION_KEY" "length" 32) | quote }}
  {{- /* CLICKHOUSE_PASSWORD is sourced from the shared ClickHouse secret
         (.Values.clickhouse.existingSecret) via the Deployment env, so AlertEngine
         and DataCore authenticate with the same credential. Not stored here. */}}
{{- end }}
{{- end }}
{{- end }}
