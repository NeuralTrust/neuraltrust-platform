{{- if .Values.backup.enabled }}
{{- $type := .Values.backup.storage.type | default "s3" }}
{{- if eq $type "s3" }}
{{- if not .Values.backup.storage.s3.existingSecret }}
{{- if or .Values.backup.storage.s3.accessKeyId .Values.backup.storage.s3.secretAccessKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clickhouse.fullname" . }}-backup-credentials
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
type: Opaque
data:
  access-key-id: {{ .Values.backup.storage.s3.accessKeyId | default "" | b64enc | quote }}
  secret-access-key: {{ .Values.backup.storage.s3.secretAccessKey | default "" | b64enc | quote }}
{{- end }}
{{- end }}
{{- else if eq $type "azblob" }}
{{- if not .Values.backup.storage.azblob.existingSecret }}
{{- if .Values.backup.storage.azblob.connectionString }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clickhouse.fullname" . }}-backup-credentials
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
type: Opaque
data:
  connection-string: {{ .Values.backup.storage.azblob.connectionString | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
