{{- $g := default dict .Values.global -}}
{{- $m := default dict $g.monitoring -}}
{{- $cap := .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" -}}
{{- if and $m.enabled $cap -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/part-of: neuraltrust-platform
    app.kubernetes.io/component: clickhouse
    {{- with $m.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: clickhouse
      interval: 1m
      rules:
        - alert: ClickHouseShardDown
          expr: |
            sum by (statefulset) (kube_statefulset_status_replicas_ready{namespace="{{ .Release.Namespace }}",statefulset=~"clickhouse-shard.*"}) == 0
          for: 5m
          labels:
            severity: critical
            {{- with $m.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'ClickHouse shard {{ printf "{{ $labels.statefulset }}" }} has no ready replicas'
            description: "Telemetry writes for this shard are failing. Check disk usage and pod status; the watchdog clickhouse check reports more granular state."
        - alert: ClickHouseKeeperDown
          expr: |
            sum(kube_statefulset_status_replicas_ready{namespace="{{ .Release.Namespace }}",statefulset=~"clickhouse-keeper.*"}) == 0
          for: 5m
          labels:
            severity: critical
            {{- with $m.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "ClickHouse Keeper is unavailable"
            description: "Replication and DDL won't make progress without Keeper. Verify the keeper StatefulSet."
{{- end }}
