{{- /* preserveExistingSecrets: when true, skip secret creation entirely (secrets are
       pre-generated / managed outside the chart). Parity with the other subcharts. */}}
{{- $preserve := dig "preserveExistingSecrets" false (.Values.global | default dict) }}
{{- if and (not .Values.auth.existingSecret) (not $preserve) }}
{{- $secretName := include "clickhouse.fullname" . }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
{{- $haveExisting := and $existingSecret (hasKey ($existingSecret.data | default dict) "admin-password") }}
{{- /* On upgrade, if no value can be resolved (no explicit auth.password and lookup
       returned nothing — e.g. restricted RBAC or a template-only render), skip the
       Secret so the live one is preserved instead of being overwritten with a fresh
       random value. helm.sh/resource-policy: keep stops Helm pruning it while skipped. */}}
{{- if or .Release.IsInstall .Values.auth.password $haveExisting }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $haveExisting }}
  admin-password: {{ index $existingSecret.data "admin-password" }}
  {{- else if .Values.auth.password }}
  admin-password: {{ .Values.auth.password | b64enc }}
  {{- else }}
  admin-password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
{{- end }}
{{- end }}
