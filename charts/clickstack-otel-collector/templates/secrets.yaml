{{- if and (eq (include "neuraltrust-platform.isV2" .) "true") (eq (include "neuraltrust-platform.isExternal" .) "true") }}
{{- if and (include "neuraltrust-platform.autoGenerateSecrets" .) (not .Values.global.preserveExistingSecrets) }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" (include "clickstack-otel-collector.fullname" .))) }}
{{- if or .Release.IsInstall $existing .Values.otlpAuthToken (eq (include "neuraltrust-platform.confirmedMigrationCanGenerateSecrets" .) "true") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clickstack-otel-collector.fullname" . }}-secrets
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "clickstack-otel-collector.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLICKHOUSE_ENDPOINT: {{ .Values.clickhouse.endpoint | quote }}
  CLICKHOUSE_USER: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.clickhouse.user "existingSecret" $existing "secretKey" "CLICKHOUSE_USER" "length" 16) | quote }}
  {{- /* CLICKHOUSE_PASSWORD is sourced from the shared ClickHouse secret
         (.Values.clickhouse.existingSecret) via the Deployment env, so the collector
         authenticates with the same credential as DataCore/AlertEngine. Not stored here. */}}
  OTLP_AUTH_TOKEN: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.otlpAuthToken "existingSecret" $existing "secretKey" "OTLP_AUTH_TOKEN" "length" 48) | quote }}
{{- end }}
{{- end }}
{{- end }}
