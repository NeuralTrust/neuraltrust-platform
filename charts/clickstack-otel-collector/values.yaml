# clickstack-otel-collector subchart.
# Renders ONLY when global.deploymentMode=external.
# Self-contained wrapper around the ClickStack collector image: exposes OTLP
# receivers and writes telemetry (otel_traces / otel_metrics_* / otel_logs)
# directly into ClickHouse. The ClickHouse exporter is generated by the image
# from the CLICKHOUSE_* env vars below — it is not templated as YAML here.
nameOverride: ""
fullnameOverride: "clickstack-collector"
securityHardening: true
image:
  repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/clickstack-otel-collector
  tag: "2.31.0"
  pullPolicy: IfNotPresent
# Private AR image — default pull secret (set "none" to opt out for Workload Identity).
imagePullSecrets: "gcr-secret"
serviceAccount:
  create: true
  name: "clickstack-collector"
  annotations: {}
replicas: 1
ports:
  otlp: 4317
  otlpHttp: 4318
# ClickHouse target. Defaults to the in-cluster clickhouse subchart over HTTP;
# set clickhouse.endpoint to your external/Cloud endpoint (e.g.
# https://<instance>.clickhouse.cloud:8443) when infrastructure.clickhouse.deploy=false.
clickhouse:
  endpoint: "http://clickhouse:8123"
  database: "otel"
  user: "neuraltrust"
  # CLICKHOUSE_PASSWORD is read from a shared secret — the in-cluster `clickhouse`
  # subchart secret by default (same secret DataCore/AlertEngine use). For external
  # ClickHouse (infrastructure.clickhouse.deploy=false), point this at the secret
  # holding your password (matches infrastructure.clickhouse.external.secretName/Key).
  existingSecret:
    name: "clickhouse"
    key: "admin-password"
# Secures the OTLP receivers (senders present this token).
otlpAuthToken: "" # Auto-generated if empty
resources:
  requests: {cpu: 100m, memory: 256Mi}
  limits: {cpu: 1000m, memory: 1Gi}
nodeSelector: {}
tolerations: []
extraEnv: []
# Collector log verbosity (HYPERDX_LOG_LEVEL). "info" by default; set "debug" to
# troubleshoot pipeline/exporter errors.
logLevel: "info"
service:
  type: ClusterIP
# Additive collector config mounted at CUSTOM_OTELCOL_CONFIG_FILE. The image ships
# an experimental metrics/promql pipeline whose exporter targets a Prometheus
# remote-write endpoint that a self-hosted ClickHouse does not expose, so it errors.
# We neutralize it with a self-contained inert pipeline (built-in nop receiver +
# nop exporter) so the collector boots cleanly. Declaring BOTH a receiver and an
# exporter keeps the pipeline valid regardless of how the image merges this file.
customConfig: |
  receivers:
    nop: {}
  exporters:
    nop: {}
  service:
    pipelines:
      metrics/promql:
        receivers: [nop]
        exporters: [nop]
