{{- /* platform-v2: legacy data-plane disabled under v2, EXCEPT the data-plane-api shim (kept until TrustLens). Renders under v1 (any mode) or the v2 data-plane-api shim. */ -}}
{{- if or (not (eq (include "neuraltrust-platform.isV2" .) "true")) (eq (include "neuraltrust-platform.dataPlaneApiV2.enabled" .) "true") }}
{{- /* ClickHouse password secret. Defaults to the in-cluster `clickhouse` secret
       (key admin-password); override via dataPlane.components.clickhouse.existingSecret
       {name,key} to match an external ClickHouse secret (infrastructure.clickhouse.external). */ -}}
{{- $chPwSecret := dict }}
{{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.clickhouse .Values.dataPlane.components.clickhouse.existingSecret }}
{{- $chPwSecret = .Values.dataPlane.components.clickhouse.existingSecret }}
{{- end }}
{{- $chPwSecretName := $chPwSecret.name | default "clickhouse" }}
{{- $chPwSecretKey := $chPwSecret.key | default "admin-password" }}
{{- /* Resolve the SQL backend (postgres | clickhouse). v2 hybrid defaults to
       PostgreSQL; v2 external and v1 stay ClickHouse. See the sqlBackend helper. */ -}}
{{- $sqlBackend := include "neuraltrust-platform.dataPlaneApi.sqlBackend" . }}
{{- $pgCfg := include "neuraltrust-platform.dataPlaneApi.postgresConfig" . | fromYaml }}
{{- $pgMigration := default dict $pgCfg.migration }}
{{- $pgMigrationEnabled := true }}{{- if hasKey $pgMigration "enabled" }}{{- $pgMigrationEnabled = $pgMigration.enabled }}{{- end }}
{{- $renderChInit := eq $sqlBackend "clickhouse" }}
{{- $renderPgInit := and (eq $sqlBackend "postgres") $pgMigrationEnabled }}
{{- $dpRedisCfg := default dict .Values.dataPlane.components.api.redis }}
{{- $dpRedisBackend := include "neuraltrust-platform.dataPlaneApi.redisBackend" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "data-plane-api"
  labels:
    app: api
    plane: data
spec:
  {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.api (hasKey .Values.dataPlane.components.api "replicas") }}
  replicas: {{ .Values.dataPlane.components.api.replicas }}
  {{- else }}
  replicas: 2
  {{- end }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        plane: data
    spec:
      {{- include "data-plane.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "data-plane.serviceAccountName" . }}
      {{- if .Values.securityHardening }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      {{- if or $renderChInit $renderPgInit }}
      initContainers:
        {{- if $renderChInit }}
        - name: clickhouse-migrations
          {{- $chMigrationRepo := "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/clickhouse-server" }}
          {{- $chMigrationTag := "26.6" }}
          {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.clickhouse .Values.dataPlane.components.clickhouse.image }}
            {{- if .Values.dataPlane.components.clickhouse.image.repository }}{{- $chMigrationRepo = .Values.dataPlane.components.clickhouse.image.repository }}{{- end }}
            {{- if .Values.dataPlane.components.clickhouse.image.tag }}{{- $chMigrationTag = .Values.dataPlane.components.clickhouse.image.tag }}{{- end }}
          {{- end }}
          image: {{ include "data-plane.image" (dict "repository" $chMigrationRepo "tag" $chMigrationTag "global" .Values.global) | quote }}
          imagePullPolicy: IfNotPresent
          {{- if .Values.securityHardening }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- end }}
          command:
          - /bin/sh
          - -c
          - |
            set -e
            echo "Running ClickHouse initialization scripts..."
            # Use port 9000 for native protocol (migrations require native protocol, not HTTP)
            CLICKHOUSE_NATIVE_PORT="9000"
            echo "Using port ${CLICKHOUSE_NATIVE_PORT} for migrations (native protocol)"
            
            # Wait for ClickHouse to be ready
            echo "Waiting for ClickHouse to be ready..."
            MAX_ATTEMPTS=60
            ATTEMPT=0
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              if clickhouse-client --host="${CLICKHOUSE_HOST}" --port="${CLICKHOUSE_NATIVE_PORT}" --user=default --password="${CLICKHOUSE_PASSWORD}" --query "SELECT 1" &> /dev/null; then
                echo "✓ ClickHouse is ready"
                break
              fi
              ATTEMPT=$((ATTEMPT + 1))
              if [ $((ATTEMPT % 5)) -eq 0 ]; then
                echo "Waiting for ClickHouse... ($ATTEMPT/$MAX_ATTEMPTS)"
              fi
              sleep 2
            done
            
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "ERROR: ClickHouse did not become ready in time"
              exit 1
            fi
            
            # Ensure user exists (idempotent)
            echo "Ensuring user ${CLICKHOUSE_USER} exists..."
            clickhouse-client \
              --host="${CLICKHOUSE_HOST}" \
              --port="${CLICKHOUSE_NATIVE_PORT}" \
              --user=default \
              --password="${CLICKHOUSE_PASSWORD}" \
              --query="CREATE USER IF NOT EXISTS ${CLICKHOUSE_USER} IDENTIFIED WITH sha256_password BY '${CLICKHOUSE_PASSWORD}'" 2>/dev/null || \
              echo "User may already exist, continuing..."
            
            # Grant permissions
            echo "Granting permissions to user ${CLICKHOUSE_USER}..."
            clickhouse-client \
              --host="${CLICKHOUSE_HOST}" \
              --port="${CLICKHOUSE_NATIVE_PORT}" \
              --user=default \
              --password="${CLICKHOUSE_PASSWORD}" \
              --query="GRANT ALL ON *.* TO ${CLICKHOUSE_USER}" 2>/dev/null || \
              echo "Permissions may already be granted, continuing..."
            
            # Calculate MD5 hash of the migration file
            MIGRATION_HASH=$(md5sum /init-db/init-db.sql | cut -d' ' -f1)
            echo "Migration file MD5: $MIGRATION_HASH"
            
            # Check if this migration has already been applied
            EXISTING_HASH=$(clickhouse-client \
              --host="${CLICKHOUSE_HOST}" \
              --port="${CLICKHOUSE_NATIVE_PORT}" \
              --user="${CLICKHOUSE_USER}" \
              --password="${CLICKHOUSE_PASSWORD}" \
              --query="SELECT migrationHash FROM ${CLICKHOUSE_DATABASE}.schema_migrations WHERE migrationHash = '${MIGRATION_HASH}' LIMIT 1" 2>/dev/null | tr -d '\n' || echo "")
            
            if [ -n "$EXISTING_HASH" ] && [ "$EXISTING_HASH" = "$MIGRATION_HASH" ]; then
              echo "Migration $MIGRATION_HASH has already been applied. Skipping."
              exit 0
            fi
            
            echo "Applying migration $MIGRATION_HASH..."
            
            # Execute the migration
            clickhouse-client \
              --host="${CLICKHOUSE_HOST}" \
              --port="${CLICKHOUSE_NATIVE_PORT}" \
              --user="${CLICKHOUSE_USER}" \
              --password="${CLICKHOUSE_PASSWORD}" \
              --multiquery \
              < /init-db/init-db.sql
            
            if [ $? -ne 0 ]; then
              echo "Error: Migration failed!"
              exit 1
            fi
            
            # Record the migration
            clickhouse-client \
              --host="${CLICKHOUSE_HOST}" \
              --port="${CLICKHOUSE_NATIVE_PORT}" \
              --user="${CLICKHOUSE_USER}" \
              --password="${CLICKHOUSE_PASSWORD}" \
              --query="INSERT INTO ${CLICKHOUSE_DATABASE}.schema_migrations (migrationHash, appliedAt) VALUES ('${MIGRATION_HASH}', now64(6))" \
              2>/dev/null || echo "Warning: Failed to record migration (non-fatal)"
            
            echo "Migration $MIGRATION_HASH applied successfully."
          env:
          - name: CLICKHOUSE_HOST
            valueFrom:
              secretKeyRef:
                name: clickhouse-secrets
                key: CLICKHOUSE_HOST
          - name: CLICKHOUSE_USER
            valueFrom:
              secretKeyRef:
                name: clickhouse-secrets
                key: CLICKHOUSE_USER
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ $chPwSecretName | quote }}
                key: {{ $chPwSecretKey | quote }}
          - name: CLICKHOUSE_DATABASE
            valueFrom:
              secretKeyRef:
                name: clickhouse-secrets
                key: CLICKHOUSE_DATABASE
          {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "go" "ctx" .) | nindent 10 }}
          resources:
            {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.api .Values.dataPlane.components.api.initContainerResources }}
            {{- toYaml .Values.dataPlane.components.api.initContainerResources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
            {{- end }}
          volumeMounts:
          - name: init-db
            mountPath: /init-db
            readOnly: true
          - name: tmp
            mountPath: /tmp
          {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 10 }}
          {{- if eq $dpRedisBackend "kafka" }}
          {{- include "neuraltrust-platform.kafka.tlsVolumeMount" . | nindent 10 }}
          {{- end }}
        {{- end }}
        {{- if $renderPgInit }}
        - name: postgres-migrations
          {{- $pgMigRepo := "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/postgres" }}
          {{- $pgMigTag := "17-alpine" }}
          {{- $pgMigPull := "IfNotPresent" }}
          {{- if $pgMigration.image }}
            {{- if $pgMigration.image.repository }}{{- $pgMigRepo = $pgMigration.image.repository }}{{- end }}
            {{- if $pgMigration.image.tag }}{{- $pgMigTag = $pgMigration.image.tag }}{{- end }}
            {{- if $pgMigration.image.pullPolicy }}{{- $pgMigPull = $pgMigration.image.pullPolicy }}{{- end }}
          {{- end }}
          image: {{ include "data-plane.image" (dict "repository" $pgMigRepo "tag" $pgMigTag "global" .Values.global) | quote }}
          imagePullPolicy: {{ $pgMigPull }}
          {{- if .Values.securityHardening }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- end }}
          command:
          - /bin/sh
          - -c
          - |
            set -e
            echo "Applying PostgreSQL schema migrations..."
            export PGPASSWORD="${POSTGRES_PASSWORD}"

            # Wait for PostgreSQL to accept connections.
            ATTEMPT=0
            MAX_ATTEMPTS=60
            until pg_isready -h "${POSTGRES_HOST}" -p "${POSTGRES_PORT}" -U "${POSTGRES_USER}" -t 2 >/dev/null 2>&1; do
              ATTEMPT=$((ATTEMPT + 1))
              if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
                echo "ERROR: PostgreSQL did not become ready in time"
                exit 1
              fi
              [ $((ATTEMPT % 5)) -eq 0 ] && echo "Waiting for PostgreSQL... ($ATTEMPT/$MAX_ATTEMPTS)"
              sleep 2
            done
            echo "PostgreSQL is ready; applying idempotent schema in a single advisory-locked transaction..."

            # A transaction-scoped advisory lock serializes concurrent replicas so
            # they never race on CREATE ... IF NOT EXISTS. The bundled DDL is
            # idempotent; ON_ERROR_STOP makes any failure fatal.
            psql --set=ON_ERROR_STOP=1 \
              -h "${POSTGRES_HOST}" \
              -p "${POSTGRES_PORT}" \
              -U "${POSTGRES_USER}" \
              -d "${POSTGRES_DATABASE}" <<'EOSQL'
            BEGIN;
            SELECT pg_advisory_xact_lock(8274123);
            \i /postgres-init/init-db.sql
            COMMIT;
            EOSQL

            echo "PostgreSQL schema migration completed."
          env:
          {{- include "neuraltrust-platform.dataPlaneApi.postgresEnv" . | nindent 10 }}
          {{- if include "neuraltrust-platform.customCaCert.enabled" . }}
          - name: PGSSLROOTCERT
            value: {{ include "neuraltrust-platform.customCaCert.path" . | quote }}
          {{- end }}
          resources:
            {{- if $pgMigration.resources }}
            {{- toYaml $pgMigration.resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
            {{- end }}
          volumeMounts:
          - name: postgres-init-db
            mountPath: /postgres-init
            readOnly: true
          - name: tmp
            mountPath: /tmp
          {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 10 }}
        {{- end }}
      {{- end }}
      containers:
      - name: api
        {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.api .Values.dataPlane.components.api.image }}
        {{- $apiRepo := .Values.dataPlane.components.api.image.repository | default "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/data-plane-api" }}
        {{- $apiTag := .Values.dataPlane.components.api.image.tag | default "v1.42.0" }}
        image: {{ include "data-plane.image" (dict "repository" $apiRepo "tag" $apiTag "global" .Values.global) | quote }}
        imagePullPolicy: {{ .Values.dataPlane.components.api.image.pullPolicy | default "Always" }}
        {{- else }}
        {{- $fallbackApiTag := "v1.42.0" }}
        image: {{ include "data-plane.image" (dict "repository" "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/data-plane-api" "tag" $fallbackApiTag "global" .Values.global) | quote }}
        imagePullPolicy: Always
        {{- end }}
        {{- if .Values.securityHardening }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        {{- end }}
        ports:
        - containerPort: 8000
        {{- $dpApiExtraEnvFrom := list }}
        {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.api .Values.dataPlane.components.api.extraEnvFrom }}
          {{- $dpApiExtraEnvFrom = .Values.dataPlane.components.api.extraEnvFrom }}
        {{- end }}
        {{- include "data-plane.envFrom" (dict "component" "api" "extraEnvFrom" $dpApiExtraEnvFrom "context" .) | nindent 8 }}
        env:
          - name: PORT
            value: "8000"
          - name: DATA_PLANE_JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ if and .Values.dataPlane .Values.dataPlane.secrets .Values.dataPlane.secrets.dataPlaneJWTSecretName }}{{ .Values.dataPlane.secrets.dataPlaneJWTSecretName }}{{ else }}data-plane-jwt-secret{{ end }}
                key: DATA_PLANE_JWT_SECRET
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ if and .Values.dataPlane .Values.dataPlane.secrets .Values.dataPlane.secrets.openaiApiKeySecretName }}{{ .Values.dataPlane.secrets.openaiApiKeySecretName }}{{ else }}openai-secrets{{ end }}
                key: OPENAI_API_KEY
                optional: true
          - name: GOOGLE_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ if and .Values.dataPlane .Values.dataPlane.secrets .Values.dataPlane.secrets.googleApiKeySecretName }}{{ .Values.dataPlane.secrets.googleApiKeySecretName }}{{ else }}google-secrets{{ end }}
                key: GOOGLE_API_KEY
                optional: true
          - name: RESEND_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ if and .Values.dataPlane .Values.dataPlane.secrets .Values.dataPlane.secrets.resendApiKeySecretName }}{{ .Values.dataPlane.secrets.resendApiKeySecretName }}{{ else }}resend-secrets{{ end }}
                key: RESEND_API_KEY
                optional: true
          {{- if eq $dpRedisBackend "kafka" }}
          {{- include "neuraltrust-platform.kafka.clientEnv" . | nindent 10 }}
          {{- end }}
          - name: EVALUATION_PROGRESS_BACKEND
            value: {{ $dpRedisBackend | quote }}
          {{- if eq $dpRedisBackend "redis" }}
          - name: REDIS_URL
            valueFrom:
              secretKeyRef:
                name: {{ if and .Values.dataPlane.secrets .Values.dataPlane.secrets.dataPlaneJWTSecretName }}{{ .Values.dataPlane.secrets.dataPlaneJWTSecretName }}{{ else }}data-plane-jwt-secret{{ end }}
                key: REDIS_URL
          - name: REDIS_MAX_CONNECTIONS
            value: {{ $dpRedisCfg.maxConnections | default 100 | quote }}
          - name: REDIS_MGET_CHUNK_SIZE
            value: {{ $dpRedisCfg.mgetChunkSize | default 200 | quote }}
          {{- with $dpRedisCfg.connectTimeoutSeconds }}
          - name: REDIS_CONNECT_TIMEOUT_SECONDS
            value: {{ . | quote }}
          {{- end }}
          {{- with $dpRedisCfg.socketTimeoutSeconds }}
          - name: REDIS_SOCKET_TIMEOUT_SECONDS
            value: {{ . | quote }}
          {{- end }}
          {{- with $dpRedisCfg.healthCheckIntervalSeconds }}
          - name: REDIS_HEALTH_CHECK_INTERVAL_SECONDS
            value: {{ . | quote }}
          {{- end }}
          {{- if $dpRedisCfg.iamAuth }}
          - name: REDIS_AUTH_MODE
            value: "aws_iam"
          - name: REDIS_IAM_USER
            value: {{ $dpRedisCfg.iamUser | quote }}
          - name: REDIS_IAM_CACHE_NAME
            value: {{ $dpRedisCfg.iamCacheName | quote }}
          {{- if $dpRedisCfg.iamRegion }}
          - name: REDIS_IAM_REGION
            value: {{ $dpRedisCfg.iamRegion | quote }}
          {{- end }}
          - name: REDIS_IAM_SERVERLESS
            value: {{ $dpRedisCfg.iamServerless | default false | quote }}
          {{- end }}
          {{- end }}
          - name: HF_HOME
            value: "/root/.cache/huggingface"
          # Optional: the data-plane image bundles its own model (fastText) and
          # needs no HF token to run. Only forwarded to eval Jobs when set.
          - name: HUGGINGFACE_TOKEN
            valueFrom:
              secretKeyRef:
                name: {{ if and .Values.dataPlane .Values.dataPlane.secrets .Values.dataPlane.secrets.huggingFaceTokenSecretName }}{{ .Values.dataPlane.secrets.huggingFaceTokenSecretName }}{{ else }}huggingface-secrets{{ end }}
                key: HUGGINGFACE_TOKEN
                optional: true
          - name: PYTHONPATH
            value: "/app"
          {{- if eq $sqlBackend "postgres" }}
          {{- include "neuraltrust-platform.dataPlaneApi.postgresEnv" . | nindent 10 }}
          {{- if include "neuraltrust-platform.customCaCert.enabled" . }}
          - name: PGSSLROOTCERT
            value: {{ include "neuraltrust-platform.customCaCert.path" . | quote }}
          {{- end }}
          {{- else }}
          # App defaults SQL_DATABASE to postgres when unset; must be explicit for ClickHouse.
          - name: SQL_DATABASE
            value: "clickhouse"
          - name: CLICKHOUSE_HOST
            valueFrom:
              secretKeyRef:
                name: clickhouse-secrets
                key: CLICKHOUSE_HOST
          - name: CLICKHOUSE_PORT
            valueFrom:
              secretKeyRef:
                name: clickhouse-secrets
                key: CLICKHOUSE_PORT
          - name: CLICKHOUSE_DATABASE
            valueFrom:
              secretKeyRef:
                name: clickhouse-secrets
                key: CLICKHOUSE_DATABASE
          - name: CLICKHOUSE_USER
            valueFrom:
              secretKeyRef:
                name: clickhouse-secrets
                key: CLICKHOUSE_USER
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ $chPwSecretName | quote }}
                key: {{ $chPwSecretKey | quote }}
          {{- end }}
          {{- if eq (include "data-plane.api.k8sJobs.enabled" .) "true" }}
          {{- $jobsCfg := .Values.dataPlane.components.api.k8sJobs }}
          - name: K8S_JOBS_ENABLED
            value: "true"
          - name: K8S_JOBS_NAMESPACE
            value: {{ include "data-plane.api.k8sJobs.namespace" . | quote }}
          - name: K8S_JOB_SERVICE_ACCOUNT
            value: {{ include "data-plane.serviceAccountName" . | quote }}
          - name: K8S_JOB_IMAGE
            value: {{ include "data-plane.api.k8sJobs.image" . | quote }}
          {{- $jobPullSecret := include "data-plane.imagePullSecretName" . }}
          {{- if $jobPullSecret }}
          # Forwarded so Job pods spawned by the API pull the (private) image
          # with the same secret as the Deployment. Omitted entirely when the
          # secret resolves to "none"/"" (nodes pull via IAM / Workload Identity).
          - name: K8S_JOB_IMAGE_PULL_SECRET
            value: {{ $jobPullSecret | quote }}
          {{- end }}
          {{- with $jobsCfg.ttlSecondsAfterFinished }}
          - name: K8S_JOB_TTL_SECONDS_AFTER_FINISHED
            value: {{ . | quote }}
          {{- end }}
          {{- with $jobsCfg.backoffLimit }}
          - name: K8S_JOB_BACKOFF_LIMIT
            value: {{ . | quote }}
          {{- end }}
          {{- with $jobsCfg.maxConcurrentJobs }}
          - name: K8S_JOBS_MAX_CONCURRENT
            value: {{ . | quote }}
          {{- end }}
          {{- with $jobsCfg.waitTimeoutSeconds }}
          - name: K8S_JOB_WAIT_TIMEOUT_SECONDS
            value: {{ . | quote }}
          {{- end }}
          {{- if and $jobsCfg.resources $jobsCfg.resources.requests }}
          {{- with $jobsCfg.resources.requests.cpu }}
          - name: K8S_JOB_CPU_REQUEST
            value: {{ . | quote }}
          {{- end }}
          {{- with $jobsCfg.resources.requests.memory }}
          - name: K8S_JOB_MEMORY_REQUEST
            value: {{ . | quote }}
          {{- end }}
          {{- end }}
          {{- if and $jobsCfg.resources $jobsCfg.resources.limits }}
          {{- with $jobsCfg.resources.limits.cpu }}
          - name: K8S_JOB_CPU_LIMIT
            value: {{ . | quote }}
          {{- end }}
          {{- with $jobsCfg.resources.limits.memory }}
          - name: K8S_JOB_MEMORY_LIMIT
            value: {{ . | quote }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.api .Values.dataPlane.components.api.extraEnv }}
          {{- toYaml .Values.dataPlane.components.api.extraEnv | nindent 10 }}
          {{- end }}
          {{- include "neuraltrust-platform.proxy-env" . | nindent 10 }}
          {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "python" "ctx" .) | nindent 10 }}
          {{- include "neuraltrust-platform.appVersionEnv" (dict "tag" (dig "components" "api" "image" "tag" "" (.Values.dataPlane | default dict))) | nindent 10 }}
        volumeMounts:
          {{- if eq (include "data-plane.api.trustTestConfig.enabled" .) "true" }}
          - name: trusttest-config-volume
            mountPath: /app/.trusttest_config.json # Assuming app runs from /app
            subPath: .trusttest_config.json
          {{- end }}
          - name: tmp
            mountPath: /tmp
          {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 10 }}
          {{- if eq $dpRedisBackend "kafka" }}
          {{- include "neuraltrust-platform.kafka.tlsVolumeMount" . | nindent 10 }}
          {{- end }}
        {{- with .Values.dataPlane.components.api.extraVolumeMounts }}
        {{- include "neuraltrust-platform.extraVolumeMounts" (dict "items" .) | nindent 10 }}
        {{- end }}
        resources:
          {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.api .Values.dataPlane.components.api.resources }}
          {{- toYaml .Values.dataPlane.components.api.resources | nindent 10 }}
          {{- else }}
          requests:
            cpu: 1
            memory: 2Gi
          limits:
            cpu: 2
            memory: 3Gi
          {{- end }}
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            httpHeaders:
            - name: Accept
              value: application/json
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            httpHeaders:
            - name: Accept
              value: application/json
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 60
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8000
            httpHeaders:
            - name: Accept
              value: application/json
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 30
      volumes:
      - name: tmp
        emptyDir: {}
      {{- include "neuraltrust-platform.customCaCert.volume" . | nindent 6 }}
      {{- if eq $dpRedisBackend "kafka" }}
      {{- include "neuraltrust-platform.kafka.tlsVolume" . | nindent 6 }}
      {{- end }}
      {{- with .Values.dataPlane.components.api.extraVolumes }}
      {{- include "neuraltrust-platform.extraVolumes" (dict "items" .) | nindent 6 }}
      {{- end }}
      {{- if $renderChInit }}
      - name: init-db
        configMap:
          name: {{ if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.clickhouse .Values.dataPlane.components.clickhouse.configmap }}{{ .Values.dataPlane.components.clickhouse.configmap.name | default "clickhouse-init-job" }}{{ else }}clickhouse-init-job{{ end }}
          items:
            - key: init-db.sql
              path: init-db.sql
      {{- end }}
      {{- if $renderPgInit }}
      - name: postgres-init-db
        configMap:
          name: data-plane-postgres-init
          items:
            - key: init-db.sql
              path: init-db.sql
      {{- end }}
      {{- if eq (include "data-plane.api.trustTestConfig.enabled" .) "true" }}
      - name: trusttest-config-volume
        configMap:
          name: data-plane-trusttest-config
      {{- end }}
      {{- include "neuraltrust-platform.nodeSelector" (dict "ctx" .) | nindent 6 }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" .) | nindent 6 }}

{{- end }}
