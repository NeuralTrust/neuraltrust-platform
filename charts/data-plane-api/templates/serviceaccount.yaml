{{- /* platform-v2: legacy data-plane disabled under v2, EXCEPT the data-plane-api shim (kept until TrustLens). Renders under v1 (any mode) or the v2 data-plane-api shim. */ -}}
{{- if or (not (eq (include "neuraltrust-platform.isV2" .) "true")) (eq (include "neuraltrust-platform.dataPlaneApiV2.enabled" .) "true") }}
{{- $sa := default dict (default dict .Values.dataPlane).serviceAccount -}}
{{- $create := true -}}
{{- if hasKey $sa "create" -}}{{- $create = $sa.create -}}{{- end -}}
{{- if and .Values.dataPlane .Values.dataPlane.enabled $create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "data-plane.serviceAccountName" . }}
  labels:
    {{- include "neuraltrust-data-plane.labels" . | nindent 4 }}
  {{- $saAnn := include "neuraltrust-platform.serviceAccount.annotationsBlock" (dict "ctx" . "annotations" $sa.annotations) }}
  {{- with $saAnn }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
{{- end }}


{{- end }}
