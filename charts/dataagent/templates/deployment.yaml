{{- if eq (include "neuraltrust-platform.dataagentEnabled" .) "true" }}
{{- $img := include "dataagent.image" (dict "repository" .Values.image.repository "tag" .Values.image.tag "global" .Values.global) }}
{{- $egressEnabled := eq (include "neuraltrust-platform.clickstackEgress.enabled" .) "true" }}
{{- $egressCfg := default dict (default dict (default dict .Values.global).clickstack).egress -}}
{{- $egressImg := default dict $egressCfg.image -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dataagent.fullname" . }}
  labels:
    {{- include "dataagent.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-plane
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "dataagent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: data-plane
  template:
    metadata:
      labels:
        {{- include "dataagent.labels" . | nindent 8 }}
        app.kubernetes.io/component: data-plane
      {{- if $egressEnabled }}
      annotations:
        checksum/egress-config: {{ include (print $.Template.BasePath "/egress-configmap.yaml") . | sha256sum }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "dataagent.serviceAccountName" . }}
      {{- include "dataagent.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.securityHardening }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      {{- if $egressEnabled }}
      - name: egress-config
        configMap:
          name: {{ include "neuraltrust-platform.clickstackEgress.fullname" . }}-config
      {{- end }}
      {{- include "neuraltrust-platform.customCaCert.volume" . | nindent 6 }}
      containers:
      - name: dataagent
        image: {{ $img | quote }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        envFrom:
        - configMapRef:
            name: dataagent-env-vars
        - secretRef:
            name: {{ (default dict .Values.existingSecret).name | default "dataagent-secrets" | quote }}
        {{- if eq (include "neuraltrust-platform.isHybrid" .) "true" }}
        # v2 hybrid: DATABASE_URL + DB_HOST/PORT/USER/PASSWORD/NAME/SSL_MODE arrive
        # through the shared `postgresql-secrets` Secret. Listed after the per-service
        # Secret so the shared credential wins.
        - secretRef:
            name: {{ include "neuraltrust-platform.v2.hybridPg.secretName" . | quote }}
            optional: true
        {{- end }}
        env:
        {{- if $egressEnabled }}
        - name: OAUTH_BROKER_ADDR
          value: "127.0.0.1:9465"
        {{- end }}
        {{- $enrolmentExisting := default dict (default dict .Values.enrolment).existingSecret }}
        {{- with $enrolmentExisting.name }}
        - name: ENROLMENT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ . | quote }}
              key: {{ $enrolmentExisting.key | default "ENROLMENT_TOKEN" | quote }}
        {{- end }}
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "neuraltrust-platform.proxy-env" . | nindent 8 }}
        {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "go" "ctx" .) | nindent 8 }}
        {{- include "neuraltrust-platform.appVersionEnv" (dict "tag" .Values.image.tag) | nindent 8 }}
        {{- if .Values.securityHardening }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        {{- end }}
        ports:
        - containerPort: {{ .Values.ports.health }}
          name: health
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 8 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
      {{- if $egressEnabled }}
      - name: clickstack-egress-collector
        image: {{ include "neuraltrust-platform.clickstackEgress.image" . | quote }}
        imagePullPolicy: {{ default "IfNotPresent" $egressImg.pullPolicy }}
        args:
          - --config=/etc/otelcol/config.yaml
        env:
          {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "go" "ctx" .) | nindent 10 }}
        ports:
          - name: otlp-grpc
            containerPort: 4317
          - name: otlp-http
            containerPort: 4318
          - name: egress-health
            containerPort: 13133
        readinessProbe:
          httpGet:
            path: /
            port: egress-health
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: egress-health
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          {{- toYaml (default (dict "requests" (dict "cpu" "50m" "memory" "128Mi") "limits" (dict "cpu" "500m" "memory" "512Mi")) $egressCfg.resources) | nindent 10 }}
        volumeMounts:
          - name: egress-config
            mountPath: /etc/otelcol
            readOnly: true
          {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
      {{- end }}
      {{- include "neuraltrust-platform.nodeSelector" (dict "ctx" . "local" .Values.nodeSelector) | nindent 6 }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" . "local" .Values.tolerations) | nindent 6 }}
{{- end }}
