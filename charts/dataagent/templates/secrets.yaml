{{- if and (eq (include "neuraltrust-platform.isV2" .) "true") (eq (include "neuraltrust-platform.isHybrid" .) "true") }}
{{- if and (include "neuraltrust-platform.autoGenerateSecrets" .) (not .Values.global.preserveExistingSecrets) }}
{{- /*
ENROLMENT_TOKEN is issued by the SaaS and is NEVER auto-generated — we source it
from values, falling back to the existing in-cluster secret on upgrade.

DB_PASSWORD IS auto-generated (read-only role provisioned by v2-postgresql-init)
and preserved on upgrade via resolveSecret. DATABASE_URL is assembled from the
`database` components (host auto-derives to the in-cluster Postgres; overlay for
external), unless .Values.databaseUrl is set (explicit override).
*/}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace "dataagent-secrets") }}
{{- $existingData := dict }}
{{- if and $existing (kindIs "map" $existing) $existing.data }}
  {{- $existingData = $existing.data }}
{{- end }}
{{- $token := .Values.enrolmentToken }}
{{- if and (not $token) (hasKey $existingData "ENROLMENT_TOKEN") }}
  {{- $token = index $existingData "ENROLMENT_TOKEN" | b64dec }}
{{- end }}
{{- $db := default dict .Values.database }}
{{- $dbPw := include "neuraltrust-platform.resolveSecret" (dict "value" $db.password "existingSecret" $existing "secretKey" "DB_PASSWORD" "length" 32) }}
{{- $dsn := .Values.databaseUrl }}
{{- if not $dsn }}
  {{- $host := include "neuraltrust-platform.postgres.host" (dict "host" $db.host) }}
  {{- $port := $db.port | default 5432 }}
  {{- $name := $db.name | default "trustdata" }}
  {{- $user := $db.user | default "dataagent" }}
  {{- $ssl := $db.sslMode | default "prefer" }}
  {{- $dsn = printf "postgresql://%s:%s@%s:%v/%s?sslmode=%s" $user $dbPw $host $port $name $ssl }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: dataagent-secrets
  labels:
    {{- include "dataagent.labels" . | nindent 4 }}
type: Opaque
stringData:
  ENROLMENT_TOKEN: {{ $token | quote }}
  DATABASE_URL: {{ $dsn | quote }}
  DB_PASSWORD: {{ $dbPw | quote }}
{{- end }}
{{- end }}
