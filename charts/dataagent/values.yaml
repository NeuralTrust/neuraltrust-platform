# DataAgent library defaults. Umbrella merges these with top-level
# `dataagent:` and per-product `agentgateway.dataagent` / `trustguard.dataagent`.
nameOverride: ""
fullnameOverride: ""
securityHardening: true
image:
  repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/dataagent
  tag: "v0.4.0"
  pullPolicy: IfNotPresent
imagePullSecrets: "gcr-secret"
serviceAccount:
  create: true
  name: ""
  annotations: {}
# Single outbound stream — a second replica would double-register on DataBridge.
replicas: 1
ports:
  health: 8080
resources:
  requests: {cpu: 50m, memory: 64Mi}
  limits: {cpu: 250m, memory: 128Mi}
nodeSelector: {}
tolerations: []
extraEnv: []
databridge:
  addr: "databridge.neuraltrust.ai:443"
  serverName: "databridge.neuraltrust.ai"
  tlsMode: "tls"
store:
  backend: "postgres"
database:
  host: ""
  port: 5432
  name: ""
  user: ""
  password: ""
  sslMode: "prefer"
databaseUrl: ""
existingSecret:
  name: ""
enrolment:
  token: ""
  existingSecret:
    name: ""
    key: "ENROLMENT_TOKEN"
supervisor:
  backoffMin: "1s"
  backoffMax: "30s"
  keepaliveTime: "10s"
  keepaliveTimeout: "3s"
  maxConcurrentQueries: 8
pdb:
  enabled: true
  minAvailable: 1
# Set by umbrella when this instance owns clickstack-egress-collector.
egressPrimary: false
product: ""
