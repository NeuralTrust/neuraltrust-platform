{{- if and (eq (include "neuraltrust-platform.isV2" .) "true") (eq (include "neuraltrust-platform.isExternal" .) "true") }}
{{- if and (include "neuraltrust-platform.autoGenerateSecrets" .) (not .Values.global.preserveExistingSecrets) }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace "datacore-secrets") }}
{{- if or .Release.IsInstall $existing .Values.jwtSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: datacore-secrets
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "datacore.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_JWT_HS256_SECRET: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.jwtSecret "existingSecret" $existing "secretKey" "AUTH_JWT_HS256_SECRET" "length" 64) | quote }}
  CLICKHOUSE_USER: {{ .Values.clickhouse.user | default "neuraltrust" | quote }}
  {{- /* CLICKHOUSE_PASSWORD is sourced from the shared ClickHouse secret
         (.Values.clickhouse.existingSecret) via the Deployment env, so DataCore
         and AlertEngine authenticate with the same credential. Not stored here. */}}
{{- end }}
{{- end }}
{{- end }}
