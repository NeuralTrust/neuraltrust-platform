# DataCore subchart.
# Renders ONLY when global.deploymentMode=external.
# Single HTTP API on :8080. Requires ClickHouse (native protocol) for OTel raw
# data and Postgres for deployment metadata. ClickHouse migrations materialize
# DataCore tables from the otel_logs landing table written by
# clickstack-otel-collector; Postgres migrations own deployments / registry /
# enrolment tables. Then serves a tenant-scoped REST API.
nameOverride: ""
fullnameOverride: "datacore"
securityHardening: true
image:
  repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/datacore
  tag: "v0.13.0"
  pullPolicy: IfNotPresent
imagePullSecrets: "gcr-secret"
serviceAccount:
  create: true
  name: "datacore"
  annotations: {}
replicas: 1
config:
  # saas  → serve everything from ClickHouse (the self-hosted / external mode).
  # hybrid → route hybrid-instance raw reads to DataBridge (SaaS) instead.
  # Both modes require Postgres for deployment metadata unless
  # RESIDENCY_ALLOW_STUB=true (local/dev only; not set by this chart).
  residencyBackend: "saas"
  logLevel: "info"
  httpAddr: ":8080"
ports:
  http: 8080
# PostgreSQL connection (own "datacore" database + role; DataCore renders in
# v2 external only and does not use the hybrid `global.postgresql` shared
# block). host empty → auto-derives to the in-cluster control-plane-postgresql
# Service. For external Postgres, pre-create the datacore role + database and
# set host/user/name/password below. Env names are POSTGRES_* (DataCore binary
# contract — not DB_*).
database:
  host: ""
  port: 5432
  name: "datacore"
  user: "datacore"
  password: "" # Auto-generated if empty (in-cluster PG); omitted when iamAuth=true
  sslMode: "prefer" # TLS when available, plaintext fallback for the non-TLS in-cluster PG; use "require" for hosted DBs
  # IAM (e.g. AWS RDS/Aurora) database auth. When true, emits POSTGRES_LOGIN=aws
  # and omits POSTGRES_PASSWORD. DataCore (v0.12.1+) mints a SigV4 token per
  # connection via the AWS SDK default chain (IRSA). Requires an IRSA-annotated
  # serviceAccount + awsRegion, and POSTGRES_SSLMODE require|verify-ca|verify-full.
  iamAuth: false
  awsRegion: "" # Required when iamAuth=true → AWS_REGION
# ClickHouse (native protocol, port 9000). Defaults to the in-cluster clickhouse
# subchart; set clickhouse.host/nativePort to your endpoint when
# infrastructure.clickhouse.deploy=false.
clickhouse:
  host: "clickhouse"
  nativePort: 9000
  database: "default" # DB where DataCore owns its tables/materialized views. Matches DataCore's SaaS/prod overlays (CLICKHOUSE_DATABASE=default); "default" is a built-in ClickHouse DB, so nothing needs creating.
  otelDatabase: "otel" # DB where clickstack-otel-collector writes otel_logs
  tls: false
  user: "neuraltrust"
  # CLICKHOUSE_PASSWORD is read from a shared secret — the in-cluster `clickhouse`
  # subchart secret by default (same secret AlertEngine uses). For external
  # ClickHouse (infrastructure.clickhouse.deploy=false), point this at the secret
  # holding your password (matches infrastructure.clickhouse.external.secretName/Key).
  existingSecret:
    name: "clickhouse"
    key: "admin-password"
# HS256 JWT verification key (required at runtime).
jwtSecret: "" # Auto-generated if empty
# Optional JWT validation.
jwt:
  issuer: ""
  audience: ""
resources:
  requests: {cpu: 100m, memory: 128Mi}
  limits: {cpu: 1000m, memory: 256Mi}
nodeSelector: {}
tolerations: []
extraEnv: []
service:
  type: ClusterIP
ingress:
  enabled: false
  className: ""
  annotations: {}
  tls:
    enabled: false
    secretName: ""
  host: ""
  hostPrefix: "datacore"
