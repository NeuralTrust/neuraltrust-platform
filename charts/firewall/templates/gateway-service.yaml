{{- if eq (include "firewall.enabled" .) "true" }}
apiVersion: v1
kind: Service
metadata:
  name: firewall
  labels:
    {{- include "firewall.gateway.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "firewall.gateway.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: http
      name: http
{{- end }}
