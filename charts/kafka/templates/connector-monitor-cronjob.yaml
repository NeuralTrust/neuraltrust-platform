{{- $monitor := .Values.connectorMonitor | default dict }}
{{- if $monitor.enabled }}
{{- $image := $monitor.image | default dict }}
{{- $defaultKafkaConnectTag := "v0.3.0" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $monitor.name | default "connector-monitor" }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
    app.kubernetes.io/component: connector-monitor
spec:
  schedule: {{ $monitor.schedule | default "*/10 * * * *" | quote }}
  concurrencyPolicy: {{ $monitor.concurrencyPolicy | default "Forbid" }}
  successfulJobsHistoryLimit: {{ $monitor.successfulJobsHistoryLimit | default 1 }}
  failedJobsHistoryLimit: {{ $monitor.failedJobsHistoryLimit | default 3 }}
  startingDeadlineSeconds: {{ $monitor.startingDeadlineSeconds | default 60 }}
  {{- if hasKey $monitor "suspend" }}
  suspend: {{ $monitor.suspend }}
  {{- end }}
  jobTemplate:
    spec:
      backoffLimit: {{ $monitor.backoffLimit | default 0 }}
      ttlSecondsAfterFinished: {{ $monitor.ttlSecondsAfterFinished | default 86400 }}
      template:
        metadata:
          labels:
            {{- include "kafka.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: connector-monitor
            app: kafka-connect
            component: connector-monitor
        spec:
          restartPolicy: Never
          {{- $pullSecrets := list }}
          {{- if .Values.imagePullSecrets }}
            {{- $pullSecrets = append $pullSecrets .Values.imagePullSecrets }}
          {{- end }}
          {{- if and .Values.global .Values.global.imagePullSecrets }}
            {{- $pullSecrets = concat $pullSecrets .Values.global.imagePullSecrets }}
          {{- end }}
          {{- if $pullSecrets }}
          imagePullSecrets:
            {{- range $pullSecrets }}
            - name: {{ . }}
            {{- end }}
          {{- end }}
          {{- if $monitor.nodeSelector }}
          nodeSelector:
            {{- toYaml $monitor.nodeSelector | nindent 12 }}
          {{- end }}
          {{- if $monitor.tolerations }}
          tolerations:
            {{- toYaml $monitor.tolerations | nindent 12 }}
          {{- end }}
          {{- if $monitor.affinity }}
          affinity:
            {{- toYaml $monitor.affinity | nindent 12 }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: {{ $monitor.runAsUser | default 1001 }}
            runAsGroup: {{ $monitor.runAsGroup | default 1001 }}
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: monitor
              image: {{ include "kafka.imageFor" (dict "repository" ($image.repository | default "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/kafka-connect") "tag" ($image.tag | default $defaultKafkaConnectTag) "global" .Values.global) | quote }}
              imagePullPolicy: {{ $image.pullPolicy | default "IfNotPresent" }}
              command:
                - /opt/kafka/monitor-connectors.sh
              env:
                - name: NAMESPACE
                  value: {{ .Release.Namespace | quote }}
                - name: APPLICATION_VERSION
                  value: {{ $image.tag | default $defaultKafkaConnectTag | quote }}
                {{- if $monitor.kafkaConnectUrl }}
                - name: KAFKA_CONNECT_URL
                  value: {{ $monitor.kafkaConnectUrl | quote }}
                {{- end }}
                - name: DRY_RUN
                  value: {{ $monitor.dryRun | default "0" | quote }}
                - name: RESTART_TIMEOUT_SECONDS
                  value: {{ $monitor.restartTimeoutSeconds | default "30" | quote }}
                {{- range $key, $value := ($monitor.env | default dict) }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
                {{- include "neuraltrust-platform.proxy-env" . | nindent 16 }}
                {{- with $monitor.extraEnv }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              {{- if or $monitor.configMapName $monitor.secretName $monitor.extraEnvFrom }}
              envFrom:
                {{- if $monitor.configMapName }}
                - configMapRef:
                    name: {{ $monitor.configMapName }}
                    optional: true
                {{- end }}
                {{- if $monitor.secretName }}
                - secretRef:
                    name: {{ $monitor.secretName }}
                    optional: true
                {{- end }}
                {{- with $monitor.extraEnvFrom }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              {{- end }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                {{- toYaml ($monitor.resources | default (dict "requests" (dict "cpu" "10m" "memory" "64Mi") "limits" (dict "cpu" "200m" "memory" "128Mi"))) | nindent 16 }}
{{- end }}
