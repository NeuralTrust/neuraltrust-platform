{{- $monitor := .Values.connectorMonitor | default dict }}
{{- $secretName := $monitor.secretName | default "kafka-connect-monitor-secrets" }}
{{- $autoGenerate := include "neuraltrust-platform.autoGenerateSecrets" . }}
{{- $preserveSecrets := false }}
{{- if and .Values.global .Values.global.preserveExistingSecrets }}
  {{- $preserveSecrets = true }}
{{- end }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
{{- $slackWebhookUrl := "" }}
{{- if and (hasKey $monitor "slackWebhookUrl") $monitor.slackWebhookUrl (ne ($monitor.slackWebhookUrl | toString) "") }}
  {{- $slackWebhookUrl = $monitor.slackWebhookUrl | toString }}
{{- else if and $existingSecret $existingSecret.data (hasKey $existingSecret.data "SLACK_WEBHOOK_URL") }}
  {{- $slackWebhookUrl = index $existingSecret.data "SLACK_WEBHOOK_URL" | b64dec }}
{{- end }}
{{- if and $monitor.enabled $secretName $autoGenerate (not $preserveSecrets) $slackWebhookUrl }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
    app.kubernetes.io/component: connector-monitor
type: Opaque
data:
  SLACK_WEBHOOK_URL: {{ $slackWebhookUrl | b64enc | quote }}
{{- end }}
