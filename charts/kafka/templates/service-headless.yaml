apiVersion: v1
kind: Service
metadata:
  name: {{ include "kafka.fullname" . }}-headless
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: client
      port: 9092
      targetPort: client
      protocol: TCP
    - name: controller
      port: 9093
      targetPort: controller
      protocol: TCP
  selector:
    {{- include "kafka.selectorLabels" . | nindent 4 }}
