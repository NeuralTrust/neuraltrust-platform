apiVersion: v1
kind: Service
metadata:
  name: {{ include "kafka.fullname" . }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 9092
      targetPort: client
      protocol: TCP
  selector:
    {{- include "kafka.selectorLabels" . | nindent 4 }}
