{{- if .Values.aispm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aispm-api
  labels:
    {{- include "aispm.labels" (dict "component" "api" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.aispm.api.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "aispm.selectorLabels" (dict "component" "api") | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "aispm.labels" (dict "component" "api" "context" .) | nindent 8 }}
    spec:
      {{- if .Values.aispm.serviceAccount.create }}
      serviceAccountName: {{ .Values.aispm.serviceAccount.name | default "aispm" }}
      {{- end }}
      {{- $imagePullSecret := .Values.aispm.imagePullSecrets | default "" }}
      {{- if and $imagePullSecret (ne $imagePullSecret "") }}
      imagePullSecrets:
        - name: {{ $imagePullSecret }}
      {{- end }}
      {{- if .Values.aispm.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.aispm.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          {{- $repo := .Values.aispm.api.image.repository | default "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/aispm-api" }}
          {{- $tag := .Values.aispm.api.image.tag | default "v0.21.3" }}
          image: {{ include "aispm.image" (dict "repository" $repo "tag" $tag "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.aispm.api.image.pullPolicy | default "IfNotPresent" }}
          {{- /* No args override: the image CMD (`python -m app.serve`) dual-binds to
                 0.0.0.0 and :: at startup, so the same image works on IPv4-only,
                 IPv6-only, and dual-stack clusters with no per-cluster knob. */}}
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aispm-config
            {{- with .Values.aispm.api.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- include "aispm.commonEnv" . | nindent 12 }}
            {{- with .Values.aispm.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- include "neuraltrust-platform.proxy-env" . | nindent 12 }}
            {{- include "neuraltrust-platform.appVersionEnv" (dict "tag" $tag) | nindent 12 }}
            {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "python" "ctx" .) | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            periodSeconds: 5
            failureThreshold: {{ (.Values.aispm.api.startupProbe).failureThreshold | default 24 }}
            successThreshold: 1
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3
          {{- if .Values.aispm.api.resources }}
          resources:
            {{- toYaml .Values.aispm.api.resources | nindent 12 }}
          {{- end }}
          {{- $sc := include "aispm.securityContext" . }}
          {{- if $sc }}
          securityContext:
            {{- $sc | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 12 }}
            {{- with .Values.aispm.api.extraVolumeMounts }}
            {{- include "neuraltrust-platform.extraVolumeMounts" (dict "items" .) | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- include "neuraltrust-platform.customCaCert.volume" . | nindent 8 }}
        {{- with .Values.aispm.api.extraVolumes }}
        {{- include "neuraltrust-platform.extraVolumes" (dict "items" .) | nindent 8 }}
        {{- end }}
      {{- include "neuraltrust-platform.nodeSelector" (dict "ctx" .) | nindent 6 }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" .) | nindent 6 }}
{{- end }}
