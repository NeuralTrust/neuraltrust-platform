{{- if .Values.aispm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aispm-beat
  labels:
    {{- include "aispm.labels" (dict "component" "beat" "context" .) | nindent 4 }}
spec:
  {{/* Celery beat must remain at a single replica to avoid duplicate scheduling */}}
  replicas: 1
  selector:
    matchLabels:
      {{- include "aispm.selectorLabels" (dict "component" "beat") | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "aispm.labels" (dict "component" "beat" "context" .) | nindent 8 }}
    spec:
      {{- if .Values.aispm.serviceAccount.create }}
      serviceAccountName: {{ .Values.aispm.serviceAccount.name | default "aispm" }}
      {{- end }}
      {{- $imagePullSecret := .Values.aispm.imagePullSecrets | default "" }}
      {{- if and $imagePullSecret (ne $imagePullSecret "") }}
      imagePullSecrets:
        - name: {{ $imagePullSecret }}
      {{- end }}
      {{- if .Values.aispm.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.aispm.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: beat
          {{- $repo := .Values.aispm.beat.image.repository | default "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/aispm-beat" }}
          {{- $tag := .Values.aispm.beat.image.tag | default "v0.21.0" }}
          image: {{ include "aispm.image" (dict "repository" $repo "tag" $tag "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.aispm.beat.image.pullPolicy | default "IfNotPresent" }}
          {{- /* See api-deployment.yaml for the rationale on direct venv exec.
                 --schedule and --pidfile both point to /tmp because:
                 (a) the persistent scheduler shelf (celerybeat-schedule.db) defaults to
                     CWD-relative, which is /app/celerybeat-schedule — read-only under
                     securityHardening, so beat crashes at startup with OSError EROFS.
                 (b) the pidfile must also live somewhere writable; /tmp is the only
                     mount we provision for this pod. */}}
          args:
            - /app/.venv/bin/celery
            - -A
            - app.workers.celery_app:celery_app
            - beat
            - -l
            - INFO
            - --schedule
            - /tmp/celerybeat-schedule
            - --pidfile
            - /tmp/celerybeat.pid
          envFrom:
            - configMapRef:
                name: aispm-config
            {{- with .Values.aispm.beat.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- include "aispm.commonEnv" . | nindent 12 }}
            {{- with .Values.aispm.beat.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- include "neuraltrust-platform.proxy-env" . | nindent 12 }}
          {{- if .Values.aispm.beat.resources }}
          resources:
            {{- toYaml .Values.aispm.beat.resources | nindent 12 }}
          {{- end }}
          {{- $sc := include "aispm.securityContext" . }}
          {{- if $sc }}
          securityContext:
            {{- $sc | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
