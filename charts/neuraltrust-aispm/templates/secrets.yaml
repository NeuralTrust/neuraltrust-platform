{{- if .Values.aispm.enabled }}
{{- $parentManagesSecrets := false }}
{{- if and $.Values.global (hasKey $.Values.global "autoGenerateSecrets") $.Values.global.autoGenerateSecrets }}
  {{- $parentManagesSecrets = true }}
{{- end }}
{{- $preserveSecrets := false }}
{{- if $.Values.global }}
  {{- if hasKey $.Values.global "preserveExistingSecrets" }}
    {{- if $.Values.global.preserveExistingSecrets }}
      {{- $preserveSecrets = true }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if and (not $parentManagesSecrets) (not $preserveSecrets) }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace "aispm-secrets") }}

{{- /* AUTH_ENCRYPTION_KEY — Fernet key (urlsafe base64-encoded 32 bytes = 44 chars) */}}
{{- $authKey := "" }}
{{- if and .Values.aispm.secrets .Values.aispm.secrets.authEncryptionKey (ne (.Values.aispm.secrets.authEncryptionKey | toString) "") }}
  {{- $authKey = .Values.aispm.secrets.authEncryptionKey | toString }}
{{- else if and $existingSecret $existingSecret.data (hasKey $existingSecret.data "AUTH_ENCRYPTION_KEY") }}
  {{- $authKey = index $existingSecret.data "AUTH_ENCRYPTION_KEY" | b64dec }}
{{- else }}
  {{- $authKey = randAlphaNum 43 | b64enc | trunc 44 }}
{{- end }}

{{- /* DATABASE_PASSWORD */}}
{{- $dbPassword := "" }}
{{- if and .Values.aispm.secrets .Values.aispm.secrets.dbPassword (ne (.Values.aispm.secrets.dbPassword | toString) "") }}
  {{- $dbPassword = .Values.aispm.secrets.dbPassword | toString }}
{{- else if and $existingSecret $existingSecret.data (hasKey $existingSecret.data "DATABASE_PASSWORD") }}
  {{- $dbPassword = index $existingSecret.data "DATABASE_PASSWORD" | b64dec }}
{{- else }}
  {{- $dbPassword = randAlphaNum 32 }}
{{- end }}

{{- $optionalKeys := dict
  "OPENAI_API_KEY" (.Values.aispm.secrets.openaiApiKey | default "")
  "GITHUB_APP_ID" (.Values.aispm.secrets.githubAppId | default "")
  "GITHUB_APP_PRIVATE_KEY" (.Values.aispm.secrets.githubAppPrivateKey | default "")
  "GITHUB_WEBHOOK_SECRET" (.Values.aispm.secrets.githubWebhookSecret | default "")
  "AZURE_TENANT_ID" (.Values.aispm.secrets.azureTenantId | default "")
  "AZURE_CLIENT_ID" (.Values.aispm.secrets.azureClientId | default "")
  "AZURE_CLIENT_SECRET" (.Values.aispm.secrets.azureClientSecret | default "")
  "RESEND_API_KEY" (.Values.aispm.secrets.resendApiKey | default "")
  "ADMIN_API_KEY" (.Values.aispm.secrets.adminApiKey | default "")
}}
apiVersion: v1
kind: Secret
metadata:
  name: aispm-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aispm.labels" (dict "component" "api" "context" .) | nindent 4 }}
type: Opaque
data:
  AUTH_ENCRYPTION_KEY: {{ $authKey | b64enc | quote }}
  DATABASE_PASSWORD: {{ $dbPassword | b64enc | quote }}
  {{- range $key, $value := $optionalKeys }}
  {{- $resolved := $value | toString }}
  {{- if and (not $resolved) $existingSecret $existingSecret.data (hasKey $existingSecret.data $key) }}
  {{- $resolved = index $existingSecret.data $key | b64dec }}
  {{- end }}
  {{- if $resolved }}
  {{ $key }}: {{ $resolved | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
