{{- /* platform-v2: legacy component disabled when global.platformVersion=v2 */ -}}
{{- if not (eq (include "neuraltrust-platform.isV2" .) "true") }}
{{- if .Values.aispm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aispm-worker
  labels:
    {{- include "aispm.labels" (dict "component" "worker" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.aispm.worker.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "aispm.selectorLabels" (dict "component" "worker") | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "aispm.labels" (dict "component" "worker" "context" .) | nindent 8 }}
    spec:
      {{- if .Values.aispm.serviceAccount.create }}
      serviceAccountName: {{ .Values.aispm.serviceAccount.name | default "aispm" }}
      {{- end }}
      {{- $imagePullSecret := .Values.aispm.imagePullSecrets | default "" }}
      {{- if and $imagePullSecret (ne $imagePullSecret "") }}
      imagePullSecrets:
        - name: {{ $imagePullSecret }}
      {{- end }}
      {{- if .Values.aispm.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.aispm.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          {{- $repo := .Values.aispm.worker.image.repository | default "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/aispm-worker" }}
          {{- $tag := .Values.aispm.worker.image.tag | default "v0.21.3" }}
          image: {{ include "aispm.image" (dict "repository" $repo "tag" $tag "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.aispm.worker.image.pullPolicy | default "IfNotPresent" }}
          {{- /* See api-deployment.yaml for the rationale on direct venv exec. */}}
          args:
            - /app/.venv/bin/celery
            - -A
            - app.workers.celery_app:celery_app
            - worker
            - -l
            - INFO
          envFrom:
            - configMapRef:
                name: aispm-config
            {{- with .Values.aispm.worker.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- include "aispm.commonEnv" . | nindent 12 }}
            {{- with .Values.aispm.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- include "neuraltrust-platform.proxy-env" . | nindent 12 }}
            {{- include "neuraltrust-platform.appVersionEnv" (dict "tag" $tag) | nindent 12 }}
            {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "python" "ctx" .) | nindent 12 }}
          {{- if .Values.aispm.worker.resources }}
          resources:
            {{- toYaml .Values.aispm.worker.resources | nindent 12 }}
          {{- end }}
          {{- $sc := include "aispm.securityContext" . }}
          {{- if $sc }}
          securityContext:
            {{- $sc | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 12 }}
            {{- with .Values.aispm.worker.extraVolumeMounts }}
            {{- include "neuraltrust-platform.extraVolumeMounts" (dict "items" .) | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- include "neuraltrust-platform.customCaCert.volume" . | nindent 8 }}
        {{- with .Values.aispm.worker.extraVolumes }}
        {{- include "neuraltrust-platform.extraVolumes" (dict "items" .) | nindent 8 }}
        {{- end }}
      {{- include "neuraltrust-platform.nodeSelector" (dict "ctx" .) | nindent 6 }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" .) | nindent 6 }}
{{- end }}

{{- end }}
