securityHardening: true # Adds readOnlyRootFilesystem, drops capabilities. Set to false to restore prior behavior.

aispm:
  # Optional, off by default. Toggle the entire subchart with this flag.
  enabled: false

  imagePullSecrets: ""

  # --- API (FastAPI / uvicorn) ---
  api:
    replicas: 1
    image:
      repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/aispm-api
      tag: v0.15.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "250m"
        memory: 512Mi
      limits:
        cpu: "500m"
        memory: 1Gi
    startupProbe:
      failureThreshold: 24
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 85
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    extraEnv: []
    extraEnvFrom: []

  # --- Celery worker ---
  worker:
    replicas: 1
    image:
      repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/aispm-worker
      tag: v0.15.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "250m"
        memory: 512Mi
      limits:
        cpu: "500m"
        memory: 1Gi
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 80
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
    extraEnv: []
    extraEnvFrom: []

  # --- Celery beat (scheduler — keep at 1 replica) ---
  beat:
    image:
      repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/aispm-beat
      tag: v0.15.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "100m"
        memory: 256Mi
      limits:
        cpu: "200m"
        memory: 512Mi
    extraEnv: []
    extraEnvFrom: []

  # --- ServiceAccount ---
  serviceAccount:
    create: true
    name: aispm
    annotations: {}

  # --- ConfigMap (non-secret env) ---
  config:
    openaiModel: "gpt-4o-mini"
    defaultSyncIntervalSeconds: "86400"
    dbPoolSize: "5"
    dbMaxOverflow: "10"
    dbPoolRecycle: "1800"
    logLevel: "INFO"
    logJsonFormat: "true"
    notificationEmailMinSeverity: "high"
    notificationSiemMinSeverity: "high"
    otelEnabled: "false"
    otelServiceName: "aispm"
    otelExporterEndpoint: "http://opentelemetry-collector.opentelemetry.svc.cluster.local:4318"
    otelEnvironment: "prod"
    applicationVersion: ""
    # AISPM_API_URL — public URL the extension/email footers point back to. Empty = internal service URL.
    aispmApiUrl: ""
    # Extra arbitrary key-value pairs added to the ConfigMap.
    extraEnv: {}

  # --- Secrets (auto-generated when global.autoGenerateSecrets is true) ---
  secrets:
    authEncryptionKey: "" # Auto-generated if empty (Fernet key — 44-char urlsafe base64)
    dbPassword: ""        # Auto-generated if empty (PostgreSQL password for the aispm user)
    openaiApiKey: ""      # Required at runtime; chart does not enforce
    githubAppId: ""
    githubAppPrivateKey: ""
    githubWebhookSecret: ""
    azureTenantId: ""
    azureClientId: ""
    azureClientSecret: ""
    resendApiKey: ""
    adminApiKey: ""

  # --- Database (PostgreSQL) ---
  # Defaults reuse the in-cluster control-plane PostgreSQL with a dedicated aispm db/user.
  # Set explicit values to point at an external instance.
  database:
    host: "control-plane-postgresql"
    port: "5432"
    user: "aispm"
    name: "aispm"
    sslMode: "disable" # "disable" for in-cluster PG, "require" for external

  # --- PostgreSQL init Job (post-install / post-upgrade hook) ---
  # The job tries the AISPM credentials first; if it can connect, it exits 0.
  # Otherwise it falls back to admin credentials from postgresql-secrets to
  # create the user/database. With external PostgreSQL the admin secret is
  # absent and the customer must pre-create the aispm user and database.
  # Override resources here if the defaults (250m/64Mi → 500m/128Mi) don't fit.
  postgresqlInit: {}
  #   resources:
  #     requests: { cpu: 250m, memory: 64Mi }
  #     limits:   { cpu: 500m, memory: 128Mi }

  # --- Redis ---
  # Defaults reuse the TrustGate Redis on database=1 (TrustGate uses 0).
  # Empty host => resolved to the in-cluster TrustGate redis-master service.
  redis:
    host: ""
    port: "6379"
    database: "1"

  # --- Kafka ---
  # Empty bootstrapServers => parent chart helper fills it from infrastructure.kafka.
  kafka:
    bootstrapServers: ""
    postureTopic: "posture_alerts"

  # --- Shared pod/container security ---
  podSecurityContext:
    fsGroup: 2000

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    runAsNonRoot: false
    runAsUser: 0

global:
  imageRegistry: ""
  autoGenerateSecrets: false
  preserveExistingSecrets: false
