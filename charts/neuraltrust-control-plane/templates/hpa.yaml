{{- /*
  Optional HorizontalPodAutoscalers for control-plane api, app, and scheduler.
  All default OFF — enable per component:

    controlPlane.components.<component>.autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
*/ -}}
{{- if and .Values.controlPlane .Values.controlPlane.enabled }}
{{- range $name, $cfg := .Values.controlPlane.components }}
{{- if and $cfg.enabled (ne $name "postgresql") }}
{{- $as := default dict $cfg.autoscaling }}
{{- if and $as $as.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: control-plane-{{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: control-plane-{{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: control-plane-{{ $name }}
  minReplicas: {{ default 1 $as.minReplicas }}
  maxReplicas: {{ default 10 $as.maxReplicas }}
  metrics:
    {{- if $as.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $as.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $as.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $as.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
