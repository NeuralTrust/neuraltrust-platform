{{- $sa := default dict (default dict .Values.controlPlane).serviceAccount -}}
{{- $create := true -}}
{{- if hasKey $sa "create" -}}{{- $create = $sa.create -}}{{- end -}}
{{- if and .Values.controlPlane .Values.controlPlane.enabled $create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "control-plane.serviceAccountName" . }}
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- $saAnn := include "neuraltrust-platform.serviceAccount.annotationsBlock" (dict "ctx" . "annotations" $sa.annotations) }}
  {{- with $saAnn }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
{{- end }}

