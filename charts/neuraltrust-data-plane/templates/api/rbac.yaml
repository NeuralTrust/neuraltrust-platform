{{- /*
RBAC for the shared `data-plane` ServiceAccount, used when k8sJobs is
enabled. The API pod (which creates Jobs) and the Job pods it spawns both
run under `data-plane` — the same SA used by the worker and kafka-connect
components and the one the app defaults to (K8S_JOB_SERVICE_ACCOUNT). Only
the API needs these verbs; Job pods don't create Jobs, so no extra SA.

Scope is intentionally namespace-local (Role, not ClusterRole) so the API
can only manage Jobs in its own namespace.

Verbs granted:
  - batch/jobs: full lifecycle (create/get/list/watch/delete/patch)
  - core/pods + pods/log: poll Job pod status and stream logs back to the
    API for debugging failed evaluations
  - core/configmaps: create and clean up the `data-plane-trusttest-config`
    ConfigMap (and, in csi mode, the entrypoint ConfigMap) that Job pods
    consume
  - core/events: read scheduling/eviction events for troubleshooting

Secrets verbs are deliberately omitted — `secretsMode=inherit` (the
default) propagates env vars in-process and never touches the Secret API.
Operators on `secretsMode=csi` already manage their SecretProviderClass
out-of-band, so no extra verbs are needed here either.
*/ -}}
{{- if eq (include "data-plane.api.k8sJobs.enabled" .) "true" -}}
{{- $jobsCfg := .Values.dataPlane.components.api.k8sJobs -}}
{{- $rbacCfg := default dict $jobsCfg.rbac -}}
{{- $createRbac := true -}}
{{- if hasKey $rbacCfg "create" -}}{{- $createRbac = $rbacCfg.create -}}{{- end -}}
{{- if $createRbac -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: data-plane-job-creator
  labels:
    {{- include "neuraltrust-data-plane.labels" . | nindent 4 }}
    app: api
    plane: data
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: data-plane-job-creator
  labels:
    {{- include "neuraltrust-data-plane.labels" . | nindent 4 }}
    app: api
    plane: data
subjects:
  - kind: ServiceAccount
    name: {{ include "data-plane.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: data-plane-job-creator
  apiGroup: rbac.authorization.k8s.io
{{- end -}}
{{- end -}}
