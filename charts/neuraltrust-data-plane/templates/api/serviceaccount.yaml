{{- /*
ServiceAccount used by the data-plane-api Deployment when it spawns
Kubernetes Jobs (and reused as the Job pods' own ServiceAccount).

Gated on:
  - .Values.dataPlane.components.api.k8sJobs.enabled       (default: true)
  - .Values.dataPlane.components.api.k8sJobs.serviceAccount.create
      (default: true; set to false if the SA is pre-provisioned, e.g.
       to attach Workload Identity / IRSA annotations out-of-band)

When the feature flag is off, no SA is created and the Deployment falls
back to the namespace's `default` ServiceAccount.
*/ -}}
{{- if eq (include "data-plane.api.k8sJobs.enabled" .) "true" -}}
{{- $jobsCfg := .Values.dataPlane.components.api.k8sJobs -}}
{{- $saCfg := default dict $jobsCfg.serviceAccount -}}
{{- $create := true -}}
{{- if hasKey $saCfg "create" -}}{{- $create = $saCfg.create -}}{{- end -}}
{{- if $create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "data-plane.api.k8sJobs.serviceAccountName" . }}
  labels:
    {{- include "neuraltrust-data-plane.labels" . | nindent 4 }}
    app: api
    plane: data
  {{- $saAnn := include "neuraltrust-platform.serviceAccount.annotationsBlock" (dict "ctx" . "annotations" $saCfg.annotations) }}
  {{- with $saAnn }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
{{- end -}}
{{- end -}}
