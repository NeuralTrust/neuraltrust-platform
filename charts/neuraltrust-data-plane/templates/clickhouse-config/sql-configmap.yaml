{{- /* platform-v2: legacy data-plane disabled under v2, EXCEPT the data-plane-api shim (kept until TrustLens). Renders under v1 (any mode) or the v2 data-plane-api shim. Only when the resolved SQL backend is ClickHouse — the v2 hybrid PostgreSQL default uses the separate data-plane-postgres-init ConfigMap instead. */ -}}
{{- if or (not (eq (include "neuraltrust-platform.isV2" .) "true")) (eq (include "neuraltrust-platform.dataPlaneApiV2.enabled" .) "true") }}
{{- if eq (include "neuraltrust-platform.dataPlaneApi.sqlBackend" .) "clickhouse" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.clickhouse .Values.dataPlane.components.clickhouse.configmap }}{{ .Values.dataPlane.components.clickhouse.configmap.name | default "clickhouse-init-job" }}{{ else }}clickhouse-init-job{{ end }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: data-plane
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: clickhouse
data:
  init-db.sql: |
{{ .Files.Get "files/clickhouse/init-db.sql" | indent 4 }} 
{{- end }}
{{- end }}
