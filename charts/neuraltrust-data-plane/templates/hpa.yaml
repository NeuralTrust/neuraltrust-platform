{{- /*
  Optional HorizontalPodAutoscalers for data-plane api, worker, and kafka-connect.
  All default OFF — enable per component:

    dataPlane.components.api.autoscaling.enabled: true
    dataPlane.components.worker.autoscaling.enabled: true
    dataPlane.components.kafka.connect.autoscaling.enabled: true
*/ -}}
{{- if and .Values.dataPlane .Values.dataPlane.enabled }}
{{- $dp := .Values.dataPlane }}
{{- if and $dp.components $dp.components.api $dp.components.api.enabled }}
{{- $as := default dict $dp.components.api.autoscaling }}
{{- if and $as $as.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-plane-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: api
    plane: data
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-plane-api
  minReplicas: {{ default 1 $as.minReplicas }}
  maxReplicas: {{ default 10 $as.maxReplicas }}
  metrics:
    {{- if $as.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $as.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $as.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $as.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
{{- if and $dp.components $dp.components.worker $dp.components.worker.enabled }}
{{- $as := default dict $dp.components.worker.autoscaling }}
{{- if and $as $as.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-plane-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app: worker
    plane: data
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-plane-worker
  minReplicas: {{ default 1 $as.minReplicas }}
  maxReplicas: {{ default 10 $as.maxReplicas }}
  metrics:
    {{- if $as.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $as.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $as.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $as.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
{{- if and $dp.components $dp.components.kafka $dp.components.kafka.enabled $dp.components.kafka.connect }}
{{- $as := default dict $dp.components.kafka.connect.autoscaling }}
{{- if and $as $as.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kafka-connect
  namespace: {{ .Release.Namespace }}
  labels:
    app: kafka-connect
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kafka-connect
  minReplicas: {{ default 1 $as.minReplicas }}
  maxReplicas: {{ default 5 $as.maxReplicas }}
  metrics:
    {{- if $as.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $as.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $as.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $as.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
