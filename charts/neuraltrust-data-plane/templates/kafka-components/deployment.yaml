apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-connect
  namespace: {{ .Release.Namespace }}
spec:
  {{- $defaultKafkaConnectTag := "v0.4.1" }}
  {{- $kafkaConnectReplicas := 1 }}
  {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.kafka .Values.dataPlane.components.kafka.connect (hasKey .Values.dataPlane.components.kafka.connect "replicas") }}
    {{- $kafkaConnectReplicas = .Values.dataPlane.components.kafka.connect.replicas }}
  {{- end }}
  {{- $connectBs := "" }}
  {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.kafka .Values.dataPlane.components.kafka.connect .Values.dataPlane.components.kafka.connect.bootstrapServers }}
    {{- $connectBs = .Values.dataPlane.components.kafka.connect.bootstrapServers }}
  {{- end }}
  {{- $kafkaCtx := dict "context" . "connectOverride" $connectBs }}
  {{- $resolvedBootstrap := include "neuraltrust-platform.kafka.bootstrapServers" $kafkaCtx }}
  {{- $kafkaAuth := include "neuraltrust-platform.kafka.authConfig" . | fromYaml }}
  {{- $kafkaTls := include "neuraltrust-platform.kafka.tlsConfig" . | fromYaml }}
  {{- $kafkaProtocol := include "neuraltrust-platform.kafka.securityProtocol" . }}
  replicas: {{ $kafkaConnectReplicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kafka-connect
  template:
    metadata:
      labels:
        app: kafka-connect
    spec:
      serviceAccountName: {{ include "data-plane.serviceAccountName" . }}
      {{- include "data-plane.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.securityHardening }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      initContainers:
        - name: fix-connect-topics
          {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.kafka .Values.dataPlane.components.kafka.connect .Values.dataPlane.components.kafka.connect.image }}
          {{- $initRepo := .Values.dataPlane.components.kafka.connect.image.repository | default "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/kafka-connect" }}
          {{- $initTag := .Values.dataPlane.components.kafka.connect.image.tag | default $defaultKafkaConnectTag }}
          image: {{ include "data-plane.image" (dict "repository" $initRepo "tag" $initTag "global" .Values.global) | quote }}
          {{- else }}
          image: {{ include "data-plane.image" (dict "repository" "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/kafka-connect" "tag" $defaultKafkaConnectTag "global" .Values.global) | quote }}
          {{- end }}
          {{- if .Values.securityHardening }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- end }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              BOOTSTRAP="{{ $resolvedBootstrap }}"
              TOPICS="connect-configs connect-offsets connect-status"
              PROPS="/shared/kafka/client.properties"
              mkdir -p /shared/kafka
              cat > "${PROPS}" <<EOF
              bootstrap.servers=${BOOTSTRAP}
              security.protocol={{ $kafkaProtocol }}
              EOF
              {{- if $kafkaAuth.enabled }}
              echo "sasl.mechanism={{ $kafkaAuth.mechanism }}" >> "${PROPS}"
              if [ -n "${KAFKA_SASL_JAAS_CONFIG:-}" ]; then
                echo "sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG}" >> "${PROPS}"
              elif [ -n "${KAFKA_SASL_USERNAME:-}" ] && [ -n "${KAFKA_SASL_PASSWORD:-}" ]; then
                {{- if eq $kafkaAuth.mechanism "PLAIN" }}
                echo "sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username=\"${KAFKA_SASL_USERNAME}\" password=\"${KAFKA_SASL_PASSWORD}\";" >> "${PROPS}"
                {{- else }}
                echo "sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username=\"${KAFKA_SASL_USERNAME}\" password=\"${KAFKA_SASL_PASSWORD}\";" >> "${PROPS}"
                {{- end }}
              fi
              {{- end }}
              {{- if $kafkaTls.enabled }}
              cat >> "${PROPS}" <<EOF
              ssl.truststore.type=PEM
              ssl.truststore.location={{ $kafkaTls.mountPath }}
              EOF
              {{- end }}
              CMD_CFG=(--command-config "${PROPS}")
              echo "Waiting for Kafka broker at ${BOOTSTRAP}..."
              WAITED=0
              until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server "${BOOTSTRAP}" "${CMD_CFG[@]}" >/dev/null 2>&1; do
                sleep 2
                WAITED=$((WAITED + 2))
                if [ $((WAITED % 30)) -eq 0 ]; then
                  echo "Still waiting for Kafka at ${BOOTSTRAP} (${WAITED}s elapsed)..."
                fi
              done
              echo "Kafka broker reachable after ${WAITED}s"
              EXISTING_TOPICS=$(/opt/kafka/bin/kafka-topics.sh --bootstrap-server "${BOOTSTRAP}" "${CMD_CFG[@]}" --list 2>/dev/null || true)
              for topic in $TOPICS; do
                if ! printf '%s\n' "$EXISTING_TOPICS" | grep -qFx "$topic"; then
                  echo "Topic '$topic' does not exist yet — Connect will create it with cleanup.policy=compact on first start"
                  continue
                fi
                if /opt/kafka/bin/kafka-configs.sh --bootstrap-server "${BOOTSTRAP}" "${CMD_CFG[@]}" \
                    --entity-type topics --entity-name "$topic" --describe 2>/dev/null \
                    | grep -qE '^[[:space:]]*cleanup\.policy=.*compact'; then
                  echo "Topic '$topic' already uses cleanup.policy=compact — skipping alter"
                  continue
                fi
                echo "Setting cleanup.policy=compact on '$topic'"
                if ! /opt/kafka/bin/kafka-configs.sh --bootstrap-server "${BOOTSTRAP}" "${CMD_CFG[@]}" \
                    --entity-type topics --entity-name "$topic" \
                    --alter --add-config cleanup.policy=compact 2>&1; then
                  echo "WARN: failed to alter '$topic'; Connect will retry on its own"
                fi
              done
              echo "Init complete."
          env:
            {{- include "neuraltrust-platform.kafka.clientEnv" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: kafka-client-config
              mountPath: /shared/kafka
            {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 12 }}
            {{- include "neuraltrust-platform.kafka.tlsVolumeMount" . | nindent 12 }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
      containers:
        - name: kafka-connect
          {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.kafka .Values.dataPlane.components.kafka.connect .Values.dataPlane.components.kafka.connect.image }}
          {{- $kafkaConnectRepo := .Values.dataPlane.components.kafka.connect.image.repository | default "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/kafka-connect" }}
          {{- $kafkaConnectTag := .Values.dataPlane.components.kafka.connect.image.tag | default $defaultKafkaConnectTag }}
          image: {{ include "data-plane.image" (dict "repository" $kafkaConnectRepo "tag" $kafkaConnectTag "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.dataPlane.components.kafka.connect.image.pullPolicy | default "Always" }}
          {{- else }}
          image: {{ include "data-plane.image" (dict "repository" "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/kafka-connect" "tag" $defaultKafkaConnectTag "global" .Values.global) | quote }}
          imagePullPolicy: Always
          {{- end }}
          {{- if $kafkaAuth.enabled }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              {{ include "neuraltrust-platform.kafka.connectJaasBootstrap" . | nindent 14 }}
              exec /opt/kafka/docker-entrypoint.sh
          {{- end }}
          {{- if .Values.securityHardening }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- end }}
          ports:
            - containerPort: 8083
          startupProbe:
            httpGet:
              path: /connectors
              port: 8083
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /connectors
              port: 8083
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          env:
            {{- include "neuraltrust-platform.kafka.connectEnv" $kafkaCtx | nindent 12 }}
            - name: CONNECT_GROUP_ID
              value: "connect-cluster"
            - name: CONNECT_KEY_CONVERTER
              value: "org.apache.kafka.connect.storage.StringConverter"
            - name: CONNECT_VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_PLUGIN_PATH
              value: "/opt/kafka/plugins"
            - name: CONNECT_PLUGIN_DISCOVERY
              value: "service_load"
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: "connect-configs"
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: "connect-offsets"
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: "connect-status"
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "{{ $kafkaConnectReplicas }}"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "{{ $kafkaConnectReplicas }}"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "{{ $kafkaConnectReplicas }}"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CONNECT_ERRORS_TOLERANCE
              value: "all"
            - name: CONNECT_ERRORS_RETRY_TIMEOUT
              value: "60"
            - name: CLICKHOUSE_HOST
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secrets
                  key: CLICKHOUSE_HOST
                  optional: true
            - name: CLICKHOUSE_PORT
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secrets
                  key: CLICKHOUSE_PORT
                  optional: true
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secrets
                  key: CLICKHOUSE_DATABASE
                  optional: true
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secrets
                  key: CLICKHOUSE_USER
                  optional: true
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse
                  key: admin-password
                  optional: true
            {{- with dig "components" "kafka" "connect" "extraEnv" (dict) (.Values.dataPlane | default dict) }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- include "neuraltrust-platform.proxy-env" . | nindent 12 }}
            {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "java" "ctx" .) | nindent 12 }}
            {{- include "neuraltrust-platform.appVersionEnv" (dict "tag" (dig "components" "kafka" "connect" "image" "tag" "" (.Values.dataPlane | default dict))) | nindent 12 }}
          {{- $connectExtraEnvFrom := dig "components" "kafka" "connect" "extraEnvFrom" (list) (.Values.dataPlane | default dict) }}
          {{- if $connectExtraEnvFrom }}
          envFrom:
            {{- toYaml $connectExtraEnvFrom | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 12 }}
            {{- include "neuraltrust-platform.kafka.tlsVolumeMount" . | nindent 12 }}
        {{- with .Values.dataPlane.components.kafka.connect.extraVolumeMounts }}
        {{- include "neuraltrust-platform.extraVolumeMounts" (dict "items" .) | nindent 12 }}
        {{- end }}
          resources:
            {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.kafka .Values.dataPlane.components.kafka.connect .Values.dataPlane.components.kafka.connect.resources }}
            {{- toYaml .Values.dataPlane.components.kafka.connect.resources | nindent 12 }}
            {{- else }}
            limits:
              cpu: "1"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 2Gi
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: kafka-client-config
          emptyDir: {}
        {{- include "neuraltrust-platform.customCaCert.volume" . | nindent 8 }}
        {{- include "neuraltrust-platform.kafka.tlsVolume" . | nindent 8 }}
      {{- with .Values.dataPlane.components.kafka.connect.extraVolumes }}
      {{- include "neuraltrust-platform.extraVolumes" (dict "items" .) | nindent 8 }}
      {{- end }}
      {{- include "neuraltrust-platform.nodeSelector" (dict "ctx" .) | nindent 6 }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" .) | nindent 6 }}
