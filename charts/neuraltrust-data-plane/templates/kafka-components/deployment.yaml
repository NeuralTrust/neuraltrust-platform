apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-connect
  namespace: {{ .Release.Namespace }}
spec:
  {{- $kafkaConnectReplicas := 1 }}
  {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.kafka .Values.dataPlane.components.kafka.connect (hasKey .Values.dataPlane.components.kafka.connect "replicas") }}
    {{- $kafkaConnectReplicas = .Values.dataPlane.components.kafka.connect.replicas }}
  {{- end }}
  replicas: {{ $kafkaConnectReplicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kafka-connect
  template:
    metadata:
      labels:
        app: kafka-connect
    spec:
      {{- $imagePullSecret := "gcr-secret" }}
      {{- if .Values.imagePullSecrets }}
        {{- $imagePullSecret = .Values.imagePullSecrets }}
      {{- else if .Values.dataPlane }}
        {{- if hasKey .Values.dataPlane "imagePullSecrets" }}
          {{- if and .Values.dataPlane.imagePullSecrets (ne .Values.dataPlane.imagePullSecrets "none") (ne .Values.dataPlane.imagePullSecrets "") }}
            {{- $imagePullSecret = .Values.dataPlane.imagePullSecrets }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if and $imagePullSecret (ne $imagePullSecret "none") (ne $imagePullSecret "") }}
      imagePullSecrets:
        - name: {{ $imagePullSecret }}
      {{- end }}
      {{- if .Values.securityHardening }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      initContainers:
        - name: fix-connect-topics
          {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.kafka .Values.dataPlane.components.kafka.connect .Values.dataPlane.components.kafka.connect.image }}
          {{- $initRepo := .Values.dataPlane.components.kafka.connect.image.repository | default "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/kafka-connect" }}
          {{- $initTag := .Values.dataPlane.components.kafka.connect.image.tag | default "v0.1.5" }}
          image: {{ include "data-plane.image" (dict "repository" $initRepo "tag" $initTag "global" .Values.global) | quote }}
          {{- else }}
          image: {{ include "data-plane.image" (dict "repository" "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/kafka-connect" "tag" "v0.1.4" "global" .Values.global) | quote }}
          {{- end }}
          {{- if .Values.securityHardening }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- end }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              BOOTSTRAP="{{ .Values.dataPlane.components.kafka.connect.bootstrapServers | default "kafka:9092" }}"
              TOPICS="connect-configs connect-offsets connect-status"
              echo "Waiting for Kafka broker at ${BOOTSTRAP}..."
              WAITED=0
              until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server "${BOOTSTRAP}" >/dev/null 2>&1; do
                sleep 2
                WAITED=$((WAITED + 2))
                if [ $((WAITED % 30)) -eq 0 ]; then
                  echo "Still waiting for Kafka at ${BOOTSTRAP} (${WAITED}s elapsed)..."
                fi
              done
              echo "Kafka broker reachable after ${WAITED}s"
              for topic in $TOPICS; do
                if ! /opt/kafka/bin/kafka-topics.sh --bootstrap-server "${BOOTSTRAP}" --describe --topic "$topic" 2>/dev/null | grep -q "$topic"; then
                  echo "Topic '$topic' does not exist yet — Connect will create it"
                  continue
                fi
                if /opt/kafka/bin/kafka-configs.sh --bootstrap-server "${BOOTSTRAP}" \
                    --entity-type topics --entity-name "$topic" --describe 2>/dev/null \
                    | grep -qE '^[[:space:]]*cleanup\.policy=.*compact'; then
                  echo "Topic '$topic' already uses cleanup.policy compact — skipping alter"
                  continue
                fi
                echo "Setting cleanup.policy=compact on '$topic'"
                /opt/kafka/bin/kafka-configs.sh --bootstrap-server "${BOOTSTRAP}" \
                  --entity-type topics --entity-name "$topic" \
                  --alter --add-config cleanup.policy=compact 2>&1 || true
              done
              echo "Init complete."
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
      containers:
        - name: kafka-connect
          {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.kafka .Values.dataPlane.components.kafka.connect .Values.dataPlane.components.kafka.connect.image }}
          {{- $kafkaConnectRepo := .Values.dataPlane.components.kafka.connect.image.repository | default "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/kafka-connect" }}
          {{- $kafkaConnectTag := .Values.dataPlane.components.kafka.connect.image.tag | default "v0.1.5" }}
          image: {{ include "data-plane.image" (dict "repository" $kafkaConnectRepo "tag" $kafkaConnectTag "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.dataPlane.components.kafka.connect.image.pullPolicy | default "Always" }}
          {{- else }}
          image: {{ include "data-plane.image" (dict "repository" "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/kafka-connect" "tag" "v0.1.4" "global" .Values.global) | quote }}
          imagePullPolicy: Always
          {{- end }}
          {{- if .Values.securityHardening }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- end }}
          ports:
            - containerPort: 8083
          # Main container is slow while Connect scans plugins and starts the worker; this only prevents kubelet killing the pod during boot.
          # Readiness still gates traffic on /connectors. failureThreshold * periodSeconds = max boot budget after init finishes.
          startupProbe:
            httpGet:
              path: /connectors
              port: 8083
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /connectors
              port: 8083
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          env:
            # --- Required Kafka Connect worker configs ---
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: {{ .Values.dataPlane.components.kafka.connect.bootstrapServers | default "kafka:9092" | quote }}
            - name: CONNECT_GROUP_ID
              value: "connect-cluster"
            - name: CONNECT_KEY_CONVERTER
              value: "org.apache.kafka.connect.storage.StringConverter"
            - name: CONNECT_VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_PLUGIN_PATH
              value: "/opt/kafka/plugins"
            # Avoid ~10–20s ReflectionScanner on boot (Kafka 4.x); ClickHouse JAR has ServiceLoader manifests.
            - name: CONNECT_PLUGIN_DISCOVERY
              value: "service_load"
            # --- Internal topic configs ---
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: "connect-configs"
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: "connect-offsets"
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: "connect-status"
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "{{ $kafkaConnectReplicas }}"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "{{ $kafkaConnectReplicas }}"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "{{ $kafkaConnectReplicas }}"
            # --- REST / networking ---
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # --- Error handling defaults (KIP-298, applied to all connectors) ---
            - name: CONNECT_ERRORS_TOLERANCE
              value: "all"
            - name: CONNECT_ERRORS_RETRY_TIMEOUT
              value: "60"
            # ClickHouse credentials for create-clickhouse-sink.sh (baked into kafka-connect image)
            - name: CLICKHOUSE_HOST
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secrets
                  key: CLICKHOUSE_HOST
                  optional: true
            - name: CLICKHOUSE_PORT
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secrets
                  key: CLICKHOUSE_PORT
                  optional: true
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secrets
                  key: CLICKHOUSE_DATABASE
                  optional: true
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clickhouse-secrets
                  key: CLICKHOUSE_USER
                  optional: true
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse
                  key: admin-password
                  optional: true
            {{- include "neuraltrust-platform.proxy-env" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- if and .Values.dataPlane .Values.dataPlane.components .Values.dataPlane.components.kafka .Values.dataPlane.components.kafka.connect .Values.dataPlane.components.kafka.connect.resources }}
            {{- toYaml .Values.dataPlane.components.kafka.connect.resources | nindent 12 }}
            {{- else }}
            limits:
              cpu: "1"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 2Gi
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
