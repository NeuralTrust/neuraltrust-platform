{{- if .Values.firewall.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firewall
  labels:
    {{- include "firewall.labels" . | nindent 4 }}
spec:
  {{- if hasKey .Values.firewall "replicas" }}
  replicas: {{ .Values.firewall.replicas }}
  {{- else }}
  replicas: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "firewall.selectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "firewall.labels" . | nindent 8 }}
    spec:
      {{- $imagePullSecret := "" }}
      {{- if .Values.firewall.imagePullSecrets }}
        {{- $imagePullSecret = .Values.firewall.imagePullSecrets }}
      {{- end }}
      {{- if and $imagePullSecret (ne $imagePullSecret "") }}
      imagePullSecrets:
        - name: {{ $imagePullSecret }}
      {{- end }}
      {{- if .Values.firewall.serviceAccountName }}
      serviceAccountName: {{ .Values.firewall.serviceAccountName }}
      {{- end }}
      {{- if .Values.firewall.nodeSelector }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              {{- range $key, $values := .Values.firewall.nodeSelector }}
              - key: {{ $key }}
                operator: In
                values:
                {{- range $values }}
                - {{ . }}
                {{- end }}
              {{- end }}
      {{- end }}
      {{- if .Values.firewall.tolerations }}
      tolerations:
        {{- toYaml .Values.firewall.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.firewall.hostIPC }}
      hostIPC: {{ .Values.firewall.hostIPC }}
      {{- end }}
      {{- if .Values.firewall.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.firewall.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
      - name: firewall
        {{- $repo := .Values.firewall.image.repository }}
        {{- $tag := .Values.firewall.image.tag }}
        image: {{ include "firewall.image" (dict "repository" $repo "tag" $tag "global" .Values.global) | quote }}
        imagePullPolicy: {{ .Values.firewall.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: firewall-config
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: firewall-secrets
              key: JWT_SECRET
        - name: HUGGINGFACE_TOKEN
          valueFrom:
            secretKeyRef:
              name: firewall-secrets
              key: HUGGINGFACE_TOKEN
              optional: true
        startupProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 5
          failureThreshold: 36
          successThreshold: 1
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 10
          failureThreshold: 3
          successThreshold: 1
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 5
          failureThreshold: 3
          successThreshold: 1
          timeoutSeconds: 3
        {{- if .Values.firewall.resources }}
        resources:
          {{- toYaml .Values.firewall.resources | nindent 10 }}
        {{- end }}
        {{- if .Values.firewall.securityContext }}
        securityContext:
          {{- toYaml .Values.firewall.securityContext | nindent 10 }}
        {{- end }}
{{- end }}
