{{- if .Values.firewall.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firewall
  labels:
    {{- include "firewall.gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.firewall.gateway.replicas | default 2 }}
  selector:
    matchLabels:
      {{- include "firewall.gateway.selectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "firewall.gateway.labels" . | nindent 8 }}
    spec:
      {{- if .Values.firewall.serviceAccount.create }}
      serviceAccountName: {{ .Values.firewall.serviceAccount.name | default "firewall" }}
      {{- end }}
      {{- $imagePullSecret := .Values.firewall.imagePullSecrets | default "" }}
      {{- if and $imagePullSecret (ne $imagePullSecret "") }}
      imagePullSecrets:
        - name: {{ $imagePullSecret }}
      {{- end }}
      {{- if .Values.firewall.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.firewall.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          {{- $gwRepo := .Values.firewall.gateway.image.repository | default "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/firewall-cpu" }}
          {{- $gwTag := .Values.firewall.gateway.image.tag | default "v2.10.0" }}
          image: {{ include "firewall.image" (dict "repository" $gwRepo "tag" $gwTag "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.firewall.gateway.image.pullPolicy | default "IfNotPresent" }}
          {{- /* No args override: the firewall image CMD (`python -m src.serve`)
                 dual-binds to 0.0.0.0 and :: at startup and hardcodes the uvloop /
                 httptools / backlog tuning the gateway always needs. */}}
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: firewall-config
            {{- with .Values.firewall.gateway.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: firewall-secrets
                  key: JWT_SECRET
            - name: HUGGINGFACE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: firewall-secrets
                  key: HUGGINGFACE_TOKEN
                  optional: true
            {{- with .Values.firewall.gateway.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- include "neuraltrust-platform.proxy-env" . | nindent 12 }}
            {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "python" "ctx" .) | nindent 12 }}
            {{- include "neuraltrust-platform.appVersionEnv" (dict "tag" $gwTag) | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            periodSeconds: 5
            failureThreshold: {{ (.Values.firewall.gateway.startupProbe).failureThreshold | default 12 }}
            successThreshold: 1
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3
          {{- if .Values.firewall.gateway.resources }}
          resources:
            {{- toYaml .Values.firewall.gateway.resources | nindent 12 }}
          {{- end }}
          {{- $gwSC := .Values.firewall.securityContext | default dict }}
          {{- if .Values.securityHardening }}
          {{- $gwSC = mustMergeOverwrite $gwSC (dict "readOnlyRootFilesystem" true) }}
          {{- end }}
          {{- if $gwSC }}
          securityContext:
            {{- toYaml $gwSC | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /root/.cache
            {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 12 }}
        {{- with .Values.firewall.gateway.extraVolumeMounts }}
        {{- include "neuraltrust-platform.extraVolumeMounts" (dict "items" .) | nindent 12 }}
        {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        {{- include "neuraltrust-platform.customCaCert.volume" . | nindent 8 }}
      {{- with .Values.firewall.gateway.extraVolumes }}
      {{- include "neuraltrust-platform.extraVolumes" (dict "items" .) | nindent 8 }}
      {{- end }}
{{- end }}
