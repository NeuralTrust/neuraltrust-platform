{{- if and .Values.firewall.enabled .Values.firewall.podDisruptionBudget .Values.firewall.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: firewall
  labels:
    {{- include "firewall.labels" . | nindent 4 }}
spec:
  {{- if hasKey .Values.firewall.podDisruptionBudget "minAvailable" }}
  minAvailable: {{ .Values.firewall.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if hasKey .Values.firewall.podDisruptionBudget "maxUnavailable" }}
  maxUnavailable: {{ .Values.firewall.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "firewall.selectorLabels" . | nindent 6 }}
{{- end }}
