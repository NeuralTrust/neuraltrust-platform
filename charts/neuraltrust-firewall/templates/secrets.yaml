{{- if .Values.firewall.enabled }}
{{- $preserveSecrets := false }}
{{- if $.Values.global }}
  {{- if hasKey $.Values.global "preserveExistingSecrets" }}
    {{- if $.Values.global.preserveExistingSecrets }}
      {{- $preserveSecrets = true }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if not $preserveSecrets }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace "firewall-secrets") }}
{{- $jwtSecret := "" }}
{{- if and .Values.firewall.secrets.jwtSecret (ne .Values.firewall.secrets.jwtSecret "") }}
  {{- $jwtSecret = .Values.firewall.secrets.jwtSecret }}
{{- else if and $existingSecret $existingSecret.data (hasKey $existingSecret.data "JWT_SECRET") }}
  {{- $jwtSecret = index $existingSecret.data "JWT_SECRET" | b64dec }}
{{- else }}
  {{- $jwtSecret = randAlphaNum 64 }}
{{- end }}
{{- $hfToken := "" }}
{{- if and .Values.firewall.secrets.huggingFaceToken (ne .Values.firewall.secrets.huggingFaceToken "") }}
  {{- $hfToken = .Values.firewall.secrets.huggingFaceToken }}
{{- else if and $existingSecret $existingSecret.data (hasKey $existingSecret.data "HUGGINGFACE_TOKEN") }}
  {{- $hfToken = index $existingSecret.data "HUGGINGFACE_TOKEN" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: firewall-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "firewall.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ $jwtSecret | b64enc }}
  {{- if $hfToken }}
  HUGGINGFACE_TOKEN: {{ $hfToken | b64enc }}
  {{- end }}
{{- end }}
{{- end }}
