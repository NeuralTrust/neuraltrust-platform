{{- if .Values.firewall.enabled }}
{{- $defaults := .Values.firewall.workerDefaults }}
{{- range $workerName, $workerCfg := .Values.firewall.workers }}
{{- if $workerCfg.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $workerName }}-worker
  labels:
    {{- include "firewall.worker.labels" (dict "name" $workerName "context" $) | nindent 4 }}
spec:
  replicas: {{ $workerCfg.replicas | default ($defaults.replicas | default 1) }}
  selector:
    matchLabels:
      {{- include "firewall.worker.selectorLabels" (dict "name" $workerName) | nindent 6 }}
  {{- $strategy := $defaults.deploymentStrategy | default "Recreate" }}
  strategy:
    type: {{ $strategy }}
    {{- if eq $strategy "RollingUpdate" }}
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "firewall.worker.labels" (dict "name" $workerName "context" $) | nindent 8 }}
    spec:
      {{- if $.Values.firewall.serviceAccount.create }}
      serviceAccountName: {{ $.Values.firewall.serviceAccount.name | default "firewall" }}
      {{- end }}
      {{- $imagePullSecret := $.Values.firewall.imagePullSecrets | default "" }}
      {{- if and $imagePullSecret (ne $imagePullSecret "") }}
      imagePullSecrets:
        - name: {{ $imagePullSecret }}
      {{- end }}
      {{- /* Per-worker selection and global.nodeSelector are merged into a single
             nodeAffinity so they never collide on the same label key. The
             per-worker selector (lists, e.g. the GPU pool) wins over global on
             key conflicts; non-conflicting global keys are still required (ANDed)
             as extra matchExpressions. Rendering everything as nodeAffinity (not a
             plain nodeSelector) is what lets the GPU pool override a global CPU
             pool keyed by the same label — global.nodeSelector values are scalars
             and are normalized to single-element lists here. */}}
      {{- $workerSelector := $workerCfg.nodeSelector | default $defaults.nodeSelector | default dict }}
      {{- $globalSelector := default dict (default dict $.Values.global).nodeSelector }}
      {{- $mergedSelector := dict }}
      {{- range $key, $value := $globalSelector }}
        {{- $_ := set $mergedSelector $key (list ($value | toString)) }}
      {{- end }}
      {{- range $key, $values := $workerSelector }}
        {{- $list := list }}
        {{- if kindIs "slice" $values }}
          {{- range $values }}{{- $list = append $list (. | toString) }}{{- end }}
        {{- else }}
          {{- $list = list ($values | toString) }}
        {{- end }}
        {{- $_ := set $mergedSelector $key $list }}
      {{- end }}
      {{- if $mergedSelector }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                {{- range $key, $values := $mergedSelector }}
                  - key: {{ $key }}
                    operator: In
                    values:
                    {{- range $values }}
                      - {{ . }}
                    {{- end }}
                {{- end }}
      {{- end }}
      {{- $tolerations := $workerCfg.tolerations | default $defaults.tolerations }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" $ "local" $tolerations) | nindent 6 }}
      {{- $hostIPC := $workerCfg.hostIPC | default $defaults.hostIPC }}
      {{- if $hostIPC }}
      hostIPC: {{ $hostIPC }}
      {{- end }}
      {{- if $.Values.firewall.podSecurityContext }}
      securityContext:
        {{- toYaml $.Values.firewall.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          {{- $wImage := $workerCfg.image | default $defaults.image }}
          {{- $wRepo := $wImage.repository | default "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/firewall-cpu" }}
          {{- $wTag := $wImage.tag | default "v2.12.0" }}
          image: {{ include "firewall.image" (dict "repository" $wRepo "tag" $wTag "global" $.Values.global) | quote }}
          imagePullPolicy: {{ $wImage.pullPolicy | default "IfNotPresent" }}
          {{- /* The firewall image CMD (`python -m src.serve`) dual-binds to 0.0.0.0
                 and :: at startup and hardcodes the uvloop / httptools / backlog
                 tuning every firewall pod uses. We still pass the per-worker app
                 module as the first arg so the same image can serve any worker. */}}
          args:
            - {{ $workerCfg.module }}
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: firewall-config
            {{- with $workerCfg.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: firewall-secrets
                  key: JWT_SECRET
            - name: HUGGINGFACE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: firewall-secrets
                  key: HUGGINGFACE_TOKEN
                  optional: true
            {{- with $workerCfg.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- include "neuraltrust-platform.proxy-env" $ | nindent 12 }}
            {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "python" "ctx" $) | nindent 12 }}
            {{- include "neuraltrust-platform.appVersionEnv" (dict "tag" $wTag) | nindent 12 }}
          {{- $startupFailure := ($workerCfg.startupProbe).failureThreshold | default ($defaults.startupProbe).failureThreshold | default 36 }}
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            periodSeconds: 5
            failureThreshold: {{ $startupFailure }}
            successThreshold: 1
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3
          {{- $resources := $workerCfg.resources | default $defaults.resources }}
          {{- if $resources }}
          resources:
            {{- toYaml $resources | nindent 12 }}
          {{- end }}
          {{- $secCtx := $workerCfg.securityContext | default $.Values.firewall.securityContext | default dict }}
          {{- if $.Values.securityHardening }}
          {{- $secCtx = mustMergeOverwrite $secCtx (dict "readOnlyRootFilesystem" true) }}
          {{- end }}
          {{- if $secCtx }}
          securityContext:
            {{- toYaml $secCtx | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /root/.cache
            {{- include "neuraltrust-platform.customCaCert.volumeMount" $ | nindent 12 }}
            {{- with $workerCfg.extraVolumeMounts }}
            {{- include "neuraltrust-platform.extraVolumeMounts" (dict "items" .) | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        {{- include "neuraltrust-platform.customCaCert.volume" $ | nindent 8 }}
        {{- with $workerCfg.extraVolumes }}
        {{- include "neuraltrust-platform.extraVolumes" (dict "items" .) | nindent 8 }}
        {{- end }}
{{- end }}
{{- end }}
{{- end }}
