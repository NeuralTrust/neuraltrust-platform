securityHardening: true # Adds readOnlyRootFilesystem, drops capabilities, seccomp profile. Set to false to restore prior behavior.

firewall:
  enabled: true

  # --- Gateway (CPU-only, lightweight API router) ---
  gateway:
    replicas: 2
    image:
      repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/firewall-cpu
      tag: v2.6.0
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: "500m"
        memory: 512Mi
      requests:
        cpu: "250m"
        memory: 256Mi
    startupProbe:
      failureThreshold: 12
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 85
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    # Extra env vars appended to the gateway container (list of EnvVar).
    extraEnv: []
    # Extra envFrom sources appended to the gateway container (list of EnvFromSource: configMapRef/secretRef).
    extraEnvFrom: []

  # --- Worker defaults (shared by all workers unless overridden) ---
  # Default: CPU image. For GPU, override image to firewall-gpu, add nvidia.com/gpu
  # resources, nodeSelector, tolerations, and hostIPC (see values-dataplane-gpu.yaml.example).
  workerDefaults:
    image:
      repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/firewall-cpu
      tag: v2.6.0
      pullPolicy: IfNotPresent
    replicas: 1
    resources:
      limits:
        cpu: "1.5"
        memory: 6Gi
      requests:
        cpu: "1"
        memory: 4Gi
    nodeSelector: {}
    tolerations: []
    hostIPC: false
    startupProbe:
      failureThreshold: 36
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 6
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 85
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

  # --- Workers (each gets Deployment, Service, HPA, PDB) ---
  # Per-worker extraEnv / extraEnvFrom default to empty; add them under a worker entry
  # to inject extra env vars or envFrom sources into that specific worker container.
  # Example:
  #   toxicity:
  #     enabled: true
  #     module: src.workers.toxicity.app:app
  #     extraEnv:
  #       - name: MY_VAR
  #         value: "literal"
  #     extraEnvFrom:
  #       - configMapRef: { name: my-configmap }
  workers:
    toxicity:
      enabled: true
      module: src.workers.toxicity.app:app
      extraEnv: []
      extraEnvFrom: []
    toolguard:
      enabled: true
      module: src.workers.toolguard.app:app
      extraEnv: []
      extraEnvFrom: []
    prompt-jailbreak:
      enabled: true
      module: src.workers.prompt_jailbreak.app:app
      extraEnv: []
      extraEnvFrom: []
    prompt-moderation:
      enabled: true
      module: src.workers.prompt_moderation.app:app
      extraEnv: []
      extraEnvFrom: []
    response-jailbreak:
      enabled: true
      module: src.workers.response_jailbreak.app:app
      extraEnv: []
      extraEnvFrom: []

  # --- ServiceAccount ---
  serviceAccount:
    create: true
    name: firewall
    annotations: {}

  # --- Secrets (standard K8s Secret, same pattern as other charts) ---
  secrets:
    jwtSecret: ""
    huggingFaceToken: ""

  # --- ConfigMap ---
  config:
    pythonUnbuffered: "1"
    pythonDontWriteBytecode: "1"
    pythonPath: "/app"
    hfHome: "/root/.cache/huggingface"
    cudaMpsActiveThreadPercentage: "20"
    cudaMpsPinnedDeviceMemLimit: "3500M"
    applicationVersion: ""
    otelEnabled: "false"
    otelExporterOtlpEndpoint: "http://opentelemetry-collector.opentelemetry.svc.cluster.local:4318"
    otelServiceName: ""
    otelEnvironment: "prod"
    extraEnv: {}

  # --- Shared pod/container security ---
  podSecurityContext:
    fsGroup: 2000

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    runAsNonRoot: false
    runAsUser: 0

  imagePullSecrets: ""

  # --- GKE HealthCheckPolicy ---
  healthCheckPolicy:
    enabled: true
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2

global:
  imageRegistry: ""
  autoGenerateSecrets: false
  preserveExistingSecrets: false
