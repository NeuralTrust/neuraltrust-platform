{{- if and .Values.siemConnectors.enabled .Values.siemConnectors.autoscaling .Values.siemConnectors.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: siem-connectors
  labels:
    {{- include "siemConnectors.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: siem-connectors
  minReplicas: {{ .Values.siemConnectors.autoscaling.minReplicas | default 1 }}
  maxReplicas: {{ .Values.siemConnectors.autoscaling.maxReplicas | default 4 }}
  metrics:
    {{- if .Values.siemConnectors.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.siemConnectors.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.siemConnectors.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.siemConnectors.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
