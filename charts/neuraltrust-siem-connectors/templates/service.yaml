{{- /* platform-v2: legacy component disabled when global.platformVersion=v2 */ -}}
{{- if not (eq (include "neuraltrust-platform.isV2" .) "true") }}
{{- if .Values.siemConnectors.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: siem-connectors
  labels:
    {{- include "siemConnectors.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "siemConnectors.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: http
      name: http
{{- end }}

{{- end }}
