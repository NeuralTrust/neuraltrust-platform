apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "neuraltrust-watchdog.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neuraltrust-watchdog.labels" . | nindent 4 }}
data:
  config.yaml: |
    runner:
      defaultInterval: {{ .Values.runner.defaultInterval }}
      defaultTimeout: {{ .Values.runner.defaultTimeout }}
      failureThreshold: {{ .Values.runner.failureThreshold }}
    server:
      listenAddr: "{{ .Values.server.listenAddr }}"
      {{- if or .Values.server.authToken.value .Values.server.authToken.existingSecret }}
      authTokenEnv: WATCHDOG_API_TOKEN
      {{- end }}
    telemetry:
      serviceName: {{ .Values.telemetry.serviceName | quote }}
      otlpEndpointEnv: OTEL_EXPORTER_OTLP_ENDPOINT
      otlpHeadersEnv: OTEL_EXPORTER_OTLP_HEADERS
      tenantIdEnv: NT_TENANT_ID
      enableTraces: {{ .Values.telemetry.enableTraces }}
      enableLogs: {{ .Values.telemetry.enableLogs }}
    actions:
      dryRun: {{ .Values.actions.dryRun }}
      slack:
        webhookUrlEnv: SLACK_WEBHOOK_URL
      otlp:
        endpointEnv: {{ .Values.actions.otlp.endpointEnv | quote }}
    {{- with .Values.logExport }}
    logExport:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if .Values.overlay.enabled }}
    {{- /* Live config overlay: SQLite on the StatefulSet PVC. allowLocalOverride
           false pins the cluster to pure GitOps/seed (write API read-only);
           allowActionEdits gates dryRun/actions edits (RBAC still also required). */}}
    overlay:
      enabled: true
      dbPath: {{ .Values.overlay.dbPath | quote }}
      allowLocalOverride: {{ .Values.overlay.allowLocalOverride }}
      allowActionEdits: {{ .Values.overlay.allowActionEdits }}
    {{- end }}
    checks:
      {{- /*
        `enabledCheckIds` is an additive overlay: any check whose `id`
        appears in this list is rendered with `enabled: true`, regardless
        of the per-check default. Lets the umbrella chart (or operator)
        flip the curated default set on without re-declaring every
        target/threshold/actions block. Per-check `enabled: true/false`
        in `.Values.checks` still wins — the overlay only flips off→on.
      */ -}}
      {{- $enabledIds := default (list) .Values.enabledCheckIds }}
      {{- range .Values.checks }}
      {{- $c := . }}
      {{- if has $c.id $enabledIds }}
      {{- $c = merge (dict "enabled" true) $c }}
      {{- end }}
      - {{ toYaml $c | nindent 8 | trim }}
      {{- end }}
