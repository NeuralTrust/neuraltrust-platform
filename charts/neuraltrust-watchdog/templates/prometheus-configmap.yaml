{{- if and .Values.enabled (not .Values.prometheus.reuseExisting) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "neuraltrust-watchdog.prometheusFullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neuraltrust-watchdog.prometheusLabels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      scrape_timeout: {{ .Values.prometheus.scrapeTimeout }}
      evaluation_interval: {{ .Values.prometheus.scrapeInterval }}

    scrape_configs:
      - job_name: otel-collector-red
        honor_labels: true
        {{- if .Values.prometheus.collectorTarget }}
        static_configs:
          - targets:
              - {{ .Values.prometheus.collectorTarget }}
        {{- else }}
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: keep
            regex: otel-collector
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: prom-export
        {{- end }}
        # RED checks derive rate, errors, and duration from the OTel
        # semconv HTTP server duration histogram.
        metric_relabel_configs:
          - source_labels: [__name__]
            action: keep
            regex: 'http_server_request_duration_seconds_(bucket|sum|count)'

      # Watchdog's own /metrics, so the watchdog-self-staleness check
      # can prove the monitor is still emitting. Without this scrape a
      # silently-dead watchdog would never trip an alert. Keep only watchdog_*
      # series to bound cardinality in the short-retention local Prometheus.
      - job_name: watchdog-self
        honor_labels: true
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ printf "%s.%s.svc.cluster.local:%v" (include "neuraltrust-watchdog.fullname" .) .Release.Namespace .Values.service.port }}
        metric_relabel_configs:
          - source_labels: [__name__]
            action: keep
            regex: 'watchdog_.*'
{{- end }}
