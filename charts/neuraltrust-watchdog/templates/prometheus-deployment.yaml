{{- if and .Values.enabled (not .Values.prometheus.reuseExisting) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "neuraltrust-watchdog.prometheusFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neuraltrust-watchdog.prometheusLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "neuraltrust-watchdog.prometheusSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "neuraltrust-watchdog.prometheusSelectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: local-prometheus
        {{- with .Values.prometheus.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/prometheus-configmap.yaml") . | sha256sum }}
        {{- with .Values.prometheus.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "neuraltrust-watchdog.prometheusServiceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.prometheus.podSecurityContext | nindent 8 }}
      containers:
        - name: prometheus
          image: {{ printf "%s:%s" .Values.prometheus.image.repository .Values.prometheus.image.tag | quote }}
          imagePullPolicy: {{ .Values.prometheus.image.pullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.prometheus.retentionTime }}
            - --storage.tsdb.retention.size={{ .Values.prometheus.retentionSize }}
            - --web.listen-address=:9090
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.prometheus.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: {{ include "neuraltrust-watchdog.prometheusFullname" . }}-config
        - name: data
          emptyDir: {}
      {{- include "neuraltrust-platform.nodeSelector" (dict "ctx" . "local" .Values.prometheus.nodeSelector) | nindent 6 }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" . "local" .Values.prometheus.tolerations) | nindent 6 }}
      {{- with .Values.prometheus.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
