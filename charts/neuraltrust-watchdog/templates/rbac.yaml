{{- if .Values.rbac.create }}
{{- $name := include "neuraltrust-watchdog.fullname" . -}}
{{- $sa := include "neuraltrust-watchdog.serviceAccountName" . -}}
{{- $allowRestart := .Values.rbac.actions.restartDeployment.enabled -}}
{{- $allowLogExport := and .Values.rbac.logExport .Values.rbac.logExport.enabled -}}
{{- if .Values.rbac.watchAllNamespaces }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  labels:
    {{- include "neuraltrust-watchdog.labels" . | nindent 4 }}
rules:
  # `namespaces` is required by the tenant_discovery check kind, which
  # enumerates tenant namespaces by label selector. Cluster-wide mode
  # implies opting in to that capability — it's a strict superset of
  # the namespace-scoped variant below.
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods, services, endpoints, events, configmaps]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: [cert-manager.io]
    resources: [certificates]
    verbs: [get, list, watch]
  {{- if $allowRestart }}
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [patch, update]
  - apiGroups: [apps]
    resources: [deployments/scale]
    verbs: [patch, update]
  {{- end }}
  {{- if $allowLogExport }}
  # RBAC half of the log-bridge double-gate. Tailing also requires
  # logExport.enabled=true in config.
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  labels:
    {{- include "neuraltrust-watchdog.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ .Release.Namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neuraltrust-watchdog.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, services, endpoints, events, configmaps]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  {{- if $allowRestart }}
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [patch, update]
  - apiGroups: [apps]
    resources: [deployments/scale]
    verbs: [patch, update]
  {{- end }}
  {{- if $allowLogExport }}
  # RBAC half of the log-bridge double-gate. Tailing also requires
  # logExport.enabled=true in config. Note: namespaceSelector sources need
  # rbac.watchAllNamespaces=true; in namespace-scoped mode use explicit
  # `namespace:` entries within this release namespace.
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neuraltrust-watchdog.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
