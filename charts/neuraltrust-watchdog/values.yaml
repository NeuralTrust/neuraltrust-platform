# neuraltrust-watchdog Helm values.
#
# All settings are additive: the chart installs cleanly with the
# defaults below. When this chart is included as a subchart of
# neuraltrust-platform, set `neuraltrust-watchdog.enabled` from the
# umbrella; in that mode the rest of these defaults still apply.

enabled: false
# Drop the release-name prefix so resources are named "neuraltrust-watchdog"
# (matching clickhouse, kafka, data-plane-api, …) instead of
# "<release>-neuraltrust-watchdog". Stable, predictable names that external
# tooling (monitoring, network policies) can rely on.
fullnameOverride: "neuraltrust-watchdog"
image:
  repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/watchdog
  tag: v0.8.0 # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent
# Pull secret(s) for private nt-docker images (watchdog + bundled Prometheus).
# Defaults to gcr-secret like the rest of the chart. Set to [] on clusters that
# pull via IAM / Workload Identity and have no pull Secret.
imagePullSecrets:
  - name: gcr-secret
# Watchdog is a singleton controller, not a stateless service: HPA is
# unsupported and replicaCount stays 1. A second replica would duplicate
# healing actions/notifications, tail every pod twice, and double per-check
# metric series. Scale vertically (resources below) and by scoping logExport
# sources / the enabled check set. Active/passive HA via k8s Lease leader
# election is an optional, deferrable follow-up — not load-based
# scaling — so replicaCount > 1 is unsafe until that lands.
replicaCount: 1
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
# Persisted operational state (internal/sqlitedb + internal/statestore): the
# shared embedded SQLite DB on a PVC that survives pod restarts — incident dedup
# (no duplicate pages), recovery notifications, log tail checkpoints, delta-check
# priming, and a warm GET /logs ring buffer. ON by default so a restart never
# re-pages or loses incident state; the watchdog then renders as a StatefulSet
# with the volumeClaimTemplate below. Set to false for ephemeral/PVC-less
# clusters (the binary degrades gracefully to pure in-memory). overlay.enabled
# implies persistence; persistence can also stand alone (durable incident state
# without the live config overlay).
persistence:
  enabled: true
  # Shared SQLite file path on the PVC. Backs both statestore and the overlay.
  dbPath: /var/lib/watchdog/watchdog.db
  # Empty => cluster default StorageClass (cloud-agnostic: GKE pd-balanced,
  # EKS gp3, AKS managed-csi, bare-metal local-path). Set explicitly for
  # locked-down clusters or to pin a class.
  storageClass: ""
  size: 1Gi
# Live config overlay (internal/configstore): operator/UI policy edits, layered
# over the ConfigMap seed (effective = seed ⊕ overlay). OFF by default — customers
# stay pure GitOps/Helm. Enabling it implies persistence (shares persistence.dbPath)
# and exposes the bearer-gated /config write API.
overlay:
  enabled: false
  # true (default) = local edits win at runtime (air-gapped-friendly,
  # local-authoritative). false = strict mode: write API is read-only and the
  # cluster tracks pure seed/GitOps.
  allowLocalOverride: true
  # Gate on the two highest-blast-radius policy fields (dryRun, actions). false
  # (default) means a UI user can tune thresholds/intervals but cannot arm
  # healing — that stays an operator change in the seed. Mutation ALSO still
  # requires the RBAC verb regardless; this is defense in depth.
  allowActionEdits: false
service:
  type: ClusterIP
  port: 8080
  metricsPort: 8080
# Bundled short-retention Prometheus. Customer-minimal installs do NOT render it:
# watchdog now pushes check-status gauges over OTLP directly, and direct-probe
# checks do not need a local query engine. It renders only when:
#   - prometheus.enabled=true, OR
#   - an enabled check has kind red/promql/scrape_staleness.
# It is alerting-only: no Alertmanager, no rules, no remote_write.
prometheus:
  enabled: false
  reuseExisting: "" # Set to an existing in-cluster Prometheus URL to skip the bundled instance.
  # Optional host:port override for the Collector Prometheus exporter. When
  # empty, bundled Prometheus discovers the in-chart Collector in the release
  # namespace by label/port name.
  collectorTarget: ""
  image:
    # Mirrored from prom/prometheus via crane into nt-docker (not Docker Hub).
    repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/prometheus
    tag: v3.12.0
    pullPolicy: IfNotPresent
  retentionTime: 3h
  retentionSize: 512MB
  scrapeInterval: 30s
  scrapeTimeout: 10s
  service:
    port: 9090
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  serviceAccount:
    name: ""
    annotations: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
  nodeSelector: {}
  tolerations: []
  affinity: {}
# Monitoring resources. Five independent capability-gated toggles, so
# every cluster can pick the combination its stack supports. The
# annotation baseline is universal; the rest are opt-in CRD-bound
# resources that only render when both the chart toggle is true AND the
# matching CRD exists.
monitoring:
  # Pod scrape annotations on the Deployment. Universal contract — works
  # with Prometheus Operator additionalScrapeConfigs, Google Managed
  # Prometheus, Amazon Managed Prometheus agent in annotation mode,
  # Azure Monitor for Containers, and the in-chart OTel collector.
  scrapeAnnotations:
    enabled: true
  # PodMonitor (monitoring.coreos.com/v1) — Prometheus Operator path.
  podMonitor:
    enabled: true
    additionalLabels: {}
    interval: 30s
    scrapeTimeout: 10s
  # PrometheusRule (monitoring.coreos.com/v1) — chart-side alerts.
  prometheusRule:
    enabled: true
    additionalLabels: {}
    alertLabels:
      team: platform
  # PodMonitoring (monitoring.googleapis.com/v1) — Google Managed
  # Prometheus path. Off by default; GMP-native customers flip it on.
  podMonitoring:
    enabled: false
    additionalLabels: {}
    interval: 30s
    scrapeTimeout: 10s
  # Rules (monitoring.googleapis.com/v1) — GMP-native alerts.
  gmpRules:
    enabled: false
    additionalLabels: {}
    alertLabels:
      team: platform
serviceAccount:
  create: true
  name: ""
  annotations: {}
# RBAC defaults are minimal: read-only access to namespace resources.
# Healing actions that mutate (k8s.restart_deployment) require explicit
# opt-in via rbac.actions.restartDeployment.enabled below.
rbac:
  create: true
  # When watchAllNamespaces is true, ClusterRole + ClusterRoleBinding
  # are rendered. Otherwise namespace-scoped Role + RoleBinding.
  watchAllNamespaces: false
  actions:
    restartDeployment:
      enabled: false
  # RBAC half of the log-bridge double-gate. When true the SA gets the
  # `pods/log` get verb. Tailing still also requires logExport.enabled=true.
  logExport:
    enabled: false
# Pod-level overrides.
podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]
nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""
podDisruptionBudget:
  enabled: false
  minAvailable: 1
networkPolicy:
  enabled: false
  # Allow ingress from these namespace selectors when networkPolicy.enabled.
  ingressFromNamespaces: []
  egress:
    enabled: true
    # extraEgress is appended verbatim; allows custom cluster-scoped
    # egress rules for the watchdog (e.g. to a managed Kafka SaaS).
    extraEgress: []
# Telemetry: when otlp.endpoint is empty the umbrella can inject the hosted OTLP
# endpoint from global.observability.hostedExport. When both are empty the OTel
# SDK is initialized with no-op providers (graceful no-egress).
telemetry:
  serviceName: neuraltrust-watchdog
  otlp:
    endpoint: ""
    headers: ""
  tenantId: ""
  enableTraces: true
  enableLogs: true
  # Push curated check-status gauges (watchdog.check.status,
  # watchdog.check.consecutive_failures, watchdog.up) over OTLP so a remote
  # backend can answer "is everything running?" without scraping /metrics.
  enableMetrics: true
# HTTP server.
server:
  listenAddr: ":8080"
  authToken:
    # Optional bearer token securing POST /checks/{id}/run.
    # Provide either `value` (rendered into a Secret) or `existingSecret`.
    value: ""
    existingSecret: ""
    secretKey: token
# Notification + healing action defaults.
actions:
  # Global default for all mutating actions; per-check override allowed
  # via checks[].dryRun.
  dryRun: true
  # Applied to every check that declares no actions of its own. Notifiers only —
  # mutating/healing actions (e.g. kafka_connect.restart_task) are never
  # defaulted on and stay explicit per check (safety rule).
  defaultActions: [notify.otlp, notify.slack]
  slack:
    # When webhookUrl is empty, notify.slack is a silent no-op.
    webhookUrl: ""
    existingSecret: ""
    secretKey: webhook
  otlp:
    endpointEnv: OTEL_EXPORTER_OTLP_ENDPOINT
# Per-kind presets deep-merged UNDER each check of that kind (per-check value
# wins). Declares shared thresholds/timing once instead of on every check.
kindDefaults:
  red:
    # "for duration": interval (60s) x failureThreshold = breach must persist
    # ~5 min before paging, so a short self-recovering spike never alerts.
    failureThreshold: 5
  deployment_health:
    thresholds: {maxRestartsPerInterval: 3, minAvailableRatio: 1.0}
# Log bridge: tail ERROR/WARN from selected workloads, redact secrets, and ship
# over OTLP push / HTTP pull / air-gapped bundle. For customer-minimal installs,
# hosted export auto-renders this block as enabled and defaults sources to the
# release namespace, so ERROR/WARN logs reach SaaS with no extra values. Set
# global.observability.hostedExport.enabled=false for pure in-cluster/no-egress
# installs. GET /logs and POST /logs/export are always bearer-gated, so set
# server.authToken when using the pull transport. See README.md.
logExport:
  # When true, hostedExport automatically enables ERROR/WARN OTLP log export.
  # Set false to keep hosted check-status metrics while disabling remote logs.
  autoEnabled: true
  enabled: false
  severities: [error, warn]
  # Workloads to tail. Use an explicit `namespace:` in namespace-scoped RBAC
  # mode; `namespaceSelector:` requires rbac.watchAllNamespaces=true.
  sources: []
  #  - { namespace: neuraltrust, podSelector: "app in (control-plane-api, data-plane-api, trustgate, firewall)" }
  # Replay window on FIRST connect / cold restart only. Stream reconnects
  # resume from an in-memory checkpoint (SinceTime) and drop the boundary
  # overlap, so reconnects do not re-export the same lines.
  sinceSeconds: 300
  maxLinesPerPodPerMinute: 120
  # Max simultaneous pod-log streams. Targets beyond the cap are skipped and
  # counted (watchdog_logexport_tail_cap_skipped_total; discovered vs active
  # gauges) so coverage gaps are visible, not silent.
  maxConcurrentTails: 100
  resyncInterval: 30s
  redaction:
    builtins: [bearer, password, dsn, apikey, email]
    extraPatterns: []
  transports:
    otlp: {enabled: true}
    pull: {enabled: true, bufferSize: 1000}
    bundle: {enabled: false, outputDir: /var/run/watchdog/logbundles}
# Product usage bridge (external customers only): discovers teams from
# in-cluster data-plane-api, polls aggregate counters for each team, and pushes
# them over OTLP. Default OFF — SaaS/hybrid keep the admin-console UsageSnapshot
# job. When enabled, reuses the platform data-plane-jwt-secret
# (DATA_PLANE_JWT_SECRET) to mint discovery and per-team JWTs.
usageExport:
  enabled: false
  # In-cluster data-plane-api base URL (Service DNS, no public ingress).
  endpoint: "http://data-plane-api-service:80"
  jwtSecret:
    existingSecret: data-plane-jwt-secret
    secretKey: DATA_PLANE_JWT_SECRET
  # In-cluster control-plane-api base URL for automatic Red Teaming target discovery.
  controlPlaneEndpoint: "http://control-plane-api-service:80"
  controlPlaneJwtSecret:
    existingSecret: control-plane-secrets
    secretKey: CONTROL_PLANE_JWT_SECRET
  # Automatic per-team target discovery (default true). Set false to export
  # TrustGate-only counters without querying control-plane-api.
  targetDiscovery: true
  interval: 1h
  timeout: 30s
# Connection envs sourced from existing cluster secrets.
secretEnv:
  clickhouse:
    # Reuse platform ClickHouse secrets (see create-secrets.sh / data-plane hook).
    userSecret: clickhouse-secrets
    userKey: CLICKHOUSE_USER
    passwordSecret: clickhouse
    passwordKey: admin-password
  redis:
    passwordSecret: ""
    passwordKey: password
# Where the runner schedules checks. defaultInterval applies to checks
# that omit `interval`. failureThreshold gates healing actions: only
# fire after N consecutive non-OK results. Actions/notifications then fire
# ONCE per incident (alerting edge / severity escalation) plus a single
# recovery notice — never every failing tick. Set a per-check `reAlertAfter`
# (e.g. 30m) to re-notify a sustained incident on a backoff.
#
# A check may override this global with its own `failureThreshold` — combined
# with its `interval` that is the watchdog's "for duration" (e.g. interval 60s +
# failureThreshold 5 = alert only after ~5 min of sustained breach). The RED
# checks below use 5 so a short, self-recovering spike never pages.
runner:
  defaultInterval: 60s
  defaultTimeout: 15s
  failureThreshold: 3
  # Env var holding the Prometheus query-API base URL. Applied as the default
  # target.endpointEnv for red/promql/scrape_staleness checks that omit it, so
  # the address is declared once. The bundled local Prometheus sets this.
  prometheusQueryEnv: PROMETHEUS_QUERY_URL
# Customer-minimal default: direct probes only (no local Prometheus required).
# These checks answer "are the main services running?" and the watchdog pushes
# their status over OTLP metrics. Adding any red/promql/scrape_staleness id here
# later renders the bundled local Prometheus.
enabledCheckIds:
  - clickhouse
  - kafka-broker
  - kafka-connect
  - control-plane-synthetic
  - data-plane-synthetic
  - trustgate-synthetic
  - firewall-synthetic
  - pod-health
  - deployment-health
# Additional checks merged after the default `checks` list. Use this from
# umbrella/region values to add cross-namespace or account-specific probes
# without replacing the entire default check catalog.
extraChecks: []
# Default check set. Override / extend via the watchdog.checks key in
# customer values. Each entry is passed to the Go watchdog as-is. Set
# enabled: false to skip a check; the corresponding components do not
# need to exist in-cluster.
checks:
  - id: clickhouse
    kind: clickhouse
    enabled: false
    target:
      address: clickhouse:9000
      database: neuraltrust
      usernameEnv: CLICKHOUSE_USER
      passwordEnv: CLICKHOUSE_PASSWORD
    thresholds:
      diskFreePctMin: 15
      mutationsMaxAgeSeconds: 1800
      replicationQueueMax: 100
      memoryUsageRatioMax: 0.85
      partsPerPartitionMax: 300
      maxErrorsPerInterval: 50
      longQueryMaxSeconds: 900
      maxLongQueries: 0
      queryLogLookbackSeconds: 900
      queryLogExceptionsMax: 0
  - id: kafka-broker
    kind: kafka_broker
    enabled: false
    target:
      bootstrapServers: ["kafka:9092"]
  - id: kafka-connect
    kind: kafka_connect
    enabled: false
    dryRun: true
    target:
      url: http://kafka-connect-svc:8083
    actions: [notify.otlp, notify.slack, kafka_connect.restart_task]
  - id: data-plane-worker-lag
    kind: kafka_consumer_lag
    enabled: false
    dryRun: true
    target:
      bootstrapServers: ["kafka:9092"]
      group: data-plane-worker
      # Required if k8s.restart_deployment is in the actions list —
      # otherwise the action falls back to the check id.
      k8sDeployment: data-plane-kafka-worker
      k8sNamespace: data-plane-workers
    thresholds:
      maxLag: 5000
  # The three red-* checks use the built-in `red` kind: the PromQL is compiled
  # in the watchdog binary from `target.signal` (requestRate | errorRatio |
  # latencyP95), so there is no hand-written query to drift or mistype, and the
  # query always groups by service_name so the alert names the offending
  # service. Tune thresholds and the "for duration" (failureThreshold) here;
  # the query itself is not customer-editable by design.
  - id: red-request-rate
    kind: red
    enabled: false
    # "for duration": interval (60s) x failureThreshold = the breach must
    # persist ~5 min before paging, so a short traffic burst that self-recovers
    # never alerts.
    failureThreshold: 5
    target:
      endpointEnv: PROMETHEUS_QUERY_URL
      signal: requestRate
    thresholds:
      operator: ">"
      warning: 500
      critical: 1000
      noDataStatus: unknown
  - id: red-error-rate
    kind: red
    enabled: false
    failureThreshold: 5 # ~5 min sustained before paging (see red-request-rate)
    target:
      endpointEnv: PROMETHEUS_QUERY_URL
      signal: errorRatio
    thresholds:
      operator: ">"
      warning: 0.05
      critical: 0.15
      noDataStatus: unknown
  - id: red-duration-p95
    kind: red
    enabled: false
    failureThreshold: 5 # ~5 min sustained before paging (see red-request-rate)
    target:
      endpointEnv: PROMETHEUS_QUERY_URL
      signal: latencyP95
    thresholds:
      operator: ">"
      warning: 1
      critical: 3
      noDataStatus: unknown
  # Watchdog self-metric staleness. The bundled local Prometheus
  # scrapes watchdog's own /metrics (job watchdog-self), so an absent
  # watchdog_checks_runs_total means the monitor itself has gone silent — the
  # one signal a process-local liveness probe can never catch. Observe-only:
  # notify actions only, never a self-restart. Disable only if you point
  # prometheus.reuseExisting at a Prometheus that does not scrape watchdog.
  - id: watchdog-self-staleness
    kind: scrape_staleness
    enabled: false
    target:
      endpointEnv: PROMETHEUS_QUERY_URL
      series: watchdog_checks_runs_total
      window: 10m
    thresholds:
      staleStatus: critical
  - id: control-plane-synthetic
    kind: httpsynthetic
    enabled: false
    target:
      urls:
        - {name: api, url: 'http://control-plane-api-service/health', expectedStatus: 200, latencyWarnMs: 500, latencyCriticalMs: 2000}
        - {name: app, url: 'http://control-plane-app-service/api/health', expectedStatus: 200}
        # scheduler exposes /v1/health on the chart Service (port 80).
        - {name: scheduler, url: 'http://control-plane-scheduler-service/v1/health', expectedStatus: 200}
  - id: data-plane-synthetic
    kind: httpsynthetic
    enabled: false
    target:
      urls:
        - {name: api, url: 'http://data-plane-api-service/health', expectedStatus: 200, latencyWarnMs: 500, latencyCriticalMs: 2000}
        - {name: ready, url: 'http://data-plane-api-service/health/ready', expectedStatus: 200}
        # /health/deep exercises downstream connections (ClickHouse, Kafka);
        # keep it on a separate check entry so a flaky downstream doesn't
        # mask a real API outage in the same alert.
        - {name: deep, url: 'http://data-plane-api-service/health/deep', expectedStatus: 200, latencyWarnMs: 1000, latencyCriticalMs: 3000}
  - id: postgres-tcp
    kind: tcpsynthetic
    enabled: false
    target:
      host: postgresql.neuraltrust
      port: 5432
  # Smoke probe — Cloud SQL CPU/memory/disk stays in cloud-infrastructure TF.
  - id: postgres-ping
    kind: postgres_ping
    enabled: false
    target:
      dsnEnv: POSTGRES_DSN
    thresholds:
      connectionUsageRatioMax: 0.8
      longQueryMaxAge: 10m
      maxLongQueries: 0
      replicationLagMaxSeconds: 60
    actions: [notify.otlp]
  - id: trustgate-synthetic
    kind: httpsynthetic
    enabled: false
    target:
      urls:
        - {name: control-plane, url: 'http://trustgate-control-plane/health'}
        - {name: data-plane, url: 'http://trustgate-data-plane/health'}
        - {name: actions, url: 'http://trustgate-actions/health'}
  - id: trustgate-e2e-pipeline
    kind: e2e_synthetic
    enabled: false
    target:
      url: http://trustgate-data-plane:8081/v1/chat/completions
      method: POST
      probeHeader: X-NT-Watchdog-Probe-ID
      probePrefix: trustgate-e2e
      persistenceDelay: 10s
      headerEnv:
        Authorization: TRUSTGATE_SYNTHETIC_AUTH_HEADER
      body: |
        {"model":"watchdog-synthetic","messages":[{"role":"user","content":"watchdog synthetic probe {{probe_id}}"}],"metadata":{"nt_watchdog_probe":true,"probe_id":"{{probe_id}}"}}
      clickhouse:
        address: clickhouse:9000
        database: neuraltrust
        usernameEnv: CLICKHOUSE_USER
        passwordEnv: CLICKHOUSE_PASSWORD
      assertQuery: |
        SELECT count()
        FROM metrics
        WHERE event_time >= now() - INTERVAL 15 MINUTE
          AND position(toString(request_headers), ?) > 0
  - id: trustgate-redis
    kind: redis
    enabled: false
    target:
      host: trustgate-redis
      port: 6379
      passwordEnv: REDIS_PASSWORD
    thresholds:
      memoryUsageRatioMax: 0.85
      connectedClientsRatioMax: 0.85
      blockedClientsMax: 0
    actions: [notify.otlp]
  - id: firewall-synthetic
    kind: httpsynthetic
    enabled: false
    target:
      urls:
        - {name: gateway, url: 'http://firewall/health'}
  - id: gateway-health
    kind: gateway_health
    enabled: false
    target:
      url: http://firewall/health
      namespace: gateway
      labelSelector: app.kubernetes.io/name=firewall
    thresholds:
      minReadyPods: 1
  # Watches cert-manager Certificates across the listed namespaces.
  - id: cert-renewal
    kind: cert_renewal
    enabled: false
    target:
      namespaces: [neuraltrust]
    thresholds:
      renewalWarnDays: 14
      renewalCriticalDays: 3
  - id: otel-collector
    kind: otel_collector
    enabled: false
    target:
      url: http://opentelemetry-collector.opentelemetry:13133/
      namespace: opentelemetry
      labelSelector: app.kubernetes.io/name=opentelemetry-collector
    thresholds:
      minReadyPods: 1
  # Replaces gcp/metric_based_alerts.tf pod_crash_alert.
  - id: pod-health
    kind: pod_health
    enabled: false
    target:
      namespaces: [neuraltrust]
      reasons: [CrashLoopBackOff, OOMKilled, ImagePullBackOff, ErrImagePull, CreateContainerConfigError]
    thresholds:
      maxFailingPods: 0
  # Replaces gcp/metric_based_alerts.tf container_restart_rate.
  - id: deployment-health
    kind: deployment_health
    enabled: false
    target:
      namespace: neuraltrust
      deployments: [trustgate-control-plane, trustgate-data-plane]
    # thresholds come from kindDefaults.deployment_health; notify actions from
    # actions.defaultActions. Add k8s.restart_deployment here when ready to heal.
  # Multi-tenant SaaS coverage. Discovers tenant namespaces dynamically
  # via label selector — NeuralTrust SaaS uses this to cover tenants
  # created at runtime by trustgate-ee
  # (project=multitenant-gateway, managed-by=trustgate-ee). Requires
  # rbac.watchAllNamespaces=true so the watchdog SA can list namespaces
  # and workloads cluster-wide. Leave OFF for single-tenant customer
  # installs.
  - id: tenant-discovery
    kind: tenant_discovery
    enabled: false
    interval: 120s
    timeout: 60s
    target:
      namespaceSelector: project=multitenant-gateway
      workloadSelector: managed-by=trustgate-ee
    thresholds:
      maxRestartsPerInterval: 5
      minAvailableRatio: 0.5
      maxUnhealthyTenants: 0
# Inherited from the umbrella chart. Local overrides win.
global:
  proxy:
    enabled: false
    httpProxy: ""
    httpsProxy: ""
    noProxy: ""
