apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustgate-actions
  labels:
    {{- include "trustgate.actions.labels" . | nindent 4 }}
    component: actions
spec:
  {{- if hasKey .Values.actions "replicas" }}
  replicas: {{ .Values.actions.replicas }}
  {{- else }}
  replicas: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "trustgate.actions.selectorLabels" . | nindent 6 }}
      component: actions
  template:
    metadata:
      labels:
        {{- include "trustgate.actions.labels" . | nindent 8 }}
        component: actions
    spec:
      serviceAccountName: {{ include "trustgate.serviceAccountName" . }}
      {{- include "trustgate.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.securityHardening }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      volumes:
      - name: logs-volume
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      {{- include "neuraltrust-platform.customCaCert.volume" . | nindent 6 }}
      {{- include "neuraltrust-platform.kafka.tlsVolume" . | nindent 6 }}
      {{- with .Values.actions.extraVolumes }}
      {{- include "neuraltrust-platform.extraVolumes" (dict "items" .) | nindent 6 }}
      {{- end }}
      containers:
      - name: actions
        image: {{ include "trustgate.image" (dict "repository" .Values.global.image.image "tag" .Values.global.image.tag "global" .Values.global) | quote }}
        args: ["actions"]
        envFrom:
        - configMapRef:
            name: trustgate-env-vars
        {{- with .Values.actions.extraEnvFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        env:
        # Sensitive values from secrets
        - name: SERVER_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: SERVER_SECRET_KEY
              optional: true
        - name: DATABASE_HOST
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_PORT
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_PASSWORD
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_NAME
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_URL
        - name: DATABASE_SSL_MODE
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_SSL_MODE
              optional: true
        - name: DATABASE_AUTH_MODE
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_AUTH_MODE
              optional: true
        - name: DATABASE_IAM_AUTH
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_IAM_AUTH
              optional: true
        # REDIS_PASSWORD is optional and sourced only from trustgate-secrets when configured
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: redis-password
              optional: true
        - name: NEURAL_TRUST_FIREWALL_URL
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: NEURAL_TRUST_FIREWALL_URL
              optional: true
        - name: NEURAL_TRUST_FIREWALL_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: NEURAL_TRUST_FIREWALL_SECRET_KEY
              optional: true
        {{- include "trustgate.kafkaEnv" . | nindent 8 }}
        {{- with .Values.actions.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "neuraltrust-platform.proxy-env" . | nindent 8 }}
        {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "go" "ctx" .) | nindent 8 }}
        {{- include "neuraltrust-platform.appVersionEnv" (dict "tag" .Values.global.image.tag) | nindent 8 }}
        {{- if .Values.securityHardening }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        {{- end }}
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.actions.ports.http }}
          name: http
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        - name: tmp
          mountPath: /tmp
        {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 8 }}
        {{- include "neuraltrust-platform.kafka.tlsVolumeMount" . | nindent 8 }}
        {{- with .Values.actions.extraVolumeMounts }}
        {{- include "neuraltrust-platform.extraVolumeMounts" (dict "items" .) | nindent 8 }}
        {{- end }}
        resources:
          {{- toYaml .Values.actions.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
      {{- include "neuraltrust-platform.nodeSelector" (dict "ctx" . "local" .Values.actions.nodeSelector) | nindent 6 }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" . "local" .Values.actions.tolerations) | nindent 6 }}
---
{{- $gkeBackendConfigName := include "neuraltrust-platform.service.gkeBackendConfigName" (dict "global" .Values.global "localName" "trustgate-actions-backendconfig") }}
{{- $gcp := default dict (default dict .Values.global.ingress).gcp }}
{{- if and .Values.ingress.enabled $gkeBackendConfigName (not $gcp.backendConfig) }}
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ $gkeBackendConfigName }}
spec:
  healthCheck:
    type: HTTP
    requestPath: /health
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: trustgate-actions
  labels:
    {{- include "trustgate.actions.labels" . | nindent 4 }}
    component: actions
  {{- $negAnnotations := include "neuraltrust-platform.service.negAnnotations" (dict "global" .Values.global "backendConfigName" "trustgate-actions-backendconfig" "pscServiceKey" "trustgate-actions") }}
  {{- if $negAnnotations }}
  annotations:
    {{- $negAnnotations | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.actions.ports.http }}
      protocol: TCP
      name: http
  selector:
    {{- include "trustgate.actions.labels" . | nindent 4 }}
    component: actions
{{- $useRoutes := false }}
{{- if include "neuraltrust-platform.isOpenshift" . }}
  {{- $ingressEnabled := false }}
  {{- if and .Values.ingress (hasKey .Values.ingress "enabled") }}
    {{- if .Values.ingress.enabled }}
      {{- $ingressEnabled = true }}
    {{- end }}
  {{- end }}
  {{- if not $ingressEnabled }}
    {{- $useRoutes = true }}
  {{- end }}
{{- end }}
{{- if $useRoutes }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: trustgate-actions-route
  labels:
    {{- include "trustgate.actions.labels" . | nindent 4 }}
    component: actions
spec:
  {{- $domain := include "neuraltrust-platform.domain" . }}
  host: {{ if $domain }}{{ printf "trustgate-actions.%s" $domain | quote }}{{ else }}"trustgate-actions.neuraltrust.ai"{{ end }}
  to:
    kind: Service
    name: trustgate-actions
    weight: 100
  port:
    targetPort: http
  tls:
    {{- $tlsConfig := dict }}
    {{- if and .Values.actions .Values.actions.ingress .Values.actions.ingress.tls }}
      {{- $tlsConfig = .Values.actions.ingress.tls }}
    {{- end }}
    {{- $tlsSecretName := "" }}
    {{- $certFromSecret := "" }}
    {{- $keyFromSecret := "" }}
    {{- if $tlsConfig.secretName }}
      {{- $tlsSecretName = $tlsConfig.secretName }}
      {{- $tlsSecret := (lookup "v1" "Secret" $.Release.Namespace $tlsSecretName) }}
      {{- if $tlsSecret }}
        {{- if hasKey $tlsSecret.data "tls.crt" }}
          {{- $certFromSecret = index $tlsSecret.data "tls.crt" | b64dec }}
        {{- end }}
        {{- if hasKey $tlsSecret.data "tls.key" }}
          {{- $keyFromSecret = index $tlsSecret.data "tls.key" | b64dec }}
        {{- end }}
      {{- end }}
    {{- end }}
    termination: {{ if $tlsConfig.termination }}{{ $tlsConfig.termination }}{{ else }}edge{{ end }}
    {{- if $certFromSecret }}
    certificate: {{ $certFromSecret | quote }}
    {{- else if $tlsConfig.certificate }}
    certificate: {{ $tlsConfig.certificate | quote }}
    {{- end }}
    {{- if $keyFromSecret }}
    key: {{ $keyFromSecret | quote }}
    {{- else if $tlsConfig.key }}
    key: {{ $tlsConfig.key | quote }}
    {{- end }}
    {{- if $tlsConfig.caCertificate }}
    caCertificate: {{ $tlsConfig.caCertificate | quote }}
    {{- end }}
    {{- if $tlsConfig.destinationCACertificate }}
    destinationCACertificate: {{ $tlsConfig.destinationCACertificate | quote }}
    {{- end }}
    insecureEdgeTerminationPolicy: {{ if $tlsConfig.insecureEdgeTerminationPolicy }}{{ $tlsConfig.insecureEdgeTerminationPolicy }}{{ else }}Redirect{{ end }}
{{- end }}