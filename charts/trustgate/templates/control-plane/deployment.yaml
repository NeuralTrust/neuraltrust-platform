apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustgate-control-plane
  labels:
    {{- include "trustgate.controlPlane.labels" . | nindent 4 }}
    component: control-plane
spec:
  {{- if hasKey .Values.controlPlane "replicas" }}
  replicas: {{ .Values.controlPlane.replicas }}
  {{- else }}
  replicas: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "trustgate.controlPlane.selectorLabels" . | nindent 6 }}
      component: control-plane
  template:
    metadata:
      labels:
        {{- include "trustgate.controlPlane.labels" . | nindent 8 }}
        component: control-plane
    spec:
      {{- $pullSecrets := list }}
      {{- if .Values.imagePullSecrets }}
        {{- if kindIs "string" .Values.imagePullSecrets }}
          {{- $pullSecrets = append $pullSecrets .Values.imagePullSecrets }}
        {{- else if kindIs "slice" .Values.imagePullSecrets }}
          {{- range .Values.imagePullSecrets }}
            {{- if kindIs "string" . }}
              {{- $pullSecrets = append $pullSecrets . }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- else if .Values.global.image.imagePullSecrets }}
        {{- if kindIs "slice" .Values.global.image.imagePullSecrets }}
          {{- range .Values.global.image.imagePullSecrets }}
            {{- if kindIs "string" . }}
              {{- $pullSecrets = append $pullSecrets . }}
            {{- end }}
          {{- end }}
        {{- else if kindIs "string" .Values.global.image.imagePullSecrets }}
          {{- $pullSecrets = append $pullSecrets .Values.global.image.imagePullSecrets }}
        {{- end }}
      {{- else if .Values.global.imagePullSecrets }}
        {{- if kindIs "string" .Values.global.imagePullSecrets }}
          {{- $pullSecrets = append $pullSecrets .Values.global.imagePullSecrets }}
        {{- else if kindIs "slice" .Values.global.imagePullSecrets }}
          {{- range .Values.global.imagePullSecrets }}
            {{- if kindIs "string" . }}
              {{- $pullSecrets = append $pullSecrets . }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if gt (len $pullSecrets) 0 }}
      imagePullSecrets:
        {{- range $pullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.securityHardening }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      volumes:
      - name: logs-volume
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      containers:
      - name: control-plane
        image: {{ include "trustgate.image" (dict "repository" .Values.global.image.image "tag" .Values.global.image.tag "global" .Values.global) | quote }}
        args: ["admin"]
        envFrom:
        - configMapRef:
            name: trustgate-env-vars
        {{- with .Values.controlPlane.extraEnvFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        env:
        # Sensitive values from secrets
        - name: SERVER_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: SERVER_SECRET_KEY
              optional: true
        - name: DATABASE_HOST
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_PORT
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_PASSWORD
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_NAME
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_URL
        - name: DATABASE_SSL_MODE
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: DATABASE_SSL_MODE
              optional: true
        # REDIS_PASSWORD is optional - can come from ConfigMap (trustgate-env-vars) or secret
        # If provided in secret, it will override ConfigMap value
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: redis-password
              optional: true
        - name: NEURAL_TRUST_FIREWALL_URL
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: NEURAL_TRUST_FIREWALL_URL
              optional: true
        - name: NEURAL_TRUST_FIREWALL_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: NEURAL_TRUST_FIREWALL_SECRET_KEY
              optional: true
        {{- with .Values.controlPlane.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "neuraltrust-platform.proxy-env" . | nindent 8 }}
        {{- if .Values.securityHardening }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        {{- end }}
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.controlPlane.ports.http }}
          name: http
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        - name: tmp
          mountPath: /tmp
        resources:
          {{- toYaml .Values.controlPlane.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
---
{{- $gkeBackendConfigName := include "neuraltrust-platform.service.gkeBackendConfigName" (dict "global" .Values.global "localName" "trustgate-control-plane-backendconfig") }}
{{- $gcp := default dict (default dict .Values.global.ingress).gcp }}
{{- if and .Values.ingress.enabled $gkeBackendConfigName (not $gcp.backendConfig) }}
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ $gkeBackendConfigName }}
spec:
  healthCheck:
    type: HTTP
    requestPath: /health
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: trustgate-control-plane
  labels:
    {{- include "trustgate.controlPlane.labels" . | nindent 4 }}
    component: control-plane
  {{- $negAnnotations := include "neuraltrust-platform.service.negAnnotations" (dict "global" .Values.global "backendConfigName" "trustgate-control-plane-backendconfig" "pscServiceKey" "trustgate-control-plane") }}
  {{- if $negAnnotations }}
  annotations:
    {{- $negAnnotations | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.controlPlane.ports.http }}
      protocol: TCP
      name: http
  selector:
    {{- include "trustgate.controlPlane.labels" . | nindent 4 }}
    component: control-plane
{{- $useRoutes := false }}
{{- if include "neuraltrust-platform.isOpenshift" . }}
  {{- $ingressEnabled := false }}
  {{- if and .Values.ingress (hasKey .Values.ingress "enabled") }}
    {{- if .Values.ingress.enabled }}
      {{- $ingressEnabled = true }}
    {{- end }}
  {{- end }}
  {{- if not $ingressEnabled }}
    {{- $useRoutes = true }}
  {{- end }}
{{- end }}
{{- if $useRoutes }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: trustgate-admin-route
  labels:
    {{- include "trustgate.controlPlane.labels" . | nindent 4 }}
    component: control-plane
spec:
  {{- $domain := include "neuraltrust-platform.domain" . }}
  host: {{ if $domain }}{{ printf "trustgate-admin.%s" $domain | quote }}{{ else }}"admin.neuraltrust.ai"{{ end }}
  to:
    kind: Service
    name: trustgate-control-plane
    weight: 100
  port:
    targetPort: http
  tls:
    {{- $tlsConfig := dict }}
    {{- if and .Values.controlPlane .Values.controlPlane.ingress .Values.controlPlane.ingress.tls }}
      {{- $tlsConfig = .Values.controlPlane.ingress.tls }}
    {{- end }}
    {{- $tlsSecretName := "" }}
    {{- $certFromSecret := "" }}
    {{- $keyFromSecret := "" }}
    {{- if $tlsConfig.secretName }}
      {{- $tlsSecretName = $tlsConfig.secretName }}
      {{- $tlsSecret := (lookup "v1" "Secret" $.Release.Namespace $tlsSecretName) }}
      {{- if $tlsSecret }}
        {{- if hasKey $tlsSecret.data "tls.crt" }}
          {{- $certFromSecret = index $tlsSecret.data "tls.crt" | b64dec }}
        {{- end }}
        {{- if hasKey $tlsSecret.data "tls.key" }}
          {{- $keyFromSecret = index $tlsSecret.data "tls.key" | b64dec }}
        {{- end }}
      {{- end }}
    {{- end }}
    termination: {{ if $tlsConfig.termination }}{{ $tlsConfig.termination }}{{ else }}edge{{ end }}
    {{- if $certFromSecret }}
    certificate: {{ $certFromSecret | quote }}
    {{- else if $tlsConfig.certificate }}
    certificate: {{ $tlsConfig.certificate | quote }}
    {{- end }}
    {{- if $keyFromSecret }}
    key: {{ $keyFromSecret | quote }}
    {{- else if $tlsConfig.key }}
    key: {{ $tlsConfig.key | quote }}
    {{- end }}
    {{- if $tlsConfig.caCertificate }}
    caCertificate: {{ $tlsConfig.caCertificate | quote }}
    {{- end }}
    {{- if $tlsConfig.destinationCACertificate }}
    destinationCACertificate: {{ $tlsConfig.destinationCACertificate | quote }}
    {{- end }}
    insecureEdgeTerminationPolicy: {{ if $tlsConfig.insecureEdgeTerminationPolicy }}{{ $tlsConfig.insecureEdgeTerminationPolicy }}{{ else }}Redirect{{ end }}
{{- end }} 