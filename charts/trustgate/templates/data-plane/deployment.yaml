apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustgate-data-plane
  labels:
    {{- include "trustgate.dataPlane.labels" . | nindent 4 }}
    component: data-plane
spec:
  replicas: {{ .Values.dataPlane.replicas }}
  selector:
    matchLabels:
      {{- include "trustgate.dataPlane.selectorLabels" . | nindent 6 }}
      component: data-plane
  template:
    metadata:
      labels:
        {{- include "trustgate.dataPlane.labels" . | nindent 8 }}
        component: data-plane
    spec:
      serviceAccountName: {{ include "trustgate.serviceAccountName" . }}
      {{- include "trustgate.imagePullSecrets" . | nindent 6 }}
      volumes:
      - name: logs-volume
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      {{- include "neuraltrust-platform.customCaCert.volume" . | nindent 6 }}
      {{- include "neuraltrust-platform.kafka.tlsVolume" . | nindent 6 }}
      {{- with .Values.dataPlane.extraVolumes }}
      {{- include "neuraltrust-platform.extraVolumes" (dict "items" .) | nindent 6 }}
      {{- end }}
      containers:
      - name: data-plane
        image: {{ include "trustgate.image" (dict "repository" .Values.global.image.image "tag" .Values.global.image.tag "global" .Values.global) | quote }}
        args: ["proxy"]
        envFrom:
        - configMapRef:
            name: trustgate-env-vars
        {{- with .Values.dataPlane.extraEnvFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        env:
        # Sensitive values from secrets
        - name: SERVER_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: SERVER_SECRET_KEY
        {{- include "trustgate.databaseEnv" . | nindent 8 }}
        # REDIS_PASSWORD is optional and sourced only from trustgate-secrets when configured
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: redis-password
              optional: true
        - name: NEURAL_TRUST_FIREWALL_URL
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: NEURAL_TRUST_FIREWALL_URL
              optional: true
        - name: NEURAL_TRUST_FIREWALL_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: trustgate-secrets
              key: NEURAL_TRUST_FIREWALL_SECRET_KEY
              optional: true
        {{- include "trustgate.kafkaEnv" . | nindent 8 }}
        {{- with .Values.dataPlane.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "neuraltrust-platform.proxy-env" . | nindent 8 }}
        {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "go" "ctx" .) | nindent 8 }}
        {{- include "neuraltrust-platform.appVersionEnv" (dict "tag" .Values.global.image.tag) | nindent 8 }}
        {{- if .Values.securityHardening }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        {{- end }}
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.dataPlane.ports.http }}
          name: http
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        - name: tmp
          mountPath: /tmp
        {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 8 }}
        {{- include "neuraltrust-platform.kafka.tlsVolumeMount" . | nindent 8 }}
        {{- with .Values.dataPlane.extraVolumeMounts }}
        {{- include "neuraltrust-platform.extraVolumeMounts" (dict "items" .) | nindent 8 }}
        {{- end }}
        resources:
          {{- toYaml .Values.dataPlane.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
      securityContext:
        {{- toYaml .Values.dataPlane.podSecurityContext | nindent 8 }}
      {{- include "neuraltrust-platform.nodeSelector" (dict "ctx" . "local" .Values.dataPlane.nodeSelector) | nindent 6 }}
      {{- with .Values.dataPlane.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" . "local" .Values.dataPlane.tolerations) | nindent 6 }}

---
{{- $gkeBackendConfigName := include "neuraltrust-platform.service.gkeBackendConfigName" (dict "global" .Values.global "localName" "trustgate-data-plane-backendconfig") }}
{{- $gcp := default dict (default dict .Values.global.ingress).gcp }}
{{- if and .Values.ingress.enabled $gkeBackendConfigName (not $gcp.backendConfig) }}
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ $gkeBackendConfigName }}
spec:
  healthCheck:
    type: HTTP
    requestPath: /health
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: trustgate-data-plane
  labels:
    {{- include "trustgate.dataPlane.labels" . | nindent 4 }}
    component: data-plane
  {{- $negAnnotations := include "neuraltrust-platform.service.negAnnotations" (dict "global" .Values.global "backendConfigName" "trustgate-data-plane-backendconfig" "pscServiceKey" "trustgate-data-plane") }}
  {{- if $negAnnotations }}
  annotations:
    {{- $negAnnotations | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.dataPlane.ports.http }}
      protocol: TCP
      name: http
  selector:
    {{- include "trustgate.dataPlane.labels" . | nindent 4 }}
    component: data-plane
{{- $useRoutes := false }}
{{- if include "neuraltrust-platform.isOpenshift" . }}
  {{- $ingressEnabled := false }}
  {{- if and .Values.ingress (hasKey .Values.ingress "enabled") }}
    {{- if .Values.ingress.enabled }}
      {{- $ingressEnabled = true }}
    {{- end }}
  {{- end }}
  {{- if not $ingressEnabled }}
    {{- $useRoutes = true }}
  {{- end }}
{{- end }}
{{- if $useRoutes }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: trustgate-gateway-route
  labels:
    {{- include "trustgate.dataPlane.labels" . | nindent 4 }}
    component: data-plane
spec:
  {{- $domain := include "neuraltrust-platform.domain" . }}
  host: {{ if $domain }}{{ printf "trustgate-gateway.%s" $domain | quote }}{{ else }}"gateway.neuraltrust.ai"{{ end }}
  to:
    kind: Service
    name: trustgate-data-plane
    weight: 100
  port:
    targetPort: http
  tls:
    {{- $tlsConfig := dict }}
    {{- if and .Values.dataPlane .Values.dataPlane.ingress .Values.dataPlane.ingress.tls }}
      {{- $tlsConfig = .Values.dataPlane.ingress.tls }}
    {{- end }}
    {{- $tlsSecretName := "" }}
    {{- $certFromSecret := "" }}
    {{- $keyFromSecret := "" }}
    {{- if $tlsConfig.secretName }}
      {{- $tlsSecretName = $tlsConfig.secretName }}
      {{- $tlsSecret := (lookup "v1" "Secret" $.Release.Namespace $tlsSecretName) }}
      {{- if $tlsSecret }}
        {{- if hasKey $tlsSecret.data "tls.crt" }}
          {{- $certFromSecret = index $tlsSecret.data "tls.crt" | b64dec }}
        {{- end }}
        {{- if hasKey $tlsSecret.data "tls.key" }}
          {{- $keyFromSecret = index $tlsSecret.data "tls.key" | b64dec }}
        {{- end }}
      {{- end }}
    {{- end }}
    termination: {{ if $tlsConfig.termination }}{{ $tlsConfig.termination }}{{ else }}edge{{ end }}
    {{- if $certFromSecret }}
    certificate: {{ $certFromSecret | quote }}
    {{- else if $tlsConfig.certificate }}
    certificate: {{ $tlsConfig.certificate | quote }}
    {{- end }}
    {{- if $keyFromSecret }}
    key: {{ $keyFromSecret | quote }}
    {{- else if $tlsConfig.key }}
    key: {{ $tlsConfig.key | quote }}
    {{- end }}
    {{- if $tlsConfig.caCertificate }}
    caCertificate: {{ $tlsConfig.caCertificate | quote }}
    {{- end }}
    {{- if $tlsConfig.destinationCACertificate }}
    destinationCACertificate: {{ $tlsConfig.destinationCACertificate | quote }}
    {{- end }}
    insecureEdgeTerminationPolicy: {{ if $tlsConfig.insecureEdgeTerminationPolicy }}{{ $tlsConfig.insecureEdgeTerminationPolicy }}{{ else }}Redirect{{ end }}
{{- end }} 