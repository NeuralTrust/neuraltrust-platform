apiVersion: v1
kind: ConfigMap
metadata:
  name: trustgate-env-vars
  labels:
    {{- include "trustgate.labels" . | nindent 4 }}
data:
  {{- /* SERVER_BASE_DOMAIN: Use global.env.SERVER_BASE_DOMAIN, config.baseDomain, platform domain, or default */}}
  {{- $baseDomain := "" }}
  {{- $platformDomain := include "neuraltrust-platform.domain" . }}
  {{- if .Values.global.env.SERVER_BASE_DOMAIN }}
    {{- $baseDomain = .Values.global.env.SERVER_BASE_DOMAIN }}
  {{- else if .Values.config.baseDomain }}
    {{- $baseDomain = .Values.config.baseDomain }}
  {{- else if $platformDomain }}
    {{- $baseDomain = $platformDomain }}
  {{- else }}
    {{- $baseDomain = "neuraltrust.ai" }}
  {{- end }}
  SERVER_BASE_DOMAIN: {{ $baseDomain | quote }}
  SERVER_ADMIN_PORT: "8080"
  SERVER_METRICS_PORT: "9090"
  SERVER_PROXY_PORT: "8081"
  SERVER_ACTIONS_PORT: "8084"
  {{- /*
    Telemetry routing.

    OPENTELEMETRY_ENABLED is the master switch (legacy default: off).
    Operators can flip every component to the in-chart collector by
    setting global.observability.collector.endpoint at the umbrella level.
    When set, TrustGate auto-enables OTLP and points at it; otherwise the
    legacy off-by-default behavior is preserved exactly.
  */ -}}
  {{- $tgGlobalObs := default dict (default dict .Values.global).observability -}}
  {{- $tgGlobalColl := default dict $tgGlobalObs.collector -}}
  {{- /*
    These are the only env names TrustGate-EE reads — see
    TrustGate-EE/internal/config/config.go. The earlier
    OPENTELEMETRY_ENDPOINT / OPENTELEMETRY_OTLP_ENDPOINT keys were never
    consumed by the binary and have been removed.
  */}}
  {{- if $tgGlobalColl.endpoint }}
  OPENTELEMETRY_ENABLED: "true"
  OPENTELEMETRY_INSECURE: "true"
  OPENTELEMETRY_TRACES_ENDPOINT: {{ $tgGlobalColl.endpoint | quote }}
  OPENTELEMETRY_METRICS_ENDPOINT: {{ $tgGlobalColl.endpoint | quote }}
  {{- else }}
  OPENTELEMETRY_ENABLED: "false"
  OPENTELEMETRY_INSECURE: "true"
  {{- end }}
  # Redis configuration
  {{- if .Values.redis.enabled }}
  # Internal Redis - use default service name and no password
  REDIS_HOST: trustgate-redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  {{- else }}
  # External Redis - use values from global.env or redis.external.
  # All values are quoted: ConfigMap `data` must be map[string]string, so an
  # unquoted numeric port/db is rejected by the API server with
  # "json: cannot unmarshal number into Go struct field ConfigMap.data".
  REDIS_HOST: {{ .Values.global.env.REDIS_HOST | default .Values.redis.external.host | default "trustgate-redis" | quote }}
  REDIS_PORT: {{ .Values.global.env.REDIS_PORT | default .Values.redis.external.port | default "6379" | quote }}
  REDIS_DB: {{ .Values.global.env.REDIS_DB | default "0" | quote }}
  {{- /* TLS + ACL username passthrough for Redis 6+ / managed services
         (e.g. TLS-only external Redis with AUTH username password). */}}
  {{- $redisTLS := .Values.global.env.REDIS_TLS | default .Values.redis.external.tls }}
  {{- if and $redisTLS (ne ($redisTLS | toString) "") }}
  REDIS_TLS: {{ $redisTLS | quote }}
  {{- end }}
  {{- $redisUsername := .Values.global.env.REDIS_USERNAME | default .Values.redis.external.username }}
  {{- if and $redisUsername (ne ($redisUsername | toString) "") }}
  REDIS_USERNAME: {{ $redisUsername | quote }}
  {{- end }}
  {{- $redisAuthMode := .Values.global.env.REDIS_AUTH_MODE | default .Values.redis.external.authMode }}
  {{- if and $redisAuthMode (ne ($redisAuthMode | toString) "") }}
  REDIS_AUTH_MODE: {{ $redisAuthMode | quote }}
  REDIS_IAM_AUTH: {{ ternary "true" "false" (eq ($redisAuthMode | toString) "iam") | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.global.env .Values.global.env.UPSTREAM_READ_TIMEOUT (ne .Values.global.env.UPSTREAM_READ_TIMEOUT "") }}
  UPSTREAM_READ_TIMEOUT: {{ .Values.global.env.UPSTREAM_READ_TIMEOUT | quote }}
  {{- end }}
  {{- if and .Values.global.env .Values.global.env.UPSTREAM_WRITE_TIMEOUT (ne .Values.global.env.UPSTREAM_WRITE_TIMEOUT "") }}
  UPSTREAM_WRITE_TIMEOUT: {{ .Values.global.env.UPSTREAM_WRITE_TIMEOUT | quote }}
  {{- end }}
  {{- if and .Values.global.env .Values.global.env.UPSTREAM_STREAM_TIMEOUT (ne .Values.global.env.UPSTREAM_STREAM_TIMEOUT "") }}
  UPSTREAM_STREAM_TIMEOUT: {{ .Values.global.env.UPSTREAM_STREAM_TIMEOUT | quote }}
  {{- end }}
  {{- if and .Values.global.env .Values.global.env.UPSTREAM_PROVIDER_TIMEOUT (ne .Values.global.env.UPSTREAM_PROVIDER_TIMEOUT "") }}
  UPSTREAM_PROVIDER_TIMEOUT: {{ .Values.global.env.UPSTREAM_PROVIDER_TIMEOUT | quote }}
  {{- end }}
  CONTROL_PLANE_HOST: trustgate-control-plane
  DATA_PLANE_HOST: trustgate-data-plane
  ACTIONS_HOST: trustgate-actions
