{{- if .Values.ingress.enabled }}
{{- $cpHost := include "neuraltrust-platform.ingress.host" (dict "host" .Values.ingress.controlPlane.host "prefix" .Values.ingress.controlPlane.hostPrefix "global" .Values.global) }}
{{- $dpHost := include "neuraltrust-platform.ingress.host" (dict "host" .Values.ingress.dataPlane.host "prefix" .Values.ingress.dataPlane.hostPrefix "global" .Values.global) }}
{{- $actHost := include "neuraltrust-platform.ingress.host" (dict "host" .Values.ingress.actions.host "prefix" .Values.ingress.actions.hostPrefix "global" .Values.global) }}
# Control Plane Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trustgate-admin
  labels:
    {{- include "trustgate.labels" . | nindent 4 }}
    component: control-plane
  {{- $annotations := include "neuraltrust-platform.ingress.annotations" (dict "global" .Values.global "local" .Values.ingress.annotations) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- $className := include "neuraltrust-platform.ingress.className" (dict "global" .Values.global "local" .Values.ingress.className) }}
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if and .Values.ingress.tls .Values.ingress.tls.enabled (include "neuraltrust-platform.ingress.renderTLS" (dict "global" .Values.global "tlsEnabled" .Values.ingress.tls.enabled)) }}
  tls:
    - secretName: {{ include "neuraltrust-platform.ingress.effectiveTLSSecretName" (dict "global" .Values.global "localSecretName" .Values.ingress.tls.secretName) }}
      {{- if $cpHost }}
      hosts:
        - {{ $cpHost }}
      {{- end }}
  {{- end }}
  rules:
    - {{- if $cpHost }}
      host: {{ $cpHost }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trustgate-control-plane
                port:
                  name: http
---
# Data Plane Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trustgate-gateway
  labels:
    {{- include "trustgate.labels" . | nindent 4 }}
    component: data-plane
  {{- $annotations := include "neuraltrust-platform.ingress.annotations" (dict "global" .Values.global "local" .Values.ingress.annotations) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- $className := include "neuraltrust-platform.ingress.className" (dict "global" .Values.global "local" .Values.ingress.className) }}
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if and .Values.ingress.tls .Values.ingress.tls.enabled (include "neuraltrust-platform.ingress.renderTLS" (dict "global" .Values.global "tlsEnabled" .Values.ingress.tls.enabled)) }}
  tls:
    - secretName: {{ include "neuraltrust-platform.ingress.effectiveTLSSecretName" (dict "global" .Values.global "localSecretName" .Values.ingress.tls.secretName) }}
      {{- if $dpHost }}
      hosts:
        - {{ $dpHost }}
      {{- end }}
  {{- end }}
  rules:
    - {{- if $dpHost }}
      host: {{ $dpHost }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trustgate-data-plane
                port:
                  name: http

---
# Actions Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trustgate-actions
  labels:
    {{- include "trustgate.labels" . | nindent 4 }}
    component: actions
  {{- $annotations := include "neuraltrust-platform.ingress.annotations" (dict "global" .Values.global "local" .Values.ingress.annotations) }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- $className := include "neuraltrust-platform.ingress.className" (dict "global" .Values.global "local" .Values.ingress.className) }}
  {{- if $className }}
  ingressClassName: {{ $className }}
  {{- end }}
  {{- if and .Values.ingress.tls .Values.ingress.tls.enabled (include "neuraltrust-platform.ingress.renderTLS" (dict "global" .Values.global "tlsEnabled" .Values.ingress.tls.enabled)) }}
  tls:
    - secretName: {{ include "neuraltrust-platform.ingress.effectiveTLSSecretName" (dict "global" .Values.global "localSecretName" .Values.ingress.tls.secretName) }}
      {{- if $actHost }}
      hosts:
        - {{ $actHost }}
      {{- end }}
  {{- end }}
  rules:
    - {{- if $actHost }}
      host: {{ $actHost }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trustgate-actions
                port:
                  name: http
{{- end }}
