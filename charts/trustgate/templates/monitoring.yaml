{{- /*
  PrometheusRule + PodMonitor for TrustGate (gateway).

  Both gates: global.monitoring.enabled AND the cluster ships
  monitoring.coreos.com/v1. If either is missing the file renders to
  empty — install/upgrade still succeeds on clusters without the
  Prometheus Operator.

  TrustGate's metrics port (SERVER_METRICS_PORT=9090) is NOT exposed via
  the data-plane Service today, so the PodMonitor targets the container
  port directly.
*/}}
{{- $g := default dict .Values.global -}}
{{- $m := default dict $g.monitoring -}}
{{- $cap := .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" -}}
{{- if and $m.enabled $cap -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: trustgate-data-plane
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trustgate.dataPlane.labels" . | nindent 4 }}
    {{- with $m.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "trustgate.dataPlane.selectorLabels" . | nindent 6 }}
      component: data-plane
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ default "30s" $m.interval }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: trustgate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trustgate.labels" . | nindent 4 }}
    {{- with $m.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: trustgate
      interval: 1m
      rules:
        - alert: TrustGateDataPlaneDown
          expr: |
            sum(kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}",deployment="trustgate-data-plane"}) == 0
          for: 5m
          labels:
            severity: critical
            {{- with $m.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "TrustGate data-plane has no ready replicas"
            description: "All trustgate-data-plane pods are unavailable. Customer traffic to the AI gateway is failing. Check pod events and recent rollouts."
        - alert: TrustGateControlPlaneDown
          expr: |
            sum(kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}",deployment="trustgate-control-plane"}) == 0
          for: 10m
          labels:
            severity: warning
            {{- with $m.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "TrustGate control-plane has no ready replicas"
            description: "Plugin/route updates won't propagate while this is down."
        - alert: TrustGateRedisDown
          expr: |
            sum(kube_statefulset_status_replicas_ready{namespace="{{ .Release.Namespace }}",statefulset="trustgate-redis"}) == 0
          for: 5m
          labels:
            severity: critical
            {{- with $m.alertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: "TrustGate Redis is unavailable"
            description: "TrustGate caches and per-route state live in Redis. Without it the gateway degrades to no caching and may fail rate-limit checks."
{{- end }}
