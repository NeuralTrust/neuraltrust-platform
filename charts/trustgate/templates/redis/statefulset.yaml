apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: trustgate-redis
  labels:
    {{- include "trustgate.labels" . | nindent 4 }}
    component: redis
spec:
  serviceName: trustgate-redis
  replicas: {{ .Values.redis.replica.replicaCount }}
  selector:
    matchLabels:
      {{- include "trustgate.selectorLabels" . | nindent 6 }}
      component: redis
  template:
    metadata:
      labels:
        {{- include "trustgate.selectorLabels" . | nindent 8 }}
        component: redis
    spec:
      {{- /* Redis pull secrets:
             1. .Values.redis.image.imagePullSecrets (per-component override, highest priority)
             2. fall back to the trustgate-wide cascade (global.image.imagePullSecrets, global.imagePullSecrets)
             Lets parent set a single trustgate.global.imagePullSecrets / .image.imagePullSecrets
             and have it apply to redis without an explicit redis.image override. */}}
      {{- if .Values.redis.image.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.redis.image.imagePullSecrets }}
        {{- if kindIs "string" . }}
        - name: {{ . }}
        {{- else }}
        - name: {{ .name | default . }}
        {{- end }}
        {{- end }}
      {{- else }}
      {{- include "trustgate.imagePullSecrets" . | nindent 6 }}
      {{- end }}
      {{- if .Values.securityHardening }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      containers:
      - name: redis
        image: {{ include "trustgate.image" (dict "repository" .Values.redis.image.repository "tag" .Values.redis.image.tag "global" .Values.global) | quote }}
        imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
        {{- if .Values.securityHardening }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        {{- end }}
        {{- /* RediSearch is loaded via `loadmodule /opt/redis-stack/lib/redisearch.so` in the
               trustgate-redis ConfigMap (the canonical module path inside redis/redis-stack-server).
               This used to pass `--loadmodule /usr/lib/redis/modules/redisearch.so` here — that
               path only exists in the DEPRECATED redislabs/redisearch image. */}}
        command: ["redis-server"]
        args:
        - /etc/redis/redis.conf
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: redis-config
          mountPath: /etc/redis
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          tcpSocket:
            port: redis
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: redis
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.redis.master.resources | nindent 10 }}
      volumes:
      - name: tmp
        emptyDir: {}
      - name: redis-config
        configMap:
          name: trustgate-redis
          items:
          - key: redis.conf
            path: redis.conf
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- if .Values.global.storageClass }}
      storageClassName: {{ .Values.global.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.redis.master.persistence.size }} 