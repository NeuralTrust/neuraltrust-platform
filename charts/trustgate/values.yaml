securityHardening: true # Adds readOnlyRootFilesystem, drops capabilities, seccomp profile. Set to false to restore prior behavior.
# Additional global settings
global:
  version: "ee" # can be "ce" or "ee"
  imageRegistry: "docker.io"
  imagePullSecrets:
    - name: gcr-secret
  # -- Storage class to use for persistent volumes
  # If not set, will use the cluster's default StorageClass
  storageClass: ""
  deploymentType: shared # shared or dedicated
  huggingface:
    apiKeySecret: "hf-api-key"
  image:
    pullPolicy: Always
    image: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/trustgate-ee"
    repository: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/trustgate-ee"
    tag: "v1.28.4"
  env:
    SERVER_SECRET_KEY: ${SERVER_SECRET_KEY}
    SERVER_BASE_DOMAIN: ${SERVER_BASE_DOMAIN:-neuraltrust.ai}
    SERVER_ADMIN_PORT: ${SERVER_ADMIN_PORT:-8080}
    SERVER_METRICS_PORT: ${SERVER_METRICS_PORT:-9090}
    SERVER_PROXY_PORT: ${SERVER_PROXY_PORT:-8081}
    SERVER_ACTIONS_PORT: ${SERVER_ACTIONS_PORT:-8084}
    DATABASE_HOST: ${DATABASE_HOST}
    DATABASE_PORT: ${DATABASE_PORT}
    DATABASE_USER: ${DATABASE_USER}
    DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    DATABASE_NAME: ${DATABASE_NAME}
    REDIS_HOST: ${REDIS_HOST}
    REDIS_PORT: ${REDIS_PORT}
    REDIS_PASSWORD: ${REDIS_PASSWORD}
    REDIS_DB: ${REDIS_DB}
    CONTROL_PLANE_HOST: ${CONTROL_PLANE_HOST}
    DATA_PLANE_HOST: ${DATA_PLANE_HOST}
    ACTIONS_HOST: ${ACTIONS_HOST}
    # Optional upstream HTTP timeouts (e.g. 300s). Omit or leave empty for TrustGate defaults.
    UPSTREAM_READ_TIMEOUT: ${UPSTREAM_READ_TIMEOUT:-}
    UPSTREAM_WRITE_TIMEOUT: ${UPSTREAM_WRITE_TIMEOUT:-}
    UPSTREAM_STREAM_TIMEOUT: ${UPSTREAM_STREAM_TIMEOUT:-}
    UPSTREAM_PROVIDER_TIMEOUT: ${UPSTREAM_PROVIDER_TIMEOUT:-}
# Service Account configuration
serviceAccount:
  create: true
  name: "trustgate"
  annotations: {}
# Common configurations
config:
  logLevel: "info"
  baseDomain: "neuraltrust.ai"
  providers: {}
# postgresqlInit.resources: optional override for postgresql-init Job container (default: requests 250m/64Mi, limits 500m/128Mi)
# postgresqlInit:
#   resources:
#     requests: { cpu: 250m, memory: 64Mi }
#     limits: { cpu: 500m, memory: 128Mi }

# Optional pre-existing Secret containing only TrustGate PostgreSQL connection
# fields. The chart still renders trustgate-secrets and can auto-generate
# SERVER_SECRET_KEY and optional integration keys when the parent chart manages
# secrets.
postgresql:
  existingSecret: ""
  existingSecretKeys:
    host: DATABASE_HOST
    port: DATABASE_PORT
    user: DATABASE_USER
    password: DATABASE_PASSWORD
    database: DATABASE_NAME
    sslMode: DATABASE_SSL_MODE
    authMode: DATABASE_AUTH_MODE
  # passwordSecretRef: keep ONLY the database password in a pre-existing Secret
  # (e.g. synced by external-secrets / Secrets Store CSI) and put host, port,
  # user, database and sslMode in values (global.env.DATABASE_*). Set both name
  # and key to activate this mode; leaving either empty keeps the default
  # lookup-and-copy behavior. When active:
  #   * the chart never reads or copies the password — TrustGate containers
  #     reference it directly via secretKeyRef -> {name, key}, so rotating the
  #     source Secret applies without re-running Helm and the password is never
  #     lookup'd at render time;
  #   * DATABASE_URL is omitted entirely. TrustGate connects using the individual
  #     DATABASE_* vars (see TrustGate pkg/config/config.go) and never reads
  #     DATABASE_URL, so the password is never embedded in a chart object.
  passwordSecretRef:
    name: ""
    key: ""
# Control Plane settings
controlPlane:
  name: trustgate-control-plane
  replicas: 1
  ports:
    http: 8080
  podSecurityContext:
    fsGroup: 1001
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 500m
      memory: 2Gi
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - trustgate-control-plane
            topologyKey: kubernetes.io/hostname
  service:
    type: ClusterIP
    port: 8080
  # Extra env vars appended to the control-plane container (list of EnvVar).
  extraEnv: []
  # Extra envFrom sources appended alongside trustgate-env-vars (list of EnvFromSource: configMapRef/secretRef).
  extraEnvFrom: []
# Data Plane settings
dataPlane:
  name: trustgate-data-plane
  replicas: 1
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  # Add ports configuration
  ports:
    http: 8081
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 20
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 75
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - trustgate-data-plane
          topologyKey: kubernetes.io/hostname
  service:
    type: ClusterIP
    port: 8081
  # Extra env vars appended to the data-plane container (list of EnvVar).
  extraEnv: []
  # Extra envFrom sources appended alongside trustgate-env-vars (list of EnvFromSource: configMapRef/secretRef).
  extraEnvFrom: []
# Actions settings
actions:
  name: trustgate-actions
  replicas: 1
  ports:
    http: 8084
  podSecurityContext:
    fsGroup: 1001
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 500m
      memory: 2Gi
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - trustgate-actions
            topologyKey: kubernetes.io/hostname
  service:
    type: ClusterIP
    port: 8084
  # Extra env vars appended to the actions container (list of EnvVar).
  extraEnv: []
  # Extra envFrom sources appended alongside trustgate-env-vars (list of EnvFromSource: configMapRef/secretRef).
  extraEnvFrom: []
# Redis configuration
redis:
  enabled: true
  # Redis `bind` directive (Redis 7.0+ syntax: prefix address with `-` to make it
  # optional — Redis skips it instead of aborting when the socket cannot be created).
  # Default `0.0.0.0 -::` binds IPv4 wildcard (required) and IPv6 wildcard
  # (optional, skipped on IPv4-only nodes such as AWS EKS where `::` would bind
  # a socket that rejects IPv4 probe connections).
  # Override to `::` for IPv6-only clusters (no IPv4 addresses on pods).
  bind: "0.0.0.0 -::"
  image:
    repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/redis-stack-server
    tag: 7.2.0-v20
    pullPolicy: IfNotPresent
  # External Redis configuration if redis.enabled is false
  # When using external Redis, set trustgate.global.env.REDIS_HOST, REDIS_PORT, and REDIS_PASSWORD
  external:
    host: "" # External Redis host (set via trustgate.global.env.REDIS_HOST when redis.enabled=false)
    port: 6379 # External Redis port (set via trustgate.global.env.REDIS_PORT when redis.enabled=false)
    password: "" # External Redis password (set via trustgate.global.env.REDIS_PASSWORD when redis.enabled=false)
    username: "" # Optional Redis 6+ ACL username (AUTH username password). Emits REDIS_USERNAME. Also settable via trustgate.global.env.REDIS_USERNAME
    tls: "" # Set "true" for TLS-only external Redis (e.g. managed serverless Redis). Emits REDIS_TLS_ENABLED (the var TrustGate reads). Also settable via trustgate.global.env.REDIS_TLS_ENABLED
    tlsInsecureVerify: "" # Set "true" to skip Redis server-cert verification (self-signed). Emits REDIS_TLS_INSECURE_VERIFY. Also settable via trustgate.global.env.REDIS_TLS_INSECURE_VERIFY
    authMode: "password" # password | iam. IAM requires app support for SigV4 token generation.
  master:
    service:
      port: 6379
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  replica:
    replicaCount: 1
    service:
      port: 6379
# Default values for TrustGate
ingress:
  enabled: true
  className: "" # Leave empty to use global.ingress.className
  annotations: {} # Per-service annotations (merged with global.ingress.annotations and AWS auto-generated annotations)
  controlPlane:
    host: "" # Optional: full hostname override. Empty = auto-derive as <hostPrefix>.<global.domain> when both are set.
    hostPrefix: "admin" # Default subdomain prefix when host is empty. Set to "" to disable auto-derive.
  dataPlane:
    host: "" # Optional: full hostname override. Empty = auto-derive as <hostPrefix>.<global.domain> when both are set.
    hostPrefix: "gateway" # Default subdomain prefix when host is empty. Set to "" to disable auto-derive.
  actions:
    host: "" # Optional: full hostname override. Empty = auto-derive as <hostPrefix>.<global.domain> when both are set.
    hostPrefix: "actions" # Default subdomain prefix when host is empty. Set to "" to disable auto-derive.
# Optional: Add cert-manager configuration
certManager:
  enabled: true
  issuerName: "letsencrypt-prod"
  issuerKind: "ClusterIssuer" # Can be "Issuer" or "ClusterIssuer"
  email: "admin@neuraltrust.ai"
  # Custom certificate support for both planes
  customCertificates:
    enabled: false # Set to true when using custom certs
    controlPlane:
      cert: |
        -----BEGIN CERTIFICATE-----
        -----END CERTIFICATE-----
      key: |
        -----BEGIN PRIVATE KEY-----
        -----END PRIVATE KEY-----
    dataPlane:
      cert: |
        -----BEGIN CERTIFICATE-----
        -----END CERTIFICATE-----
      key: |
        -----BEGIN PRIVATE KEY-----
        -----END PRIVATE KEY-----
