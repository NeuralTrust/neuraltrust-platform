{{- if eq (include "trustguard.enabled" .) "true" }}
{{- /*
Config-sync gRPC listener TLS for the TrustGuard control plane (external/full,
deployed APP_ENV). Auto-generates a self-signed CA + server certificate whose
SANs cover the control-plane Service DNS names, so the in-cluster data plane can
dial the listener with real TLS verification. Preserved across upgrades via
lookup (never rotated) and carries resource-policy: keep.

Skipped when:
  - config-sync TLS is not required (see trustguard.configSyncTls.active), OR
  - an operator supplies configSync.grpcTls.existingSecret, OR
  - global.preserveExistingSecrets=true (secrets are pre-provisioned).
*/ -}}
{{- if eq (include "trustguard.configSyncTls.active" .) "true" }}
{{- $tls := (default dict .Values.configSync).grpcTls | default dict }}
{{- $preserve := and .Values.global .Values.global.preserveExistingSecrets }}
{{- if and (not ($tls.existingSecret | default "")) (ne ($tls.autoGenerate | default true) false) (not $preserve) }}
{{- $name := include "trustguard.configSyncTls.secretName" . }}
{{- $days := int ($tls.durationDays | default 3650) }}
{{- $cn := include "trustguard.configSyncTls.serverName" . }}
{{- $svc := .Values.controlPlane.name }}
{{- $ns := .Release.Namespace }}
{{- $altNames := list $svc (printf "%s.%s" $svc $ns) (printf "%s.%s.svc" $svc $ns) $cn }}
{{- $crt := "" }}
{{- $key := "" }}
{{- $ca := "" }}
{{- $existing := lookup "v1" "Secret" $ns $name }}
{{- if and $existing $existing.data }}
  {{- if hasKey $existing.data "tls.crt" }}{{- $crt = index $existing.data "tls.crt" }}{{- end }}
  {{- if hasKey $existing.data "tls.key" }}{{- $key = index $existing.data "tls.key" }}{{- end }}
  {{- if hasKey $existing.data "ca.crt" }}{{- $ca = index $existing.data "ca.crt" }}{{- end }}
{{- end }}
{{- if not (and $crt $key $ca) }}
  {{- $caCert := genCA "trustguard-configsync-ca" $days }}
  {{- $cert := genSignedCert $cn nil $altNames $days $caCert }}
  {{- $crt = $cert.Cert | b64enc }}
  {{- $key = $cert.Key | b64enc }}
  {{- $ca = $caCert.Cert | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "trustguard.labels" . | nindent 4 }}
    app.kubernetes.io/component: configsync-tls
  annotations:
    helm.sh/resource-policy: keep
type: kubernetes.io/tls
data:
  tls.crt: {{ $crt | quote }}
  tls.key: {{ $key | quote }}
  ca.crt: {{ $ca | quote }}
{{- end }}
{{- end }}
{{- end }}
