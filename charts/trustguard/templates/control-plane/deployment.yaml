{{- if and (eq (include "neuraltrust-platform.isV2" .) "true") (eq (include "neuraltrust-platform.isFull" .) "true") }}
{{- $img := include "trustguard.image" (dict "repository" .Values.image.repository "tag" .Values.image.tag "global" .Values.global) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.controlPlane.name }}
  labels:
    {{- include "trustguard.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      {{- include "trustguard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "trustguard.labels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: {{ include "trustguard.serviceAccountName" . }}
      {{- include "trustguard.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.securityHardening }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      - name: telemetry
        configMap:
          name: trustguard-telemetry
          optional: true
      {{- if eq (include "trustguard.configSyncTls.active" .) "true" }}
      - name: configsync-tls
        secret:
          secretName: {{ include "trustguard.configSyncTls.secretName" . }}
      {{- end }}
      {{- include "neuraltrust-platform.customCaCert.volume" . | nindent 6 }}
      containers:
      - name: control-plane
        image: {{ $img | quote }}
        args: {{ toJson .Values.controlPlane.args }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        envFrom:
        - configMapRef:
            name: trustguard-env-vars
        - secretRef:
            name: trustguard-secrets
        env:
        {{- with .Values.controlPlane.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if eq (include "trustguard.configSyncTls.active" .) "true" }}
        - name: CONFIG_SYNC_GRPC_TLS_CERT
          value: {{ printf "%s/tls.crt" (include "trustguard.configSyncTls.mountPath" .) | quote }}
        - name: CONFIG_SYNC_GRPC_TLS_KEY
          value: {{ printf "%s/tls.key" (include "trustguard.configSyncTls.mountPath" .) | quote }}
        {{- end }}
        {{- include "neuraltrust-platform.trustguardClientEnv" (dict "ctx" . "idVar" "TRUSTGUARD_PLATFORM_CLIENT_ID" "secretVar" "TRUSTGUARD_PLATFORM_CLIENT_SECRET") | nindent 8 }}
        {{- include "neuraltrust-platform.proxy-env" . | nindent 8 }}
        {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "go" "ctx" .) | nindent 8 }}
        {{- include "neuraltrust-platform.configSyncTokenEnv" . | nindent 8 }}
        {{- include "neuraltrust-platform.appVersionEnv" (dict "tag" .Values.image.tag) | nindent 8 }}
        {{- if and (eq (include "neuraltrust-platform.clickstackHybridEnabled" .) "true") (eq (include "neuraltrust-platform.clickstack.usesExistingSecret" .) "true") }}
        {{- include "neuraltrust-platform.clickstack.otlpHeadersEnv" . | nindent 8 }}
        {{- else if eq (include "neuraltrust-platform.isExternal" .) "true" }}
        {{- include "neuraltrust-platform.clickstack.externalOtlpHeadersEnv" . | nindent 8 }}
        {{- end }}
        {{- $fw := default dict .Values.firewall }}
        {{- if $fw.enabled }}
        {{- $fwSecret := default dict $fw.existingSecret }}
        - name: NEURAL_TRUST_FIREWALL_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ $fwSecret.name | default "firewall-secrets" | quote }}
              key: {{ $fwSecret.key | default "JWT_SECRET" | quote }}
        {{- end }}
        {{- if .Values.securityHardening }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        {{- end }}
        ports:
        - containerPort: {{ .Values.controlPlane.ports.http }}
          name: http
        {{- with .Values.controlPlane.ports.grpc }}
        - containerPort: {{ . }}
          name: grpc
        {{- end }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: telemetry
          mountPath: /etc/telemetry
          readOnly: true
        {{- if eq (include "trustguard.configSyncTls.active" .) "true" }}
        - name: configsync-tls
          mountPath: {{ include "trustguard.configSyncTls.mountPath" . | quote }}
          readOnly: true
        {{- end }}
        {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 8 }}
        resources:
          {{- toYaml .Values.controlPlane.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
      {{- include "neuraltrust-platform.nodeSelector" (dict "ctx" . "local" .Values.controlPlane.nodeSelector) | nindent 6 }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" . "local" .Values.controlPlane.tolerations) | nindent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.controlPlane.name }}
  labels:
    {{- include "trustguard.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
  {{- $negAnnotations := include "neuraltrust-platform.service.negAnnotations" (dict "global" .Values.global "pscServiceKey" "trustguard-control-plane") }}
  {{- with $negAnnotations }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.controlPlane.service.type | default "ClusterIP" }}
  ports:
    - port: 80
      targetPort: {{ .Values.controlPlane.ports.http }}
      protocol: TCP
      name: http
    {{- with .Values.controlPlane.ports.grpc }}
    - port: {{ . }}
      targetPort: {{ . }}
      protocol: TCP
      name: grpc
    {{- end }}
  selector:
    {{- include "trustguard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
{{- end }}
