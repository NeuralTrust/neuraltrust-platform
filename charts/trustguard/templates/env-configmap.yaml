{{- if eq (include "trustguard.enabled" .) "true" }}
{{- $isHybrid := eq (include "neuraltrust-platform.isHybrid" .) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: trustguard-env-vars
  labels:
    {{- include "trustguard.labels" . | nindent 4 }}
{{- /*
TRUSTGUARD_BASE_URL is the audience (`aud`) stamped on platform-scope tokens and
validated on /v1/evaluate — it just has to be a stable, non-empty string that is
identical to what this data plane both signs and checks. Derive it from
global.domain (https://trustguard.<domain>) when set, else fall back to the
in-cluster Service URL so it is never empty when a platform client is configured
(TrustGuard refuses to boot with a platform client but no base URL). Override
.Values.platform.baseURL only for a bespoke public audience.
*/}}
{{- $tgAud := .Values.platform.baseURL }}
{{- if not $tgAud }}
  {{- $domain := include "neuraltrust-platform.domain" . }}
  {{- if $domain }}
    {{- $tgAud = printf "https://trustguard.%s" $domain }}
  {{- else }}
    {{- $tgAud = printf "http://trustguard-data-plane.%s.svc.cluster.local" .Release.Namespace }}
  {{- end }}
{{- end }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  APP_ENV: {{ .Values.config.appEnv | quote }}
  # Control plane listens on SERVER_PORT; data plane on SERVER_DATA_PORT. Both
  # are set so either plane boots correctly from the shared env (they must differ).
  SERVER_PORT: {{ .Values.controlPlane.ports.http | quote }}
  SERVER_DATA_PORT: {{ .Values.dataPlane.ports.http | quote }}
  {{- if $isHybrid }}
  # v2 hybrid: DB_HOST/DB_PORT/DB_USER/DB_NAME/DB_PASSWORD/DB_SSL_MODE arrive
  # through the shared `postgresql-secrets` Secret (via envFrom on the Deployment).
  # A single `neuraltrust` role owns the shared `neuraltrust` database.
  {{- $cachePubSub := true }}
  {{- if hasKey .Values.redis "enableCachePubSub" }}{{- $cachePubSub = .Values.redis.enableCachePubSub }}{{- end }}
  ENABLE_CACHE_PUBSUB: {{ $cachePubSub | quote }}
  {{- else }}
  # v2 external: each service points at its own PostgreSQL role/database. Host
  # defaults to the in-cluster `control-plane-postgresql` Service; override
  # `.Values.database.host` for hosted/managed PostgreSQL.
  DB_HOST: {{ include "neuraltrust-platform.postgres.host" (dict "host" .Values.database.host) | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
  DB_NAME: {{ include "neuraltrust-platform.v2.dbName" (dict "ctx" . "explicit" .Values.database.name "external" "trustguard") | quote }}
  DB_USER: {{ include "neuraltrust-platform.v2.writerUser" (dict "ctx" . "explicit" .Values.database.user "default" "trustguard") | quote }}
  DB_SSL_MODE: {{ .Values.database.sslMode | quote }}
  {{- if .Values.database.iamAuth }}
  # IAM (RDS) DB auth: no static DB_PASSWORD is shipped; the service mints a token.
  DB_IAM_AUTH: "true"
  DB_AUTH_MODE: "iam"
  POSTGRES_LOGIN: "aws"
  {{- end }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  {{- $cachePubSub := true }}
  {{- if hasKey .Values.redis "enableCachePubSub" }}{{- $cachePubSub = .Values.redis.enableCachePubSub }}{{- end }}
  ENABLE_CACHE_PUBSUB: {{ $cachePubSub | quote }}
  {{- if and .Values.redis.username (ne (.Values.redis.username | toString) "") }}
  REDIS_USERNAME: {{ .Values.redis.username | quote }}
  {{- end }}
  {{- if and .Values.redis.tls (ne (.Values.redis.tls | toString) "") }}
  # TLS-only managed Redis (e.g. ElastiCache Serverless enforces in-transit encryption).
  REDIS_TLS: {{ .Values.redis.tls | quote }}
  {{- end }}
  {{- if .Values.redis.iamAuth }}
  # IAM (ElastiCache) Redis auth: TrustGuard mints a SigV4 token at connect time
  # (REDIS_LOGIN=aws). No static REDIS_PASSWORD is shipped.
  REDIS_IAM_AUTH: "true"
  REDIS_LOGIN: "aws"
  {{- if and .Values.redis.cacheName (ne (.Values.redis.cacheName | toString) "") }}
  REDIS_CACHE_NAME: {{ .Values.redis.cacheName | quote }}
  {{- end }}
  {{- if .Values.redis.awsServerless }}
  REDIS_AWS_SERVERLESS: "true"
  {{- end }}
  {{- end }}
  {{- end }}
  # TRUSTGUARD_PLATFORM_CLIENT_ID/_SECRET are wired from the shared
  # trustguard-client-credentials Secret in the Deployment env (kept consistent
  # with AgentGateway's TRUSTGUARD_CLIENT_ID/_SECRET).
  TRUSTGUARD_BASE_URL: {{ $tgAud | quote }}
  {{- $fw := default dict .Values.firewall }}
  {{- /* In-cluster Firewall Service is named `firewall` (port 80). Private
         cluster DNS is allowed by TrustGuard's default
         FIREWALL_ALLOW_PRIVATE_EGRESS=true. */}}
  NEURAL_TRUST_FIREWALL_BASE_URL: {{ $fw.baseURL | default (printf "http://firewall.%s.svc.cluster.local" .Release.Namespace) | quote }}
  FIREWALL_ALLOW_PRIVATE_EGRESS: "true"
  OPENTELEMETRY_SERVICE_NAME: "trustguard"
  TELEMETRY_EXPORTERS_FILE: "/etc/telemetry/telemetry.yaml"
  {{- if eq (include "neuraltrust-platform.isExternal" .) "true" }}
  # External mode: product telemetry (metadata/raw) is OTLP *logs* via
  # otlploghttp.WithEndpointURL, which takes the URL path verbatim — so this
  # endpoint MUST include /v1/logs (same as TrustGuard/TrustGate SaaS overlays).
  # Runtime traces/metrics use OPENTELEMETRY_* with host:port + WithEndpoint,
  # which appends /v1/traces and /v1/metrics itself. Authorization comes from
  # clickstack-collector-secrets via the Deployment.
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ printf "http://clickstack-collector.%s.svc.cluster.local:4318/v1/logs" .Release.Namespace | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  OPENTELEMETRY_ENABLED: "true"
  OPENTELEMETRY_INSECURE: "true"
  OPENTELEMETRY_TRACES_ENDPOINT: {{ printf "clickstack-collector.%s.svc.cluster.local:4318" .Release.Namespace | quote }}
  OPENTELEMETRY_METRICS_ENDPOINT: {{ printf "clickstack-collector.%s.svc.cluster.local:4318" .Release.Namespace | quote }}
  {{- else if eq (include "neuraltrust-platform.clickstackHybridEnabled" .) "true" }}
  # Hybrid: dual-write via local clickstack-egress-collector (enrolment → SaaS).
  # Apps send plain OTLP in-cluster; no direct SaaS Authorization header.
  {{- include "neuraltrust-platform.clickstack.otlpEnv" . | nindent 2 }}
  {{- else }}
  {{- $obs := default dict .Values.global.observability }}
  {{- $collector := default dict $obs.collector }}
  {{- if $collector.endpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ $collector.endpoint | quote }}
  {{- else if $obs.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ printf "http://otel-collector.%s.svc.cluster.local:4318" .Release.Namespace | quote }}
  {{- end }}
  {{- end }}
{{- end }}
