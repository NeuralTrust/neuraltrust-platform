{{- if eq (include "neuraltrust-platform.isV2" .) "true" }}
{{- if and (include "neuraltrust-platform.autoGenerateSecrets" .) (not .Values.global.preserveExistingSecrets) }}
{{- $isHybrid := eq (include "neuraltrust-platform.isHybrid" .) "true" }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace "trustguard-secrets") }}
{{- $hasExplicit := or .Values.adminJwtSecret .Values.tokenSigningSecret .Values.redisEventsSecret .Values.database.password }}
{{- if or .Release.IsInstall $existing $hasExplicit }}
{{- $dbPw := include "neuraltrust-platform.resolveSecret" (dict "value" .Values.database.password "existingSecret" $existing "secretKey" "DB_PASSWORD" "length" 32) }}
apiVersion: v1
kind: Secret
metadata:
  name: trustguard-secrets
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "trustguard.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADMIN_JWT_SECRET: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.adminJwtSecret "existingSecret" $existing "secretKey" "ADMIN_JWT_SECRET" "length" 64) | quote }}
  TRUSTGUARD_TOKEN_SIGNING_SECRET: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.tokenSigningSecret "existingSecret" $existing "secretKey" "TRUSTGUARD_TOKEN_SIGNING_SECRET" "length" 64) | quote }}
  REDIS_EVENTS_SECRET: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.redisEventsSecret "existingSecret" $existing "secretKey" "REDIS_EVENTS_SECRET" "length" 64) | quote }}
  {{- /* v2 hybrid: DB_PASSWORD, SENSIBLE_PG_DSN, and REDIS_PASSWORD all come
         from the shared `postgresql-secrets` / `redis-secrets` Secrets (wired
         via envFrom on the Deployment), so they are omitted here to keep a
         single source of truth. IAM DB auth also ships no static password. */}}
  {{- if and (not .Values.database.iamAuth) (not $isHybrid) }}
  DB_PASSWORD: {{ $dbPw | quote }}
  {{- end }}
  {{- if and .Values.redis.password (not .Values.redis.iamAuth) (not $isHybrid) }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- end }}
  {{- /* TRUSTGUARD_PLATFORM_CLIENT_ID/_SECRET are injected from the shared
         trustguard-client-credentials Secret via the Deployment env, so the pair
         stays identical to AgentGateway's client credentials. Not stored here. */}}
  {{- if (default dict .Values.configSync).enabled }}
  {{- $csToken := include "neuraltrust-platform.configSync.token" (dict "ctx" . "existingSecret" $existing) }}
  {{- if $csToken }}
  CONFIG_SYNC_TOKEN: {{ $csToken | quote }}
  {{- end }}
  CONFIG_SYNC_LKG_KEY: {{ include "neuraltrust-platform.configSync.lkgKey" (dict "ctx" . "existingSecret" $existing) | quote }}
  {{- end }}
  {{- /* Hybrid ClickStack export: Authorization header for the collector's OTLP
         receivers. Rendered only when global.clickstack is enabled AND the
         operator supplies the token inline (or the value was preserved from a
         prior chart-managed Secret). When `global.clickstack.existingSecret.name`
         is set, the header is sourced from that operator-owned Secret via
         `secretKeyRef` on the data-plane Deployment instead. */}}
  {{- if and (eq (include "neuraltrust-platform.clickstackHybridEnabled" .) "true") (ne (include "neuraltrust-platform.clickstack.usesExistingSecret" .) "true") }}
  {{- $otlpHeaders := include "neuraltrust-platform.clickstack.otlpHeaders" (dict "ctx" . "existingSecret" $existing) }}
  {{- if $otlpHeaders }}
  OTEL_EXPORTER_OTLP_HEADERS: {{ $otlpHeaders | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
