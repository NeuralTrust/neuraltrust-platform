{{- if eq (include "trustguard.enabled" .) "true" }}
{{- /*
Mode-specific default telemetry exporters. Hybrid keeps raw payloads in the
customer-boundary Postgres for DataAgent. External sends metadata and raw events
over OTLP/HTTP to the in-cluster ClickStack collector.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: trustguard-telemetry
  labels:
    {{- include "trustguard.labels" . | nindent 4 }}
data:
  telemetry.yaml: |
    exporters:
      {{- if eq (include "neuraltrust-platform.isHybrid" .) "true" }}
      {{- if eq (include "neuraltrust-platform.clickstackHybridEnabled" .) "true" }}
      metadata:
        - name: metadata-otlp
          type: otlp
      {{- end }}
      raw:
        - name: sensible-pg
          type: postgres
          settings:
            dsn_env: SENSIBLE_PG_DSN
        {{- if eq (include "neuraltrust-platform.clickstackHybridEnabled" .) "true" }}
        - name: raw-otlp
          type: otlp
        {{- end }}
      {{- else }}
      metadata:
        - name: metadata-otlp
          type: otlp
      raw:
        - name: raw-otlp
          type: otlp
      {{- end }}
{{- end }}
