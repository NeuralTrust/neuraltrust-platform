{{- if and (eq (include "neuraltrust-platform.isV2" .) "true") .Values.enabled }}
{{- if and (include "neuraltrust-platform.autoGenerateSecrets" .) (not .Values.global.preserveExistingSecrets) }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace "trustlens-secrets") }}
{{- $hasExplicit := or .Values.jwtSecret .Values.encryptionKeyset .Values.database.password }}
{{- if or .Release.IsInstall $existing $hasExplicit }}
apiVersion: v1
kind: Secret
metadata:
  name: trustlens-secrets
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "trustlens.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.jwtSecret "existingSecret" $existing "secretKey" "JWT_SECRET" "length" 64) | quote }}
  ENCRYPTION_KEYSET: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.encryptionKeyset "existingSecret" $existing "secretKey" "ENCRYPTION_KEYSET" "length" 64) | quote }}
  DATABASE_PASSWORD: {{ include "neuraltrust-platform.resolveSecret" (dict "value" .Values.database.password "existingSecret" $existing "secretKey" "DATABASE_PASSWORD" "length" 32) | quote }}
{{- end }}
{{- end }}
{{- end }}
