{{- if .Values.enabled }}
{{- /* Watchdog is a stateful singleton: it owns a small SQLite database on a
       PVC (internal/sqlitedb) backing both the config overlay
       (internal/configstore) and persisted operational state
       (internal/statestore), and must stay at 1 replica (no HA, no leader
       election). A StatefulSet gives it a stable identity + an optional
       volumeClaimTemplate for that DB — parity with k8s/base. The PVC is
       provisioned whenever persistence OR the overlay is enabled. */ -}}
{{- $persist := or .Values.persistence.enabled .Values.overlay.enabled -}}
{{- $obs := default dict (default dict .Values.global).observability -}}
{{- $hostedEnabled := include "neuraltrust-watchdog.hostedExportEnabled" . -}}
{{- $tenantID := default $obs.tenantId .Values.telemetry.tenantId -}}
{{- $otlpEndpoint := .Values.telemetry.otlp.endpoint -}}
{{- if and (not $otlpEndpoint) $hostedEnabled -}}
{{- $otlpEndpoint = include "neuraltrust-watchdog.hostedEndpoint" . -}}
{{- end -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "neuraltrust-watchdog.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neuraltrust-watchdog.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "neuraltrust-watchdog.fullname" . }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "neuraltrust-watchdog.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "neuraltrust-watchdog.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- /* Baseline scrape contract — uniform across Prometheus
               Operator, GMP, AMP, Azure Monitor, OTel collector, and
               air-gapped customer stacks. Opt out via
               monitoring.scrapeAnnotations.enabled=false. */ -}}
        {{- $mon := default dict .Values.monitoring -}}
        {{- $sa  := default dict $mon.scrapeAnnotations -}}
        {{- if $sa.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "neuraltrust-watchdog.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: watchdog
          image: {{ include "neuraltrust-watchdog.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -config=/etc/watchdog/config.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- if .Values.image.tag }}
            - name: APPLICATION_VERSION
              value: {{ .Values.image.tag | quote }}
            {{- end }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NT_ENVIRONMENT
              value: {{ default "unknown" (default "" (default dict .Values.global).environment) | quote }}
            - name: PROMETHEUS_QUERY_URL
              value: {{ include "neuraltrust-watchdog.prometheusEndpoint" . | quote }}
            {{- if $tenantID }}
            - name: NT_TENANT_ID
              value: {{ $tenantID | quote }}
            {{- end }}
            {{- if $otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $otlpEndpoint | quote }}
            {{- end }}
            {{- if .Values.telemetry.otlp.headers }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: {{ .Values.telemetry.otlp.headers | quote }}
            {{- end }}
            {{- if $hostedEnabled }}
            - name: OPENTELEMETRY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "neuraltrust-watchdog.hostedTokenSecretName" . }}
                  key: {{ include "neuraltrust-watchdog.hostedTokenSecretKey" . }}
            {{- end }}
            {{- if or .Values.server.authToken.value .Values.server.authToken.existingSecret }}
            - name: WATCHDOG_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "neuraltrust-watchdog.authSecretName" . }}
                  key: {{ .Values.server.authToken.secretKey }}
            {{- end }}
            {{- if or .Values.actions.slack.webhookUrl .Values.actions.slack.existingSecret }}
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "neuraltrust-watchdog.slackSecretName" . }}
                  key: {{ .Values.actions.slack.secretKey }}
                  optional: true
            {{- end }}
            {{- with .Values.secretEnv.clickhouse }}
            {{- if .userSecret }}
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .userSecret }}
                  key: {{ .userKey | default "username" }}
            {{- end }}
            {{- if .passwordSecret }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .passwordSecret }}
                  key: {{ .passwordKey | default "password" }}
            {{- end }}
            {{- end }}
            {{- with .Values.secretEnv.redis }}
            {{- if .passwordSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .passwordSecret }}
                  key: {{ .passwordKey | default "password" }}
                  optional: true
            {{- end }}
            {{- end }}
            {{- if .Values.usageExport.enabled }}
            - name: DATA_PLANE_API_URL
              value: {{ .Values.usageExport.endpoint | quote }}
            - name: DATA_PLANE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.usageExport.jwtSecret.existingSecret | default "data-plane-jwt-secret" }}
                  key: {{ .Values.usageExport.jwtSecret.secretKey | default "DATA_PLANE_JWT_SECRET" }}
            - name: CONTROL_PLANE_API_URL
              value: {{ .Values.usageExport.controlPlaneEndpoint | quote }}
            - name: CONTROL_PLANE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.usageExport.controlPlaneJwtSecret.existingSecret | default "control-plane-secrets" }}
                  key: {{ .Values.usageExport.controlPlaneJwtSecret.secretKey | default "CONTROL_PLANE_JWT_SECRET" }}
            {{- end }}
            {{- if or .Values.desiredState.enabled .Values.platformState.enabled }}
            {{- /* deploy-api control-plane wiring, shared by the desired-state
                   reporter and the platform image-tag applier. */}}
            - name: DEPLOY_API_URL
              value: {{ .Values.desiredState.endpoint | quote }}
            - name: DEPLOY_API_CLUSTER_ID
              value: {{ .Values.desiredState.clusterId | quote }}
            {{- if or .Values.desiredState.token.value .Values.desiredState.token.existingSecret }}
            - name: WATCHDOG_INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "neuraltrust-watchdog.desiredStateTokenSecretName" . }}
                  key: {{ .Values.desiredState.token.secretKey | default "token" }}
            {{- end }}
            {{- end }}
            {{- if .Values.platformState.enabled }}
            {{- /* helm needs writable HOME dirs (root FS is read-only, so point
                   them at the emptyDir below) and a registry config to pull the
                   OCI chart for diffing. HELM_DATA_HOME (plugins incl. helm-diff)
                   stays at the baked-in image path. */}}
            - name: HELM_CONFIG_HOME
              value: /var/run/helm/work/config
            - name: HELM_CACHE_HOME
              value: /var/run/helm/work/cache
            {{- if .Values.platformState.registryConfig.existingSecret }}
            - name: HELM_REGISTRY_CONFIG
              value: /var/run/helm/registry/config.json
            {{- end }}
            {{- end }}
            {{- include "neuraltrust-watchdog.proxyEnv" . | nindent 12 }}
            {{- include "neuraltrust-platform.customCaCert.env" (dict "runtime" "go" "ctx" .) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/watchdog
              readOnly: true
            {{- if and .Values.logExport.enabled .Values.logExport.transports.bundle.enabled }}
            {{- /* Writable scratch for the air-gapped log bundle; required
                   because the root FS is read-only. */}}
            - name: logbundles
              mountPath: /var/run/watchdog
            {{- end }}
            {{- if $persist }}
            {{- /* Shared SQLite DB PVC (internal/sqlitedb): config overlay +
                   persisted operational state. Mounted + provisioned when
                   persistence OR the overlay is enabled. */}}
            - name: overlay
              mountPath: /var/lib/watchdog
            {{- end }}
            {{- if .Values.platformState.enabled }}
            {{- /* Writable scratch for helm config/cache (root FS is read-only). */}}
            - name: helm-work
              mountPath: /var/run/helm/work
            {{- if .Values.platformState.registryConfig.existingSecret }}
            {{- /* Read-only OCI registry auth (dockerconfigjson) for helm pull. */}}
            - name: helm-registry
              mountPath: /var/run/helm/registry
              readOnly: true
            {{- end }}
            {{- end }}
            {{- include "neuraltrust-platform.customCaCert.volumeMount" . | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "neuraltrust-watchdog.fullname" . }}-config
        {{- if and .Values.logExport.enabled .Values.logExport.transports.bundle.enabled }}
        - name: logbundles
          emptyDir: {}
        {{- end }}
        {{- if .Values.platformState.enabled }}
        - name: helm-work
          emptyDir: {}
        {{- if .Values.platformState.registryConfig.existingSecret }}
        - name: helm-registry
          secret:
            secretName: {{ .Values.platformState.registryConfig.existingSecret }}
            items:
              - key: {{ .Values.platformState.registryConfig.secretKey | default ".dockerconfigjson" }}
                path: config.json
        {{- end }}
        {{- end }}
        {{- include "neuraltrust-platform.customCaCert.volume" . | nindent 8 }}
      {{- include "neuraltrust-platform.nodeSelector" (dict "ctx" . "local" .Values.nodeSelector) | nindent 6 }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" . "local" .Values.tolerations) | nindent 6 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if $persist }}
  volumeClaimTemplates:
    - metadata:
        name: overlay
        labels:
          {{- include "neuraltrust-watchdog.selectorLabels" . | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            {{- /* Cloud-agnostic default: 1Gi is ample for the watchdog DB.
                   storageClass omitted => cluster default provisioner (GKE
                   pd-balanced, EKS gp3, AKS managed-csi, bare-metal). Clusters
                   that forbid dynamic PVCs must pre-create the PVC or keep
                   persistence + overlay disabled. */}}
            storage: {{ .Values.persistence.size | default "1Gi" }}
  {{- end }}
{{- end }}
