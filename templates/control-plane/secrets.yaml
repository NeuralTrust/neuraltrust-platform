{{- /*
Umbrella-owned control-plane Secret shared by control-plane-api and control-plane-app.
Renders only in v2 external mode when secrets are being managed by this chart.
Values are read from either control-plane-api.controlPlane.secrets or
control-plane-app.controlPlane.secrets (API preferred), so operators can
place them under either root.
*/ -}}
{{- $secretName := "control-plane-secrets" -}}
{{- $auto := eq (include "neuraltrust-platform.autoGenerateSecrets" .) "true" -}}
{{- $preserve := .Values.global.preserveExistingSecrets | default false -}}
{{- $isExternal := eq (include "neuraltrust-platform.isExternal" .) "true" -}}
{{- $cpApi := default dict (index .Values "control-plane-api") -}}
{{- $cpApp := default dict (index .Values "control-plane-app") -}}
{{- $apiCp := default dict $cpApi.controlPlane -}}
{{- $appCp := default dict $cpApp.controlPlane -}}
{{- $apiSecrets := default dict $apiCp.secrets -}}
{{- $appSecrets := default dict $appCp.secrets -}}
{{- $secrets := merge (deepCopy $apiSecrets) $appSecrets -}}
{{- if and $isExternal $auto (not $preserve) }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  CONTROL_PLANE_JWT_SECRET: {{ include "neuraltrust-platform.resolveSecret" (dict "value" $secrets.controlPlaneJWTSecret "existingSecret" $existing "secretKey" "CONTROL_PLANE_JWT_SECRET") | b64enc | quote }}
  AUTH_SECRET: {{ include "neuraltrust-platform.resolveSecret" (dict "value" $secrets.authSecret "existingSecret" $existing "secretKey" "AUTH_SECRET") | b64enc | quote }}
  NEXTAUTH_SECRET: {{ include "neuraltrust-platform.resolveSecret" (dict "value" $secrets.authSecret "existingSecret" $existing "secretKey" "AUTH_SECRET") | b64enc | quote }}
  OPENAI_API_KEY: {{ $secrets.openaiApiKey | default "" | b64enc | quote }}
  resend-api-key: {{ $secrets.resendApiKey | default "" | b64enc | quote }}
  resend-alert-sender: {{ $secrets.resendAlertSender | default "" | b64enc | quote }}
  resend-invite-sender: {{ $secrets.resendInviteSender | default "" | b64enc | quote }}
  TRUSTGATE_JWT_SECRET: {{ include "neuraltrust-platform.resolveSecret" (dict "value" $secrets.trustgateJwtSecret "existingSecret" $existing "secretKey" "TRUSTGATE_JWT_SECRET") | b64enc | quote }}
  FIREWALL_API_URL: {{ $secrets.firewallApiUrl | default "" | b64enc | quote }}
  {{- if $secrets.firewallJwtSecret }}
  FIREWALL_JWT_SECRET: {{ $secrets.firewallJwtSecret | b64enc | quote }}
  {{- end }}
  MODEL_SCANNER_SECRET: {{ $secrets.modelScannerSecret | default "" | b64enc | quote }}
{{- end }}
