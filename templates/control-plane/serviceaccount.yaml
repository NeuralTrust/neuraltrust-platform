{{- /*
Umbrella-owned ServiceAccount shared by control-plane-api and control-plane-app.
Only rendered when the control planes deploy (v2 external mode).
Both API and App run under the stable `control-plane` ServiceAccount name.
*/ -}}
{{- if eq (include "neuraltrust-platform.isExternal" .) "true" }}
{{- $cpApi := default dict (index .Values "control-plane-api") -}}
{{- $cpApp := default dict (index .Values "control-plane-app") -}}
{{- $apiCp := default dict $cpApi.controlPlane -}}
{{- $appCp := default dict $cpApp.controlPlane -}}
{{- $sa := default dict $apiCp.serviceAccount -}}
{{- if not $sa -}}{{- $sa = default dict $appCp.serviceAccount -}}{{- end -}}
{{- $create := true -}}
{{- if hasKey $sa "create" -}}{{- $create = $sa.create -}}{{- end -}}
{{- if $create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa.name | default "control-plane" }}
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- $saAnn := include "neuraltrust-platform.serviceAccount.annotationsBlock" (dict "ctx" . "annotations" $sa.annotations) }}
  {{- with $saAnn }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
