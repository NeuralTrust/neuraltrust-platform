{{- $global := default dict .Values.global }}
{{- $globalIngress := default dict $global.ingress }}
{{- $globalIngressTLS := default dict $globalIngress.tls }}
{{- $preserveSecrets := false }}
{{- if and .Values.global .Values.global.preserveExistingSecrets }}
  {{- $preserveSecrets = true }}
{{- end }}
{{- $autoGenerate := include "neuraltrust-platform.ingress.autoGenerateTLSSecret" (dict "global" $global) }}
{{- $sharedSecretName := include "neuraltrust-platform.ingress.defaultTLSSecretName" (dict "global" $global) }}
{{- $sharedHosts := list }}

{{- /* Control-plane (external only). */}}
{{- $cpApi := index .Values "control-plane-api" | default dict }}
{{- $cpApp := index .Values "control-plane-app" | default dict }}
{{- $cpRenders := eq (include "neuraltrust-platform.isExternal" .) "true" }}
{{- if $cpRenders }}
  {{- $cpApiComp := default dict (default dict $cpApi.controlPlane).components }}
  {{- $api := default dict $cpApiComp.api }}
  {{- if and $api.ingress $api.ingress.enabled $api.ingress.tls $api.ingress.tls.enabled (not $api.ingress.tls.secretName) $api.host }}
    {{- $renderApiTLS := include "neuraltrust-platform.ingress.renderTLS" (dict "global" $global "tlsEnabled" $api.ingress.tls.enabled) }}
    {{- if $renderApiTLS }}{{- $sharedHosts = append $sharedHosts $api.host }}{{- end }}
  {{- end }}
  {{- $cpAppComp := default dict (default dict $cpApp.controlPlane).components }}
  {{- $app := default dict $cpAppComp.app }}
  {{- if and $app.ingress $app.ingress.enabled $app.ingress.tls $app.ingress.tls.enabled (not $app.ingress.tls.secretName) }}
    {{- $renderAppTLS := include "neuraltrust-platform.ingress.renderTLS" (dict "global" $global "tlsEnabled" $app.ingress.tls.enabled) }}
    {{- if $renderAppTLS }}
      {{- if $app.host }}{{- $sharedHosts = append $sharedHosts $app.host }}{{- end }}
      {{- if $app.secondaryHost }}{{- $sharedHosts = append $sharedHosts $app.secondaryHost }}{{- end }}
    {{- end }}
  {{- end }}
{{- end }}

{{- /* data-plane-api. */}}
{{- $dpChart := index .Values "data-plane-api" | default dict }}
{{- $dpComp := default dict (default dict $dpChart.dataPlane).components }}
{{- $dpApi := default dict $dpComp.api }}
{{- if and $dpApi.ingress $dpApi.ingress.enabled $dpApi.ingress.tls $dpApi.ingress.tls.enabled (not $dpApi.ingress.tls.secretName) $dpApi.host }}
  {{- $renderDataPlaneTLS := include "neuraltrust-platform.ingress.renderTLS" (dict "global" $global "tlsEnabled" $dpApi.ingress.tls.enabled) }}
  {{- if $renderDataPlaneTLS }}{{- $sharedHosts = append $sharedHosts $dpApi.host }}{{- end }}
{{- end }}

{{- if and $autoGenerate (not $preserveSecrets) }}
  {{- $commonName := $globalIngressTLS.commonName | default "neuraltrust.local" }}
  {{- $durationDays := int ($globalIngressTLS.durationDays | default 3650) }}
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $sharedSecretName }}
  {{- $existingCrt := "" }}
  {{- $existingKey := "" }}
  {{- if and $existingSecret $existingSecret.data }}
    {{- if hasKey $existingSecret.data "tls.crt" }}
      {{- $existingCrt = index $existingSecret.data "tls.crt" }}
    {{- end }}
    {{- if hasKey $existingSecret.data "tls.key" }}
      {{- $existingKey = index $existingSecret.data "tls.key" }}
    {{- end }}
  {{- end }}
  {{- $altNames := uniq $sharedHosts }}
  {{- if not (has $commonName $altNames) }}
    {{- $altNames = append $altNames $commonName }}
  {{- end }}
  {{- $tlsCrt := $existingCrt }}
  {{- $tlsKey := $existingKey }}
  {{- if not (and $tlsCrt $tlsKey) }}
    {{- $cert := genSelfSignedCert $commonName nil $altNames $durationDays }}
    {{- $tlsCrt = $cert.Cert | b64enc }}
    {{- $tlsKey = $cert.Key | b64enc }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $sharedSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neuraltrust-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress-tls
type: kubernetes.io/tls
data:
  tls.crt: {{ $tlsCrt | quote }}
  tls.key: {{ $tlsKey | quote }}
{{- end }}
