{{- $global := default dict .Values.global }}
{{- $globalIngress := default dict $global.ingress }}
{{- $globalIngressTLS := default dict $globalIngress.tls }}
{{- $preserveSecrets := false }}
{{- if and .Values.global .Values.global.preserveExistingSecrets }}
  {{- $preserveSecrets = true }}
{{- end }}
{{- $autoGenerate := include "neuraltrust-platform.ingress.autoGenerateTLSSecret" (dict "global" $global) }}
{{- $sharedSecretName := include "neuraltrust-platform.ingress.defaultTLSSecretName" (dict "global" $global) }}
{{- $sharedHosts := list }}

{{- $trustgate := .Values.trustgate | default dict }}
{{- if and $trustgate $trustgate.enabled $trustgate.ingress $trustgate.ingress.enabled $trustgate.ingress.tls $trustgate.ingress.tls.enabled (not $trustgate.ingress.tls.secretName) }}
  {{- $renderTrustgateTLS := include "neuraltrust-platform.ingress.renderTLS" (dict "global" $global "tlsEnabled" $trustgate.ingress.tls.enabled) }}
  {{- if $renderTrustgateTLS }}
    {{- if $trustgate.ingress.controlPlane.host }}
      {{- $sharedHosts = append $sharedHosts $trustgate.ingress.controlPlane.host }}
    {{- end }}
    {{- if $trustgate.ingress.dataPlane.host }}
      {{- $sharedHosts = append $sharedHosts $trustgate.ingress.dataPlane.host }}
    {{- end }}
    {{- if $trustgate.ingress.actions.host }}
      {{- $sharedHosts = append $sharedHosts $trustgate.ingress.actions.host }}
    {{- end }}
  {{- end }}
{{- end }}

{{- $controlPlaneChart := index .Values "neuraltrust-control-plane" | default dict }}
{{- if and $controlPlaneChart $controlPlaneChart.controlPlane $controlPlaneChart.controlPlane.enabled $controlPlaneChart.controlPlane.components }}
  {{- $cpComponents := $controlPlaneChart.controlPlane.components }}
  {{- if and $cpComponents.api $cpComponents.api.ingress $cpComponents.api.ingress.enabled $cpComponents.api.ingress.tls $cpComponents.api.ingress.tls.enabled (not $cpComponents.api.ingress.tls.secretName) }}
    {{- $renderApiTLS := include "neuraltrust-platform.ingress.renderTLS" (dict "global" $global "tlsEnabled" $cpComponents.api.ingress.tls.enabled) }}
    {{- if $renderApiTLS }}
      {{- if $cpComponents.api.host }}
        {{- $sharedHosts = append $sharedHosts $cpComponents.api.host }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- if and $cpComponents.app $cpComponents.app.ingress $cpComponents.app.ingress.enabled $cpComponents.app.ingress.tls $cpComponents.app.ingress.tls.enabled (not $cpComponents.app.ingress.tls.secretName) }}
    {{- $renderAppTLS := include "neuraltrust-platform.ingress.renderTLS" (dict "global" $global "tlsEnabled" $cpComponents.app.ingress.tls.enabled) }}
    {{- if $renderAppTLS }}
      {{- if $cpComponents.app.host }}
        {{- $sharedHosts = append $sharedHosts $cpComponents.app.host }}
      {{- end }}
      {{- if $cpComponents.app.secondaryHost }}
        {{- $sharedHosts = append $sharedHosts $cpComponents.app.secondaryHost }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- if and $cpComponents.scheduler $cpComponents.scheduler.ingress $cpComponents.scheduler.ingress.enabled $cpComponents.scheduler.ingress.tls $cpComponents.scheduler.ingress.tls.enabled (not $cpComponents.scheduler.ingress.tls.secretName) }}
    {{- $renderSchedulerTLS := include "neuraltrust-platform.ingress.renderTLS" (dict "global" $global "tlsEnabled" $cpComponents.scheduler.ingress.tls.enabled) }}
    {{- if $renderSchedulerTLS }}
      {{- if $cpComponents.scheduler.host }}
        {{- $sharedHosts = append $sharedHosts $cpComponents.scheduler.host }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}

{{- $dataPlaneChart := index .Values "neuraltrust-data-plane" | default dict }}
{{- if and $dataPlaneChart $dataPlaneChart.dataPlane $dataPlaneChart.dataPlane.components $dataPlaneChart.dataPlane.components.api $dataPlaneChart.dataPlane.components.api.ingress $dataPlaneChart.dataPlane.components.api.ingress.enabled $dataPlaneChart.dataPlane.components.api.ingress.tls $dataPlaneChart.dataPlane.components.api.ingress.tls.enabled (not $dataPlaneChart.dataPlane.components.api.ingress.tls.secretName) }}
  {{- $renderDataPlaneTLS := include "neuraltrust-platform.ingress.renderTLS" (dict "global" $global "tlsEnabled" $dataPlaneChart.dataPlane.components.api.ingress.tls.enabled) }}
  {{- if $renderDataPlaneTLS }}
    {{- if $dataPlaneChart.dataPlane.components.api.host }}
      {{- $sharedHosts = append $sharedHosts $dataPlaneChart.dataPlane.components.api.host }}
    {{- end }}
  {{- end }}
{{- end }}

{{- if and $autoGenerate (not $preserveSecrets) }}
  {{- $commonName := $globalIngressTLS.commonName | default "neuraltrust.local" }}
  {{- $durationDays := int ($globalIngressTLS.durationDays | default 3650) }}
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $sharedSecretName }}
  {{- $existingCrt := "" }}
  {{- $existingKey := "" }}
  {{- if and $existingSecret $existingSecret.data }}
    {{- if hasKey $existingSecret.data "tls.crt" }}
      {{- $existingCrt = index $existingSecret.data "tls.crt" }}
    {{- end }}
    {{- if hasKey $existingSecret.data "tls.key" }}
      {{- $existingKey = index $existingSecret.data "tls.key" }}
    {{- end }}
  {{- end }}
  {{- $altNames := uniq $sharedHosts }}
  {{- if not (has $commonName $altNames) }}
    {{- $altNames = append $altNames $commonName }}
  {{- end }}
  {{- $tlsCrt := $existingCrt }}
  {{- $tlsKey := $existingKey }}
  {{- if not (and $tlsCrt $tlsKey) }}
    {{- $cert := genSelfSignedCert $commonName nil $altNames $durationDays }}
    {{- $tlsCrt = $cert.Cert | b64enc }}
    {{- $tlsKey = $cert.Key | b64enc }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $sharedSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neuraltrust-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress-tls
type: kubernetes.io/tls
data:
  tls.crt: {{ $tlsCrt | quote }}
  tls.key: {{ $tlsKey | quote }}
{{- end }}
