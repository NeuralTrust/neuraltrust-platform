{{- /*
Render a Secret holding the bearer token for collector.neuraltrust.ai
ONLY when:
  - observability is enabled, AND
  - hostedExport is enabled, AND
  - tokenValue is explicitly set (the operator wants helm to manage it)

When the token comes from a pre-existing Secret (resolved via lookup at
template time), we do not re-create it here. This preserves the
"resolveSecret" pattern: never overwrite secrets that already exist.
*/ -}}
{{- if include "neuraltrust-platform.otelCollector.enabled" . }}
{{- $obs := default dict (default dict .Values.global).observability }}
{{- $hosted := default dict $obs.hostedExport }}
{{- $auth := default dict $hosted.auth }}
{{- if and $hosted.enabled $auth.tokenValue (ne ($auth.tokenValue | toString) "") }}
{{- if and (include "neuraltrust-platform.autoGenerateSecrets" .) (not .Values.global.preserveExistingSecrets) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ default "neuraltrust-observability-token" $auth.tokenSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neuraltrust-platform.otelCollector.labels" . | nindent 4 }}
type: Opaque
data:
  {{ default "token" $auth.tokenSecretKey }}: {{ $auth.tokenValue | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}
