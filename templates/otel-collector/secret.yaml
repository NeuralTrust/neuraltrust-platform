{{- /*
Bearer token for collector.neuraltrust.ai (hosted OTLP export).

Rendered when the in-chart collector OR watchdog needs hosted egress AND
global.observability.hostedExport is enabled.

Unlike other auto-generated secrets, this token is NEVER randomly generated —
it must be supplied explicitly (tokenValue) or pre-created / preserved via
lookup (see SECRETS.md and create-secrets.sh OBSERVABILITY_TOKEN).
*/ -}}
{{- $obs := default dict (default dict .Values.global).observability }}
{{- $hosted := default dict $obs.hostedExport }}
{{- $auth := default dict $hosted.auth }}
{{- $watchdog := index .Values "neuraltrust-watchdog" | default dict }}
{{- $needsHostedToken := or (include "neuraltrust-platform.otelCollector.enabled" .) (default false $watchdog.enabled) }}
{{- if and $needsHostedToken (default true $hosted.enabled) }}
{{- if and (include "neuraltrust-platform.autoGenerateSecrets" .) (not .Values.global.preserveExistingSecrets) }}
{{- $secretName := default "neuraltrust-observability-token" $auth.tokenSecretName }}
{{- $secretKey := default "token" $auth.tokenSecretKey }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $hasExplicit := and $auth.tokenValue (ne ($auth.tokenValue | toString) "") }}
{{- $hasExisting := and $existingSecret (kindIs "map" $existingSecret) (hasKey $existingSecret.data $secretKey) }}
{{- if or $hasExplicit $hasExisting }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neuraltrust-platform.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $hasExisting }}
  {{ $secretKey }}: {{ index $existingSecret.data $secretKey | quote }}
  {{- else }}
  {{ $secretKey }}: {{ $auth.tokenValue | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
