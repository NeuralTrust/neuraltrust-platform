{{- if include "neuraltrust-platform.otelCollector.enabled" . }}
{{- $obs := default dict (default dict .Values.global).observability }}
{{- $sa := default dict (default dict $obs.collector).serviceAccount }}
{{- if (default true $sa.create) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "neuraltrust-platform.otelCollector.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "neuraltrust-platform.otelCollector.labels" . | nindent 4 }}
  {{- with $sa.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
