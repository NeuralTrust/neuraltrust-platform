{{- /*
Platform Secrets Auto-Generation
=================================
Generates required secrets automatically when not explicitly provided in helm values.
Centralizes secret creation in the parent chart to coordinate shared values
(e.g., SERVER_SECRET_KEY and trustgateJwtSecret must be identical).

For each secret value, resolution order:
  1. Use explicitly provided value (non-empty string in helm values)
  2. Reuse value from existing Kubernetes Secret in the cluster (via lookup)
  3. Generate a new random value

Controlled by:
  - global.autoGenerateSecrets: true (default) → enables auto-generation from parent chart
  - global.autoGenerateSecrets: false → disables; subcharts manage their own secrets
  - global.preserveExistingSecrets: true → skips ALL secret creation entirely

NOTE: When using secret references (map values like {secretName: "x", secretKey: "y"}),
      set global.autoGenerateSecrets: false to let subchart templates handle them.
*/}}

{{- $autoGenerate := include "neuraltrust-platform.autoGenerateSecrets" . }}
{{- $preserveSecrets := false }}
{{- if and .Values.global .Values.global.preserveExistingSecrets }}
  {{- $preserveSecrets = true }}
{{- end }}

{{- if and $autoGenerate (not $preserveSecrets) }}

{{- /* ================================================================ */}}
{{- /* LOOKUP EXISTING SECRETS FROM CLUSTER                            */}}
{{- /* On first install these will be nil; on upgrades they preserve   */}}
{{- /* previously generated values.                                    */}}
{{- /* ================================================================ */}}

{{- $existingTrustgate := (lookup "v1" "Secret" .Release.Namespace "trustgate-secrets") }}
{{- $existingControlPlane := (lookup "v1" "Secret" .Release.Namespace "control-plane-secrets") }}
{{- $dpSecretName := "data-plane-jwt-secret" }}
{{- $dp := index .Values "neuraltrust-data-plane" }}
{{- if and $dp $dp.dataPlane $dp.dataPlane.secrets $dp.dataPlane.secrets.dataPlaneJWTSecretName (ne $dp.dataPlane.secrets.dataPlaneJWTSecretName "") }}
  {{- $dpSecretName = $dp.dataPlane.secrets.dataPlaneJWTSecretName }}
{{- end }}
{{- $existingDataPlane := (lookup "v1" "Secret" .Release.Namespace $dpSecretName) }}
{{- $existingPostgresql := (lookup "v1" "Secret" .Release.Namespace "postgresql-secrets") }}
{{- $existingFirewall := (lookup "v1" "Secret" .Release.Namespace "firewall-secrets") }}
{{- $existingAispm := (lookup "v1" "Secret" .Release.Namespace "aispm-secrets") }}

{{- /* ================================================================ */}}
{{- /* RESOLVE SECRET VALUES                                           */}}
{{- /* explicit value > existing cluster value > auto-generate          */}}
{{- /* ================================================================ */}}

{{- /* --- Subchart value shortcuts --- */}}
{{- $tg := .Values.trustgate | default dict }}
{{- $tgGlobal := ($tg.global | default dict) }}
{{- $tgEnv := ($tgGlobal.env | default dict) }}
{{- $tgPostgresql := ($tg.postgresql | default dict) }}
{{- $tgPgExistingSecretName := ($tgPostgresql.existingSecret | default "") }}
{{- /* passwordSecretRef: TrustGate reads its DB password directly from the
       user's Secret via secretKeyRef; the chart never looks it up or copies it,
       and DATABASE_PASSWORD / DATABASE_URL are omitted from trustgate-secrets. */}}
{{- $tgPwSecretRef := ($tgPostgresql.passwordSecretRef | default dict) }}
{{- $tgPwFromSecret := and $tgPwSecretRef.name $tgPwSecretRef.key }}
{{- $tgPgExistingSecret := dict }}
{{- if and $tgPgExistingSecretName (not $tgPwFromSecret) }}
  {{- $tgPgExistingSecret = (lookup "v1" "Secret" .Release.Namespace $tgPgExistingSecretName) | default dict }}
{{- end }}
{{- $tgPgSecretKeys := ($tgPostgresql.existingSecretKeys | default dict) }}
{{- $tgPgHostKey := ($tgPgSecretKeys.host | default "DATABASE_HOST") }}
{{- $tgPgPortKey := ($tgPgSecretKeys.port | default "DATABASE_PORT") }}
{{- $tgPgUserKey := ($tgPgSecretKeys.user | default "DATABASE_USER") }}
{{- $tgPgPasswordKey := ($tgPgSecretKeys.password | default "DATABASE_PASSWORD") }}
{{- $tgPgNameKey := ($tgPgSecretKeys.database | default "DATABASE_NAME") }}
{{- $tgPgSslModeKey := ($tgPgSecretKeys.sslMode | default "DATABASE_SSL_MODE") }}
{{- $tgPgAuthModeKey := ($tgPgSecretKeys.authMode | default "DATABASE_AUTH_MODE") }}
{{- $cp := index .Values "neuraltrust-control-plane" }}
{{- $cpSecrets := dict }}
{{- if and $cp $cp.controlPlane $cp.controlPlane.secrets }}
  {{- $cpSecrets = $cp.controlPlane.secrets }}
{{- end }}
{{- $cpPg := dict }}
{{- $cpPgNode := dict }}
{{- if and $cp $cp.controlPlane $cp.controlPlane.components $cp.controlPlane.components.postgresql }}
  {{- $cpPgNode = $cp.controlPlane.components.postgresql }}
  {{- if $cp.controlPlane.components.postgresql.secrets }}
    {{- $cpPg = $cp.controlPlane.components.postgresql.secrets }}
  {{- end }}
{{- end }}
{{- $dpSecrets := dict }}
{{- if and $dp $dp.dataPlane $dp.dataPlane.secrets }}
  {{- $dpSecrets = $dp.dataPlane.secrets }}
{{- end }}
{{- $fw := index .Values "neuraltrust-firewall" | default dict }}
{{- $fwFirewall := $fw.firewall | default dict }}
{{- $fwSecrets := $fwFirewall.secrets | default dict }}
{{- $fwEnabled := false }}
{{- if and $fwFirewall (hasKey $fwFirewall "enabled") $fwFirewall.enabled }}
  {{- $fwEnabled = true }}
{{- end }}
{{- $aispmRoot := index .Values "neuraltrust-aispm" | default dict }}
{{- $aispmCfg := $aispmRoot.aispm | default dict }}
{{- $aispmSecretsCfg := $aispmCfg.secrets | default dict }}
{{- $aispmEnabled := false }}
{{- if and $aispmCfg (hasKey $aispmCfg "enabled") $aispmCfg.enabled }}
  {{- $aispmEnabled = true }}
{{- end }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* Shared TrustGate Key (SERVER_SECRET_KEY = trustgateJwtSecret)    */}}
{{- /* This value MUST be identical in trustgate-secrets and            */}}
{{- /* control-plane-secrets. Resolve once, use in both.                */}}
{{- /* ---------------------------------------------------------------- */}}

{{- $trustgateSharedKey := "" }}
{{- /* Check explicit value from trustgate.global.env.SERVER_SECRET_KEY */}}
{{- if and (hasKey $tgEnv "SERVER_SECRET_KEY") $tgEnv.SERVER_SECRET_KEY (ne $tgEnv.SERVER_SECRET_KEY "") }}
  {{- $trustgateSharedKey = $tgEnv.SERVER_SECRET_KEY }}
{{- end }}
{{- /* Check explicit value from control-plane trustgateJwtSecret */}}
{{- if not $trustgateSharedKey }}
  {{- if and (hasKey $cpSecrets "trustgateJwtSecret") $cpSecrets.trustgateJwtSecret (ne ($cpSecrets.trustgateJwtSecret | toString) "") }}
    {{- $trustgateSharedKey = $cpSecrets.trustgateJwtSecret | toString }}
  {{- end }}
{{- end }}
{{- /* Check existing cluster secrets */}}
{{- if not $trustgateSharedKey }}
  {{- if and $existingTrustgate (kindIs "map" $existingTrustgate) }}
    {{- if and (index $existingTrustgate "data") (hasKey $existingTrustgate.data "SERVER_SECRET_KEY") }}
      {{- $trustgateSharedKey = index $existingTrustgate.data "SERVER_SECRET_KEY" | b64dec }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if not $trustgateSharedKey }}
  {{- if and $existingControlPlane (kindIs "map" $existingControlPlane) }}
    {{- if and (index $existingControlPlane "data") (hasKey $existingControlPlane.data "TRUSTGATE_JWT_SECRET") }}
      {{- $trustgateSharedKey = index $existingControlPlane.data "TRUSTGATE_JWT_SECRET" | b64dec }}
    {{- end }}
  {{- end }}
{{- end }}
{{- /* Generate if still empty */}}
{{- if not $trustgateSharedKey }}
  {{- $trustgateSharedKey = randAlphaNum 64 }}
{{- end }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* Control Plane JWT Secret                                         */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $cpJwtSecret := include "neuraltrust-platform.resolveSecret" (dict "value" ($cpSecrets.controlPlaneJWTSecret | default "") "existingSecret" $existingControlPlane "secretKey" "CONTROL_PLANE_JWT_SECRET" "length" 64) }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* Data Plane JWT Secret                                            */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $dpJwtSecret := include "neuraltrust-platform.resolveSecret" (dict "value" ($dpSecrets.dataPlaneJWTSecret | default "") "existingSecret" $existingDataPlane "secretKey" "DATA_PLANE_JWT_SECRET" "length" 64) }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* Control Plane PostgreSQL auth mode                                */}}
{{- /* IAM (AWS RDS IAM auth) is password-less and only applies to       */}}
{{- /* external PostgreSQL — the in-cluster bundled PG always uses a      */}}
{{- /* password. When IAM is active, skip password generation and emit a */}}
{{- /* password-less DATABASE_URL.                                       */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $cpPgDeploy := false }}
{{- if and $cp $cp.infrastructure $cp.infrastructure.postgresql (hasKey $cp.infrastructure.postgresql "deploy") }}
  {{- $cpPgDeploy = $cp.infrastructure.postgresql.deploy }}
{{- end }}
{{- /* Umbrella-wide override: an explicit global.postgresql.deploy=false forces external Postgres. */}}
{{- if and .Values.global .Values.global.postgresql (hasKey .Values.global.postgresql "deploy") (not .Values.global.postgresql.deploy) }}
  {{- $cpPgDeploy = false }}
{{- end }}
{{- $cpDbIamAuth := and (eq ($cpPgNode.authMode | default "password") "iam") (not $cpPgDeploy) }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* PostgreSQL Password                                              */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $pgPassword := "" }}
{{- if $cpDbIamAuth }}
  {{- if and (hasKey $cpPg "password") $cpPg.password (ne ($cpPg.password | toString) "") }}
    {{- $pgPassword = $cpPg.password | toString }}
  {{- else if and $existingPostgresql (kindIs "map" $existingPostgresql) (index $existingPostgresql "data") (hasKey $existingPostgresql.data "POSTGRES_PASSWORD") }}
    {{- $pgPassword = index $existingPostgresql.data "POSTGRES_PASSWORD" | b64dec }}
  {{- end }}
{{- else }}
  {{- $pgPassword = include "neuraltrust-platform.resolveSecret" (dict "value" ($cpPg.password | default "") "existingSecret" $existingPostgresql "secretKey" "POSTGRES_PASSWORD" "length" 32) }}
{{- end }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* TrustGate Database Password                                      */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $tgDbAuthMode := "password" }}
{{- if and $tgPgExistingSecret (kindIs "map" $tgPgExistingSecret) (index $tgPgExistingSecret "data") (hasKey $tgPgExistingSecret.data $tgPgAuthModeKey) }}
  {{- $tgDbAuthMode = index $tgPgExistingSecret.data $tgPgAuthModeKey | b64dec }}
{{- else if $tgEnv.DATABASE_AUTH_MODE }}
  {{- $tgDbAuthMode = $tgEnv.DATABASE_AUTH_MODE }}
{{- end }}
{{- $tgDbIamAuth := eq $tgDbAuthMode "iam" }}
{{- $tgDbPassword := "" }}
{{- if $tgDbIamAuth }}
  {{- if and $tgPgExistingSecret (kindIs "map" $tgPgExistingSecret) (index $tgPgExistingSecret "data") (hasKey $tgPgExistingSecret.data $tgPgPasswordKey) }}
    {{- $tgDbPassword = index $tgPgExistingSecret.data $tgPgPasswordKey | b64dec }}
  {{- else if and $tgEnv.DATABASE_PASSWORD (ne ($tgEnv.DATABASE_PASSWORD | toString) "") }}
    {{- $tgDbPassword = $tgEnv.DATABASE_PASSWORD | toString }}
  {{- else if and $existingTrustgate (kindIs "map" $existingTrustgate) (index $existingTrustgate "data") (hasKey $existingTrustgate.data "DATABASE_PASSWORD") }}
    {{- $tgDbPassword = index $existingTrustgate.data "DATABASE_PASSWORD" | b64dec }}
  {{- end }}
{{- else if $tgPwFromSecret }}
  {{- /* Password is injected at runtime from the user's Secret; never resolved,
         generated or copied here. */}}
{{- else }}
  {{- if and $tgPgExistingSecret (kindIs "map" $tgPgExistingSecret) (index $tgPgExistingSecret "data") (hasKey $tgPgExistingSecret.data $tgPgPasswordKey) }}
    {{- $tgDbPassword = index $tgPgExistingSecret.data $tgPgPasswordKey | b64dec }}
  {{- else if and $tgEnv.DATABASE_PASSWORD (ne ($tgEnv.DATABASE_PASSWORD | toString) "") }}
    {{- $tgDbPassword = $tgEnv.DATABASE_PASSWORD | toString }}
  {{- else }}
    {{- $tgDbPassword = include "neuraltrust-platform.resolveSecret" (dict "value" "" "existingSecret" $existingTrustgate "secretKey" "DATABASE_PASSWORD" "length" 32) }}
  {{- end }}
{{- end }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* TrustGate Database Connection Values                             */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $tgDbHost := "" }}
{{- if and $tgPgExistingSecret (kindIs "map" $tgPgExistingSecret) (index $tgPgExistingSecret "data") (hasKey $tgPgExistingSecret.data $tgPgHostKey) }}
  {{- $tgDbHost = index $tgPgExistingSecret.data $tgPgHostKey | b64dec }}
{{- else if $tgEnv.DATABASE_HOST }}
  {{- $tgDbHost = $tgEnv.DATABASE_HOST }}
{{- end }}
{{- $tgDbHost = $tgDbHost | default "control-plane-postgresql" }}
{{- $tgDbPort := "" }}
{{- if and $tgPgExistingSecret (kindIs "map" $tgPgExistingSecret) (index $tgPgExistingSecret "data") (hasKey $tgPgExistingSecret.data $tgPgPortKey) }}
  {{- $tgDbPort = index $tgPgExistingSecret.data $tgPgPortKey | b64dec }}
{{- else if $tgEnv.DATABASE_PORT }}
  {{- $tgDbPort = $tgEnv.DATABASE_PORT }}
{{- end }}
{{- $tgDbPort = $tgDbPort | default "5432" | toString }}
{{- $tgDbUser := "" }}
{{- if and $tgPgExistingSecret (kindIs "map" $tgPgExistingSecret) (index $tgPgExistingSecret "data") (hasKey $tgPgExistingSecret.data $tgPgUserKey) }}
  {{- $tgDbUser = index $tgPgExistingSecret.data $tgPgUserKey | b64dec }}
{{- else if $tgEnv.DATABASE_USER }}
  {{- $tgDbUser = $tgEnv.DATABASE_USER }}
{{- end }}
{{- $tgDbUser = $tgDbUser | default "trustgate" }}
{{- $tgDbName := "" }}
{{- if and $tgPgExistingSecret (kindIs "map" $tgPgExistingSecret) (index $tgPgExistingSecret "data") (hasKey $tgPgExistingSecret.data $tgPgNameKey) }}
  {{- $tgDbName = index $tgPgExistingSecret.data $tgPgNameKey | b64dec }}
{{- else if $tgEnv.DATABASE_NAME }}
  {{- $tgDbName = $tgEnv.DATABASE_NAME }}
{{- end }}
{{- $tgDbName = $tgDbName | default "trustgate" }}
{{- $tgDbSslMode := "" }}
{{- if and $tgPgExistingSecret (kindIs "map" $tgPgExistingSecret) (index $tgPgExistingSecret "data") (hasKey $tgPgExistingSecret.data $tgPgSslModeKey) }}
  {{- $tgDbSslMode = index $tgPgExistingSecret.data $tgPgSslModeKey | b64dec }}
{{- else if $tgEnv.DATABASE_SSL_MODE }}
  {{- $tgDbSslMode = $tgEnv.DATABASE_SSL_MODE }}
{{- end }}
{{- $tgDbSslMode = $tgDbSslMode | default "disable" }}
{{- $tgDbUrl := "" }}
{{- if $tgDbIamAuth }}
  {{- $tgDbUrl = printf "postgresql://%s@%s:%s/%s?sslmode=%s" $tgDbUser $tgDbHost $tgDbPort $tgDbName $tgDbSslMode }}
{{- else }}
  {{- $tgDbUrl = printf "postgresql://%s:%s@%s:%s/%s?sslmode=%s" $tgDbUser ($tgDbPassword | urlquery) $tgDbHost $tgDbPort $tgDbName $tgDbSslMode }}
{{- end }}

{{- /* TrustGate Redis password (if supplied) stays in Secret, not ConfigMap. */}}
{{- $tgRedisPassword := "" }}
{{- if and $tgEnv.REDIS_PASSWORD (ne ($tgEnv.REDIS_PASSWORD | toString) "") (not (hasPrefix "${" ($tgEnv.REDIS_PASSWORD | toString))) }}
  {{- $tgRedisPassword = $tgEnv.REDIS_PASSWORD | toString }}
{{- else if and $tg.redis $tg.redis.external $tg.redis.external.password (ne ($tg.redis.external.password | toString) "") (not (hasPrefix "${" ($tg.redis.external.password | toString))) }}
  {{- $tgRedisPassword = $tg.redis.external.password | toString }}
{{- else if and $existingTrustgate (kindIs "map" $existingTrustgate) (index $existingTrustgate "data") (hasKey $existingTrustgate.data "redis-password") }}
  {{- $tgRedisPassword = index $existingTrustgate.data "redis-password" | b64dec }}
{{- end }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* Shared Firewall JWT Key                                          */}}
{{- /* When neuraltrust-firewall is enabled, resolve the firewall JWT   */}}
{{- /* once and write it to both firewall-secrets and trustgate-secrets. */}}
{{- /* ---------------------------------------------------------------- */}}

{{- $firewallJwtKey := "" }}
{{- if and (hasKey $fwSecrets "jwtSecret") $fwSecrets.jwtSecret (ne ($fwSecrets.jwtSecret | toString) "") }}
  {{- $firewallJwtKey = $fwSecrets.jwtSecret | toString }}
{{- end }}
{{- if not $firewallJwtKey }}
  {{- if and $existingFirewall (kindIs "map" $existingFirewall) (index $existingFirewall "data") (hasKey $existingFirewall.data "JWT_SECRET") }}
    {{- $firewallJwtKey = index $existingFirewall.data "JWT_SECRET" | b64dec }}
  {{- end }}
{{- end }}
{{- if not $firewallJwtKey }}
  {{- if and $existingTrustgate (kindIs "map" $existingTrustgate) (index $existingTrustgate "data") (hasKey $existingTrustgate.data "NEURAL_TRUST_FIREWALL_SECRET_KEY") }}
    {{- $firewallJwtKey = index $existingTrustgate.data "NEURAL_TRUST_FIREWALL_SECRET_KEY" | b64dec }}
  {{- end }}
{{- end }}
{{- if and (not $firewallJwtKey) $fwEnabled }}
  {{- $firewallJwtKey = randAlphaNum 64 }}
{{- end }}

{{- $fwHfToken := "" }}
{{- if and (hasKey $fwSecrets "huggingFaceToken") $fwSecrets.huggingFaceToken (ne ($fwSecrets.huggingFaceToken | toString) "") }}
  {{- $fwHfToken = $fwSecrets.huggingFaceToken | toString }}
{{- else if and $existingFirewall (kindIs "map" $existingFirewall) (index $existingFirewall "data") (hasKey $existingFirewall.data "HUGGINGFACE_TOKEN") }}
  {{- $fwHfToken = index $existingFirewall.data "HUGGINGFACE_TOKEN" | b64dec }}
{{- end }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* TrustGate ↔ Firewall: URL and secret key                        */}}
{{- /* Auto-populated from firewall subchart when enabled; explicit     */}}
{{- /* values always win.                                               */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $tgFirewallUrl := "" }}
{{- if and (hasKey $tgEnv "NEURAL_TRUST_FIREWALL_URL") $tgEnv.NEURAL_TRUST_FIREWALL_URL (ne ($tgEnv.NEURAL_TRUST_FIREWALL_URL | toString) "") }}
  {{- $tgFirewallUrl = $tgEnv.NEURAL_TRUST_FIREWALL_URL | toString }}
{{- else if and $existingTrustgate (kindIs "map" $existingTrustgate) (index $existingTrustgate "data") (hasKey $existingTrustgate.data "NEURAL_TRUST_FIREWALL_URL") }}
  {{- $tgFirewallUrl = index $existingTrustgate.data "NEURAL_TRUST_FIREWALL_URL" | b64dec }}
{{- else if $fwEnabled }}
  {{- $tgFirewallUrl = printf "http://firewall.%s.svc.cluster.local" .Release.Namespace }}
{{- end }}
{{- $tgFirewallApiKey := "" }}
{{- if and (hasKey $tgEnv "NEURAL_TRUST_FIREWALL_SECRET_KEY") $tgEnv.NEURAL_TRUST_FIREWALL_SECRET_KEY (ne ($tgEnv.NEURAL_TRUST_FIREWALL_SECRET_KEY | toString) "") }}
  {{- $tgFirewallApiKey = $tgEnv.NEURAL_TRUST_FIREWALL_SECRET_KEY | toString }}
{{- else if $firewallJwtKey }}
  {{- $tgFirewallApiKey = $firewallJwtKey }}
{{- else if and $existingTrustgate (kindIs "map" $existingTrustgate) (index $existingTrustgate "data") (hasKey $existingTrustgate.data "NEURAL_TRUST_FIREWALL_SECRET_KEY") }}
  {{- $tgFirewallApiKey = index $existingTrustgate.data "NEURAL_TRUST_FIREWALL_SECRET_KEY" | b64dec }}
{{- end }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* Control Plane app ↔ Firewall: URL                                */}}
{{- /* Resolution: explicit controlPlane.components.app.config.firewallApiUrl */}}
{{- /* > existing control-plane-secrets value (lookup) > firewall FQDN  */}}
{{- /* when firewall enabled > data-plane API service URL (fallback).   */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $cpFirewallApiUrl := "" }}
{{- $cpAppCfg := dict }}
{{- if and $cp $cp.controlPlane $cp.controlPlane.components $cp.controlPlane.components.app $cp.controlPlane.components.app.config }}
  {{- $cpAppCfg = $cp.controlPlane.components.app.config }}
{{- end }}
{{- if and (hasKey $cpAppCfg "firewallApiUrl") $cpAppCfg.firewallApiUrl (ne ($cpAppCfg.firewallApiUrl | toString) "") }}
  {{- $cpFirewallApiUrl = $cpAppCfg.firewallApiUrl | toString }}
{{- else if and $existingControlPlane (kindIs "map" $existingControlPlane) (index $existingControlPlane "data") (hasKey $existingControlPlane.data "FIREWALL_API_URL") }}
  {{- $cpFirewallApiUrl = index $existingControlPlane.data "FIREWALL_API_URL" | b64dec }}
{{- else if $fwEnabled }}
  {{- $cpFirewallApiUrl = printf "http://firewall.%s.svc.cluster.local" .Release.Namespace }}
{{- else }}
  {{- $cpFirewallApiUrl = "http://data-plane-api-service:80" }}
{{- end }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* Control Plane app ↔ AISPM: POSTURE_API_URL                       */}}
{{- /* Resolution: explicit controlPlane.components.app.config.postureApiUrl */}}
{{- /* > existing control-plane-secrets value (lookup) > aispm Service  */}}
{{- /* FQDN when AISPM is enabled > empty (consumer treats as optional). */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $cpPostureApiUrl := "" }}
{{- if and (hasKey $cpAppCfg "postureApiUrl") $cpAppCfg.postureApiUrl (ne ($cpAppCfg.postureApiUrl | toString) "") }}
  {{- $cpPostureApiUrl = $cpAppCfg.postureApiUrl | toString }}
{{- else if and $existingControlPlane (kindIs "map" $existingControlPlane) (index $existingControlPlane "data") (hasKey $existingControlPlane.data "POSTURE_API_URL") }}
  {{- $cpPostureApiUrl = index $existingControlPlane.data "POSTURE_API_URL" | b64dec }}
{{- else if $aispmEnabled }}
  {{- $cpPostureApiUrl = printf "http://aispm-api-service.%s.svc.cluster.local:80" .Release.Namespace }}
{{- end }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* AISPM secret values                                              */}}
{{- /* Auto-generated where empty; existing values preserved on upgrade. */}}
{{- /* AUTH_ENCRYPTION_KEY is a Fernet key (urlsafe base64 of 32 bytes).         */}}
{{- /* See charts/neuraltrust-aispm/templates/secrets.yaml for the rationale on  */}}
{{- /* the generation pipeline — the two paths must stay in sync because they   */}}
{{- /* both write to the same `aispm-secrets` Secret (mutually exclusive paths: */}}
{{- /* parent fires when global.autoGenerateSecrets is on, subchart otherwise). */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $aispmAuthKey := "" }}
{{- if and (hasKey $aispmSecretsCfg "authEncryptionKey") $aispmSecretsCfg.authEncryptionKey (ne ($aispmSecretsCfg.authEncryptionKey | toString) "") }}
  {{- $aispmAuthKey = $aispmSecretsCfg.authEncryptionKey | toString }}
{{- else if and $existingAispm (kindIs "map" $existingAispm) (index $existingAispm "data") (hasKey $existingAispm.data "AUTH_ENCRYPTION_KEY") }}
  {{- $aispmAuthKey = index $existingAispm.data "AUTH_ENCRYPTION_KEY" | b64dec }}
{{- else if $aispmEnabled }}
  {{- $aispmAuthKey = randAlphaNum 32 | b64enc | replace "/" "_" | replace "+" "-" }}
{{- end }}
{{- /* AISPM DB auth mode. In IAM mode there is no static password (the app mints
       an RDS token); keep it empty unless one was explicitly provided. */}}
{{- $aispmDbCfg := $aispmCfg.database | default dict }}
{{- $aispmDbIamAuth := eq ($aispmDbCfg.authMode | default "password") "iam" }}
{{- $aispmDbPassword := "" }}
{{- if and (hasKey $aispmSecretsCfg "dbPassword") $aispmSecretsCfg.dbPassword (ne ($aispmSecretsCfg.dbPassword | toString) "") }}
  {{- $aispmDbPassword = $aispmSecretsCfg.dbPassword | toString }}
{{- else if and $existingAispm (kindIs "map" $existingAispm) (index $existingAispm "data") (hasKey $existingAispm.data "DATABASE_PASSWORD") }}
  {{- $aispmDbPassword = index $existingAispm.data "DATABASE_PASSWORD" | b64dec }}
{{- else if and $aispmEnabled (not $aispmDbIamAuth) }}
  {{- $aispmDbPassword = randAlphaNum 32 }}
{{- end }}
{{- /* Optional AISPM Redis password (external/managed Redis). */}}
{{- $aispmRedisCfg := $aispmCfg.redis | default dict }}
{{- $aispmRedisPassword := "" }}
{{- if and (hasKey $aispmRedisCfg "password") $aispmRedisCfg.password (ne ($aispmRedisCfg.password | toString) "") }}
  {{- $aispmRedisPassword = $aispmRedisCfg.password | toString }}
{{- else if and $existingAispm (kindIs "map" $existingAispm) (index $existingAispm "data") (hasKey $existingAispm.data "redis-password") }}
  {{- $aispmRedisPassword = index $existingAispm.data "redis-password" | b64dec }}
{{- end }}
{{- /* Optional pass-through values: only emitted when present (in values or in existing secret). */}}
{{- $aispmOptional := dict
  "OPENAI_API_KEY" "openaiApiKey"
  "GITHUB_APP_ID" "githubAppId"
  "GITHUB_APP_PRIVATE_KEY" "githubAppPrivateKey"
  "GITHUB_WEBHOOK_SECRET" "githubWebhookSecret"
  "AZURE_TENANT_ID" "azureTenantId"
  "AZURE_CLIENT_ID" "azureClientId"
  "AZURE_CLIENT_SECRET" "azureClientSecret"
  "RESEND_API_KEY" "resendApiKey"
  "ADMIN_API_KEY" "adminApiKey"
}}
{{- $aispmOptionalResolved := dict }}
{{- range $secretKey, $valuesKey := $aispmOptional }}
  {{- $resolved := "" }}
  {{- if and (hasKey $aispmSecretsCfg $valuesKey) (index $aispmSecretsCfg $valuesKey) (ne ((index $aispmSecretsCfg $valuesKey) | toString) "") }}
    {{- $resolved = (index $aispmSecretsCfg $valuesKey) | toString }}
  {{- else if and $existingAispm (kindIs "map" $existingAispm) (index $existingAispm "data") (hasKey $existingAispm.data $secretKey) }}
    {{- $resolved = index $existingAispm.data $secretKey | b64dec }}
  {{- end }}
  {{- if $resolved }}
    {{- $_ := set $aispmOptionalResolved $secretKey $resolved }}
  {{- end }}
{{- end }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* PostgreSQL Connection Values                                     */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $pgUser := $cpPg.user | default "neuraltrust" }}
{{- $pgDb := $cpPg.database | default "neuraltrust" }}
{{- $pgHost := $cpPg.host | default "control-plane-postgresql" }}
{{- $pgPort := $cpPg.port | default "5432" | toString }}
{{- $pgSslMode := ternary "disable" "require" $cpPgDeploy }}
{{- $pgDbUrl := "" }}
{{- if $cpDbIamAuth }}
  {{- $pgDbUrl = printf "postgresql://%s@%s:%s/%s?connection_limit=15&sslmode=%s" $pgUser $pgHost $pgPort $pgDb $pgSslMode }}
{{- else }}
  {{- $pgDbUrl = printf "postgresql://%s:%s@%s:%s/%s?connection_limit=15&sslmode=%s" $pgUser ($pgPassword | urlquery) $pgHost $pgPort $pgDb $pgSslMode }}
{{- end }}

{{- /* ---------------------------------------------------------------- */}}
{{- /* Control Plane Optional Secrets (not auto-generated)              */}}
{{- /* ---------------------------------------------------------------- */}}
{{- $cpOpenaiKey := $cpSecrets.openaiApiKey | default "" }}
{{- $cpResendKey := $cpSecrets.resendApiKey | default "" }}
{{- $cpResendAlert := $cpSecrets.resendAlertSender | default "" }}
{{- $cpResendInvite := $cpSecrets.resendInviteSender | default "" }}
{{- $cpFirewallJwt := $cpSecrets.firewallJwtSecret | default "" }}
{{- $cpModelScanner := $cpSecrets.modelScannerSecret | default "" }}


{{- /* ================================================================ */}}
{{- /* CREATE KUBERNETES SECRETS                                        */}}
{{- /* ================================================================ */}}


{{- /* ================================================================ */}}
{{- /* 1. TRUSTGATE SECRETS                                             */}}
{{- /* ================================================================ */}}
{{- if and .Values.trustgate .Values.trustgate.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: trustgate-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
  labels:
    app.kubernetes.io/name: {{ include "neuraltrust-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: trustgate
type: Opaque
data:
  DATABASE_HOST: {{ $tgDbHost | b64enc | quote }}
  DATABASE_PORT: {{ $tgDbPort | b64enc | quote }}
  DATABASE_USER: {{ $tgDbUser | b64enc | quote }}
  {{- if not $tgPwFromSecret }}
  DATABASE_PASSWORD: {{ $tgDbPassword | b64enc | quote }}
  {{- end }}
  DATABASE_NAME: {{ $tgDbName | b64enc | quote }}
  DATABASE_SSL_MODE: {{ $tgDbSslMode | b64enc | quote }}
  DATABASE_AUTH_MODE: {{ $tgDbAuthMode | b64enc | quote }}
  DATABASE_IAM_AUTH: {{ ternary "true" "false" $tgDbIamAuth | b64enc | quote }}
  {{- if not $tgPwFromSecret }}
  DATABASE_URL: {{ $tgDbUrl | b64enc | quote }}
  {{- end }}
  {{- if $tgRedisPassword }}
  redis-password: {{ $tgRedisPassword | b64enc | quote }}
  {{- end }}
  SERVER_SECRET_KEY: {{ $trustgateSharedKey | b64enc | quote }}
  {{- if $tgFirewallUrl }}
  NEURAL_TRUST_FIREWALL_URL: {{ $tgFirewallUrl | b64enc | quote }}
  {{- end }}
  {{- if $tgFirewallApiKey }}
  NEURAL_TRUST_FIREWALL_SECRET_KEY: {{ $tgFirewallApiKey | b64enc | quote }}
  {{- end }}
  {{- if and .Values.trustgate .Values.trustgate.config .Values.trustgate.config.providers }}
  {{- range $provider, $config := .Values.trustgate.config.providers }}
  {{- if $config.apiKey }}
  {{ $provider }}-api-key: {{ $config.apiKey | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}

---
{{- /* ================================================================ */}}
{{- /* 2. CONTROL PLANE SECRETS                                         */}}
{{- /* ================================================================ */}}
{{- $cpEnabled := false }}
{{- if and $cp $cp.controlPlane $cp.controlPlane.enabled }}
  {{- $cpEnabled = true }}
{{- end }}
{{- if $cpEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: control-plane-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: {{ include "neuraltrust-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: control-plane
type: Opaque
data:
  CONTROL_PLANE_JWT_SECRET: {{ $cpJwtSecret | b64enc }}
  OPENAI_API_KEY: {{ $cpOpenaiKey | b64enc | quote }}
  resend-api-key: {{ $cpResendKey | b64enc | quote }}
  resend-alert-sender: {{ $cpResendAlert | b64enc | quote }}
  resend-invite-sender: {{ $cpResendInvite | b64enc | quote }}
  TRUSTGATE_JWT_SECRET: {{ $trustgateSharedKey | b64enc }}
  {{- if and $cpFirewallJwt (ne $cpFirewallJwt "") }}
  FIREWALL_JWT_SECRET: {{ $cpFirewallJwt | b64enc }}
  {{- end }}
  FIREWALL_API_URL: {{ $cpFirewallApiUrl | b64enc | quote }}
  {{- if $cpPostureApiUrl }}
  POSTURE_API_URL: {{ $cpPostureApiUrl | b64enc | quote }}
  {{- end }}
  MODEL_SCANNER_SECRET: {{ $cpModelScanner | b64enc | quote }}
{{- end }}

---
{{- /* ================================================================ */}}
{{- /* 3. DATA PLANE JWT SECRET                                         */}}
{{- /* ================================================================ */}}
{{- $dpEnabled := false }}
{{- if and $dp $dp.dataPlane $dp.dataPlane.enabled }}
  {{- $dpEnabled = true }}
{{- end }}
{{- if $dpEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $dpSecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: {{ include "neuraltrust-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: data-plane
type: Opaque
data:
  DATA_PLANE_JWT_SECRET: {{ $dpJwtSecret | b64enc }}
{{- end }}

---
{{- /* ================================================================ */}}
{{- /* 4. POSTGRESQL SECRETS                                            */}}
{{- /* ================================================================ */}}
{{- $pgDeploy := false }}
{{- if and $cp $cp.infrastructure $cp.infrastructure.postgresql (hasKey $cp.infrastructure.postgresql "deploy") }}
  {{- $pgDeploy = $cp.infrastructure.postgresql.deploy }}
{{- end }}
{{- /* Umbrella-wide override: an explicit global.postgresql.deploy=false forces external Postgres. */}}
{{- if and .Values.global .Values.global.postgresql (hasKey .Values.global.postgresql "deploy") (not .Values.global.postgresql.deploy) }}
  {{- $pgDeploy = false }}
{{- end }}
{{- /* Create postgresql-secrets if PostgreSQL is deployed OR if password/host is configured */}}
{{- if or $pgDeploy $pgPassword $pgHost }}
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: {{ include "neuraltrust-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: postgresql
type: Opaque
data:
  POSTGRES_USER: {{ $pgUser | b64enc }}
  POSTGRES_PASSWORD: {{ $pgPassword | b64enc }}
  POSTGRES_DB: {{ $pgDb | b64enc }}
  POSTGRES_HOST: {{ $pgHost | b64enc }}
  POSTGRES_PORT: {{ $pgPort | b64enc }}
  DATABASE_AUTH_MODE: {{ ternary "iam" "password" $cpDbIamAuth | b64enc | quote }}
  DATABASE_IAM_AUTH: {{ ternary "true" "false" $cpDbIamAuth | b64enc | quote }}
  DATABASE_URL: {{ $pgDbUrl | b64enc }}
  POSTGRES_PRISMA_URL: {{ $pgDbUrl | b64enc }}
{{- end }}

---
{{- /* ================================================================ */}}
{{- /* 5. FIREWALL SECRETS                                              */}}
{{- /* ================================================================ */}}
{{- if $fwEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: firewall-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: {{ include "neuraltrust-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: firewall
type: Opaque
data:
  JWT_SECRET: {{ $firewallJwtKey | b64enc }}
  {{- if $fwHfToken }}
  HUGGINGFACE_TOKEN: {{ $fwHfToken | b64enc }}
  {{- end }}
{{- end }}

---
{{- /* ================================================================ */}}
{{- /* 6. AISPM SECRETS                                                 */}}
{{- /* ================================================================ */}}
{{- if $aispmEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: aispm-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: {{ include "neuraltrust-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: aispm
type: Opaque
data:
  AUTH_ENCRYPTION_KEY: {{ $aispmAuthKey | b64enc | quote }}
  DATABASE_PASSWORD: {{ $aispmDbPassword | b64enc | quote }}
  {{- if $aispmRedisPassword }}
  redis-password: {{ $aispmRedisPassword | b64enc | quote }}
  {{- end }}
  {{- range $key, $value := $aispmOptionalResolved }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}

{{- end }}
{{- /* End of autoGenerate && !preserveSecrets */}}
