{{- /*
Platform-level auto-generated Secrets (v2 only). Centralised so shared values
stay consistent across subcharts.

Resolution per key: explicit value > existing cluster Secret > randAlphaNum.

Controlled by:
  - global.autoGenerateSecrets: true (default) → auto-generation on
  - global.preserveExistingSecrets: true → skip ALL emission (operator owns them)
*/}}
{{- $autoGenerate := include "neuraltrust-platform.autoGenerateSecrets" . }}
{{- $preserveSecrets := false }}
{{- if and .Values.global .Values.global.preserveExistingSecrets }}
  {{- $preserveSecrets = true }}
{{- end }}
{{- if and $autoGenerate (not $preserveSecrets) }}

{{- /* Lookup existing Secrets so upgrades reuse previously generated values. */}}
{{- $dpValues := index .Values "data-plane-api" | default dict }}
{{- $dpRoot := default dict $dpValues.dataPlane }}
{{- $dpSecretsVals := default dict $dpRoot.secrets }}
{{- $dpSecretName := "data-plane-jwt-secret" }}
{{- if and $dpSecretsVals.dataPlaneJWTSecretName (ne $dpSecretsVals.dataPlaneJWTSecretName "") }}
  {{- $dpSecretName = $dpSecretsVals.dataPlaneJWTSecretName }}
{{- end }}
{{- $existingDataPlane := (lookup "v1" "Secret" .Release.Namespace $dpSecretName) }}
{{- $existingPostgresql := (lookup "v1" "Secret" .Release.Namespace "postgresql-secrets") }}
{{- $existingFirewall := (lookup "v1" "Secret" .Release.Namespace "firewall-secrets") }}
{{- $existingRedis := (lookup "v1" "Secret" .Release.Namespace "redis-secrets") }}

{{- /* Firewall config. */}}
{{- $fwRoot := default dict .Values.firewall }}
{{- $fwFirewall := default dict $fwRoot.firewall }}
{{- $fwSecrets := default dict $fwFirewall.secrets }}
{{- $fwEnabled := eq (include "neuraltrust-platform.product.enabled" (dict "ctx" . "product" "trustguard")) "true" }}

{{- /* PostgreSQL config. Hybrid uses global.postgresql as the shared contract.
       External control-plane may also overlay host/user/database/password/authMode
       under control-plane-api.controlPlane.components.postgresql (secrets + authMode);
       those win over empty global fields so managed Aurora IAM installs emit
       postgresql-secrets without requiring a hybrid-style shared password. */}}
{{- $globalPg := default dict (default dict .Values.global).postgresql }}
{{- $cpApiRoot := default dict (index .Values "control-plane-api") }}
{{- $cpApiPg := default dict (default dict (default dict $cpApiRoot.controlPlane).components).postgresql }}
{{- $cpApiPgSecrets := default dict $cpApiPg.secrets }}
{{- $pgDeploy := true }}
{{- if hasKey $globalPg "deploy" }}{{- $pgDeploy = $globalPg.deploy }}{{- end }}
{{- /* Precedence: global.postgresql.* wins when set; else control-plane-api overlay;
       else in-cluster defaults. Do not let chart-default control-plane host
       ("control-plane-postgresql") shadow an explicit global.postgresql.host. */}}
{{- $pgHost := "" }}
{{- if and $globalPg.host (ne ($globalPg.host | toString) "") }}{{- $pgHost = $globalPg.host | toString }}
{{- else if and $cpApiPgSecrets.host (ne ($cpApiPgSecrets.host | toString) "") (ne ($cpApiPgSecrets.host | toString) "control-plane-postgresql") }}{{- $pgHost = $cpApiPgSecrets.host | toString }}
{{- else }}{{- $pgHost = "control-plane-postgresql" }}{{- end }}
{{- $pgPort := "" }}
{{- if $globalPg.port }}{{- $pgPort = $globalPg.port | toString }}
{{- else if and $cpApiPgSecrets.port (ne ($cpApiPgSecrets.port | toString) "") }}{{- $pgPort = $cpApiPgSecrets.port | toString }}
{{- else }}{{- $pgPort = "5432" }}{{- end }}
{{- $pgUser := "" }}
{{- if and $globalPg.user (ne ($globalPg.user | toString) "") }}{{- $pgUser = $globalPg.user | toString }}
{{- else if and $cpApiPgSecrets.user (ne ($cpApiPgSecrets.user | toString) "") }}{{- $pgUser = $cpApiPgSecrets.user | toString }}
{{- else }}{{- $pgUser = "neuraltrust" }}{{- end }}
{{- $pgDb := "" }}
{{- if and $globalPg.database (ne ($globalPg.database | toString) "") }}{{- $pgDb = $globalPg.database | toString }}
{{- else if and $cpApiPgSecrets.database (ne ($cpApiPgSecrets.database | toString) "") }}{{- $pgDb = $cpApiPgSecrets.database | toString }}
{{- else }}{{- $pgDb = "neuraltrust" }}{{- end }}
{{- $pgAuthMode := "password" }}
{{- if and $globalPg.authMode (ne ($globalPg.authMode | toString) "") }}{{- $pgAuthMode = $globalPg.authMode | toString | lower }}
{{- else if and $cpApiPg.authMode (ne ($cpApiPg.authMode | toString) "") }}{{- $pgAuthMode = $cpApiPg.authMode | toString | lower }}
{{- end }}
{{- $pgIam := eq $pgAuthMode "iam" }}
{{- $pgSslMode := $globalPg.sslMode | default (ternary "disable" (ternary "require" "prefer" $pgIam) $pgDeploy) }}
{{- $pgPasswordExplicit := "" }}
{{- if and $globalPg.password (ne ($globalPg.password | toString) "") }}{{- $pgPasswordExplicit = $globalPg.password | toString }}
{{- else if and $cpApiPgSecrets.password (ne ($cpApiPgSecrets.password | toString) "") }}{{- $pgPasswordExplicit = $cpApiPgSecrets.password | toString }}
{{- end }}
{{- $pgPassword := "" }}
{{- if not $pgIam }}
  {{- $pgPassword = include "neuraltrust-platform.resolveSecret" (dict "value" $pgPasswordExplicit "existingSecret" $existingPostgresql "secretKey" "POSTGRES_PASSWORD" "length" 32) }}
{{- end }}
{{- $pgDbUrl := "" }}
{{- $sensiblePgDsn := "" }}
{{- if $pgIam }}
  {{- $pgDbUrl = printf "postgresql://%s@%s:%s/%s?connection_limit=15&sslmode=%s" ($pgUser | urlquery) $pgHost $pgPort $pgDb $pgSslMode }}
  {{- $sensiblePgDsn = printf "postgresql://%s@%s:%s/%s?sslmode=%s" ($pgUser | urlquery) $pgHost $pgPort $pgDb $pgSslMode }}
{{- else }}
  {{- $pgDbUrl = printf "postgresql://%s:%s@%s:%s/%s?connection_limit=15&sslmode=%s" $pgUser ($pgPassword | urlquery) $pgHost $pgPort $pgDb $pgSslMode }}
  {{- $sensiblePgDsn = printf "postgresql://%s:%s@%s:%s/%s?sslmode=%s" ($pgUser | urlquery) ($pgPassword | urlquery) $pgHost $pgPort $pgDb $pgSslMode }}
{{- end }}
{{- $pgChartManagedSecret := true }}
{{- $pgExistingRef := default dict $globalPg.existingSecret }}
{{- if $pgExistingRef.name }}{{- $pgChartManagedSecret = false }}{{- end }}
{{- /* Emit when in-cluster, or when an external host/password/control-plane overlay is set. */}}
{{- $pgHasExternalEndpoint := or (and $globalPg.host (ne ($globalPg.host | toString) "")) (and $cpApiPgSecrets.host (ne ($cpApiPgSecrets.host | toString) "") (ne ($cpApiPgSecrets.host | toString) "control-plane-postgresql")) $pgPasswordExplicit }}
{{- $pgShouldEmit := and $pgChartManagedSecret (or $pgDeploy $pgHasExternalEndpoint) }}

{{- /* data-plane-api JWT + Redis URL. */}}
{{- $dpJwtSecret := include "neuraltrust-platform.resolveSecret" (dict "value" ($dpSecretsVals.dataPlaneJWTSecret | default "") "existingSecret" $existingDataPlane "secretKey" "DATA_PLANE_JWT_SECRET" "length" 64) }}
{{- $dpRedisUrl := include "neuraltrust-platform.dataPlaneApi.redisUrl" . }}

{{- /* Firewall JWT. */}}
{{- $firewallJwtKey := "" }}
{{- if and $fwSecrets.jwtSecret (ne ($fwSecrets.jwtSecret | toString) "") }}
  {{- $firewallJwtKey = $fwSecrets.jwtSecret | toString }}
{{- else if and $existingFirewall (kindIs "map" $existingFirewall) (index $existingFirewall "data") (hasKey $existingFirewall.data "JWT_SECRET") }}
  {{- $firewallJwtKey = index $existingFirewall.data "JWT_SECRET" | b64dec }}
{{- else if $fwEnabled }}
  {{- $firewallJwtKey = randAlphaNum 64 }}
{{- end }}
{{- $fwHfToken := "" }}
{{- if and $fwSecrets.huggingFaceToken (ne ($fwSecrets.huggingFaceToken | toString) "") }}
  {{- $fwHfToken = $fwSecrets.huggingFaceToken | toString }}
{{- else if and $existingFirewall (kindIs "map" $existingFirewall) (index $existingFirewall "data") (hasKey $existingFirewall.data "HUGGINGFACE_TOKEN") }}
  {{- $fwHfToken = index $existingFirewall.data "HUGGINGFACE_TOKEN" | b64dec }}
{{- end }}

{{- /* data-plane-api enable gate (external always on; hybrid positive opt-in). */}}
{{- $dpEnabled := eq (include "neuraltrust-platform.product.enabled" (dict "ctx" . "product" "dataPlane")) "true" }}

{{- /* ================================================================ */}}
{{- /* 1. data-plane-api JWT / Redis Secret                              */}}
{{- /* ================================================================ */}}
{{- if $dpEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $dpSecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: {{ include "neuraltrust-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: data-plane
type: Opaque
data:
  DATA_PLANE_JWT_SECRET: {{ $dpJwtSecret | b64enc }}
  {{- if $dpRedisUrl }}
  REDIS_URL: {{ $dpRedisUrl | b64enc }}
  {{- end }}
{{- end }}

---
{{- /* ================================================================ */}}
{{- /* 2. PostgreSQL Secret (chart-managed only)                         */}}
{{- /* ================================================================ */}}
{{- if $pgShouldEmit }}
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: {{ include "neuraltrust-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: postgresql
type: Opaque
data:
  POSTGRES_USER: {{ $pgUser | b64enc }}
  POSTGRES_PASSWORD: {{ $pgPassword | b64enc }}
  POSTGRES_DB: {{ $pgDb | b64enc }}
  POSTGRES_HOST: {{ $pgHost | b64enc }}
  POSTGRES_PORT: {{ $pgPort | b64enc }}
  DATABASE_AUTH_MODE: {{ $pgAuthMode | b64enc | quote }}
  DATABASE_IAM_AUTH: {{ ternary "true" "false" $pgIam | b64enc | quote }}
  {{- /* App (Next.js) reads POSTGRES_AUTH_MODE=iam; API (Python) reads
         POSTGRES_CONNECTION_TYPE=aurora. Keep DATABASE_* as the chart-level
         flag for create-secrets / operators. */}}
  POSTGRES_AUTH_MODE: {{ $pgAuthMode | b64enc | quote }}
  POSTGRES_CONNECTION_TYPE: {{ ternary "aurora" "postgres" $pgIam | b64enc | quote }}
  DATABASE_URL: {{ $pgDbUrl | b64enc }}
  POSTGRES_PRISMA_URL: {{ $pgDbUrl | b64enc }}
  DB_HOST: {{ $pgHost | b64enc }}
  DB_PORT: {{ $pgPort | b64enc }}
  DB_USER: {{ $pgUser | b64enc }}
  DB_PASSWORD: {{ $pgPassword | b64enc }}
  DB_NAME: {{ $pgDb | b64enc }}
  DB_SSL_MODE: {{ $pgSslMode | b64enc }}
  SENSIBLE_PG_DSN: {{ $sensiblePgDsn | b64enc }}
{{- end }}

---
{{- /* ================================================================ */}}
{{- /* 3. Firewall Secret                                                */}}
{{- /* ================================================================ */}}
{{- if $fwEnabled }}
apiVersion: v1
kind: Secret
metadata:
  name: firewall-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: {{ include "neuraltrust-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: firewall
type: Opaque
data:
  JWT_SECRET: {{ $firewallJwtKey | b64enc }}
  {{- if $fwHfToken }}
  HUGGINGFACE_TOKEN: {{ $fwHfToken | b64enc }}
  {{- end }}
{{- end }}

---
{{- /* ================================================================ */}}
{{- /* 4. Redis Secret (hybrid shared credential)                        */}}
{{- /* ================================================================ */}}
{{- if eq (include "neuraltrust-platform.isHybrid" .) "true" }}
{{- $globalRedis := default dict (default dict .Values.global).redis }}
{{- $redisExistingRef := default dict $globalRedis.existingSecret }}
{{- if not $redisExistingRef.name }}
{{- $redisHost := $globalRedis.host | default "redis" }}
{{- $redisPort := $globalRedis.port | default 6379 | toString }}
{{- $redisUser := $globalRedis.username | default "" }}
{{- $redisTls := $globalRedis.tls | default "" }}
{{- $redisPassword := "" }}
{{- if and $globalRedis.password (ne ($globalRedis.password | toString) "") }}
  {{- $redisPassword = $globalRedis.password | toString }}
{{- else if and $existingRedis (kindIs "map" $existingRedis) (index $existingRedis "data") (hasKey $existingRedis.data "REDIS_PASSWORD") }}
  {{- $redisPassword = index $existingRedis.data "REDIS_PASSWORD" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: {{ include "neuraltrust-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: redis
type: Opaque
data:
  REDIS_HOST: {{ $redisHost | b64enc }}
  REDIS_PORT: {{ $redisPort | b64enc }}
  REDIS_PASSWORD: {{ $redisPassword | b64enc }}
  REDIS_USERNAME: {{ $redisUser | b64enc }}
  REDIS_TLS: {{ $redisTls | b64enc }}
{{- end }}
{{- end }}

{{- end }}
