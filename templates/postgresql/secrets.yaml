{{- /*
Fallback postgresql-secrets when global.autoGenerateSecrets is false.

Mutually exclusive with templates/platform-secrets.yaml (which owns this Secret
when autoGenerateSecrets is true). Skip when preserveExistingSecrets is true —
operators must pre-create the Secret out-of-band in that mode.

Emits only when the operator supplies an explicit password, external host, or
IAM auth overlay so empty values files do not create a useless Secret.
*/ -}}
{{- $autoGenerate := eq (include "neuraltrust-platform.autoGenerateSecrets" .) "true" -}}
{{- $preserveSecrets := false -}}
{{- if and .Values.global .Values.global.preserveExistingSecrets -}}
  {{- $preserveSecrets = true -}}
{{- end -}}
{{- if and (not $autoGenerate) (not $preserveSecrets) -}}
{{- $globalPg := default dict (default dict .Values.global).postgresql -}}
{{- $cpApiRoot := default dict (index .Values "control-plane-api") -}}
{{- $cpApiPg := default dict (default dict (default dict $cpApiRoot.controlPlane).components).postgresql -}}
{{- $cpApiPgSecrets := default dict $cpApiPg.secrets -}}
{{- $pgExistingRef := default dict $globalPg.existingSecret -}}
{{- $pgDeploy := true -}}
{{- if hasKey $globalPg "deploy" -}}{{- $pgDeploy = $globalPg.deploy -}}{{- end -}}
{{- $pgHost := "" -}}
{{- if and $globalPg.host (ne ($globalPg.host | toString) "") -}}{{- $pgHost = $globalPg.host | toString -}}
{{- else if and $cpApiPgSecrets.host (ne ($cpApiPgSecrets.host | toString) "") (ne ($cpApiPgSecrets.host | toString) "control-plane-postgresql") -}}{{- $pgHost = $cpApiPgSecrets.host | toString -}}
{{- else -}}{{- $pgHost = "control-plane-postgresql" -}}{{- end -}}
{{- $pgPort := "" -}}
{{- if $globalPg.port -}}{{- $pgPort = $globalPg.port | toString -}}
{{- else if and $cpApiPgSecrets.port (ne ($cpApiPgSecrets.port | toString) "") -}}{{- $pgPort = $cpApiPgSecrets.port | toString -}}
{{- else -}}{{- $pgPort = "5432" -}}{{- end -}}
{{- $pgUser := "" -}}
{{- if and $globalPg.user (ne ($globalPg.user | toString) "") -}}{{- $pgUser = $globalPg.user | toString -}}
{{- else if and $cpApiPgSecrets.user (ne ($cpApiPgSecrets.user | toString) "") -}}{{- $pgUser = $cpApiPgSecrets.user | toString -}}
{{- else -}}{{- $pgUser = "neuraltrust" -}}{{- end -}}
{{- $pgDb := "" -}}
{{- if and $globalPg.database (ne ($globalPg.database | toString) "") -}}{{- $pgDb = $globalPg.database | toString -}}
{{- else if and $cpApiPgSecrets.database (ne ($cpApiPgSecrets.database | toString) "") -}}{{- $pgDb = $cpApiPgSecrets.database | toString -}}
{{- else -}}{{- $pgDb = "neuraltrust" -}}{{- end -}}
{{- $pgAuthMode := "password" -}}
{{- if and $globalPg.authMode (ne ($globalPg.authMode | toString) "") -}}{{- $pgAuthMode = $globalPg.authMode | toString | lower -}}
{{- else if and $cpApiPg.authMode (ne ($cpApiPg.authMode | toString) "") -}}{{- $pgAuthMode = $cpApiPg.authMode | toString | lower -}}
{{- end -}}
{{- $pgIam := and (eq $pgAuthMode "iam") (not $pgDeploy) -}}
{{- $pgSslMode := $globalPg.sslMode | default (ternary "disable" (ternary "require" "prefer" $pgIam) $pgDeploy) -}}
{{- $pgPassword := "" -}}
{{- if and (not $pgIam) $globalPg.password (ne ($globalPg.password | toString) "") -}}
  {{- $pgPassword = $globalPg.password | toString -}}
{{- else if and (not $pgIam) $cpApiPgSecrets.password (ne ($cpApiPgSecrets.password | toString) "") -}}
  {{- $pgPassword = $cpApiPgSecrets.password | toString -}}
{{- end -}}
{{- $pgHasExternalEndpoint := or (and $globalPg.host (ne ($globalPg.host | toString) "")) (and $cpApiPgSecrets.host (ne ($cpApiPgSecrets.host | toString) "") (ne ($cpApiPgSecrets.host | toString) "control-plane-postgresql")) $pgPassword $pgIam -}}
{{- if and (not $pgExistingRef.name) (or $pgDeploy $pgHasExternalEndpoint) (or $pgPassword $pgIam $pgHasExternalEndpoint) -}}
{{- $existingPostgresql := (lookup "v1" "Secret" .Release.Namespace "postgresql-secrets") -}}
{{- if and (not $pgPassword) (not $pgIam) $existingPostgresql (kindIs "map" $existingPostgresql) (index $existingPostgresql "data") (hasKey $existingPostgresql.data "POSTGRES_PASSWORD") -}}
  {{- $pgPassword = index $existingPostgresql.data "POSTGRES_PASSWORD" | b64dec -}}
{{- end -}}
{{- $pgDbUrl := "" -}}
{{- $sensiblePgDsn := "" -}}
{{- if $pgIam -}}
  {{- $pgDbUrl = printf "postgresql://%s@%s:%s/%s?connection_limit=15&sslmode=%s" ($pgUser | urlquery) $pgHost $pgPort $pgDb $pgSslMode -}}
  {{- $sensiblePgDsn = printf "postgresql://%s@%s:%s/%s?sslmode=%s" ($pgUser | urlquery) $pgHost $pgPort $pgDb $pgSslMode -}}
{{- else if $pgPassword -}}
  {{- $pgDbUrl = printf "postgresql://%s:%s@%s:%s/%s?connection_limit=15&sslmode=%s" $pgUser ($pgPassword | urlquery) $pgHost $pgPort $pgDb $pgSslMode -}}
  {{- $sensiblePgDsn = printf "postgresql://%s:%s@%s:%s/%s?sslmode=%s" ($pgUser | urlquery) ($pgPassword | urlquery) $pgHost $pgPort $pgDb $pgSslMode -}}
{{- end -}}
{{- if or $pgPassword $pgIam -}}
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: {{ include "neuraltrust-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: postgresql
type: Opaque
data:
  POSTGRES_USER: {{ $pgUser | b64enc }}
  POSTGRES_PASSWORD: {{ $pgPassword | b64enc }}
  POSTGRES_DB: {{ $pgDb | b64enc }}
  POSTGRES_HOST: {{ $pgHost | b64enc }}
  POSTGRES_PORT: {{ $pgPort | b64enc }}
  DATABASE_AUTH_MODE: {{ $pgAuthMode | b64enc | quote }}
  DATABASE_IAM_AUTH: {{ ternary "true" "false" $pgIam | b64enc | quote }}
  POSTGRES_AUTH_MODE: {{ $pgAuthMode | b64enc | quote }}
  POSTGRES_CONNECTION_TYPE: {{ ternary "aurora" "postgres" $pgIam | b64enc | quote }}
  {{- if $pgDbUrl }}
  DATABASE_URL: {{ $pgDbUrl | b64enc }}
  POSTGRES_PRISMA_URL: {{ $pgDbUrl | b64enc }}
  {{- end }}
  DB_HOST: {{ $pgHost | b64enc }}
  DB_PORT: {{ $pgPort | b64enc }}
  DB_USER: {{ $pgUser | b64enc }}
  DB_PASSWORD: {{ $pgPassword | b64enc }}
  DB_NAME: {{ $pgDb | b64enc }}
  DB_SSL_MODE: {{ $pgSslMode | b64enc }}
  {{- if $sensiblePgDsn }}
  SENSIBLE_PG_DSN: {{ $sensiblePgDsn | b64enc }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
