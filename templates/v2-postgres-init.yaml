{{- /*
platform-v2: create a database + role per v2 service on the in-cluster
control-plane-postgresql, using the admin credentials in postgresql-secrets and
each service's own generated password (agentgateway-secrets/DB_PASSWORD,
trustguard-secrets/DB_PASSWORD, trustlens-secrets/DATABASE_PASSWORD).

Rendered only when:
  - global.platformVersion=v2, AND
  - in-cluster PostgreSQL is deployed (skipped for external Postgres, where the
    operator pre-creates the per-service users/databases).
Idempotent: existing roles get their password reset; existing databases are left
in place. A service is skipped when its password env resolves empty.
*/ -}}
{{- if eq (include "neuraltrust-platform.isV2" .) "true" }}
{{- /* Detect in-cluster Postgres (mirror control-plane.postgresql.deploy resolution). */}}
{{- $pgDeploy := true }}
{{- $cp := index .Values "neuraltrust-control-plane" }}
{{- if and $cp $cp.infrastructure $cp.infrastructure.postgresql (hasKey $cp.infrastructure.postgresql "deploy") }}
  {{- $pgDeploy = $cp.infrastructure.postgresql.deploy }}
{{- end }}
{{- if and .Values.global .Values.global.postgresql (hasKey .Values.global.postgresql "deploy") (not .Values.global.postgresql.deploy) }}
  {{- $pgDeploy = false }}
{{- end }}
{{- if $pgDeploy }}
{{- /* Per-service roles and databases, keyed on deployment mode:
       - hybrid: only the data planes run on-prem. Both services write raw telemetry
         into ONE shared database ("trustdata") but each into its OWN schema (named
         after its role) so their per-service "migration_versions" trackers never
         collide. DataAgent reads that DB read-only; its role's search_path spans both
         writer schemas so its unqualified reads (SELECT ... FROM "<table>") resolve.
       - external: control + data run on-prem and each control plane owns its own
         migrations, so every service gets its OWN database (public schema). DataAgent
         is not deployed (DataCore reads ClickHouse instead).
       Names default per mode and are overridable via each subchart's database.{user,name}. */}}
{{- $isHybrid := eq (include "neuraltrust-platform.isHybrid" .) "true" }}
{{- $isExternal := eq (include "neuraltrust-platform.isExternal" .) "true" }}
{{- $ag := default dict (index .Values "agentgateway") }}
{{- $agDb := default dict $ag.database }}
{{- $agUser := $agDb.user | default "agentgateway" }}
{{- $tg := default dict (index .Values "trustguard") }}
{{- $tgDb := default dict $tg.database }}
{{- $tgUser := $tgDb.user | default "trustguard" }}
{{- /* hybrid: one shared DB; external: one DB per service (defaults to the service name). */}}
{{- $sharedDb := $agDb.name | default "trustdata" }}
{{- $agName := $agDb.name | default "agentgateway" }}
{{- $tgName := $tgDb.name | default "trustguard" }}
{{- $da := default dict (index .Values "dataagent") }}
{{- $daDb := default dict $da.database }}
{{- $daUser := $daDb.user | default "dataagent" }}
{{- $tl := default dict (index .Values "trustlens") }}
{{- $tlEnabled := and (hasKey $tl "enabled") $tl.enabled }}
{{- $tlDb := default dict $tl.database }}
{{- $tlUser := $tlDb.user | default "trustlens" }}
{{- $tlName := $tlDb.name | default "trustlens" }}
{{- /* AlertEngine — external only; keeps its own database (separate migrations). */}}
{{- $ae := default dict (index .Values "alertengine") }}
{{- $aeEnabled := true }}
{{- if hasKey $ae "enabled" }}{{- $aeEnabled = $ae.enabled }}{{- end }}
{{- $aeEnabled = and $aeEnabled (eq (include "neuraltrust-platform.isExternal" .) "true") }}
{{- $aeDb := default dict $ae.database }}
{{- $aeUser := $aeDb.user | default "alertengine" }}
{{- $aeName := $aeDb.name | default "alertengine" }}
{{- /* Image (matches the trustgate/aispm init image; override via global.postgresql.image). */}}
{{- $pgImageRepo := "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/postgres" }}
{{- $pgImageTag := "17-alpine" }}
{{- with (default dict .Values.global).postgresql }}
  {{- with .image }}
    {{- if .repository }}{{- $pgImageRepo = .repository }}{{- end }}
    {{- if .tag }}{{- $pgImageTag = .tag }}{{- end }}
  {{- end }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: v2-postgresql-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: v2-postgresql-init
    app.kubernetes.io/component: postgresql-init
    app.kubernetes.io/part-of: neuraltrust-platform
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: v2-postgresql-init
        app.kubernetes.io/component: postgresql-init
    spec:
      restartPolicy: Never
      {{- if (default dict .Values.global).imagePullSecrets }}
      imagePullSecrets:
      {{- range (default dict .Values.global).imagePullSecrets }}
      {{- if kindIs "string" . }}
        - name: {{ . }}
      {{- else if kindIs "map" . }}
        - {{ toYaml . | nindent 10 | trim }}
      {{- end }}
      {{- end }}
      {{- else }}
      imagePullSecrets:
        - name: gcr-secret
      {{- end }}
      {{- include "neuraltrust-platform.nodeSelector" (dict "ctx" .) | nindent 6 }}
      {{- include "neuraltrust-platform.tolerations" (dict "ctx" .) | nindent 6 }}
      containers:
        - name: postgresql-init
          image: {{ printf "%s:%s" $pgImageRepo $pgImageTag | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              PG_HOST="${POSTGRES_HOST:-control-plane-postgresql}"
              PG_PORT="${POSTGRES_PORT:-5432}"
              PG_ADMIN_USER="${POSTGRES_USER:-neuraltrust}"
              PG_ADMIN_PASSWORD="${POSTGRES_PASSWORD}"

              if [ -z "${PG_ADMIN_PASSWORD}" ]; then
                echo "ERROR: postgresql-secrets/POSTGRES_PASSWORD not available; cannot create v2 databases."
                exit 1
              fi

              echo "Waiting for PostgreSQL at ${PG_HOST}:${PG_PORT}..."
              export PGPASSWORD="${PG_ADMIN_PASSWORD}"
              ATTEMPT=0
              MAX_ATTEMPTS=240
              while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
                if pg_isready -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_ADMIN_USER}" -t 2 >/dev/null 2>&1; then
                  echo "PostgreSQL is ready."
                  break
                fi
                ATTEMPT=$((ATTEMPT + 1))
                [ $((ATTEMPT % 10)) -eq 0 ] && echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: waiting for PostgreSQL..."
                sleep 2
              done
              if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
                echo "ERROR: PostgreSQL not ready after $((MAX_ATTEMPTS * 2))s."
                exit 1
              fi

              PSQL="psql -h ${PG_HOST} -p ${PG_PORT} -U ${PG_ADMIN_USER} -d postgres"

              # ensure_role <role> <password>; returns 1 (skip) when no password.
              ensure_role() {
                ROLE="$1"; PW="$2"
                if [ -z "${PW}" ]; then
                  echo "Skipping role '${ROLE}' (no password provided)."
                  return 1
                fi
                echo "Ensuring role '${ROLE}'..."
                if [ "$(${PSQL} -tAc "SELECT 1 FROM pg_roles WHERE rolname='${ROLE}'" 2>/dev/null)" = "1" ]; then
                  ${PSQL} -c "ALTER USER \"${ROLE}\" WITH PASSWORD '${PW}';" || echo "WARNING: could not update password for '${ROLE}'"
                else
                  ${PSQL} -c "CREATE USER \"${ROLE}\" WITH PASSWORD '${PW}';"
                fi
                return 0
              }

              # ensure_db <database>; created owned by the admin role.
              ensure_db() {
                DB="$1"
                echo "Ensuring database '${DB}'..."
                if [ "$(${PSQL} -tAc "SELECT 1 FROM pg_database WHERE datname='${DB}'" 2>/dev/null)" != "1" ]; then
                  ${PSQL} -c "CREATE DATABASE \"${DB}\";"
                fi
              }

              # ensure_writer_schema <database> <role>: give the writer its OWN schema
              # (named after the role) and default its search_path there, so its
              # unqualified DDL (raw data table + "migration_versions" tracker) lands in
              # that schema and co-tenants' identically-named trackers never collide. SET
              # (not RESET) also converges an earlier shared-"public" release onto the schema.
              ensure_writer_schema() {
                DB="$1"; ROLE="$2"
                PSQL_DB="psql -h ${PG_HOST} -p ${PG_PORT} -U ${PG_ADMIN_USER} -d ${DB}"
                ${PSQL} -c "GRANT CONNECT ON DATABASE \"${DB}\" TO \"${ROLE}\";" || echo "WARNING: grant connect failed for '${ROLE}'"
                ${PSQL_DB} -c "CREATE SCHEMA IF NOT EXISTS \"${ROLE}\" AUTHORIZATION \"${ROLE}\";" || echo "WARNING: create schema failed for '${ROLE}'"
                ${PSQL} -c "ALTER ROLE \"${ROLE}\" IN DATABASE \"${DB}\" SET search_path = \"${ROLE}\";" || echo "WARNING: set search_path failed for '${ROLE}'"
                echo "✓ writer '${ROLE}' ready in '${DB}' (schema '${ROLE}')."
              }

              # grant_readonly <database> <reader> <writer>: SELECT-only on the writer's
              # schema, incl. future tables the writer creates there.
              grant_readonly() {
                DB="$1"; READER="$2"; WRITER="$3"
                PSQL_DB="psql -h ${PG_HOST} -p ${PG_PORT} -U ${PG_ADMIN_USER} -d ${DB}"
                ${PSQL} -c "GRANT CONNECT ON DATABASE \"${DB}\" TO \"${READER}\";" || echo "WARNING: grant connect failed for '${READER}'"
                ${PSQL_DB} -c "GRANT USAGE ON SCHEMA \"${WRITER}\" TO \"${READER}\";" || echo "WARNING: grant usage failed for '${READER}'"
                ${PSQL_DB} -c "GRANT SELECT ON ALL TABLES IN SCHEMA \"${WRITER}\" TO \"${READER}\";" || echo "WARNING: grant select failed for '${READER}'"
                ${PSQL_DB} -c "ALTER DEFAULT PRIVILEGES FOR ROLE \"${WRITER}\" IN SCHEMA \"${WRITER}\" GRANT SELECT ON TABLES TO \"${READER}\";" || echo "WARNING: default privileges failed for '${READER}'"
                echo "✓ reader '${READER}' can SELECT schema '${WRITER}' in '${DB}'."
              }

              # ensure_owned_db <database> <role>: a private database owned by the service
              # (external mode — each control plane owns its own migrations).
              ensure_owned_db() {
                DB="$1"; ROLE="$2"
                ensure_db "${DB}"
                ${PSQL} -c "ALTER DATABASE \"${DB}\" OWNER TO \"${ROLE}\";" || echo "WARNING: set owner failed for '${DB}'"
                ${PSQL} -c "GRANT ALL PRIVILEGES ON DATABASE \"${DB}\" TO \"${ROLE}\";" || echo "WARNING: grant db failed for '${DB}'"
                psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_ADMIN_USER}" -d "${DB}" -c "GRANT ALL ON SCHEMA public TO \"${ROLE}\";" || echo "WARNING: grant schema failed for '${DB}'"
                echo "✓ '${ROLE}' owns database '${DB}' (public schema)."
              }

              {{- if $isHybrid }}
              # ---- hybrid: shared trustdata DB; each writer in its own schema; DataAgent reads both ----
              AG_OK=0; TG_OK=0; DA_OK=0
              if ensure_role "{{ $agUser }}" "${AGENTGATEWAY_DB_PASSWORD}"; then AG_OK=1; fi
              if ensure_role "{{ $tgUser }}" "${TRUSTGUARD_DB_PASSWORD}"; then TG_OK=1; fi
              if ensure_role "{{ $daUser }}" "${DATAAGENT_DB_PASSWORD:-}"; then DA_OK=1; fi

              if [ "${AG_OK}" = "1" ] || [ "${TG_OK}" = "1" ]; then
                ensure_db "{{ $sharedDb }}"
                if [ "${AG_OK}" = "1" ]; then ensure_writer_schema "{{ $sharedDb }}" "{{ $agUser }}"; fi
                if [ "${TG_OK}" = "1" ]; then ensure_writer_schema "{{ $sharedDb }}" "{{ $tgUser }}"; fi
                if [ "${DA_OK}" = "1" ]; then
                  if [ "${AG_OK}" = "1" ]; then grant_readonly "{{ $sharedDb }}" "{{ $daUser }}" "{{ $agUser }}"; fi
                  if [ "${TG_OK}" = "1" ]; then grant_readonly "{{ $sharedDb }}" "{{ $daUser }}" "{{ $tgUser }}"; fi
                  # DataAgent reads both writers unqualified: its search_path must span both schemas.
                  ${PSQL} -c "ALTER ROLE \"{{ $daUser }}\" IN DATABASE \"{{ $sharedDb }}\" SET search_path = \"{{ $agUser }}\", \"{{ $tgUser }}\", public;" || echo "WARNING: set reader search_path failed for '{{ $daUser }}'"
                fi
              fi
              {{- end }}

              {{- if $isExternal }}
              # ---- external: one private database per service; control planes own migrations ----
              if ensure_role "{{ $agUser }}" "${AGENTGATEWAY_DB_PASSWORD}"; then ensure_owned_db "{{ $agName }}" "{{ $agUser }}"; fi
              if ensure_role "{{ $tgUser }}" "${TRUSTGUARD_DB_PASSWORD}"; then ensure_owned_db "{{ $tgName }}" "{{ $tgUser }}"; fi
              {{- end }}

              {{- if $tlEnabled }}
              # TrustLens keeps its own database (separate schema + migrations).
              if ensure_role "{{ $tlUser }}" "${TRUSTLENS_DB_PASSWORD}"; then
                ensure_db "{{ $tlName }}"
                ${PSQL} -c "ALTER DATABASE \"{{ $tlName }}\" OWNER TO \"{{ $tlUser }}\";" || echo "WARNING: set owner failed for '{{ $tlName }}'"
                ${PSQL} -c "GRANT ALL PRIVILEGES ON DATABASE \"{{ $tlName }}\" TO \"{{ $tlUser }}\";" || echo "WARNING: grant db failed for '{{ $tlName }}'"
                psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_ADMIN_USER}" -d "{{ $tlName }}" -c "GRANT ALL ON SCHEMA public TO \"{{ $tlUser }}\";" || echo "WARNING: grant schema failed for '{{ $tlName }}'"
              fi
              {{- end }}

              {{- if $aeEnabled }}
              # AlertEngine keeps its own database (separate migrations).
              if ensure_role "{{ $aeUser }}" "${ALERTENGINE_DB_PASSWORD}"; then
                ensure_db "{{ $aeName }}"
                ${PSQL} -c "ALTER DATABASE \"{{ $aeName }}\" OWNER TO \"{{ $aeUser }}\";" || echo "WARNING: set owner failed for '{{ $aeName }}'"
                ${PSQL} -c "GRANT ALL PRIVILEGES ON DATABASE \"{{ $aeName }}\" TO \"{{ $aeUser }}\";" || echo "WARNING: grant db failed for '{{ $aeName }}'"
                psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_ADMIN_USER}" -d "{{ $aeName }}" -c "GRANT ALL ON SCHEMA public TO \"{{ $aeUser }}\";" || echo "WARNING: grant schema failed for '{{ $aeName }}'"
              fi
              {{- end }}

              echo "v2 PostgreSQL initialization completed."
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          env:
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: POSTGRES_HOST
                  optional: true
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: POSTGRES_PORT
                  optional: true
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: POSTGRES_USER
                  optional: true
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secrets
                  key: POSTGRES_PASSWORD
                  optional: true
            - name: AGENTGATEWAY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentgateway-secrets
                  key: DB_PASSWORD
                  optional: true
            - name: TRUSTGUARD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trustguard-secrets
                  key: DB_PASSWORD
                  optional: true
            - name: DATAAGENT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dataagent-secrets
                  key: DB_PASSWORD
                  optional: true
            {{- if $tlEnabled }}
            - name: TRUSTLENS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trustlens-secrets
                  key: DATABASE_PASSWORD
                  optional: true
            {{- end }}
            {{- if $aeEnabled }}
            - name: ALERTENGINE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alertengine-secrets
                  key: DB_PASSWORD
                  optional: true
            {{- end }}
{{- end }}
{{- end }}
