{{- /*
Shared TrustGuard client-credentials Secret.

AgentGateway's proxy authenticates to TrustGuard's /v1/token with a
client_credentials pair (scope=platform); TrustGuard validates it against its own
TRUSTGUARD_PLATFORM_CLIENT_ID/_SECRET. Both sides MUST use the same id + secret,
so we own a single Secret here and inject it into both services' Deployments via
neuraltrust-platform.trustguardClientEnv. The id/secret are emitted together and
stay a consistent pair: either both populated or both empty (TrustGuard refuses
to boot with a platform client id set but no secret).

Resolution (matches neuraltrust-platform.resolveSecret):
  1. global.v2.trustguardClientSecret (explicit override)
  2. existing trustguard-client-credentials in the cluster
  3. legacy v2-trustguard-client-secret during the 2.0 prerelease migration
  4. random value, only when global.autoGenerateSecrets is on
When none of the above apply, both keys render empty (platform scope disabled).
*/ -}}
{{- if and (eq (include "neuraltrust-platform.isV2" .) "true") (not (dig "preserveExistingSecrets" false (.Values.global | default dict))) }}
{{- $v2 := default dict (default dict .Values.global).v2 }}
{{- $auto := eq (include "neuraltrust-platform.autoGenerateSecrets" .) "true" }}
{{- $override := $v2.trustguardClientSecret | default "" }}
{{- $current := (lookup "v1" "Secret" .Release.Namespace "trustguard-client-credentials") }}
{{- $legacy := (lookup "v1" "Secret" .Release.Namespace "v2-trustguard-client-secret") }}
{{- $existing := dict }}
{{- $currentId := "" }}
{{- $currentSecret := "" }}
{{- if and $current (kindIs "map" $current) $current.data }}
  {{- if hasKey $current.data "CLIENT_ID" }}{{- $currentId = index $current.data "CLIENT_ID" | b64dec }}{{- end }}
  {{- if hasKey $current.data "CLIENT_SECRET" }}{{- $currentSecret = index $current.data "CLIENT_SECRET" | b64dec }}{{- end }}
{{- end }}
{{- $legacyId := "" }}
{{- $legacySecret := "" }}
{{- if and $legacy (kindIs "map" $legacy) $legacy.data }}
  {{- if hasKey $legacy.data "CLIENT_ID" }}{{- $legacyId = index $legacy.data "CLIENT_ID" | b64dec }}{{- end }}
  {{- if hasKey $legacy.data "CLIENT_SECRET" }}{{- $legacySecret = index $legacy.data "CLIENT_SECRET" | b64dec }}{{- end }}
{{- end }}
{{- $currentComplete := and (ne $currentId "") (ne $currentSecret "") }}
{{- $legacyComplete := and (ne $legacyId "") (ne $legacySecret "") }}
{{- if $currentComplete }}
  {{- $existing = $current }}
{{- else if $legacyComplete }}
  {{- $existing = $legacy }}
{{- end }}
{{- $hasExisting := or $currentComplete $legacyComplete }}
{{- $clientId := "" }}
{{- $clientSecret := "" }}
{{- if or $auto $override $hasExisting }}
  {{- $configuredId := $v2.trustguardClientId | default "agentgateway-platform" }}
  {{- $clientId = $configuredId }}
  {{- if $hasExisting }}
    {{- $clientId = index $existing.data "CLIENT_ID" | b64dec }}
  {{- end }}
  {{- /* A non-default configured ID is an intentional override; otherwise the
         persisted ID stays paired with its existing client secret. */}}
  {{- if ne $configuredId "agentgateway-platform" }}
    {{- $clientId = $configuredId }}
  {{- end }}
  {{- $clientSecret = include "neuraltrust-platform.resolveSecret" (dict "value" $override "existingSecret" $existing "secretKey" "CLIENT_SECRET" "length" 48) }}
{{- end }}
{{- if or .Release.IsInstall $hasExisting $override (eq (include "neuraltrust-platform.confirmedMigrationCanGenerateSecrets" .) "true") }}
apiVersion: v1
kind: Secret
metadata:
  name: trustguard-client-credentials
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: trustguard-client-credentials
    app.kubernetes.io/component: trustguard-client-credentials
    app.kubernetes.io/part-of: neuraltrust-platform
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  CLIENT_ID: {{ $clientId | quote }}
  CLIENT_SECRET: {{ $clientSecret | quote }}
{{- end }}
{{- end }}
