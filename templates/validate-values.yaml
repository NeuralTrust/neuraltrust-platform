{{- /*
Fail early for unsupported topology values. This template intentionally emits
no Kubernetes resource when validation succeeds.
*/ -}}
{{- $global := default dict .Values.global -}}
{{- $mode := $global.deploymentMode | default "hybrid" -}}
{{- if not (has $mode (list "hybrid" "external")) -}}
  {{- fail (printf "global.deploymentMode must be one of: hybrid, external (got %q)" $mode) -}}
{{- end -}}

{{- $trustlens := default dict .Values.trustlens -}}
{{- $trustlensImage := default dict $trustlens.image -}}
{{- if and ($trustlens.enabled | default false) (not ($trustlensImage.tag | default "")) -}}
  {{- fail "trustlens.image.tag is required when trustlens.enabled=true; no default TrustLens release image is published yet." -}}
{{- end -}}

{{- /* DataAgent hybrid guard rails. */ -}}
{{- $dataagent := default dict .Values.dataagent -}}
{{- if or (hasKey $dataagent "enrolmentToken") (hasKey $dataagent "enrolmentTokenExistingSecret") -}}
  {{- fail "dataagent.enrolmentToken / dataagent.enrolmentTokenExistingSecret were renamed to dataagent.enrolment.token / dataagent.enrolment.existingSecret (same ritual as configSync.token / existingSecret)." -}}
{{- end -}}
{{- $enrolment := default dict $dataagent.enrolment -}}
{{- $existingTokenRef := default dict $enrolment.existingSecret -}}
{{- $enrolmentToken := $enrolment.token | default "" -}}
{{- $existingDataRef := default dict $dataagent.existingSecret -}}
{{- $managedDataagentSecret := lookup "v1" "Secret" .Release.Namespace "dataagent-secrets" -}}
{{- $managedDataagentData := dict -}}
{{- if and $managedDataagentSecret (kindIs "map" $managedDataagentSecret) $managedDataagentSecret.data -}}
  {{- $managedDataagentData = $managedDataagentSecret.data -}}
{{- end -}}
{{- $hasManagedToken := and (hasKey $managedDataagentData "ENROLMENT_TOKEN") (ne (index $managedDataagentData "ENROLMENT_TOKEN") "") -}}
{{- $hasManagedDatabase := and (hasKey $managedDataagentData "DATABASE_URL") (ne (index $managedDataagentData "DATABASE_URL") "") -}}
{{- $autoGenerate := true -}}
{{- if hasKey $global "autoGenerateSecrets" -}}{{- $autoGenerate = $global.autoGenerateSecrets -}}{{- end -}}
{{- $preserveExisting := false -}}
{{- if hasKey $global "preserveExistingSecrets" -}}{{- $preserveExisting = $global.preserveExistingSecrets -}}{{- end -}}
{{- if and
  (eq $mode "hybrid")
  $dataagent.tenantId
  $enrolmentToken
  (not ($existingTokenRef.name | default ""))
  (not $hasManagedToken)
  (or (not $autoGenerate) $preserveExisting ($existingDataRef.name | default ""))
-}}
  {{- fail "dataagent.enrolment.token cannot be materialized with externally managed database secrets. Set dataagent.enrolment.existingSecret.name/key." -}}
{{- end -}}
{{- $dataagentTokenConfigured := or $enrolmentToken ($existingTokenRef.name | default "") $hasManagedToken -}}
{{- if and
  (eq $mode "hybrid")
  $dataagent.tenantId
  $dataagentTokenConfigured
  (or (not $autoGenerate) $preserveExisting)
  (not ($existingDataRef.name | default ""))
  (not $hasManagedDatabase)
-}}
  {{- fail "DataAgent requires dataagent.existingSecret.name containing DATABASE_URL and DB_PASSWORD when chart secret generation is disabled." -}}
{{- end -}}
{{- if and (eq $mode "external") $preserveExisting -}}
  {{- $existingControlPlane := lookup "v1" "Secret" .Release.Namespace "control-plane-secrets" -}}
  {{- if and $existingControlPlane (kindIs "map" $existingControlPlane) $existingControlPlane.data -}}
    {{- if or (not (hasKey $existingControlPlane.data "AUTH_SECRET")) (not (hasKey $existingControlPlane.data "NEXTAUTH_SECRET")) -}}
      {{- fail "preserveExistingSecrets=true requires control-plane-secrets to contain both AUTH_SECRET and NEXTAUTH_SECRET before an external upgrade." -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- /* Config-sync is fail-closed: require a SaaS-issued token source. */ -}}
{{- range $component := list
  (dict "name" "agentgateway" "secretName" "agentgateway-secrets" "values" (default dict $.Values.agentgateway))
  (dict "name" "trustguard" "secretName" "trustguard-secrets" "values" (default dict $.Values.trustguard))
-}}
  {{- $configSync := default dict $component.values.configSync -}}
  {{- $existingRef := default dict $configSync.existingSecret -}}
  {{- $managedSecret := lookup "v1" "Secret" $.Release.Namespace $component.secretName -}}
  {{- $managedData := dict -}}
  {{- if and $managedSecret (kindIs "map" $managedSecret) $managedSecret.data -}}
    {{- $managedData = $managedSecret.data -}}
  {{- end -}}
  {{- $hasManagedToken := and (hasKey $managedData "CONFIG_SYNC_TOKEN") (ne (index $managedData "CONFIG_SYNC_TOKEN") "") -}}
  {{- $hasManagedLkgKey := and (hasKey $managedData "CONFIG_SYNC_LKG_KEY") (ne (index $managedData "CONFIG_SYNC_LKG_KEY") "") -}}
  {{- $inlineTokenUsable := and ($configSync.token | default "") $autoGenerate (not $preserveExisting) -}}
  {{- $configSyncOn := eq (include "neuraltrust-platform.configSync.enabledFrom" (dict "mode" $mode "configSync" $configSync)) "true" -}}
  {{- if and
    $configSyncOn
    (not $inlineTokenUsable)
    (not ($existingRef.name | default ""))
    (not (and $hasManagedToken $hasManagedLkgKey))
  -}}
    {{- fail (printf "%s config-sync requires CONFIG_SYNC_TOKEN and CONFIG_SYNC_LKG_KEY: set %s.configSync.existingSecret.name, or use %s.configSync.token only when chart Secret generation is enabled. Hybrid enables config-sync by default; set %s.configSync.enabled=false only for Postgres-managed configuration." $component.name $component.name $component.name $component.name) -}}
  {{- end -}}
{{- end -}}

{{- /* Hybrid product OTLP is mandatory: local egress + DataAgent enrolment.
     EXTERNAL keeps telemetry in-cluster (no SaaS hop). Legacy opt-out keys
     are rejected so operators move air-gap installs to deploymentMode=external. */ -}}
{{- $clickstack := default dict $global.clickstack -}}
{{- $egress := default dict $clickstack.egress -}}
{{- if eq $mode "hybrid" -}}
  {{- if and (hasKey $clickstack "enabled") (eq $clickstack.enabled false) -}}
    {{- fail "global.clickstack.enabled is no longer supported: hybrid product OTLP is mandatory. Use global.deploymentMode=external for air-gapped / local-only product telemetry." -}}
  {{- end -}}
  {{- if and (hasKey $egress "enabled") (eq $egress.enabled false) -}}
    {{- fail "global.clickstack.egress.enabled is no longer supported: hybrid product OTLP always uses the DataAgent-co-located egress collector. Use global.deploymentMode=external for air-gapped / local-only product telemetry." -}}
  {{- end -}}
  {{- if ne (include "neuraltrust-platform.dataagentEnabled" .) "true" -}}
    {{- fail "v2 hybrid requires an enabled DataAgent (tenantId + enrolment.token or enrolment.existingSecret.name) so the OTLP egress sidecar can use the loopback OAuth broker. Use global.deploymentMode=external for air-gapped / local-only product telemetry." -}}
  {{- end -}}
{{- end -}}

{{- /* data-plane-api SQL backend validation. */ -}}
{{- $dpRoot := default dict (index .Values "data-plane-api") -}}
{{- $dpComponents := default dict (default dict $dpRoot.dataPlane).components -}}
{{- $dpApi := default dict $dpComponents.api -}}
{{- $dpApiEnabled := true -}}
{{- if hasKey $dpApi "enabled" -}}{{- $dpApiEnabled = $dpApi.enabled -}}{{- end -}}
{{- $dpApiDatabase := default dict $dpApi.database -}}
{{- $dpBackend := $dpApiDatabase.backend | default "" | toString | lower -}}
{{- if and $dpBackend (not (has $dpBackend (list "postgres" "postgresql" "clickhouse" "auto"))) -}}
  {{- fail (printf "data-plane-api.dataPlane.components.api.database.backend must be one of: postgres, clickhouse, auto (got %q)" $dpBackend) -}}
{{- end -}}
{{- if and (eq $mode "hybrid") $dpApiEnabled (eq $dpBackend "clickhouse") -}}
  {{- $dpCh := default dict $dpComponents.clickhouse -}}
  {{- $dpChHost := $dpCh.host | default "clickhouse" -}}
  {{- if not (contains "." $dpChHost) -}}
    {{- fail "data-plane-api.dataPlane.components.api.database.backend=clickhouse in v2 hybrid requires an external ClickHouse: set data-plane-api.dataPlane.components.clickhouse.host to a dotted (external) endpoint, or use the default PostgreSQL backend." -}}
  {{- end -}}
{{- end -}}
