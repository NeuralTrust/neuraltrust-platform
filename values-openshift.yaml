# Platform v2 hybrid on OpenShift using native Routes.

global:
  platformVersion: "v2"
  deploymentMode: "hybrid"
  platform: "openshift"
  domain: "apps.example.com"
  imageRegistry: ""
  storageClass: ""
  autoGenerateSecrets: true
  preserveExistingSecrets: false
  security:
    allowInsecureImages: true
  ingress:
    provider: "openshift"

infrastructure:
  postgresql:
    deploy: true
  redis:
    deploy: true
  clickhouse:
    deploy: true
  kafka:
    deploy: false

dataagent:
  tenantId: ""
  enrolmentToken: ""
