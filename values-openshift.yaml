# Platform v2 hybrid on OpenShift using native Routes.
# Hybrid product OTLP requires DataAgent enrolment (see values-required.yaml).
# Air-gapped / local-only product telemetry → global.deploymentMode=external.

global:
  deploymentMode: "hybrid"
  platform: "openshift"
  domain: "apps.example.com"
  ingress:
    provider: "openshift"
