# Platform v2 hybrid on OpenShift using native Routes.
# Layer over values-required.yaml (or a positive product example) so
# global.products is selected and DataAgent enrolment is set.
# Air-gapped / local-only product telemetry → global.deploymentMode=external.

global:
  deploymentMode: "hybrid"
  platform: "openshift"
  domain: "apps.example.com"
  ingress:
    provider: "openshift"
