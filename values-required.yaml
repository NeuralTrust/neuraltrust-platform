# Minimal Platform v2 hybrid starting point.
# Set the platform and domain, then install with:
#   helm upgrade --install neuraltrust-platform <chart> \
#     --namespace neuraltrust --create-namespace -f values-required.yaml

global:
  platformVersion: "v2"
  deploymentMode: "hybrid"
  platform: "kubernetes" # Required: aws | gcp | azure | openshift | kubernetes
  domain: "platform.example.com" # Required: base domain for generated hostnames
  imageRegistry: "" # Optional: "<registry>/neuraltrust"
  storageClass: "" # Optional: cluster default when empty
  autoGenerateSecrets: true
  preserveExistingSecrets: false

# DataAgent is optional and enrolment-gated. Enable only after NeuralTrust
# provides both values below.
dataagent:
  tenantId: ""
  enrolmentToken: ""
  enrolmentTokenExistingSecret:
    name: ""
    key: "ENROLMENT_TOKEN"
