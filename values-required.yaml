# Minimal Platform v2 hybrid starting point.
# Install fails closed until a ClickStack token is supplied (authToken OR
# existingSecret.name), or until air-gap is opted in with
# global.clickstack.enabled: false.
#
#   helm upgrade --install neuraltrust-platform <chart> \
#     --namespace neuraltrust --create-namespace -f values-required.yaml

global:
  deploymentMode: "hybrid"
  platform: "kubernetes" # Required: aws | gcp | azure | openshift | kubernetes
  domain: "platform.example.com" # Required: base domain for generated hostnames
  imageRegistry: "" # Optional: "<registry>/neuraltrust"
  storageClass: "" # Optional: cluster default when empty
  autoGenerateSecrets: true
  # v2 hybrid ALWAYS dual-writes AgentGateway + TrustGuard product data over OTLP
  # to the NeuralTrust SaaS ClickStack collector (endpoint / protocol / TLS are
  # fixed by the chart). Supply the collector's bearer token below OR reference a
  # pre-created Secret via existingSecret.name. Rendering fails when neither is
  # set. Set `enabled: false` for an air-gapped install with no OTLP dual-write.
  clickstack:
    authToken: "" # Required (or set existingSecret.name below)
    # existingSecret:
    #   name: "clickstack-otlp-token"       # pre-created Secret name
    #   key: "OTEL_EXPORTER_OTLP_HEADERS"   # optional (default shown)

# DataAgent is optional and enrolment-gated. Enable only after NeuralTrust
# provides tenantId plus enrolmentToken or enrolmentTokenExistingSecret.name.
dataagent:
  tenantId: ""
  enrolmentToken: ""
