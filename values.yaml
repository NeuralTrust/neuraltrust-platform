# Unified NeuralTrust Platform Values (Optimized)
# This file contains all configuration for deploying NeuralTrust platform components
# including infrastructure (ClickHouse, Kafka, PostgreSQL), NeuralTrust services,
# and TrustGate components.

# Global settings
global:
  # Platform/cloud provider. Auto-configures ingress, security contexts, and routing.
  # Supported: "aws" | "gcp" | "azure" | "openshift" | "kubernetes"
  #   aws       → Ingress: ALB (requires AWS LB Controller), standard security contexts
  #   gcp       → Ingress: GCE (built-in on GKE), standard security contexts
  #   azure     → Ingress: AGIC (requires AGIC add-on), standard security contexts
  #   openshift → Routes (when ingress disabled) or Ingress, relaxed security contexts (SCC)
  #   kubernetes → Generic Kubernetes, no cloud-specific annotations
  # Switch platform: --set global.platform=gcp
  platform: "gcp"
  # Base domain for auto-generating service URLs and hostnames.
  # Used across all platforms for URL generation (e.g., "control-plane-api.{domain}").
  # Examples: "aws.neuraltrust.ai", "apps.mycluster.openshiftapps.com", "gcp.neuraltrust.ai"
  domain: "neuraltrust.ai"
  # DEPRECATED: Use platform: "openshift" and domain instead.
  openshift: false
  openshiftDomain: ""
  imageRegistry: "" # Global image registry prefix (e.g., "europe-west1-docker.pkg.dev/project/repo"). If set, will be prepended to image repositories.
  autoGenerateSecrets: true # Auto-generate required secrets (JWT keys, passwords) if not explicitly provided. Uses lookup to preserve existing values on upgrades. Set to false to let subcharts manage their own secrets (required when using secret references).
  preserveExistingSecrets: false # Set to true to prevent Helm from creating/updating secrets (secrets are pre-generated). When true, secret templates are NOT rendered.
  security:
    allowInsecureImages: true # Allow Bitnami charts to use their container images
  storageClass: "" # Global storage class for persistent volumes
  # Outbound HTTP proxy for corporate environments (e.g. Santander).
  # When enabled, HTTP_PROXY/HTTPS_PROXY/NO_PROXY (upper+lowercase) are injected into every workload.
  proxy:
    enabled: false
    httpProxy: "" # e.g. "http://proxy.corp:3128"
    httpsProxy: "" # e.g. "http://proxy.corp:3128"
    noProxy: "localhost,127.0.0.1,.cluster.local,.svc"
  # Private Service Connect (PSC) -- GCP only
  # Services listed in negNames get a standalone NEG (PSC-only, no public Ingress).
  # Services NOT listed keep their regular {"ingress": true} annotation.
  psc:
    negNames: {}
    #   trustgate-data-plane: "trustgate-data-plane-psc-neg"
    #   trustgate-control-plane: "trustgate-control-plane-psc-neg"
    #   trustgate-actions: "trustgate-actions-psc-neg"
    #   control-plane-api: "control-plane-api-psc-neg"
    #   control-plane-app: "control-plane-app-psc-neg"
    #   control-plane-scheduler: "control-plane-scheduler-psc-neg"
    #   data-plane-api: "data-plane-api-psc-neg"
    #   firewall: "firewall-psc-neg"
  # Global Ingress Configuration
  # These settings are applied to ALL Ingress resources across all subcharts.
  # Per-service ingress settings (className, annotations) override these globals when set.
  ingress:
    # Ingress provider — auto-detected from global.platform if empty.
    # Override to decouple ingress from platform (e.g., OpenShift with a custom ingress controller).
    # Values: "aws" | "gcp" | "azure" | "openshift" | "none" | "" (auto-detect)
    provider: ""
    className: "" # Override auto-detected className (leave empty to use provider default)
    annotations: {} # Global annotations applied to all Ingress resources (merged with provider annotations)
    tls:
      autoGenerate: true # Create one shared self-signed kubernetes.io/tls secret by default on install/upgrade (unless preserveExistingSecrets=true).
      secretName: "neuraltrust-ingress-tls" # Shared fallback TLS secret used whenever an ingress enables TLS without a per-ingress secretName.
      commonName: "neuraltrust.local" # Fallback CN/SAN for the generated certificate when ingress hosts are empty.
      durationDays: 3650 # Validity period for the generated self-signed certificate.
      # Notes:
      # - This shared secret is created by default even before any ingress references it.
      # - This is only used for controllers that terminate TLS from Kubernetes TLS secrets.
      # - Cloud-managed TLS paths (AWS ACM, GKE managed certificates, Azure Application Gateway certs)
      #   do NOT render spec.tls and therefore do not use this secret.
      # - Set per-ingress tls.secretName to reuse an existing secret instead of the generated one.
    # AWS ALB Ingress Controller settings (used when provider=aws)
    # Requires: AWS Load Balancer Controller installed in the EKS cluster
    # Install: https://kubernetes-sigs.github.io/aws-load-balancer-controller/
    aws:
      scheme: "internet-facing" # "internet-facing" (public) or "internal" (private VPC only)
      targetType: "ip" # "ip" (recommended, required for Fargate) or "instance"
      groupName: "neuraltrust" # Share a single ALB across all ingresses. Empty = one ALB per Ingress.
      certificateArn: "" # ACM certificate ARN for TLS termination (e.g., "arn:aws:acm:us-east-1:123456789:certificate/abc-123")
      sslRedirect: "443" # Redirect HTTP to HTTPS port (set to "" to disable)
      wafAclArn: "" # Optional: WAF v2 Web ACL ARN for additional security
      additionalAnnotations: {} # Any additional ALB annotations as key-value pairs
    # GCP GCE Ingress Controller settings (used when provider=gcp)
    # Built-in on GKE — no extra installation needed.
    # Creates a Google Cloud Load Balancer (GCLB) per Ingress.
    gcp:
      staticIpName: "" # Optional: pre-reserved static IP name (gcloud compute addresses create ...). Empty = ephemeral IP.
      managedCertificates: "" # Optional: comma-separated Google-managed certificate names (e.g., "neuraltrust-cert")
      backendConfig: "" # Optional GKE-only BackendConfig name to reuse on ingress-backed Services. Empty = chart creates per-service /health BackendConfigs where supported.
      sslRedirect: false # Set to true to redirect HTTP→HTTPS (requires managedCertificates or pre-provisioned cert)
      neg:
        enabled: true # Enable NEG (Network Endpoint Groups) annotations on services backing Ingress resources.
        # Required on non-autopilot GKE clusters when services are ClusterIP (default).
        # Adds cloud.google.com/neg: '{"ingress": true}' to service metadata.
        # On autopilot clusters this is a safe no-op.
      additionalAnnotations: {} # Any additional GCE annotations as key-value pairs
    # Azure Application Gateway Ingress Controller settings (used when provider=azure)
    # Requires: AGIC add-on enabled on AKS cluster
    # Docs: https://learn.microsoft.com/en-us/azure/application-gateway/ingress-controller-overview
    azure:
      appGatewayName: "" # Optional: Application Gateway name (if multiple gateways)
      sslCertificate: "" # Optional: name of SSL certificate configured on Application Gateway
      sslRedirect: false # Set to true to redirect HTTP→HTTPS
      wafPolicyId: "" # Optional: WAF policy resource ID
      requestTimeout: "" # Optional: backend request timeout in seconds (e.g., "30")
      additionalAnnotations: {} # Any additional AGIC annotations as key-value pairs
  # ----------------------------------------------------------------------
  # In-chart OpenTelemetry Collector + optional hosted observability egress.
  # ----------------------------------------------------------------------
  # When `global.observability.enabled` is true OR `neuraltrust-watchdog.enabled`
  # is true, the chart deploys a single-replica OTel Collector (Contrib) under
  # the release namespace. Default OFF — enable explicitly or via the watchdog
  # subchart / `values-self-monitoring.yaml.example` overlay.
  # All component telemetry — Prometheus scrapes, OTLP traces from
  # TrustGate/Firewall/AISPM, K8s events, kubeletstats — is funnelled
  # through this collector. The hosted exporter ships infra metrics +
  # K8s events to NeuralTrust's managed observability endpoint when a
  # bearer token is provided (see `hostedExport` below).
  #
  # GRACEFUL DEGRADATION: if no token is resolvable (Secret missing,
  # tokenValue empty, lookup returns nothing), the hosted exporter is
  # silently OMITTED. The collector still runs locally and never blocks
  # install in air-gapped environments. Two flag-level opt-outs:
  #   - global.observability.enabled: true        # collector without watchdog
  #   - neuraltrust-watchdog.enabled: true       # collector + watchdog together
  #   - global.observability.enabled: false       # remove collector (unless watchdog on)
  #   - global.observability.hostedExport.enabled: false  # local-only collector
  # ----------------------------------------------------------------------
  # Single-switch self-monitoring (watchdog + curated default checks).
  # ----------------------------------------------------------------------
  # When `enabled: true`, the operator opts into the full self-monitoring
  # stack: the watchdog subchart is turned on AND a curated subset of
  # checks (control plane / data plane / trustgate / firewall HTTP
  # probes, plus pod-health and deployment-health) flip from
  # observe-only defaults to active.
  #
  # This flag is informational at the umbrella level — child-chart values
  # cannot be mutated from here at render time. To opt in, merge
  # `values-self-monitoring.yaml.example` into your install:
  #
  #     helm upgrade --install neuraltrust . \
  #         -f values-self-monitoring.yaml.example \
  #         -f accounts/<client>/values-<client>.yaml
  #
  # Healing actions (Deployment restarts, Kafka Connect task restarts)
  # remain gated by `actions.dryRun: true` inside the watchdog config —
  # operators flip them off per-check after parity has been validated.
  selfMonitoring:
    enabled: false
  # Optional integration with the Prometheus Operator. When enabled AND
  # the cluster ships the monitoring.coreos.com/v1 CRDs, every subchart
  # renders a ServiceMonitor + PrometheusRule under
  # `charts/<sub>/templates/monitoring/`. If the CRDs are missing the
  # blocks are silently skipped — `helm install` still succeeds. Customers
  # who don't run Prometheus Operator can leave this OFF and rely on the
  # in-chart OTel Collector + watchdog instead.
  monitoring:
    enabled: false
    # Apply to every PrometheusRule/ServiceMonitor so the operator selectors
    # only pick up our resources (e.g. `release: kube-prometheus-stack`).
    additionalLabels: {}
    # Default scrape interval applied to every ServiceMonitor unless
    # overridden per-subchart.
    interval: 30s
    # Default alert severity label so customers can route via Alertmanager
    # without editing the rules.
    alertLabels:
      team: platform
  observability:
    enabled: false
    tenantId: "" # Sent as nt.tenant_id resource attribute (optional).
    hostedExport:
      enabled: true
      endpoint: "https://collector.neuraltrust.ai:4318" # OTLP/HTTP
      auth:
        # Bearer token. resolveSecret order: tokenValue > existingSecret > lookup.
        # When all three are empty, the otlphttp/neuraltrust exporter is omitted.
        tokenSecretName: "neuraltrust-observability-token"
        tokenSecretKey: "token"
        tokenValue: ""
      tlsCaSecretName: "" # Optional custom CA Secret (key: ca.crt) for proxies that MITM TLS.
      sendingQueue:
        enabled: true
        storage: file_storage # disk-backed buffer
        maxSize: 1000 # max items in queue, oldest dropped on overflow
      retry:
        initialInterval: 5s
        maxInterval: 30s
        maxElapsedTime: 0s # never give up
    # sendLogs covers the K8s events receiver + watchdog log records;
    # NEVER application payloads. Enable carefully.
    sendLogs: false
    sendTraces: true
    collector:
      # Optional: route every component (TrustGate, Firewall, AISPM,
      # Control Plane, Data Plane) at this OTLP endpoint. When set, the
      # subchart configmaps OVERRIDE their per-component defaults so
      # operators don't have to touch each one. Recommended value when
      # using the in-chart collector:
      #   http://<RELEASE>-otel-collector.<NAMESPACE>.svc.cluster.local:4318
      # Leave empty to keep each subchart pointing at whatever its own
      # `*.config.otel*Endpoint` already references (preserves the prior
      # behaviour for upgrades).
      endpoint: ""
      image:
        repository: otel/opentelemetry-collector-contrib
        tag: "0.110.0"
        pullPolicy: IfNotPresent
      replicas: 1
      service:
        type: ClusterIP
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
      bufferPVC:
        enabled: true
        size: 2Gi
        storageClass: "" # Falls back to global.storageClass.
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: [ALL]
      podAnnotations: {}
      podLabels: {}
      nodeSelector: {}
      tolerations: []
      affinity: {}
      debug: false # When true, adds the OTel `debug` exporter for local troubleshooting.
      # extraReceivers / extraProcessors / extraExporters / extraServicePipelines
      # are merged into the rendered config without escaping. Use to point a
      # second exporter at the customer's own collector or to enable e.g.
      # the `googlecloudmonitoring` receiver.
      extraReceivers: {}
      extraProcessors: {}
      extraExporters: {}
      extraServicePipelines: {}
      # Service account for the collector. The k8s_events + kubeletstats
      # receivers require cluster-scoped read permissions; gated by RBAC below.
      serviceAccount:
        create: true
        name: ""
        annotations: {}
      rbac:
        create: true
        # When true, ClusterRole + ClusterRoleBinding give cluster-wide read of
        # events + kubeletstats. Required for the `k8s_events` and
        # `kubeletstats` receivers. Disable to keep RBAC namespace-scoped at
        # the cost of those signals.
        clusterScoped: true
# Optional add-on services (off by default, listed first for visibility).
# Toggle each one with its own enabled flag; everything else uses chart defaults.
#
# AI Security Posture Management (AISPM)
# When enabled, the parent chart auto-populates:
#   - control-plane-secrets/POSTURE_API_URL → http://aispm-api-service.<release-namespace>.svc.cluster.local:80
# The control-plane-app reads POSTURE_API_URL (and falls back to DATA_PLANE_JWT_SECRET
# for POSTURE_JWT_SECRET) automatically; no app code changes needed.
neuraltrust-aispm:
  aispm:
    enabled: false
    # imagePullSecrets: "gcr-secret"
    # api:
    #   replicas: 1
    #   image: { repository: "...", tag: "v0.15.0", pullPolicy: IfNotPresent }
    #   resources: { requests: {...}, limits: {...} }
    #   autoscaling: { enabled: true, minReplicas: 1, maxReplicas: 4 }
    #   podDisruptionBudget: { enabled: true, minAvailable: 1 }
    #   extraEnv: []
    #   extraEnvFrom: []
    # worker: { replicas: 1, image: {...}, resources: {...}, autoscaling: { enabled: false } }
    # beat:   { image: {...}, resources: {...} }
    # config:
    #   openaiModel: "gpt-4o-mini"
    #   defaultSyncIntervalSeconds: "86400"
    #   otelEnabled: "false"
    #   aispmApiUrl: ""        # Empty = internal Service URL
    # secrets:
    #   authEncryptionKey: ""  # Auto-generated if empty (Fernet 44-char urlsafe base64)
    #   dbPassword: ""         # Auto-generated if empty
    #   openaiApiKey: ""       # Required at runtime; chart does not enforce
    # database: { host: "control-plane-postgresql", user: "aispm", name: "aispm", sslMode: "disable" }
    # redis:    { host: "", port: "6379", database: "1" }   # Empty host shares TrustGate Redis
    # kafka:    { bootstrapServers: "", postureTopic: "posture_alerts" }
# SIEM forwarder
# Internal-only worker that consumes Kafka audit/posture events and forwards
# them to external SIEMs (Splunk, Sentinel, Datadog, Elasticsearch, …) using
# per-team configuration stored in ClickHouse.
neuraltrust-siem-connectors:
  siemConnectors:
    enabled: false
    # imagePullSecrets: "gcr-secret"
    # replicas: 1
    # image: { repository: "...", tag: "latest", pullPolicy: IfNotPresent }
    # resources: { requests: {...}, limits: {...} }
    # autoscaling: { enabled: false, minReplicas: 1, maxReplicas: 4 }
    # podDisruptionBudget: { enabled: true, minAvailable: 1 }
    # config:
    #   kafkaTopics: "audit_events,posture_alerts"
    #   logLevel: "info"
    #   port: "3000"
    # kafka:      { brokers: "" }     # Empty => resolved via parent infrastructure helper
    # clickhouse: { host: "", database: "neuraltrust", user: "neuraltrust",
    #               secretName: "clickhouse-secrets", secretKey: "admin-password" }
# Infrastructure Components
# These can be deployed or configured to use pre-installed instances
infrastructure:
  # ClickHouse Configuration
  clickhouse:
    # Set to true to deploy ClickHouse, false to use pre-installed instance
    # Default: true (deploy)
    deploy: true
    # External ClickHouse configuration (used when deploy: false)
    external:
      host: "clickhouse.clickhouse.svc.cluster.local" # e.g., "clickhouse.clickhouse.svc.cluster.local"
      port: "8123"
      user: "neuraltrust"
      password: "" # Auto-generated if empty (only used when deploy: false)
      database: "neuraltrust"
      # Secret reference for external ClickHouse credentials
      secretName: "clickhouse" # Optional: secret containing CLICKHOUSE_PASSWORD
      secretKey: "admin-password" # Key in secret for password
      # ClickHouse chart values (used when deploy: true)
      # Values are passed via root-level 'clickhouse:' section below
  # Kafka Configuration
  kafka:
    # Set to true to deploy Kafka, false to use pre-installed instance
    # Default: true (deploy)
    deploy: true
    # External Kafka configuration (used when deploy: false)
    external:
      bootstrapServers: "" # e.g., "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
      # Or individual brokers:
      brokers: [] # e.g., ["kafka-0.kafka-headless:9092", "kafka-1.kafka-headless:9092"]
      # Secret reference for external Kafka credentials (if using SASL)
      secretName: "" # Optional
      secretKey: "" # Optional
      # Kafka chart values (used when deploy: true)
      # Values are passed via root-level 'kafka:' section below
  # PostgreSQL Configuration
  postgresql:
    # Note: PostgreSQL deployment is controlled by neuraltrust-control-plane.infrastructure.postgresql.deploy below
    # Set deploy: true/false in that section to enable/disable in-cluster PostgreSQL deployment
    # External PostgreSQL configuration (used when neuraltrust-control-plane.infrastructure.postgresql.deploy=false)
    external:
      host: "postgresql.postgresql.svc.cluster.local" # e.g., "postgresql.postgresql.svc.cluster.local"
      port: "5432"
      user: "postgres" # Default: "postgres" for external, "neuraltrust" for in-cluster
      password: "" # Auto-generated if empty (only used when deploy: false)
      database: "neuraltrust"
      # Secret reference for external PostgreSQL credentials
      secretName: "" # Optional: secret containing POSTGRES_PASSWORD
      secretKey: "" # Optional: key in secret for password
      # PostgreSQL chart values (used when deploy: true)
      # Values are passed via 'neuraltrust-control-plane.controlPlane.components.postgresql:' section below
  # Redis Configuration
  # Note: Redis is deployed as part of TrustGate, not as a separate subchart
  # Control Redis deployment via 'trustgate.redis.enabled' (see trustgate.redis section below)
  # External Redis configuration is available in 'trustgate.redis.external' section below
# ClickHouse subchart values (passed directly to clickhouse subchart)
# These values are used when infrastructure.clickhouse.deploy=true
clickhouse:
  securityHardening: true # Adds readOnlyRootFilesystem, drops capabilities, seccomp profile. Set to false to restore prior behavior.
  fullnameOverride: "clickhouse"
  replicaCount: 1
  imagePullSecrets: "gcr-secret"
  image:
    repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/clickhouse-server
    tag: "26.3"
    pullPolicy: IfNotPresent
  global:
    imagePullSecrets: []
  auth:
    username: "neuraltrust"
    password: "" # Auto-generated if empty
    existingSecret: "" # Set to "" if you want Helm to create/manage the secret
    existingSecretKey: "admin-password"
    database: "neuraltrust"
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources:
    requests:
      memory: 4Gi
      cpu: 2
    limits:
      memory: 8Gi
      cpu: 4
  logLevel: "fatal"
  # ClickHouse `<listen_host>`. Defaults to `::` so a single value works on
  # IPv4-only, dual-stack, and IPv6-only clusters (Linux `bindv6only=0`).
  # Set to "0.0.0.0" to force IPv4-only.
  listenHost: "::"
  # ClickHouse backup configuration (optional)
  backup:
    enabled: false # Set to true to enable scheduled backups to object storage
    schedule: "0 2 * * *" # Cron schedule (default: daily at 2 AM UTC)
    database: "" # Database to back up; defaults to auth.database (neuraltrust)
    storage:
      # Storage backend. Supported: s3 (also covers GCS via S3-compatible API), azblob
      type: s3
      s3:
        # Full S3 or S3-compatible endpoint including bucket and path prefix.
        # S3:  https://s3.<region>.amazonaws.com/<bucket>/<prefix>
        # GCS: https://storage.googleapis.com/<bucket>/<prefix>
        # MinIO or other S3-compatible: https://<host>/<bucket>/<prefix>
        endpoint: "" # Required
        accessKeyId: "" # Leave empty to use IAM instance profile / IRSA
        secretAccessKey: "" # Leave empty to use IAM instance profile / IRSA
        # Optional: reference an existing Secret instead of inline credentials above.
        # The secret must contain the keys defined by existingSecretKey*.
        existingSecret: ""
        existingSecretKeyAccessKeyId: access-key-id
        existingSecretKeySecretAccessKey: secret-access-key
      azblob:
        connectionString: "" # Azure Blob Storage connection string. Required.
        container: "" # Blob container name. Required.
        path: "clickhouse-backups/" # Path prefix inside the container
        # Optional: reference an existing Secret instead of inline credentials above.
        existingSecret: ""
        existingSecretKeyConnectionString: connection-string
    image:
      repository: "" # Backup job image; defaults to the ClickHouse image (includes clickhouse-client)
      tag: "" # Defaults to the ClickHouse image tag
      pullPolicy: IfNotPresent
    serviceAccount:
      create: false # Set to true to create a dedicated ServiceAccount (e.g. for GKE Workload Identity)
      name: "" # Auto-generated when create=true; leave empty to use the default SA
      annotations: {} # e.g. iam.gke.io/gcp-service-account: sa@project.iam.gserviceaccount.com
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    nodeSelector: {}
    tolerations: []
    affinity: {}
# Kafka subchart values (passed directly to kafka subchart)
# These values are used when infrastructure.kafka.deploy=true
kafka:
  securityHardening: true # Adds readOnlyRootFilesystem, drops capabilities, seccomp profile. Set to false to restore prior behavior.
  fullnameOverride: "kafka"
  replicaCount: 1
  imagePullSecrets: "gcr-secret"
  image:
    repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/kafka
    tag: "4.3.0"
    pullPolicy: IfNotPresent
  global:
    imagePullSecrets: []
  config:
    defaultReplicationFactor: 1
    offsetsTopicReplicationFactor: 1
    transactionStateLogReplicationFactor: 1
    transactionStateLogMinIsr: 1
    minInsyncReplicas: 1
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1
  # DEPRECATED: kafka.connectorMonitor was removed in chart v1.13.0.
  # The CronJob has been replaced by the long-running neuraltrust-watchdog
  # service (subchart `neuraltrust-watchdog`) which polls Kafka Connect via
  # `kafka_connect_connectors` and can restart FAILED tasks behind a dryRun
  # flag. Migration:
  #   1. Set `neuraltrust-watchdog.enabled: true`.
  #   2. Add (or keep) the `kafka-connect` check in the watchdog's checks
  #      list pointing at your Kafka Connect URL.
  # The values block below is intentionally left as an empty placeholder so
  # existing accounts/<client>/values.yaml files referencing
  # `kafka.connectorMonitor.*` do not fail Helm rendering. Helm garbage-
  # collects the old CronJob + Secret on the next upgrade.
  connectorMonitor: {}
# TrustGate Configuration
trustgate:
  securityHardening: true # Adds readOnlyRootFilesystem, drops capabilities, seccomp profile. Set to false to restore prior behavior.
  enabled: true
  global:
    version: "ee" # can be "ce" or "ee"
    imageRegistry: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker"
    storageClass: ""
    deploymentType: shared # shared or dedicated
    huggingface:
      apiKeySecret: "hf-api-key"
    image:
      pullPolicy: Always
      image: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/trustgate-ee"
      tag: "v1.27.4"
      # imagePullSecrets: if not set, will fall back to parent chart's global.imagePullSecrets
      imagePullSecrets: ["gcr-secret"] # Set to array of secret names, e.g., ["secret-name"] or leave empty to use parent global.imagePullSecrets
    postgresql:
      # PostgreSQL image used for TrustGate database initialization job
      image:
        repository: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/postgres" # PostgreSQL image repository
        tag: "17-alpine" # PostgreSQL image tag
    env:
      SERVER_SECRET_KEY: "" # Auto-generated if empty (shared with trustgateJwtSecret)
      SERVER_BASE_DOMAIN: "yourdomain.com" # Set to your domain
      SERVER_ADMIN_PORT: "8080"
      SERVER_METRICS_PORT: "9090"
      SERVER_PROXY_PORT: "8081"
      SERVER_ACTIONS_PORT: "8084"
      # Database connection (uses infrastructure.postgresql config)
      # When control-plane PostgreSQL is installed in-cluster, use:
      # - DATABASE_HOST: "control-plane-postgresql" (service name)
      # - DATABASE_USER: "neuraltrust" (matches control-plane PostgreSQL user)
      # - DATABASE_PASSWORD: same as control-plane PostgreSQL password
      DATABASE_HOST: "control-plane-postgresql" # Use control-plane PostgreSQL service name when infrastructure.postgresql.deploy=true
      DATABASE_PORT: "5432"
      DATABASE_USER: "trustgate"
      DATABASE_PASSWORD: "" # Auto-generated if empty
      DATABASE_NAME: "trustgate"
      # PostgreSQL SSL mode (disable, require, verify-ca, verify-full)
      # Use "disable" when infrastructure.postgresql.deploy=true, "require" for external PostgreSQL
      DATABASE_SSL_MODE: "disable" # Use "disable" for in-cluster PostgreSQL, "require" for external
      # Redis connection
      REDIS_HOST: "" # Will be auto-configured if redis.enabled
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      # Optional upstream HTTP timeouts (e.g. "300s"). Omit or leave empty for TrustGate defaults.
      UPSTREAM_READ_TIMEOUT: ""
      UPSTREAM_WRITE_TIMEOUT: ""
      UPSTREAM_STREAM_TIMEOUT: ""
      UPSTREAM_PROVIDER_TIMEOUT: ""
  # PostgreSQL initialization job resource overrides
  postgresqlInit:
    resources: {} # Override init job container resources (default: requests 250m/64Mi, limits 500m/128Mi)
  # Service Account configuration
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  # Common configurations
  config:
    logLevel: "info"
    baseDomain: "yourdomain.com" # Set to your domain
    providers: {}
  # Control Plane settings
  controlPlane:
    name: trustgate-control-plane
    replicas: 2
    ports:
      http: 8080
    podSecurityContext:
      fsGroup: 1001
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    nodeSelector: {}
    tolerations: []
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - trustgate-control-plane
              topologyKey: kubernetes.io/hostname
    service:
      type: ClusterIP
      port: 8080
    # Extra env hooks — see neuraltrust-data-plane.dataPlane.components.api below
    # for syntax. extraEnvFrom entries are appended to the existing
    # envFrom: [configMapRef: trustgate-env-vars] list.
    extraEnv: []
    extraEnvFrom: []
  # Data Plane settings
  dataPlane:
    name: trustgate-data-plane
    replicas: 2
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
    ports:
      http: 8081
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 20
      targetCPUUtilizationPercentage: 75
      targetMemoryUtilizationPercentage: 75
    nodeSelector: {}
    tolerations: []
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - trustgate-data-plane
            topologyKey: kubernetes.io/hostname
    service:
      type: ClusterIP
      port: 8081
    # Extra env hooks — see neuraltrust-data-plane.dataPlane.components.api below
    # for syntax. extraEnvFrom entries are appended to the existing
    # envFrom: [configMapRef: trustgate-env-vars] list.
    extraEnv: []
    extraEnvFrom: []
  # Actions settings
  actions:
    name: trustgate-actions
    replicas: 2
    ports:
      http: 8084
    podSecurityContext:
      fsGroup: 1001
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    nodeSelector: {}
    tolerations: []
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - trustgate-actions
              topologyKey: kubernetes.io/hostname
    service:
      type: ClusterIP
      port: 8084
    # Extra env hooks — see neuraltrust-data-plane.dataPlane.components.api below
    # for syntax. extraEnvFrom entries are appended to the existing
    # envFrom: [configMapRef: trustgate-env-vars] list.
    extraEnv: []
    extraEnvFrom: []
  # Redis configuration
  # Note: Redis is deployed as part of TrustGate (not as a separate infrastructure subchart)
  # Set enabled: false to use external Redis, then configure trustgate.redis.external below
  redis:
    enabled: true
    image:
      repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/redis-stack-server
      tag: 7.2.0-v20
      pullPolicy: Always
      imagePullSecrets: []
    # External Redis configuration if redis.enabled is false
    external:
      host: ""
      port: 6379
      password: "" # Optional - recommended when using external Redis (redis.enabled: false)
    master:
      service:
        port: 6379
      persistence:
        enabled: true
        size: 10Gi
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 1000m
          memory: 2Gi
    replica:
      replicaCount: 1
      service:
        port: 6379
  ingress:
    enabled: true # Enable Ingress (Ingress supports TLS secrets via secretName)
    className: "" # Per-service override for ingress class (leave empty to use global.ingress.className)
    annotations: {} # Per-service annotations (merged with global and AWS auto-generated annotations)
    controlPlane:
      host: "" # Optional: set to your domain (e.g., "admin.yourdomain.com"). Empty = auto-derive as <hostPrefix>.<global.domain> when both are set, otherwise use ALB auto-generated URL.
      hostPrefix: "admin" # Default subdomain prefix when host is empty and global.domain is set. Set to "" to disable auto-derive.
    dataPlane:
      host: "" # Optional: set to your domain (e.g., "gateway.yourdomain.com"). Empty = auto-derive as <hostPrefix>.<global.domain> when both are set, otherwise use ALB auto-generated URL.
      hostPrefix: "gateway" # Default subdomain prefix when host is empty and global.domain is set. Set to "" to disable auto-derive.
    actions:
      host: "" # Optional: set to your domain (e.g., "actions.yourdomain.com"). Empty = auto-derive as <hostPrefix>.<global.domain> when both are set, otherwise use ALB auto-generated URL.
      hostPrefix: "actions" # Default subdomain prefix when host is empty and global.domain is set. Set to "" to disable auto-derive.
    # TLS configuration for Ingress
    # HTTPS is enabled by default for bundled ingresses.
    # The shared secret from global.ingress.tls.secretName is created by default.
    # If secretName is empty, this ingress uses that shared self-signed secret.
    # To use an existing wildcard TLS secret instead, set tls.secretName to that secret name.
    # The secret must be type kubernetes.io/tls and contain tls.crt and tls.key.
    tls:
      enabled: true
      secretName: "" # Optional override for this ingress; empty = use shared generated/global secret
# NeuralTrust Control Plane subchart values
# Helm requires values to be passed to subcharts using the subchart name as a prefix
neuraltrust-control-plane:
  securityHardening: true # Adds readOnlyRootFilesystem, drops capabilities, seccomp profile. Set to false to restore prior behavior (e.g. for PostgreSQL).
  infrastructure:
    postgresql:
      deploy: true # Deploy PostgreSQL in-cluster (set to false to use external PostgreSQL)
  controlPlane:
    enabled: false
    imagePullSecrets: "gcr-secret" # Set imagePullSecrets for all control-plane components (scheduler, api, app, postgresql)
    secrets:
      controlPlaneJWTSecret: "" # Auto-generated if empty
      openaiApiKey: ""
      resendApiKey: ""
      resendAlertSender: ""
      resendInviteSender: ""
      trustgateJwtSecret: "" # Auto-generated if empty (= SERVER_SECRET_KEY)
      firewallJwtSecret: ""
      modelScannerSecret: ""
    components:
      scheduler:
        enabled: true
        host: "" # Optional: full hostname override. Empty = auto-derive as <hostPrefix>.<global.domain> when both are set, otherwise use ALB auto-generated URL.
        hostPrefix: "scheduler" # Default subdomain prefix when host is empty and global.domain is set. Set to "" to disable auto-derive.
        service:
          type: ClusterIP
        ingress:
          enabled: true # Enable Ingress (Ingress supports TLS secrets)
          className: "" # Per-service override (leave empty to use global.ingress.className)
          annotations: {}
          # TLS configuration for Ingress
          # HTTPS is enabled by default for bundled ingresses.
          # The shared secret from global.ingress.tls.secretName is created by default.
          # If secretName is empty, this ingress uses that shared self-signed secret.
          # Set secretName to use a pre-created kubernetes.io/tls secret instead.
          tls:
            enabled: true
            secretName: "" # Optional override for this ingress; empty = use shared generated/global secret
        replicaCount: 1
        image:
          repository: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/scheduler"
          tag: "v1.9.7"
          pullPolicy: "Always"
        config:
          # URLs will be auto-generated from OpenShift Routes if global.openshift=true and global.openshiftDomain is set
          # Otherwise, set these manually or they will default to internal service URLs
          controlPlaneApiUrl: "" # Auto: https://control-plane-api.{global.openshiftDomain} or http://control-plane-api-service.{namespace}.svc.cluster.local
          dataPlaneApiUrl: "" # Auto: https://data-plane-api.{global.openshiftDomain} or http://data-plane-api-service.{namespace}.svc.cluster.local
        # initContainerResources: override for wait-for-postgresql initContainer (default: requests 250m/64Mi, limits 500m/128Mi)
        # initContainerResources:
        #   requests: { cpu: 250m, memory: 64Mi }
        #   limits: { cpu: 500m, memory: 128Mi }
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 200m
        healthProbes:
          path: "/v1/health" # Scheduler mounts routes under /v1; /health alone returns 401 from auth middleware
        # Extra env hooks — see neuraltrust-data-plane.dataPlane.components.api above
        # for syntax (EnvVar list and EnvFromSource list).
        extraEnv: []
        extraEnvFrom: []
      api:
        enabled: true
        host: "" # Optional: full hostname override. Empty = auto-derive as <hostPrefix>.<global.domain> when both are set, otherwise use ALB auto-generated URL.
        hostPrefix: "api" # Default subdomain prefix when host is empty and global.domain is set. Set to "" to disable auto-derive.
        service:
          type: ClusterIP
        ingress:
          enabled: true # Enable Ingress (Ingress supports TLS secrets)
          className: "" # Per-service override (leave empty to use global.ingress.className)
          annotations: {}
          # TLS configuration for Ingress
          # HTTPS is enabled by default for bundled ingresses.
          # The shared secret from global.ingress.tls.secretName is created by default.
          # If secretName is empty, this ingress uses that shared self-signed secret.
          # Set secretName to use a pre-created kubernetes.io/tls secret instead.
          tls:
            enabled: true
            secretName: "" # Optional override for this ingress; empty = use shared generated/global secret
        replicaCount: 2
        image:
          repository: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/control-plane-api"
          tag: "v1.18.3"
          pullPolicy: "Always"
        config:
          # URLs will be auto-generated from OpenShift Routes if global.openshift=true and global.openshiftDomain is set
          # Otherwise, set these manually or they will default to internal service URLs
          controlPlaneApiUrl: "" # Auto: https://control-plane-api.{global.openshiftDomain} or http://control-plane-api-service.{namespace}.svc.cluster.local
          dataPlaneApiUrl: "" # Auto: https://data-plane-api.{global.openshiftDomain} or http://data-plane-api-service.{namespace}.svc.cluster.local
        # initContainerResources: override for wait-for-postgresql initContainer (default: requests 250m/64Mi, limits 500m/128Mi)
        # initContainerResources:
        #   requests: { cpu: 250m, memory: 64Mi }
        #   limits: { cpu: 500m, memory: 128Mi }
        resources:
          requests:
            memory: 1Gi
            cpu: 1000m
          limits:
            memory: 2Gi
            cpu: 2000m
        healthCheck:
          # Health check job image (used for post-install/post-upgrade health checks)
          image:
            repository: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/curl"
            tag: "8.20.0"
        # Extra env hooks — see neuraltrust-data-plane.dataPlane.components.api above
        # for syntax (EnvVar list and EnvFromSource list).
        extraEnv: []
        extraEnvFrom: []
      app:
        enabled: true
        host: "" # Optional: full hostname override. Empty = auto-derive as <hostPrefix>.<global.domain> when both are set, otherwise use ALB auto-generated URL.
        hostPrefix: "app" # Default subdomain prefix when host is empty and global.domain is set. Set to "" to disable auto-derive.
        # Node.js HOSTNAME env (Next.js bind address). Defaults to `::` so a
        # single value works on IPv4-only, dual-stack, and IPv6-only clusters
        # (Linux `bindv6only=0`). Set to "0.0.0.0" to force IPv4-only.
        hostname: "::"
        secondaryHost: ""
        service:
          type: ClusterIP
        ingress:
          enabled: true # Enable Ingress (Ingress supports TLS secrets)
          className: "" # Per-service override (leave empty to use global.ingress.className)
          annotations: {}
          # TLS configuration for Ingress
          # HTTPS is enabled by default for bundled ingresses.
          # The shared secret from global.ingress.tls.secretName is created by default.
          # If secretName is empty, this ingress uses that shared self-signed secret.
          # Set secretName to use a pre-created kubernetes.io/tls secret instead.
          tls:
            enabled: true
            secretName: "" # Optional override for this ingress; empty = use shared generated/global secret
        replicaCount: 2
        image:
          repository: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/app"
          tag: "v1.65.9"
          pullPolicy: "Always"
        config:
          nodeEnv: production
          port: 3000
          # URLs will be auto-generated from OpenShift Routes if global.openshift=true and global.openshiftDomain is set
          # Otherwise, set these manually or they will default to internal service URLs
          controlPlaneApiUrl: "" # Auto: https://control-plane-api.{global.openshiftDomain} or http://control-plane-api-service:80 (same namespace)
          dataPlaneApiUrl: "" # Auto: https://data-plane-api.{global.openshiftDomain} or http://data-plane-api-service:80 (same namespace)
          schedulerUrl: "" # Auto: https://control-plane-scheduler.{global.openshiftDomain} or http://control-plane-scheduler-service:80 (same namespace)
          trustgateControlPlaneUrl: "" # Auto: https://trustgate-admin.{global.openshiftDomain} or http://trustgate-control-plane:80 (same namespace)
          trustgateDataPlaneUrl: "" # Auto: https://trustgate-gateway.{global.openshiftDomain} or http://trustgate-data-plane:80 (same namespace)
          trustgateActionsUrl: "" # Auto: https://trustgate-actions.{global.openshiftDomain} or http://trustgate-actions:80 (same namespace)
          nextAuthUrl: "" # Auto: https://{app.host} or https://control-plane-app.yourdomain.com
          firewallApiUrl: ""
          # POSTURE_API_URL — control-plane-app → AISPM API host (no path).
          # Empty value lets the parent chart auto-resolve to
          # http://aispm-api-service.<release-namespace>.svc.cluster.local:80
          # when neuraltrust-aispm.aispm.enabled is true.
          postureApiUrl: ""
          modelScannerApiUrl: ""
          openaiModel: "gpt-4o-mini"
          kafkaHost: "kafka"
          kafkaPort: "9092"
        # initContainerResources: override for init-db initContainer (default: requests 250m/256Mi, limits 500m/512Mi)
        # initContainerResources:
        #   requests: { cpu: 250m, memory: 256Mi }
        #   limits: { cpu: 500m, memory: 512Mi }
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 500m
        initContainer:
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
        # Extra env hooks — see neuraltrust-data-plane.dataPlane.components.api above
        # for syntax (EnvVar list and EnvFromSource list).
        extraEnv: []
        extraEnvFrom: []
      postgresql:
        secrets:
          name: "postgresql-secrets"
          user: "neuraltrust" # PostgreSQL user (default: "neuraltrust" for in-cluster, "postgres" for external)
          password: "" # Auto-generated if empty
          database: "neuraltrust" # PostgreSQL database name
          host: "control-plane-postgresql" # PostgreSQL host (set to "control-plane-postgresql" when infrastructure.postgresql.deploy=true, or external host when using external PostgreSQL)
          port: "5432" # PostgreSQL port
        image:
          repository: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/postgres"
          tag: "17-alpine"
          pullPolicy: "Always"
          # Component-level override; leave empty so the postgresql/deployment.yaml
          # template falls back to controlPlane.imagePullSecrets ("gcr-secret" by default).
          # Set to e.g. [{name: my-registry-secret}] to override per component.
          imagePullSecrets: []
        persistence:
          enabled: true
          size: 10Gi
          storageClass: ""
          preserveOnDelete: true
        resources:
          requests:
            memory: 2Gi
            cpu: 1000m
          limits:
            memory: 4Gi
            cpu: 2000m
        service:
          type: ClusterIP
          port: 5432
# NeuralTrust Data Plane subchart values
# Helm requires values to be passed to subcharts using the subchart name as a prefix
neuraltrust-data-plane:
  securityHardening: true # Adds readOnlyRootFilesystem, drops capabilities, seccomp profile. Set to false to restore prior behavior.
  dataPlane:
    enabled: true
    imagePullSecrets: "gcr-secret" # Set imagePullSecrets for all data-plane components (api, worker, kafka-connect)
    secrets:
      openaiApiKeySecretName: "openai-secrets"
      openaiApiKey: ""
      googleApiKeySecretName: "google-secrets"
      googleApiKey: ""
      resendApiKeySecretName: "resend-secrets"
      resendApiKey: ""
      dataPlaneJWTSecretName: "data-plane-jwt-secret"
      dataPlaneJWTSecret: "" # Auto-generated if empty
      huggingFaceTokenSecretName: "huggingface-secrets"
      huggingFaceToken: ""
    components:
      clickhouse:
        enabled: true
        host: "clickhouse"
        port: "8123"
        user: "neuraltrust"
        database: "neuraltrust"
        auth:
          username: "neuraltrust"
        secrets:
          name: "clickhouse-secrets"
        configmap:
          name: "clickhouse-init-job"
      kafka:
        enabled: true
        connect:
          replicas: 1
          bootstrapServers: "kafka:9092"
          image:
            repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/kafka-connect
            tag: v0.3.1
            pullPolicy: Always
          resources:
            limits:
              cpu: "1"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 2Gi
      api:
        enabled: true
        host: "" # Optional: full hostname override. Empty = auto-derive as <hostPrefix>.<global.domain> when both are set, otherwise use ALB auto-generated URL.
        hostPrefix: "data-plane-api" # Default subdomain prefix when host is empty and global.domain is set. Set to "" to disable auto-derive.
        service:
          type: ClusterIP
        ingress:
          enabled: true # Enable Ingress (Ingress supports TLS secrets)
          className: "" # Per-service override (leave empty to use global.ingress.className)
          annotations: {}
          # TLS configuration for Ingress
          # HTTPS is enabled by default for bundled ingresses.
          # The shared secret from global.ingress.tls.secretName is created by default.
          # If secretName is empty, this ingress uses that shared self-signed secret.
          # Set secretName to use a pre-created kubernetes.io/tls secret instead.
          tls:
            enabled: true
            secretName: "" # Optional override for this ingress; empty = use shared generated/global secret
        classifierModel: "gpt"
        image:
          repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/data-plane-api
          tag: v1.24.11
          pullPolicy: Always
        accessMode: ReadWriteOnce
        huggingfaceToken: ""
        storage: 10Gi
        # TrustTest configuration: Set to {} to enable volume mounting of trusttest config
        # The ConfigMap content is generated from charts/neuraltrust-data-plane/files/.trusttest_config.json
        trustTestConfig: {}
        replicas: 2
        # initContainerResources: override for clickhouse-migrations initContainer (default: requests 250m/256Mi, limits 500m/512Mi)
        # initContainerResources:
        #   requests: { cpu: 250m, memory: 256Mi }
        #   limits: { cpu: 500m, memory: 512Mi }
        resources:
          requests:
            cpu: 2
            memory: 4Gi
          limits:
            cpu: 4
            memory: 6Gi
        # Per-component env injection hooks (available on every main service container
        # across the NT charts: control-plane api/app/scheduler, data-plane api/worker,
        # firewall gateway/workers.<name>, trustgate controlPlane/dataPlane/actions).
        #
        # extraEnv     — list of EnvVar entries appended to the container env (name+value
        #                or name+valueFrom.{secretKeyRef,configMapKeyRef,fieldRef}).
        # extraEnvFrom — list of EnvFromSource entries (configMapRef / secretRef) used to
        #                load whole ConfigMaps or Secrets as env vars in a single line.
        #
        # Example:
        #   extraEnv:
        #     - name: MY_VAR
        #       value: "literal"
        #     - name: DB_PASSWORD
        #       valueFrom:
        #         secretKeyRef: { name: my-secret, key: password }
        #   extraEnvFrom:
        #     - configMapRef: { name: my-configmap }
        #     - secretRef:    { name: my-secret, optional: true }
        extraEnv: []
        extraEnvFrom: []
        # Run evaluation workloads as Kubernetes Jobs spawned by data-plane-api
        # (instead of FastAPI background tasks). Default ON.
        #
        # The API process propagates its own env vars into each Job pod spec
        # at job-creation time — no Secret object, no CSI mount, no
        # SecretProviderClass needed. Works identically on Helm (on-prem,
        # secretKeyRef-based) and Flux + Secret Manager (SaaS, CSI-based)
        # because the API doesn't care how its own env was populated.
        #
        # Requires data-plane-api >= v1.25.0. To opt out for older images,
        # set k8sJobs.enabled: false.
        k8sJobs:
          enabled: true
          # Namespace where Jobs are created. Empty = release namespace.
          namespace: ""
          serviceAccount:
            create: true
            name: "" # Empty = "data-plane-api"
            annotations: {}
          rbac:
            create: true # Role data-plane-job-creator + RoleBinding
          # Job container image. Empty fields fall back to the API image above.
          jobImage:
            repository: ""
            tag: ""
            pullPolicy: ""
          # Per-Job pod resources.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          ttlSecondsAfterFinished: 3600
          backoffLimit: 0
          maxConcurrentJobs: 10
          waitTimeoutSeconds: 1800
      worker:
        enabled: true
        replicas: 1
        image:
          repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/workers
          tag: v1.6.12
          pullPolicy: Always
        resources:
          requests:
            memory: 4Gi
            cpu: 1000m
          limits:
            memory: 8Gi
            cpu: 2000m
        # See api.extraEnv / api.extraEnvFrom above for syntax and semantics.
        extraEnv: []
        extraEnvFrom: []
# NeuralTrust Firewall subchart values
# Default: ON (gateway + 5 workers using firewall-cpu, CPU only). To disable, set
# neuraltrust-firewall.firewall.enabled: false. To run workers on GPU, override
# workerDefaults.image to firewall-gpu and add nvidia.com/gpu resources,
# nodeSelector, tolerations, and hostIPC (see values-dataplane-gpu.yaml.example
# and regions/values-us-prod.yaml for GPU patterns).
#
# When firewall is enabled, the parent chart auto-populates:
#   - trustgate-secrets/NEURAL_TRUST_FIREWALL_URL  → http://firewall.<release-namespace>.svc.cluster.local
#   - control-plane-secrets/FIREWALL_API_URL       → same FQDN
# When firewall is disabled, FIREWALL_API_URL falls back to the data-plane API service.
# Cross-namespace or external firewall? Override trustgate.global.env.NEURAL_TRUST_FIREWALL_URL
# (and controlPlane.components.app.config.firewallApiUrl) explicitly.
neuraltrust-firewall:
  securityHardening: true # Adds readOnlyRootFilesystem, drops capabilities, seccomp profile. Set to false to restore prior behavior.
  firewall:
    enabled: true
    imagePullSecrets: "gcr-secret"
    # --- Gateway ---
    gateway:
      replicas: 2
      image:
        repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/firewall-cpu
        tag: "v2.9.5"
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: "250m"
          memory: 256Mi
        limits:
          cpu: "500m"
          memory: 512Mi
      startupProbe:
        failureThreshold: 12
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 4
        targetCPUUtilizationPercentage: 80
        targetMemoryUtilizationPercentage: 85
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      # Extra env hooks — see neuraltrust-data-plane.dataPlane.components.api above
      # for syntax. extraEnvFrom is appended to the existing
      # envFrom: [configMapRef: firewall-config] list.
      extraEnv: []
      extraEnvFrom: []
    # --- Worker defaults (shared by all workers) ---
    # Default: CPU image, no GPU scheduling. For GPU, override with:
    #   workerDefaults.image.repository: .../firewall-gpu
    #   workerDefaults.resources.requests/limits: nvidia.com/gpu: "1"
    #   workerDefaults.nodeSelector / tolerations / hostIPC: true
    workerDefaults:
      image:
        repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/firewall-cpu
        tag: "v2.9.5"
        pullPolicy: IfNotPresent
      replicas: 1
      resources:
        requests:
          cpu: "1"
          memory: 4Gi
        limits:
          cpu: "1.5"
          memory: 6Gi
      nodeSelector: {}
      tolerations: []
      hostIPC: false
      startupProbe:
        failureThreshold: 36
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 6
        targetCPUUtilizationPercentage: 80
        targetMemoryUtilizationPercentage: 85
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
    # --- Workers ---
    # Per-worker extraEnv / extraEnvFrom default to empty; add them under a worker
    # entry to inject extra env vars or envFrom sources into that specific worker
    # container. See neuraltrust-data-plane.dataPlane.components.api above for syntax.
    workers:
      toxicity:
        enabled: true
        module: src.workers.toxicity.app:app
        extraEnv: []
        extraEnvFrom: []
      toolguard:
        enabled: true
        module: src.workers.toolguard.app:app
        extraEnv: []
        extraEnvFrom: []
      prompt-jailbreak:
        enabled: true
        module: src.workers.prompt_jailbreak.app:app
        extraEnv: []
        extraEnvFrom: []
      prompt-moderation:
        enabled: true
        module: src.workers.prompt_moderation.app:app
        extraEnv: []
        extraEnvFrom: []
      response-jailbreak:
        enabled: true
        module: src.workers.response_jailbreak.app:app
        extraEnv: []
        extraEnvFrom: []
    # --- Shared settings ---
    config:
      pythonUnbuffered: "1"
      pythonDontWriteBytecode: "1"
      pythonPath: "/app"
      hfHome: "/root/.cache/huggingface"
      otelEnabled: "false"
    secrets:
      jwtSecret: ""
      huggingFaceToken: ""
    serviceAccount:
      create: true
      name: firewall
      annotations: {}
    podSecurityContext:
      fsGroup: 2000
    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
      runAsNonRoot: false
      runAsUser: 0
    healthCheckPolicy:
      enabled: false
    image:
      tag: v2.7.0
# ----------------------------------------------------------------------
# neuraltrust-watchdog (subchart)
# ----------------------------------------------------------------------
# Self-monitoring + self-healing controller. OFF by default. When
# enabled, the watchdog runs as a single Deployment in the release
# namespace and periodically probes the platform components configured
# under `neuraltrust-watchdog.checks`. Mutating actions default to
# dryRun: true so adoption can be incremental.
#
# Full reference: charts/neuraltrust-watchdog/values.yaml
# Example: values-watchdog.yaml.example
neuraltrust-watchdog:
  enabled: false
