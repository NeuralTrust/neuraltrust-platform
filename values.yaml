# NeuralTrust Platform (v2 only)
# =============================================================================
# v1 is maintained only on the v1.14.x release line — do not install this
# chart on a v1 cluster. Chart 2.0.0 is the official v2-only GA release.
# =============================================================================

global:
  # Cloud platform / Kubernetes flavour. Auto-configures ingress, security
  # contexts, and routing.
  # Supported: "aws" | "gcp" | "azure" | "openshift" | "kubernetes"
  platform: "gcp"
  # Split-plane boundary.
  #   "hybrid"   → only data-plane components deploy at the customer; control
  #                planes stay in NeuralTrust SaaS (default). DataAgent bridges
  #                local reads to the SaaS DataBridge. In-cluster Postgres +
  #                Redis deploy by default; ClickHouse does NOT deploy.
  #   "external" → control planes AND data planes deploy on-prem PLUS the
  #                self-hosted analytics stack (clickstack-otel-collector +
  #                DataCore over local ClickHouse). No SaaS dependency;
  #                DataAgent is not deployed.
  deploymentMode: "hybrid"
  # External-only bootstrap admin for control-plane-app. Ignored in hybrid
  # (app does not render). Prefer existingSecret (avoids Helm release history);
  # inline email+password is the escape hatch when both are non-empty.
  superadmin:
    email: ""
    password: ""
    existingSecret:
      name: ""
      emailKey: "ONPREM_SUPERADMIN_EMAIL"
      passwordKey: "ONPREM_SUPERADMIN_PASSWORD"
  # Hybrid product selection (positive opt-in). Defaults are all false so
  # overlays only declare what they want. External mode ignores these flags
  # and always deploys the full product stack. Firewall follows TrustGuard.
  products:
    trustgate: false
    trustguard: false
    dataPlane: false
  # v2 knobs: shared client_credentials pair AgentGateway presents to
  # TrustGuard. Both sides read the same Secret so id/secret stay in sync.
  v2:
    trustguardClientId: "agentgateway-platform"
    trustguardClientSecret: "" # Auto-generated when empty (global.autoGenerateSecrets)
    trustguardClientSecretName: ""
  # ClickStack OTLP export for the v2 data planes (AgentGateway + TrustGuard).
  #
  # HYBRID: always on. Apps send plain OTLP to a local ClusterIP Service
  # (clickstack-egress-collector) on the DataAgent pod. An OTel collector
  # sidecar exchanges via DataAgent's loopback OAuth broker (enrolment stays
  # on DataAgent only) and forwards to SaaS. There is no opt-out and no
  # direct SaaS authToken path. Requires dataagent enrolment (JWT carries
  # tenant_id / instance_id).
  # Air-gapped / local-only product telemetry → use deploymentMode=external.
  #
  # EXTERNAL: this block is ignored. Product telemetry stays in-cluster
  # (AgentGateway/TrustGuard → clickstack-otel-collector → local ClickHouse).
  clickstack:
    # Optional overrides for the egress sidecar's SaaS export target only.
    endpoint: ""
    protocol: ""
    insecure: false
    egress:
      nameOverride: "" # ClusterIP Service name (default clickstack-egress-collector)
      clientId: "otlp-egress" # non-secret oauth2client placeholder
      clientSecret: "unused" # non-secret oauth2client placeholder (broker ignores it)
      endpoint: "" # SaaS OTLP/HTTP base; default https://telemetry.neuraltrust.ai
      # OTel sidecar bind host (health + OTLP receivers). Chart emits [::]:port.
      # Override to "0.0.0.0" only for rare IPv4-only kernels with bindv6only=1.
      listenHost: "::"
      image:
        repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/opentelemetry-collector-contrib
        tag: "0.156.0"
        pullPolicy: IfNotPresent
      resources: {}
  # Base domain used for URL generation (<hostPrefix>.<domain>).
  domain: "neuraltrust.ai"
  imageRegistry: "" # Global registry mirror; empty = per-component defaults
  imagePullSecrets: [] # Optional global pull-secret list applied to platform workloads
  autoGenerateSecrets: true
  preserveExistingSecrets: false
  # Shared PostgreSQL (v2 hybrid + external control-plane).
  # Hybrid: every service (AgentGateway, TrustGuard, DataAgent, data-plane-api)
  # connects to ONE shared database via envFrom on the `postgresql-secrets`
  # Secret rendered from this block.
  # External: `deploy` still gates the in-cluster Postgres Deployment, and this
  # block (plus control-plane-api overlays) feeds the shared `postgresql-secrets`
  # used by control-plane-api/app. Runtime services keep their own per-service
  # `*.database` identities. Set `deploy: false` and `host`/credentials (or
  # existingSecret) for a hosted instance. Application migrations own tables;
  # there is no chart-managed schema init.
  postgresql:
    deploy: true
    host: "" # Empty + deploy=true resolves to the in-cluster "control-plane-postgresql" Service
    port: 5432
    user: neuraltrust
    database: neuraltrust
    password: "" # Empty auto-generates and stores it in postgresql-secrets
    sslMode: prefer
    # authMode: password | iam (external Postgres only; ignored when deploy=true).
    # awsRegion is required for IAM token minting on control-plane api/app.
    authMode: "password"
    awsRegion: ""
    existingSecret:
      name: ""
      keys:
        host: "DB_HOST"
        port: "DB_PORT"
        user: "DB_USER"
        password: "DB_PASSWORD"
        database: "DB_NAME"
        sslMode: "DB_SSL_MODE"
    # In-cluster PostgreSQL Deployment image/resources/persistence knobs.
    image:
      repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/postgres
      tag: "17-alpine"
      pullPolicy: IfNotPresent
      # Empty → global.imagePullSecrets → chart default gcr-secret. ["none"] suppresses.
      imagePullSecrets: []
    resources:
      requests:
        memory: 2Gi
        cpu: 500m
      limits:
        memory: 4Gi
        cpu: 2000m
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""
      preserveOnDelete: true
    service:
      type: ClusterIP
      port: 5432
  # Shared Redis (v2 hybrid).
  redis:
    deploy: true
    host: "" # Empty + deploy=true resolves to the in-cluster "redis" Service
    port: 6379
    password: ""
    username: ""
    tls: ""
    existingSecret:
      name: ""
      keys:
        host: "REDIS_HOST"
        port: "REDIS_PORT"
        password: "REDIS_PASSWORD"
        username: "REDIS_USERNAME"
        tls: "REDIS_TLS"
  security:
    allowInsecureImages: true # Bitnami charts require this
  storageClass: ""
  nodeSelector: {}
  tolerations: []
  proxy:
    enabled: false
    httpProxy: ""
    httpsProxy: ""
    noProxy: "localhost,127.0.0.1,::1,.cluster.local,.svc"
  customCaCert:
    enabled: false
    secretName: ""
    key: ca.crt
    mountPath: /etc/ssl/certs/custom-ca.crt
  irsa:
    roleArn: ""
    applyGlobally: false
  psc:
    negNames: {}
  ingress:
    provider: ""
    className: ""
    annotations: {}
    tls:
      autoGenerate: true
      secretName: "neuraltrust-ingress-tls"
      commonName: "neuraltrust.local"
      durationDays: 3650
    aws:
      scheme: "internet-facing"
      targetType: "ip"
      groupName: "neuraltrust"
      certificateArn: ""
      sslRedirect: "443"
      wafAclArn: ""
      additionalAnnotations: {}
    gcp:
      staticIpName: ""
      managedCertificates: ""
      backendConfig: ""
      sslRedirect: false
      neg:
        enabled: true
      additionalAnnotations: {}
    azure:
      appGatewayName: ""
      sslCertificate: ""
      sslRedirect: false
      wafPolicyId: ""
      requestTimeout: ""
      additionalAnnotations: {}
  monitoring:
    enabled: false
    additionalLabels: {}
    interval: 30s
    alertLabels:
      team: platform
  observability:
    enabled: false
    tenantId: ""
    clusterName: ""
    hostedExport:
      enabled: true
      endpoint: "https://collector.neuraltrust.ai"
      auth:
        tokenSecretName: "neuraltrust-observability-token"
        tokenSecretKey: "token"
        tokenValue: ""
      tlsCaSecretName: ""
      sendingQueue:
        enabled: true
        storage: file_storage
        maxSize: 1000
      retry:
        initialInterval: 5s
        maxInterval: 30s
        maxElapsedTime: 0s
    sendLogs: false
    sendTraces: true
    collector:
      fullnameOverride: "otel-collector"
      endpoint: ""
      # Bind host for health / OTLP / prometheus exporters. Default "::"
      # dual-stacks on Linux; set "0.0.0.0" only if bindv6only=1 breaks IPv4.
      listenHost: "::"
      image:
        repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/opentelemetry-collector-contrib
        tag: "0.156.0"
        pullPolicy: IfNotPresent
      imagePullSecret: "gcr-secret"
      replicas: 1
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 80
        targetMemoryUtilizationPercentage: 85
      podDisruptionBudget:
        enabled: false
        minAvailable: 1
      service:
        type: ClusterIP
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
      bufferPVC:
        enabled: true
        size: 2Gi
        storageClass: ""
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: [ALL]
      podAnnotations: {}
      podLabels: {}
      nodeSelector: {}
      tolerations: []
      affinity: {}
      debug: false
      extraReceivers: {}
      extraProcessors: {}
      extraExporters: {}
      extraServicePipelines: {}
      serviceAccount:
        create: true
        name: ""
        annotations: {}
      rbac:
        create: true
        clusterScoped: true
# Infrastructure toggles.
infrastructure:
  # In-cluster ClickHouse deploys ONLY in v2 external (hybrid stores analytics
  # in NeuralTrust SaaS). Set deploy=false to point at a hosted ClickHouse.
  clickhouse:
    deploy: true
    external:
      host: "clickhouse.clickhouse.svc.cluster.local"
      port: "8123"
      user: "neuraltrust"
      password: ""
      database: "neuraltrust"
      secretName: "clickhouse"
      secretKey: "admin-password"
  # In-cluster Redis Deployment knobs. host/port/password flow through
  # global.redis; the block below controls how the in-cluster Redis renders.
  redis:
    image:
      repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/redis-stack-server
      tag: "7.2.0-v20"
      pullPolicy: IfNotPresent
    port: 6379
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: false
      size: 2Gi
      storageClass: ""
    nodeSelector: {}
    tolerations: []
# ClickHouse subchart values (rendered only in v2 external).
clickhouse:
  securityHardening: true
  fullnameOverride: "clickhouse"
  replicaCount: 1
  imagePullSecrets: "gcr-secret"
  image:
    repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/clickhouse-server
    tag: "26.6"
    pullPolicy: IfNotPresent
  global:
    imagePullSecrets: []
  auth:
    username: "neuraltrust"
    password: ""
    existingSecret: ""
    existingSecretKey: "admin-password"
    database: "neuraltrust"
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources:
    requests:
      memory: 4Gi
      cpu: 1
    limits:
      memory: 8Gi
      cpu: 4
  logLevel: "fatal"
  listenHost: "::"
  backup:
    enabled: false
    schedule: "0 2 * * *"
    database: ""
    storage:
      type: s3
      s3:
        endpoint: ""
        accessKeyId: ""
        secretAccessKey: ""
        existingSecret: ""
        existingSecretKeyAccessKeyId: access-key-id
        existingSecretKeySecretAccessKey: secret-access-key
      azblob:
        connectionString: ""
        container: ""
        path: "clickhouse-backups/"
        existingSecret: ""
        existingSecretKeyConnectionString: connection-string
    image:
      repository: ""
      tag: ""
      pullPolicy: IfNotPresent
    serviceAccount:
      create: false
      name: ""
      annotations: {}
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    nodeSelector: {}
    tolerations: []
    affinity: {}
# =============================================================================
# Control-plane split (v2 external only).
# =============================================================================
# Both charts share the umbrella-owned `control-plane` ServiceAccount and
# `control-plane-secrets` Secret (templates/control-plane/). Component config
# lives inside each chart's own root; put shared knobs (secrets, image pull
# secret) under either root — the umbrella reads from both.
control-plane-api:
  imagePullSecrets: "gcr-secret"
  controlPlane:
    imagePullSecrets: "gcr-secret"
    serviceAccount:
      create: true
      name: control-plane
      annotations: {}
    secrets:
      controlPlaneJWTSecret: ""
      authSecret: ""
      openaiApiKey: ""
      resendApiKey: ""
      resendAlertSender: ""
      resendInviteSender: ""
      trustgateJwtSecret: ""
      firewallJwtSecret: ""
      modelScannerSecret: ""
    components:
      api:
        enabled: true
        host: ""
        hostPrefix: "api"
        service:
          type: ClusterIP
        ingress:
          enabled: true
          className: ""
          annotations: {}
          tls:
            enabled: true
            secretName: ""
        replicaCount: 2
        image:
          repository: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/control-plane-api"
          tag: "v1.23.1"
          pullPolicy: "Always"
        config:
          controlPlaneApiUrl: ""
          dataPlaneApiUrl: ""
        resources:
          requests:
            memory: 1Gi
            cpu: 1000m
          limits:
            memory: 2Gi
            cpu: 2000m
        autoscaling:
          enabled: false
          minReplicas: 1
          maxReplicas: 10
          targetCPUUtilizationPercentage: 80
          targetMemoryUtilizationPercentage: 80
        podDisruptionBudget:
          enabled: false
          minAvailable: 1
        extraEnv: []
        extraEnvFrom: []
      postgresql:
        # Per-service Postgres wiring for v2 external. Ignored in hybrid.
        # authMode: password | iam. IAM requires IRSA + awsRegion; the Python
        # API uses POSTGRES_CONNECTION_TYPE=aurora (emitted into postgresql-secrets).
        authMode: "password"
        awsRegion: "" # Required when authMode=iam → AWS_REGION (or set global.postgresql.awsRegion)
        secrets:
          name: "postgresql-secrets"
          user: "neuraltrust"
          password: ""
          database: "neuraltrust"
          host: "control-plane-postgresql"
          port: "5432"
control-plane-app:
  imagePullSecrets: "gcr-secret"
  controlPlane:
    imagePullSecrets: "gcr-secret"
    serviceAccount:
      create: true
      name: control-plane
      annotations: {}
    components:
      app:
        enabled: true
        host: ""
        hostPrefix: "app"
        hostname: "::"
        secondaryHost: ""
        service:
          type: ClusterIP
        ingress:
          enabled: true
          className: ""
          annotations: {}
          tls:
            enabled: true
            secretName: ""
        replicaCount: 2
        image:
          repository: "europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/app"
          tag: "v1.107.1"
          pullPolicy: "Always"
        config:
          nodeEnv: production
          port: 3000
          controlPlaneApiUrl: ""
          dataPlaneApiUrl: ""
          appUrl: ""
          nextAuthUrl: ""
          firewallApiUrl: ""
          forceV2Ui: "true"
          # Prefer platform env email (SES/SMTP/Resend) over per-org DB config.
          # Default true because this chart only renders in external mode.
          authEmailForceEnv: "true"
          agentgatewayUrl: ""
          agentgatewayProxyUrl: ""
          trustguardUrl: ""
          datacoreUrl: ""
          datacoreMetricsEnabled: "true"
          alertEngineApiUrl: ""
          trustlensApiUrl: ""
          modelScannerApiUrl: ""
          openaiModel: "gpt-4o-mini"
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 500m
        initContainer:
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
        autoscaling:
          enabled: false
          minReplicas: 1
          maxReplicas: 10
          targetCPUUtilizationPercentage: 80
          targetMemoryUtilizationPercentage: 80
        podDisruptionBudget:
          enabled: false
          minAvailable: 1
        extraEnv: []
        extraEnvFrom: []
      postgresql:
        # Per-service Postgres wiring for v2 external.
        # authMode: password | iam. IAM requires IRSA + awsRegion; the Next.js
        # app uses POSTGRES_AUTH_MODE=iam and mints a token for Prisma migrate.
        authMode: "password"
        awsRegion: "" # Required when authMode=iam → AWS_REGION (or set global.postgresql.awsRegion)
        secrets:
          name: "postgresql-secrets"
          user: "neuraltrust"
          password: ""
          database: "neuraltrust"
          host: "control-plane-postgresql"
          port: "5432"
# =============================================================================
# Platform v2 in-cluster services.
# =============================================================================

# TrustGate (commercial name for AgentGateway): admin + proxy/MCP. Image repo
# stays agentgateway for now; K8s names stay agentgateway-*.
agentgateway:
  image:
    tag: "v0.18.1"
  database:
    sslMode: "prefer"
    iamAuth: false
  redis:
    host: "redis"
    iamAuth: false
  trustguard:
    # Empty ⇒ stable in-cluster TrustGuard Service when
    # global.products.trustguard=true. Omitted entirely when Guard is off.
    baseURL: ""
  # Per-product DataAgent (hybrid). Nested so product overlays mix via -f.
  # Identity (tenant_id / instance_id) comes from the enrolment JWT only.
  dataagent:
    enrolment:
      token: ""
      existingSecret:
        name: ""
        key: "ENROLMENT_TOKEN"
    existingSecret:
      name: ""
# TrustGuard: control-plane + data-plane (/v1/evaluate).
trustguard:
  image:
    tag: "v0.19.1"
  database:
    sslMode: "prefer"
    iamAuth: false
  redis:
    host: "redis"
    iamAuth: false
  dataagent:
    enrolment:
      token: ""
      existingSecret:
        name: ""
        key: "ENROLMENT_TOKEN"
    existingSecret:
      name: ""
# TrustLens (opt-in, WIP).
trustlens:
  enabled: false
  image:
    tag: ""
  database:
    host: "control-plane-postgresql"
    sslMode: "prefer"
# Shared DataAgent defaults. Per-product enrolment lives only under
# agentgateway.dataagent / trustguard.dataagent.
dataagent:
  image:
    tag: "v0.4.0"
  databridge:
    addr: "databridge.neuraltrust.ai:443"
    serverName: "databridge.neuraltrust.ai"
  database:
    sslMode: "prefer"
# DataCore (v2 external only): residency API over local ClickHouse + Postgres
# (deployment metadata). Own `datacore` database/role — not the hybrid shared
# `global.postgresql` block.
datacore:
  image:
    tag: "v0.14.0"
  database:
    host: ""
    port: 5432
    name: "datacore"
    user: "datacore"
    sslMode: "prefer"
    iamAuth: false
  clickhouse:
    host: "clickhouse"
    nativePort: 9000
    database: "default"
    otelDatabase: "otel"
# ClickStack OTel collector (v2 external only): OTLP-to-ClickHouse pipeline.
clickstack-otel-collector:
  image:
    tag: "2.31.0"
    repository: europe-west1-docker.pkg.dev/neuraltrust-app-prod/nt-docker/clickstack-otel-collector
  clickhouse:
    endpoint: "http://clickhouse:8123"
    database: "otel"
# AlertEngine (v2 external only): detection rules over ClickHouse telemetry.
alertengine:
  enabled: true
  image:
    tag: "v0.5.0"
  database:
    host: ""
    port: 5432
    name: "alertengine"
    user: "alertengine"
    sslMode: "prefer"
    iamAuth: false
  clickhouse:
    host: "clickhouse"
    nativePort: 9000
    database: "otel"
    username: "neuraltrust"
    secure: false
